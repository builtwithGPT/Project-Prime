  for (let d = 0; d <= 42; d++) {
    const day = dayOffset(d);
    weight += (Math.random() * 0.15 - 0.03); // ~0.4 lbs/week gain trend
    const isWeekly = d % 7 === 0;
    bodyLogs.push({
      user_id: userId,
      date: day.toISOString(),
      weight: +weight.toFixed(1),
      waist:  isWeekly ? +(40.0 + d * 0.002 + (Math.random() * 0.1 - 0.05)).toFixed(1) : null,
      chest:  isWeekly ? +(41.5 + d * 0.006 + (Math.random() * 0.1)).toFixed(1) : null,
      arms:   isWeekly ? +(14.0 + d * 0.003 + (Math.random() * 0.05)).toFixed(1) : null,
      glutes: isWeekly ? +(41.0 + d * 0.008 + (Math.random() * 0.1)).toFixed(1) : null,
      thighs: isWeekly ? +(22.5 + d * 0.004 + (Math.random() * 0.1)).toFixed(1) : null,
      hips:   isWeekly ? +(40.5 + d * 0.002).toFixed(1) : null,
    });
  }
  // Insert in batches of 20
  for (let i = 0; i < bodyLogs.length; i += 20) {
    await fetch(SUPABASE_URL + "/rest/v1/body_logs", {
      method: "POST", headers, body: JSON.stringify(bodyLogs.slice(i, i + 20)),
    });
  }

  // ── 3. Workout logs — 3x/week, progressive overload ─────────────────────
  // Workout days: Mon, Wed, Fri = day offsets 0,2,4 of each week
  // Exercise sets rotate through muscle groups
  const workoutDays = [];
  for (let w = 0; w < 6; w++) {
    for (const offset of [0, 2, 4]) {
      const d = w * 7 + offset;
      if (d <= 84) workoutDays.push(d);
    }
  }

  // Progressive weights: week 1 baseline, +2.5 lbs every 2 weeks per exercise
  const baseWeights = { 3: 20, 4: 15, 5: 25, 7: 10, 9: 45, 11: 20, 12: 15, 13: 15, 14: 20, 15: 25, 16: 15, 17: 15, 19: 15 };
  const workoutLogs = [];
  for (const d of workoutDays) {
    const day = dayOffset(d);
    const week = Math.floor(d / 7);
    const progress = week * 2.5;
    // Always log warmups (ex 1,2) + rotation of main lifts
    const exIds = [1, 2]; // warmup always
    // Alternate upper/lower
    if (d % 14 < 7) {
      exIds.push(...[3, 4, 5, 6, 7, 8]); // upper
    } else {
      exIds.push(...[9, 11, 14, 15, 16]); // lower + shoulders + arms
    }
    for (const exId of exIds) {
      const ex = INITIAL_EXERCISES[exId - 1];
      if (!ex) continue;
      const sets = parseInt(ex.defaultSets) || 3;
      const reps = parseInt(ex.defaultReps) || 10;
      const baseW = baseWeights[exId] || 0;
      const weight = ex.type === "weighted" ? Math.round((baseW + progress) / 2.5) * 2.5 : 0;
      workoutLogs.push({
        user_id: userId,
        exercise_id: exId,
        date: day.toISOString(),
        sets, reps,
        weight,
        notes: "Set 1: " + reps + "r@" + weight + "lbs | Set 2: " + reps + "r@" + weight + "lbs | Set 3: " + reps + "r@" + weight + "lbs",
      });
    }
  }
  for (let i = 0; i < workoutLogs.length; i += 20) {
    await fetch(SUPABASE_URL + "/rest/v1/workout_logs", {
      method: "POST", headers, body: JSON.stringify(workoutLogs.slice(i, i + 20)),
    });
  }

  // ── 4. Nutrition days — 6/7 days compliance, strong protein ────────────
  const nutritionLogs = [];
  for (let d = 0; d <= 42; d++) {
    if (Math.random() < 0.14) continue; // ~1 skip per week
    const day = dayOffset(d);
    const hitProtein = Math.random() > 0.15;
    const calories = 2580 + Math.round(Math.random() * 200 - 50);
    const protein  = hitProtein ? 185 + Math.round(Math.random() * 20) : 140 + Math.round(Math.random() * 30);
    const fat      = 60 + Math.round(Math.random() * 15);
    const carbs    = Math.round((calories - protein * 4 - fat * 9) / 4);
    nutritionLogs.push({
      user_id: userId,
      date: dateStr(day),
      phase: "Gain Phase",
      total_calories: calories,
      total_protein: protein,
      total_carbs: Math.max(carbs, 150),
      total_fat: fat,
      target_calories: 2650,
      target_protein: 191,
      target_carbs: 220,
      target_fat: 65,
      compliance: hitProtein ? "GOOD" : "NEEDS IMPROVEMENT",
      notes: "Dev seeded data",
    });
  }
  for (let i = 0; i < nutritionLogs.length; i += 20) {
    await fetch(SUPABASE_URL + "/rest/v1/nutrition_days", {
      method: "POST", headers, body: JSON.stringify(nutritionLogs.slice(i, i + 20)),
    });
  }

  // ── 5. Recovery sessions — 5x/week ──────────────────────────────────────
  const recovTemplates = ["Daily Maintenance", "Post-Lift Reset", "Full Body Recovery"];
  const recoverySessions = [];
  for (let d = 0; d <= 42; d++) {
    if (Math.random() < 0.28) continue; // ~5/week
    const day = dayOffset(d);
    const template = recovTemplates[d % recovTemplates.length];
    const beforeEnergy = 2 + Math.round(Math.random() * 2);
    const afterEnergy  = Math.min(5, beforeEnergy + 1 + Math.round(Math.random()));
    const beforeHeel   = Math.round(Math.random() * 3);
    const afterHeel    = Math.max(0, beforeHeel - Math.round(Math.random() * 2));
    recoverySessions.push({
      user_id: userId,
      date: dateStr(day),
      template_name: template,
      duration_minutes: 15 + Math.round(Math.random() * 20),
      completed_count: 4 + Math.round(Math.random() * 2),
      total_count: 6,
      before_energy: beforeEnergy,
      after_energy: afterEnergy,
      before_soreness: 2 + Math.round(Math.random() * 2),
      after_soreness: 1 + Math.round(Math.random()),
      before_heel_pain: beforeHeel,
      after_heel_pain: afterHeel,
      before_low_back_tightness: Math.round(Math.random() * 2),
      after_low_back_tightness: Math.round(Math.random()),
      result_rating: afterEnergy > beforeEnergy ? "better" : "neutral",
      items: [],
    });
  }
  for (let i = 0; i < recoverySessions.length; i += 20) {
    await fetch(SUPABASE_URL + "/rest/v1/recovery_sessions", {
      method: "POST", headers, body: JSON.stringify(recoverySessions.slice(i, i + 20)),
    });
  }

  return {
    bodyLogs: bodyLogs.length,
    workoutLogs: workoutLogs.length,
    nutritionLogs: nutritionLogs.length,
    recoverySessions: recoverySessions.length,
  };
}

// ─── PROJECT PRIME SCORE ENGINE ───────────────────────────────────────────────

function calcStrengthScore(workoutLogs, exercises, phase) {
  if (!phase?.startDate) return { score: null, pct: null, comparable: 0, window: 0 };
  const phaseStart = new Date(phase.startDate);
  const now        = new Date();
  const daysSince  = Math.round((now - phaseStart) / 86400000);

  // Choose rolling window: 28-day preferred, 14-day fallback for early phase
  const windowDays = daysSince >= 28 ? 28 : 14;
  const windowStart = new Date(now);
  windowStart.setDate(now.getDate() - windowDays);

  // Use phase start as baseline anchor (first 7 days) vs current window (last 14/28 days)
  const baselineEnd = new Date(phaseStart);
  baselineEnd.setDate(phaseStart.getDate() + 7);

  const calcSF = (log, ex) => {
    if (ex.type === "weighted")   return log.sets * log.reps * log.weight;
    if (ex.type === "bodyweight") return log.sets * log.reps * 10;
    return log.sets * log.reps; // banded
  };

  // Group all phase logs by exercise
  const ssBaselines = getBaselines(); // per-exercise recalibration baselines
  const byEx = {};
  workoutLogs.forEach(l => {
    const ex = exercises.find(e => Number(e.id) === Number(l.exerciseId));
    if (!ex) return;
    const d = new Date(l.date);
    if (d < phaseStart) return;
    const key = Number(l.exerciseId);
    if (!byEx[key]) byEx[key] = { ex, baseline: [], current: [] };
    // If a recalibration baseline exists, use it as the baseline anchor instead of phase-start week
    const exBaseline = ssBaselines[String(key)];
    const effectiveBaselineEnd = exBaseline
      ? new Date(exBaseline.date)
      : baselineEnd;
    if (d <= effectiveBaselineEnd) byEx[key].baseline.push({ sf: calcSF(l, ex), date: d });
    // Current: within rolling window
    if (d >= windowStart) byEx[key].current.push({ sf: calcSF(l, ex), date: d });
  });

  // For each exercise with both baseline and current data, compute like-for-like progress
  const progValues = [];
  Object.values(byEx).forEach(({ ex, baseline, current }) => {
    if (baseline.length === 0 || current.length === 0) return;
    // Use best SF in baseline period (peaked performance, not first-day only)
    const sfBaseline = Math.max.apply(null, baseline.map(e => e.sf));
    // Use best SF in current window
    const sfCurrent  = Math.max.apply(null, current.map(e => e.sf));
    if (sfBaseline === 0) return;
    progValues.push((sfCurrent - sfBaseline) / sfBaseline * 100);
  });

  // Fallback: if baseline window has no data yet (phase too new),
  // use first-vs-last for each exercise with 2+ sessions
  if (progValues.length === 0) {
    Object.values(byEx).forEach(({ ex, baseline, current }) => {
      const allLogs = [...baseline, ...current].sort((a, b) => a.date - b.date);
      if (allLogs.length < 2) return;
      const sfFirst = allLogs[0].sf, sfLast = allLogs[allLogs.length - 1].sf;
      if (sfFirst === 0) return;
      progValues.push((sfLast - sfFirst) / sfFirst * 100);
    });
  }

  if (progValues.length === 0) return { score: null, pct: null, comparable: 0, window: windowDays };
  const avgPct = progValues.reduce((s, v) => s + v, 0) / progValues.length;

  let score;
  if      (avgPct >= 5.0)  score = 100;
  else if (avgPct >= 3.0)  score = 95;
  else if (avgPct >= 2.0)  score = 90;
  else if (avgPct >= 1.0)  score = 85;
  else if (avgPct >= 0.0)  score = 75;
  else if (avgPct >= -1.0) score = 65;
  else if (avgPct >= -3.0) score = 50;
  else                      score = 25;

  return { score, pct: +avgPct.toFixed(1), comparable: progValues.length, window: windowDays };
}

function calcWaistScore(bodyLogs, phase) {
  if (!phase?.startDate) return { score: null, change: null };
  const phaseStart = new Date(phase.startDate);
  const phaseLogs  = [...bodyLogs].filter(l => l.waist && new Date(l.date) >= phaseStart).sort((a, b) => new Date(a.date) - new Date(b.date));
  if (phaseLogs.length < 1) return { score: null, change: null };

  const baseline = phaseLogs[0].waist;
  // Use average of last 2 measurements to reduce noise
  const recent = phaseLogs.slice(-2);
  const current = recent.reduce((s, l) => s + l.waist, 0) / recent.length;
  const change  = +(current - baseline).toFixed(2);

  let score;
  if      (change <= 0.00) score = 100;
  else if (change <= 0.25) score = 95;
  else if (change <= 0.50) score = 90;
  else if (change <= 0.75) score = 80;
  else if (change <= 1.00) score = 70;
  else if (change <= 1.50) score = 50;
  else                      score = 25;

  return { score, change };
}

function calcWeightScore(bodyLogs, phase) {
  if (!phase?.startDate) return { score: null, rate: null };
  const phaseStart = new Date(phase.startDate);
  const wLogs = [...bodyLogs].filter(l => l.weight && new Date(l.date) >= phaseStart).sort((a, b) => new Date(a.date) - new Date(b.date));
  if (wLogs.length < 2) return { score: null, rate: null };

  // 7-day rolling averages
  const now   = new Date();
  const d7ago = new Date(now); d7ago.setDate(d7ago.getDate() - 7);
  const d14ago = new Date(now); d14ago.setDate(d14ago.getDate() - 14);

  const recent = wLogs.filter(l => new Date(l.date) >= d7ago);
  const prior  = wLogs.filter(l => new Date(l.date) >= d14ago && new Date(l.date) < d7ago);

  if (recent.length === 0) {
    // Fall back to simple rate over all data
    const days = (new Date(wLogs[wLogs.length-1].date) - new Date(wLogs[0].date)) / 86400000;
    if (days < 1) return { score: null, rate: null };
    const rate = +((wLogs[wLogs.length-1].weight - wLogs[0].weight) / days * 7).toFixed(2);
    return scoreFromRate(rate);
  }

  const avgRecent = recent.reduce((s, l) => s + l.weight, 0) / recent.length;
  if (prior.length === 0) return { score: 75, rate: null }; // not enough prior data
  const avgPrior  = prior.reduce((s, l)  => s + l.weight, 0) / prior.length;
  const rate = +(avgRecent - avgPrior).toFixed(2);
  return scoreFromRate(rate);
}

function scoreFromRate(rate) {
  let score;
  if      (rate >= 0.25 && rate <= 0.50) score = 100;
  else if (rate >= 0.10 && rate <  0.25) score = 90;
  else if (rate >  0.50 && rate <= 0.75) score = 85;
  else if (rate >= 0.00 && rate <  0.10) score = 75;
  else if (rate >  0.75 && rate <= 1.00) score = 70;
  else if (rate <  0.00)                  score = 60;
  else                                    score = 50; // > 1.00
  return { score, rate };
}

function calcPrimeScore(strengthScore, waistScore, weightScore) {
  const s = strengthScore ?? 50;
  const w = waistScore    ?? 75;
  const g = weightScore   ?? 75;
  return Math.max(1, Math.min(100, Math.round(s * 0.50 + w * 0.30 + g * 0.20)));
}

function scoreToBand(score) {
  if (score >= 90) return { label: "ON TRACK",        color: "#4AD99A", bg: "#4AD99A0D", border: "#4AD99A33" };
  if (score >= 80) return { label: "CAUTION",         color: "#E8A838", bg: "#E8A8380D", border: "#E8A83833" };
  if (score >= 70) return { label: "ADJUST",          color: "#E87D38", bg: "#E87D380D", border: "#E87D3833" };
  return               { label: "WRONG DIRECTION", color: "#D94A4A", bg: "#D94A4A0D", border: "#D94A4A33" };
}

function calcPrimeScoreState(confidence, strengthResult, waistResult, weightResult) {
  const { tier, weighIns, workoutDays, nutritionLogs, waistSessions, daysSince } = confidence;

  // Baseline thresholds — waist is weekly so only need 1 session to pass
  const hasWeight    = weighIns      >= 7;
  const hasWaist     = (waistSessions >= 1);
  const hasStrength  = strengthResult.comparable >= 2;
  const hasNutrition = nutritionLogs  >= 5;

  if (tier === "low" || daysSince < 7 || !hasStrength) {
    return {
      mode: "baseline",
      checklist: [
        { label: "7 daily weigh-ins",         done: hasWeight,    current: weighIns,      target: 7 },
        { label: "1 weekly waist measurement", done: hasWaist,     current: waistSessions, target: 1 },
        { label: "2 comparable workouts",      done: hasStrength,  current: strengthResult.comparable, target: 2 },
        { label: "5 nutrition days logged",    done: hasNutrition, current: nutritionLogs, target: 5 },
      ],
    };
  }

  if (tier === "medium") return { mode: "preliminary" };
  return { mode: "active" };
}

// ─── PROJECT PRIME CONFIDENCE ENGINE ──────────────────────────────────────────
// Separates "what the data says" from "how much we trust the data"

function calcConfidence(phase, bodyLogs, workoutLogs, nutritionDays) {
  if (!phase) return { tier: "none", score: 0, daysSince: 0, weighIns: 0, workoutDays: 0, nutritionLogs: 0, waistSessions: 0, reasons: [] };

  const phaseStart    = new Date(phase.startDate);
  const now           = new Date();
  const daysSince     = Math.max(0, Math.round((now - phaseStart) / 86400000));
  const phaseLogs     = bodyLogs.filter(l => new Date(l.date) >= phaseStart);
  const weighIns      = phaseLogs.filter(l => l.weight).length;
  // Waist is weekly — count measurement sessions (unique dates with waist data)
  const waistSessions = [...new Set(phaseLogs.filter(l => l.waist).map(l => l.date.split("T")[0]))].length;
  const workoutDays   = [...new Set(
    workoutLogs.filter(l => new Date(l.date) >= phaseStart).map(l => l.date.split("T")[0])
  )].length;
  const nutritionLogs = nutritionDays.filter(d => new Date(d.date + "T12:00:00") >= phaseStart).length;

  // Score each dimension 0-25
  // Weight: daily — need 7 days for a full rolling window
  const timeScore      = Math.min(25, (daysSince / 21) * 25);
  const weightScore    = Math.min(25, (weighIns  / 7)  * 25);
  const trainingScore  = Math.min(25, (workoutDays / 6) * 25);
  const nutritionScore = Math.min(25, (nutritionLogs / 7) * 25);
  const score = Math.round(timeScore + weightScore + trainingScore + nutritionScore);

  // Tier logic — waist only needs 1 session for medium, 2 for high (weekly cadence)
  let tier;
  if (score < 30 || daysSince < 7)        tier = "low";
  else if (score < 65 || daysSince < 14)  tier = "medium";
  else                                     tier = "high";

  // High confidence requires at least 2 weekly waist sessions
  if (tier === "high" && waistSessions < 2) tier = "medium";

  const reasons = [];
  if (weighIns     < 7)  reasons.push(weighIns + " weigh-in" + (weighIns !== 1 ? "s" : "") + " (need 7 for rolling average)");
  if (workoutDays  < 3)  reasons.push(workoutDays + " workout day" + (workoutDays !== 1 ? "s" : "") + " logged");
  if (nutritionLogs < 5) reasons.push(nutritionLogs + " nutrition day" + (nutritionLogs !== 1 ? "s" : "") + " logged");
  if (waistSessions < 1) reasons.push("No waist measurement yet (weekly cadence)");
  if (daysSince    < 7)  reasons.push(daysSince + " day" + (daysSince !== 1 ? "s" : "") + " into phase");

  return { tier, score, daysSince, weighIns, workoutDays, nutritionLogs, waistSessions, reasons };
}

// Derive the overall phase verdict using confidence tier + trend direction
function calcVerdict(confidence, weightStatus, waistStatus, pfStatus, phase) {
  const { tier } = confidence;

  // No phase — no verdict
  if (!phase) return "gray";

  // Low confidence — always baseline regardless of numbers
  if (tier === "low") return "baseline";

  // Medium confidence — softer thresholds, no red
  if (tier === "medium") {
    const anyBad = weightStatus === "red" || waistStatus === "red";
    if (anyBad) return "yellow";
    const allOk = weightStatus === "green" && waistStatus !== "red";
    return allOk ? "green" : "yellow";
  }

  // High confidence — full spectrum
  const anyRed   = weightStatus === "red" || waistStatus === "red" || pfStatus === "red";
  const allGreen = weightStatus === "green" && waistStatus !== "red" && pfStatus !== "red";
  if (anyRed)   return "red";
  if (allGreen) return "green";
  return "yellow";
}

// Build the four-part coach narrative — always references trends, not single data points
function buildCoachNarrative(confidence, weightChange, wRate, waistChange, totalPFChange, verdict, phase, weeklyReview) {
  if (weeklyReview && weeklyReview.executive_summary && !weeklyReview.executive_summary.includes("error")) {
    return weeklyReview.executive_summary;
  }
  if (!phase) return "Set an active phase to unlock your coaching assessment.";

  const tier    = confidence.tier;
  const daysSince = confidence.daysSince || 0;
  const weighIns  = confidence.weighIns  || 0;
  const isGain  = phase.type === "gain";

  if (tier === "low") {
    const wNote  = weightChange !== null && weightChange > 0
      ? "Body weight has increased " + weightChange + " lbs since phase start. This likely reflects increased food volume, glycogen storage, and hydration — not fat gain. "
      : "";
    const pfNote = totalPFChange !== null && totalPFChange > 0
      ? "Strength Factor is showing a " + totalPFChange + "% improvement — a strong early signal. "
      : "";
    return wNote + pfNote + "Only " + daysSince + " day" + (daysSince !== 1 ? "s" : "") + " of data with " + weighIns + " weigh-in" + (weighIns !== 1 ? "s" : "") + " — not enough for a reliable trend. Focus on consistent daily logging. No adjustments recommended.";
  }

  if (tier === "medium") {
    const wNote = wRate !== null
      ? "The 7-day rolling weight average is trending at " + (wRate >= 0 ? "+" : "") + wRate + " lbs/week — " + (isGain ? (wRate > 0.8 ? "slightly above target pace, worth monitoring" : wRate < 0.2 ? "below target pace, check calorie surplus" : "within the ideal gain range") : "on track") + ". "
      : "";
    const waistNote = waistChange !== null
      ? "Waist trend (rolling average) is " + (waistChange === 0 ? "stable" : (waistChange > 0 ? "up +" + waistChange + '"' : "down " + Math.abs(waistChange) + '"') + " from baseline") + ", which is " + (waistChange <= 0.5 ? "acceptable at this stage" : "worth monitoring — wait for 2+ more weekly measurements before adjusting") + ". "
      : "";
    const pfNote = totalPFChange !== null
      ? "Strength Factor is " + (totalPFChange > 0 ? "up " + totalPFChange + "%" : "flat or declining") + " since phase start. "
      : "";
    return wNote + waistNote + pfNote + "Trends are emerging. Continue collecting data before making plan adjustments.";
  }

  if (verdict === "green") {
    const wTrend    = wRate !== null ? "Weight has been trending at " + (wRate >= 0 ? "+" : "") + wRate + " lbs/week (7-day rolling average)" : "Weight trend is controlled";
    const waistNote = waistChange !== null && waistChange <= 0.25 ? " while the waist rolling average remains stable — indicating lean muscle gain" : "";
    const pfNote    = totalPFChange !== null && totalPFChange > 0 ? ". Strength Factor is up " + totalPFChange + "% since phase start" : "";
    return wTrend + waistNote + pfNote + ". Continue the current plan.";
  }
  if (verdict === "red") {
    const wWarn    = wRate !== null && wRate > 0.8 ? "The 7-day rolling weight average is trending at " + wRate + " lbs/week — above the ideal 0.25-0.75 lbs/week range. " : "";
    const waistWarn = waistChange !== null && waistChange > 0.75 ? "Waist rolling average has increased " + waistChange + '" from baseline — possible excess fat accumulation. ' : "";
    return wWarn + waistWarn + "Review nutrition and training load. Confirm the trend holds over 7-10 more days before making significant changes.";
  }
  return "Progress is mixed. Continue consistent logging and avoid large plan changes until trends are clearly confirmed over multiple weeks.";
}

function BodyTab({ bodyLogs, onSave, workoutLogs, exercises, nutritionDays, recoverySessions, phase, phaseInfo }) {
  const [showForm, setShowForm]     = useState(false);
  const [fields, setFields]         = useState({ weight: "", chest: "", waist: "", hips: "", glutes: "", thighs: "", arms: "" });
  const [saveStatus, setSaveStatus] = useState(null);
  const [activeTrend, setActiveTrend] = useState("weight");
  const [weeklyReview, setWeeklyReview] = useState(null);
  const [generating, setGenerating]     = useState(false);
  const [showAllWins, setShowAllWins]     = useState(false);
  const [reviewSaveStatus, setReviewSaveStatus] = useState(null);
  const setF = (k) => (e) => setFields(f => ({ ...f, [k]: e.target.value }));

  // ── Data derivations ───────────────────────────────────────────────────────
  const sorted = [...bodyLogs].sort((a, b) => new Date(a.date) - new Date(b.date));
  const latest = sorted[sorted.length - 1] || {};
  const phaseStart = phase?.startDate ? new Date(phase.startDate) : null;

  // Get first body log at or after phase start (baseline)
  const baseline = phaseStart
    ? sorted.find(l => new Date(l.date) >= phaseStart) || sorted[0]
    : sorted[0];

  const weightSeries = sorted.filter(l => l.weight).map(l => ({ value: l.weight, date: l.date }));
  const waistSeries  = sorted.filter(l => l.waist).map(l => ({ value: l.waist,  date: l.date }));
  const chestSeries  = sorted.filter(l => l.chest).map(l => ({ value: l.chest,  date: l.date }));
  const armsSeries   = sorted.filter(l => l.arms).map(l =>  ({ value: l.arms,   date: l.date }));
  const glutesSeries = sorted.filter(l => l.glutes).map(l => ({ value: l.glutes, date: l.date }));
  const thighsSeries = sorted.filter(l => l.thighs).map(l => ({ value: l.thighs, date: l.date }));

  const latestWeight = latest.weight || null;
  const baseWeight   = baseline?.weight || null;

  // 7-day rolling average — more stable than single weigh-in
  const now7 = new Date();
  const d7   = new Date(now7); d7.setDate(now7.getDate() - 7);
  const d14  = new Date(now7); d14.setDate(now7.getDate() - 14);
  const recentW7  = weightSeries.filter(e => new Date(e.date) >= d7);
  const priorW7   = weightSeries.filter(e => new Date(e.date) >= d14 && new Date(e.date) < d7);
  const avg7day   = recentW7.length  ? +(recentW7.reduce((s, e)  => s + e.value, 0) / recentW7.length).toFixed(1)  : null;
  const avgPrior7 = priorW7.length   ? +(priorW7.reduce((s, e)   => s + e.value, 0) / priorW7.length).toFixed(1)   : null;

  // Phase-total weight change uses rolling avg vs baseline
  const weightChange = avg7day && baseWeight ? +(avg7day - baseWeight).toFixed(1) : null;

  // Weekly rate: current 7d avg minus prior 7d avg
  const wRate = avg7day !== null && avgPrior7 !== null
    ? +(avg7day - avgPrior7).toFixed(2)
    : (() => {
        // Fallback: simple rate over all phase data when not enough for rolling windows
        if (weightSeries.length < 2) return null;
        const first = weightSeries[0], last = weightSeries[weightSeries.length - 1];
        const days = (new Date(last.date) - new Date(first.date)) / 86400000;
        if (days < 1) return null;
        return +((last.value - first.value) / days * 7).toFixed(2);
      })();

  // Weight KPI status (Gain phase: ideal +0.25–0.75/wk)
  // Weight status requires 7+ weigh-ins for a valid rolling trend
  const phaseWeighIns = sorted.filter(l => l.weight && phaseStart && new Date(l.date) >= phaseStart).length;
  const weightHasTrend = phaseWeighIns >= 7 && wRate !== null;

  const weightStatus = (() => {
    if (!weightHasTrend) return "blue"; // collecting data
    const isGain = phase?.type === "gain";
    if (isGain) {
      if (wRate >= 0.2 && wRate <= 0.8) return "green";
      if (wRate > 0.8) return "red";
      return "yellow";
    } else {
      if (wRate <= -0.5 && wRate >= -1.5) return "green";
      if (wRate < -1.5) return "red";
      return "yellow";
    }
  })();

  const weightStatusLabel = (() => {
    if (!weightHasTrend) {
      if (phaseWeighIns === 0) return "⚪ No Data";
      return "🔵 Collecting Data (" + phaseWeighIns + "/7 weigh-ins)";
    }
    const isGain = phase?.type === "gain";
    if (isGain) {
      if (weightStatus === "green") return "🟢 Ideal Gain Pace";
      if (weightStatus === "red")   return "🔴 Too Fast";
      return "🟡 Too Slow";
    } else {
      if (weightStatus === "green") return "🟢 Ideal Cut Pace";
      if (weightStatus === "red")   return "🔴 Too Fast";
      return "🟡 Too Slow";
    }
  })();

  // Waist KPI — weekly measurement, rolling avg of last 2-3 vs baseline
  const latestWaist = latest.waist || null;
  const baseWaist   = baseline?.waist || null;
  const waistSorted = sorted.filter(l => l.waist && phaseStart && new Date(l.date) >= phaseStart);
  const waistRolling = (() => {
    if (waistSorted.length === 0) return null;
    const last3 = waistSorted.slice(-3);
    return +(last3.reduce((s, l) => s + l.waist, 0) / last3.length).toFixed(2);
  })();
  // Need 2+ measurements (baseline + at least one follow-up) for a valid trend
  const waistHasTrend = waistSorted.length >= 2 && waistRolling !== null && baseWaist !== null;
  const waistChange = waistRolling !== null && baseWaist ? +(waistRolling - baseWaist).toFixed(2) : null;

  const waistStatus = (() => {
    if (waistSorted.length === 0) return "gray";       // no data at all
    if (!waistHasTrend)           return "blue";       // only baseline, awaiting follow-up
    return waistChange <= 0.25 ? "green" : waistChange <= 0.75 ? "yellow" : "red";
  })();

  const waistStatusLabel = (() => {
    if (waistSorted.length === 0) return "⚪ No Measurement";
    if (!waistHasTrend)           return "🔵 Baseline Set · Awaiting Weekly Measurement";
    return waistStatus === "green" ? "🟢 Stable" : waistStatus === "yellow" ? "🟡 Slight Increase" : "🔴 Increasing";
  })();

  // Sub-label for waist card — no "No change from baseline" unless trend is valid
  const waistSubLabel = (() => {
    if (waistSorted.length === 0) return null;
    if (!waistHasTrend) return "Baseline: " + baseWaist + '"  ·  Next weekly measurement needed';
    return waistChange === 0 ? "No change from baseline" : (waistChange > 0 ? "+" : "") + waistChange + '" from baseline';
  })();

  // Strength Factor KPI
  const pfSince = (exerciseIds, since) => {
    const sinceDate = since ? new Date(since) : null;
    const relevant = workoutLogs.filter(l => !sinceDate || new Date(l.date) >= sinceDate);
    const byEx = {};
    relevant.forEach(l => {
      const ex = exercises.find(e => Number(e.id) === Number(l.exerciseId));
      if (!ex) return;
      if (exerciseIds && !exerciseIds.includes(Number(l.exerciseId))) return;
      if (!byEx[l.exerciseId]) byEx[l.exerciseId] = [];
      byEx[l.exerciseId].push({ pf: calcPF(l.sets, l.reps, l.weight, ex.type, ex.laterality), date: l.date });
    });
    return byEx;
  };

  const upperGroups = ["Chest", "Back", "Shoulders", "Arms"];
  const lowerGroups = ["Glutes", "Hamstrings", "Legs"];
  const upperExIds  = exercises.filter(e => upperGroups.includes(e.muscleGroup)).map(e => Number(e.id));
  const lowerExIds  = exercises.filter(e => lowerGroups.includes(e.muscleGroup)).map(e => Number(e.id));

  const calcGroupPFChange = (exIds) => {
    const since = phase?.startDate;
    const bodyBaselines = getBaselines(); // respect per-exercise recalibration baselines
    const byEx = pfSince(exIds, null);
    let totalFirst = 0, totalLast = 0, count = 0;
    Object.entries(byEx).forEach(([exId, entries]) => {
      if (exIds && !exIds.includes(Number(exId))) return;
      if (entries.length < 2) return;
      const sorted = [...entries].sort((a, b) => new Date(a.date) - new Date(b.date));
      // If a recalibration baseline exists for this exercise, use it as the start point.
      // Otherwise fall back to phase start date.
      const exBaseline = bodyBaselines[String(exId)];
      const baselineDate = exBaseline?.date || since;
      const phaseEntries = baselineDate ? sorted.filter(e => new Date(e.date) >= new Date(baselineDate)) : sorted;
      if (phaseEntries.length < 2) return;
      totalFirst += phaseEntries[0].pf;
      totalLast  += phaseEntries[phaseEntries.length - 1].pf;
      count++;
    });
    if (count === 0 || totalFirst === 0) return null;
    return +((totalLast - totalFirst) / totalFirst * 100).toFixed(1);
  };

  const totalPFChange = calcGroupPFChange([...upperExIds, ...lowerExIds]);
  const upperPFChange = calcGroupPFChange(upperExIds);
  const lowerPFChange = calcGroupPFChange(lowerExIds);

  // PF status requires both: 2+ comparable workouts AND 14+ days
  const pfDaysSince = phase?.startDate ? Math.round((new Date() - new Date(phase.startDate)) / 86400000) : 0;
  const pfComparableCount = strengthResult?.comparable || 0;
  const pfHasTrend = pfComparableCount >= 2 && pfDaysSince >= 14;
  const pfEarlySignal = pfComparableCount >= 2 && pfDaysSince < 14;
  const pfNeedData = pfComparableCount < 2;

  const pfStatus = (() => {
    if (pfNeedData)     return "gray";
    if (pfEarlySignal)  return "blue";
    if (totalPFChange === null) return "gray";
    return totalPFChange >= 3 ? "green" : totalPFChange >= 0 ? "yellow" : "red";
  })();

  const pfStatusLabel = (() => {
    if (pfNeedData)    return pfComparableCount === 0 ? "⚪ No Workouts Yet" : "⚪ Need Another Workout";
    if (pfEarlySignal) return "🔵 Early Strength Signal";
    if (totalPFChange === null) return "⚪ No data";
    return pfStatus === "green" ? "🟢 Strength Increasing" : pfStatus === "yellow" ? "🟡 Plateau" : "🔴 Declining";
  })();

  // PF sub-label changes based on maturity
  const pfSubLabel = (() => {
    if (pfNeedData)    return "Log another workout session to enable comparison";
    if (pfEarlySignal) return "Initial trend — active after 14 days of comparable data";
    return "Active strength trend (" + pfDaysSince + "d of data)";
  })();

  // Physique ratios
  const ratios = (() => {
    const w = latestWaist;
    if (!w) return null;
    const bw = baseline?.waist;
    return [
      { name: "Chest:Waist",  val: latest.chest  ? +(latest.chest  / w).toFixed(2) : null, base: (baseline?.chest  && bw) ? +(baseline.chest  / bw).toFixed(2) : null },
      { name: "Arms:Waist",   val: latest.arms   ? +(latest.arms   / w).toFixed(2) : null, base: (baseline?.arms   && bw) ? +(baseline.arms   / bw).toFixed(2) : null },
      { name: "Thighs:Waist", val: latest.thighs ? +(latest.thighs / w).toFixed(2) : null, base: (baseline?.thighs && bw) ? +(baseline.thighs / bw).toFixed(2) : null },
      { name: "Glutes:Waist", val: latest.glutes ? +(latest.glutes / w).toFixed(2) : null, base: (baseline?.glutes && bw) ? +(baseline.glutes / bw).toFixed(2) : null },
    ];
  })();

  // Trend chart options — each includes a verdict answering "Is this helping my phase?"
  const pfByDay = (() => {
    const byDay = {};
    workoutLogs.forEach(l => {
      const ex = exercises.find(e => Number(e.id) === Number(l.exerciseId));
      if (!ex) return;
      const day = l.date.split("T")[0];
      byDay[day] = (byDay[day] || 0) + calcPF(l.sets, l.reps, l.weight, ex.type, ex.laterality);
    });
    return Object.entries(byDay).sort((a, b) => a[0].localeCompare(b[0])).map(([date, value]) => ({ date, value }));
  })();

  const trendVerdict = (series, higherIsBetter) => {
    if (series.length < 2) return { verdict: null, verdictColor: "#4B5563", verdictEmoji: "\u26AA" };
    const first = series[0].value, last = series[series.length-1].value;
    const pct = ((last - first) / first) * 100;
    const isNeutral = Math.abs(pct) < 1;
    const isGood = higherIsBetter ? pct > 0 : pct < 0;
    if (isNeutral) return { verdict: "Stable — holding steady",                                           verdictColor: "#E8A838", verdictEmoji: "\uD83D\uDFE1" };
    if (isGood)    return { verdict: higherIsBetter ? "On target — trending up" : "Controlled",           verdictColor: "#4AD99A", verdictEmoji: "\uD83D\uDFE2" };
    return         { verdict: higherIsBetter ? "Stagnant — needs attention" : "Increasing — monitor",    verdictColor: "#D94A4A", verdictEmoji: "\uD83D\uDD34" };
  };

  const trendOptions = [
    { id: "weight", label: "Weight",       data: weightSeries, color: "#4A90D9", unit: "lbs", ...trendVerdict(weightSeries, phase?.type !== "cut") },
    { id: "waist",  label: "Waist",        data: waistSeries,  color: "#D94A4A", unit: "in",  ...trendVerdict(waistSeries,  false) },
    { id: "pf",     label: "Strength Factor", data: pfByDay,      color: "#E8A838", unit: "SF",  ...trendVerdict(pfByDay,      true) },
    { id: "chest",  label: "Chest",        data: chestSeries,  color: "#4A90D9", unit: "in",  ...trendVerdict(chestSeries,  true) },
    { id: "arms",   label: "Arms",         data: armsSeries,   color: "#D94A7A", unit: "in",  ...trendVerdict(armsSeries,   true) },
    { id: "glutes", label: "Glutes",       data: glutesSeries, color: "#E87D38", unit: "in",  ...trendVerdict(glutesSeries, true) },
    { id: "thighs", label: "Thighs",       data: thighsSeries, color: "#E8A838", unit: "in",  ...trendVerdict(thighsSeries, true) },
  ];
  const activeTrendData = trendOptions.find(t => t.id === activeTrend);

  // ── Generate Weekly Review ────────────────────────────────────────────────
  const generateReview = async () => {
    setGenerating(true);
    const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

    // Collect 7-day data snapshot
    const recentWorkouts = workoutLogs.filter(l => new Date(l.date) >= sevenDaysAgo);
    const recentNutrition = nutritionDays.filter(d => new Date(d.date + "T12:00:00") >= sevenDaysAgo);
    const recentRecovery  = (recoverySessions || []).filter(s => new Date(s.date + "T12:00:00") >= sevenDaysAgo);

    const avgCals   = recentNutrition.length ? Math.round(recentNutrition.reduce((s, d) => s + (d.total_calories || 0), 0) / recentNutrition.length) : null;
    const avgProt   = recentNutrition.length ? Math.round(recentNutrition.reduce((s, d) => s + (d.total_protein || 0), 0) / recentNutrition.length) : null;
    const avgEnergy = recentRecovery.length  ? +(recentRecovery.reduce((s, r) => s + (r.after_energy || 0), 0) / recentRecovery.length).toFixed(1) : null;
    const heelTrend = recentRecovery.length  ? +(recentRecovery.reduce((s, r) => s + (r.after_heel_pain || 0), 0) / recentRecovery.length).toFixed(1) : null;
    const backTrend = recentRecovery.length  ? +(recentRecovery.reduce((s, r) => s + (r.after_low_back_tightness || 0), 0) / recentRecovery.length).toFixed(1) : null;

    const conf = calcConfidence(phase, bodyLogs, workoutLogs, nutritionDays);
    const snapshot = {
      phase: phase ? `${PHASE_CONFIG[phase.type]?.label} — Week ${phaseInfo?.week || 1}` : "No active phase",
      phaseWeek: phaseInfo?.week || 1,
      daysRemaining: phaseInfo?.remaining || 0,
      confidenceTier: conf.tier,
      confidenceScore: conf.score,
      daysSincePhaseStart: conf.daysSince,
      weight: { current: latestWeight, baseline: baseWeight, change: weightChange, weeklyRate: wRate },
      waist: { current: latestWaist, baseline: baseWaist, change: waistChange },
      measurements: { chest: latest.chest, arms: latest.arms, thighs: latest.thighs, glutes: latest.glutes },
      strengthFactorChange: { total: totalPFChange, upper: upperPFChange, lower: lowerPFChange },
      nutrition: { avgCalories: avgCals, target: getTargets(phase).calories, avgProtein: avgProt, proteinTarget: getTargets(phase).protein, daysLogged: recentNutrition.length },
      recovery: { sessionsCompleted: recentRecovery.length, avgEnergy, avgHeelPain: heelTrend, avgLowBack: backTrend },
      workoutDays: [...new Set(recentWorkouts.map(l => l.date.split("T")[0]))].length,
    };

    const phaseType = phase?.type === "gain" ? "Gain" : "Cut";
    const isGainPhase = phase?.type === "gain";

    let confidenceInstructions;
    if (conf.tier === "low") {
      confidenceInstructions = "CRITICAL: Data confidence is LOW (only " + conf.daysSince + " days, " + conf.weighIns + " weigh-ins). You MUST:\n" +
        "- Set overall_status to 🔵 Establishing Baseline\n" +
        "- Do NOT recommend calorie changes\n" +
        "- Do NOT flag weight gain as excessive fat\n" +
        "- Do NOT issue course correction warnings\n" +
        "- Focus executive_summary on early positive signals and expected fluctuations\n" +
        "- Explain that initial weight changes reflect glycogen, hydration, and food volume not fat gain\n" +
        "- Recommend building consistency, not making adjustments";
    } else if (conf.tier === "medium") {
      confidenceInstructions = "Data confidence is MEDIUM (" + conf.daysSince + " days). You MAY:\n" +
        "- Use On Track or Monitor status (NOT Course Correction unless clearly warranted)\n" +
        "- Note emerging trends cautiously\n" +
        "- Suggest monitoring but NOT major plan changes\n" +
        "- Phrase recommendations as continue monitoring not adjust immediately";
    } else {
      confidenceInstructions = "Data confidence is HIGH (" + conf.daysSince + " days). Full assessment permitted. Use all status levels as appropriate.";
    }

    const statusOptions = conf.tier === "low"
      ? "🔵 Establishing Baseline"
      : "🟢 Excellent Progress or 🟢 On Track or 🟡 Monitor or 🔴 Course Correction Needed";

    const weightCriteria = isGainPhase ? "increases 0.25-0.75 lbs/week" : "decreases 0.5-1.5 lbs/week";
    const waistCriteria  = isGainPhase ? "stays stable or increases minimally under 0.5 inches per month" : "decreases consistently";
    const pfCriteria     = isGainPhase ? "increases week over week" : "stays stable or increases";

    const prompt = "You are an elite personal coach reviewing Project Prime fitness data. Return ONLY a JSON object (no markdown, no explanation).\n\n" +
      confidenceInstructions + "\n\nDATA:\n" + JSON.stringify(snapshot, null, 2) +
      "\n\nProject Prime success criteria for a " + phaseType + " Phase:\n" +
      "- Weight " + weightCriteria + "\n" +
      "- Waist " + waistCriteria + "\n" +
      "- Strength Factor " + pfCriteria + "\n" +
      "- Protein target hit consistently\n" +
      "- Recovery sessions improving\n\n" +
      "Return ONLY this JSON:\n{\n" +
      '  "overall_status": "' + statusOptions + '",\n' +
      '  "executive_summary": "2-3 sentence coaching summary: Observation what happened. Confidence how much to trust it. Interpretation what it likely means. Action what to do.",\n' +
      '  "major_wins": ["win 1", "win 2", "win 3"],\n' +
      '  "areas_to_monitor": ["area 1", "area 2"],\n' +
      '  "next_week_recommendations": ["action 1", "action 2", "action 3"]\n}';

    try {
      const text = await callAI(
        "You are an elite Project Prime fitness coach. Return only valid JSON, no markdown, no explanation.",
        prompt,
        1000
      );
      const parsed = JSON.parse(text);
      const reviewObj = {
        ...parsed,
        phase: PHASE_CONFIG[phase?.type]?.label || "Unknown",
        phase_week: phaseInfo?.week || 1,
        review_date: new Date().toISOString(),
        input_data_snapshot: snapshot,
      };
      setWeeklyReview(reviewObj);
      try { localStorage.setItem("pp_weekly_review", JSON.stringify(reviewObj)); } catch {}
    } catch (e) {
      setWeeklyReview({
        overall_status: "🔴 Error",
        executive_summary: `AI coach error: ${e.message}. Open browser console (F12) for details.`,
        major_wins: [],
        areas_to_monitor: [`Error detail: ${e.message}`],
        next_week_recommendations: ["Check that your OpenAI API key is set correctly in the app", "Verify the key has available credits at platform.openai.com", "Check browser console (F12 → Console) for the full error"],
        phase: PHASE_CONFIG[phase?.type]?.label || "Unknown",
        phase_week: phaseInfo?.week || 1,
        review_date: new Date().toISOString(),
      });
    }
    setGenerating(false);
  };

  // Load cached review on mount
  useEffect(() => {
    try {
      const cached = localStorage.getItem("pp_weekly_review");
      if (cached) setWeeklyReview(JSON.parse(cached));
    } catch {}
  }, []);

  // ── Form save ────────────────────────────────────────────────────────────
  const handleSave = async () => {
    setSaveStatus("saving");
    const ok = await onSave({ date: new Date().toISOString(), ...Object.fromEntries(Object.entries(fields).map(([k, v]) => [k, v ? Number(v) : null])) });
    setSaveStatus(ok ? "saved" : "error");
    setTimeout(() => setSaveStatus(null), 3000);
    if (ok) { setShowForm(false); setFields({ weight: "", chest: "", waist: "", hips: "", glutes: "", thighs: "", arms: "" }); }
  };

  const recent = [...sorted].reverse().slice(0, 10);

  // ── Compute derived stats for Executive Hero ────────────────────────────
  const phaseName  = phase ? PHASE_CONFIG[phase.type]?.label : null;
  const phaseWeek  = phaseInfo?.week || 1;
  const phaseTotalWeeks = phase ? PHASE_CONFIG[phase.type]?.weeks : null;

  // Nutrition compliance (last 7 days)
  const last7days = (() => { const d = new Date(); d.setDate(d.getDate()-7); return d; })();
  const recentNutr = nutritionDays.filter(d => new Date(d.date+"T12:00:00") >= last7days);
  const proteinDaysHit = recentNutr.filter(d => (d.total_protein||0) >= (d.target_protein || getTargets(phase).protein)).length;
  const proteinCompliance = recentNutr.length > 0 ? Math.round(proteinDaysHit / recentNutr.length * 100) : null;

  // Recovery compliance (last 7 days)
  const recentRec = (recoverySessions||[]).filter(s => new Date(s.date+"T12:00:00") >= last7days);
  const recCompliance = recentRec.length > 0 ? Math.round(recentRec.filter(s => s.result_rating === "better").length / recentRec.length * 100) : null;

  // Training sessions last 7 days
  const recentWorkoutDays = [...new Set(
    workoutLogs.filter(l => new Date(l.date) >= last7days).map(l => l.date.split("T")[0])
  )].length;

  // ── Confidence Engine ─────────────────────────────────────────────────────
  const confidence = calcConfidence(phase, bodyLogs, workoutLogs, nutritionDays);
  const verdict    = calcVerdict(confidence, weightStatus, waistStatus, pfStatus, phase);
  const coachNarrative = buildCoachNarrative(confidence, weightChange, wRate, waistChange, totalPFChange, verdict, phase, weeklyReview);

  // ── Project Prime Score (after confidence is defined) ─────────────────────
  const strengthResult = calcStrengthScore(workoutLogs, exercises, phase);
  const waistResult    = calcWaistScore(bodyLogs, phase);
  const weightResult   = calcWeightScore(bodyLogs, phase);
  const primeScore     = calcPrimeScore(strengthResult.score, waistResult.score, weightResult.score);
  const scoreState     = calcPrimeScoreState(confidence, strengthResult, waistResult, weightResult);
  const scoreBand      = scoreToBand(primeScore);

  const scoreBandCoachNote = {
    "ON TRACK":        "Strength is improving while waist remains controlled and weight is increasing within the target range. Continue current calories and training progression.",
    "CAUTION":         "Progress is present but not optimal. Monitor waist and strength trends before making major changes.",
    "ADJUST":          "Progress appears stalled or inefficient. Review calorie target, training progression, and recovery quality.",
    "WRONG DIRECTION": "Weight and waist are increasing without sufficient strength improvement. The surplus is not productive. Make immediate adjustments.",
  };

  // KPI statuses respect confidence tier — low confidence suppresses red
  const confidentWeightStatus = confidence.tier === "low" ? "blue" : weightStatus;
  const confidentWaistStatus  = confidence.tier === "low" ? "blue" : waistStatus;
  const confidentPFStatus     = confidence.tier === "low" ? (pfStatus === "gray" ? "gray" : "blue") : pfStatus;

  const verdictConfig = {
    green:    { emoji: "🟢", label: "LEAN GAIN ON TRACK",              color: "#4AD99A", bg: "#4AD99A0D", border: "#4AD99A33", action: "Continue the current plan." },
    yellow:   { emoji: "🟡", label: "MONITOR — TREND EMERGING",        color: "#E8A838", bg: "#E8A8380D", border: "#E8A83833", action: "Continue collecting data before making adjustments." },
    red:      { emoji: "🔴", label: "COURSE CORRECTION NEEDED",        color: "#D94A4A", bg: "#D94A4A0D", border: "#D94A4A33", action: "Review the plan with your coach." },
    baseline: { emoji: "🔵", label: "ESTABLISHING BASELINE",           color: "#4A90D9", bg: "#4A90D90D", border: "#4A90D933", action: "Build consistency. No adjustments recommended." },
    gray:     { emoji: "⚪", label: "LOG DATA TO SEE STATUS",          color: "#4B5563", bg: "#4B55630D", border: "#4B556333", action: "Log body measurements and workouts to unlock your assessment." },
  }[verdict];

  // Confidence badge info
  const confidenceBadge = {
    low:    { label: `LOW CONFIDENCE · ${confidence.daysSince}d of data`, color: "#4A90D9" },
    medium: { label: `MEDIUM CONFIDENCE · ${confidence.daysSince}d of data`, color: "#E8A838" },
    high:   { label: `HIGH CONFIDENCE · ${confidence.daysSince}d of data`, color: "#4AD99A" },
    none:   { label: "NO PHASE DATA", color: "#4B5563" },
  }[confidence.tier];


  // Score history — simple localStorage read, no hooks needed in render
  // Save today's score to localStorage
  const scoreHistoryRaw = localStorage.getItem("pp_score_history");
  const scoreHistoryData = scoreHistoryRaw ? JSON.parse(scoreHistoryRaw) : [];
  if (scoreState && scoreState.mode === "active" && primeScore) {
    const today = new Date().toLocaleDateString("en-CA");
    const prev = scoreHistoryData.filter(e => e.date !== today);
    const updated = prev.concat([{ date: today, score: primeScore }]).slice(-28);
    localStorage.setItem("pp_score_history", JSON.stringify(updated));
  }

  // Build 4-week trend — compute directly from raw data for past weeks
  // so trend populates immediately without needing historical localStorage entries
  const weeklyScoreTrend = [3,2,1,0].map(function(i) {
    const weekEnd = new Date();
    weekEnd.setDate(weekEnd.getDate() - i * 7);
    const weekStart = new Date(weekEnd);
    weekStart.setDate(weekEnd.getDate() - 7);
    const label = i === 0 ? "This Week" : "Wk -" + i;

    if (i === 0) {
      // Current week — use live primeScore
      return { label, score: (scoreState && scoreState.mode !== "baseline" && primeScore) ? primeScore : null };
    }

    // Past weeks — recompute score from data available at that snapshot
    if (!phase || !phase.startDate) return { label, score: null };
    const phaseStart = new Date(phase.startDate);

    const snapBody     = bodyLogs.filter(function(l) { const d = new Date(l.date); return d >= phaseStart && d <= weekEnd; });
    const snapWorkouts = workoutLogs.filter(function(l) { const d = new Date(l.date); return d >= phaseStart && d <= weekEnd; });
    const snapNutr     = nutritionDays.filter(function(d) { const nd = new Date(d.date + "T12:00:00"); return nd >= phaseStart && nd <= weekEnd; });

    if (snapBody.length < 3 || snapWorkouts.length < 1) return { label, score: null };

    const sStrength = calcStrengthScore(snapWorkouts, exercises, phase);
    const sWaist    = calcWaistScore(snapBody, phase);
    const sWeight   = calcWeightScore(snapBody, phase);
    const sScore    = calcPrimeScore(sStrength.score, sWaist.score, sWeight.score);
    return { label, score: sScore > 0 ? sScore : null };
  });

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

      {/* ── Log form modal ─────────────────────────────────────────────── */}
      {showForm && (
        <Modal title="Log Body Measurements" onClose={() => setShowForm(false)} width={520}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 20 }}>
            {[["Weight (lbs)", "weight"], ["Chest (in)", "chest"], ["Waist (in)", "waist"], ["Hips (in)", "hips"], ["Glutes (in)", "glutes"], ["Thighs (in)", "thighs"], ["Arms (in)", "arms"]].map(([label, k]) => (
              <div key={k}>
                <label style={{ color: k === "glutes" ? "#E87D38" : "#8B92A5", fontSize: 11, display: "block", marginBottom: 6, fontWeight: k === "glutes" ? 700 : 400 }}>{label}{k === "glutes" ? " ★" : ""}</label>
                <input type="number" value={fields[k]} onChange={setF(k)} style={inputStyle} />
              </div>
            ))}
          </div>
          <button onClick={handleSave}
            style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 9, padding: "13px 0", width: "100%", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
            Save
          </button>
        </Modal>
      )}

      {/* ══════════════════════════════════════════════════════════════════
          SECTION 1 — PROJECT PRIME SCORE
      ══════════════════════════════════════════════════════════════════ */}
      <div style={{ background: "#1A1D26", borderRadius: 16, border: "1px solid #2A2D3A" }}>

        {/* Top bar */}
        <div style={{ padding: "12px 20px", borderBottom: "1px solid #2A2D3A", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em" }}>PROJECT PRIME SCORE</div>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <SaveStatus status={saveStatus} />
            <button onClick={() => setShowForm(true)} style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 8, padding: "7px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>+ Log Measurements</button>
          </div>
        </div>

        {/* Two column body — always shown */}
        <div style={{ display: "grid", gridTemplateColumns: "60% 40%", minWidth: 0 }}>

          {/* ══ LEFT COLUMN ══ */}
          <div style={{ padding: "20px 24px", borderRight: "1px solid #2A2D3A" }}>

            {/* Score hero row — gauge + status + mini bars */}
            <div style={{ display: "flex", alignItems: "center", gap: 20, paddingBottom: 20, borderBottom: "1px solid #2A2D3A", marginBottom: 20 }}>

              {/* Circular gauge — shows score or baseline indicator */}
              {(() => {
                const isBaseline = scoreState.mode === "baseline";
                const sc = isBaseline ? "#4A90D9" : (scoreState.mode === "active" ? scoreBand.color : "#E8A838");
                const displayScore = isBaseline ? null : primeScore;
                const r = 44, circ = 2 * Math.PI * r;
                const pct = isBaseline ? 0.15 : primeScore / 100;
                return (
                  <div style={{ position: "relative", width: 110, height: 110, flexShrink: 0 }}>
                    <svg width="110" height="110" style={{ transform: "rotate(-90deg)" }}>
                      <circle cx="55" cy="55" r={r} fill="none" stroke="#2A2D3A" strokeWidth="10" />
                      <circle cx="55" cy="55" r={r} fill="none" stroke={sc} strokeWidth="10"
                        strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)}
                        strokeLinecap="round" strokeDasharray={isBaseline ? "8 6" : circ}
                        strokeDashoffset={isBaseline ? 0 : circ * (1 - pct)} />
                    </svg>
                    <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                      {isBaseline ? (
                        <div style={{ fontSize: 28, lineHeight: 1 }}>🔵</div>
                      ) : (
                        <>
                          <div style={{ fontSize: 32, fontWeight: 900, color: sc, lineHeight: 1 }}>{primeScore}</div>
                          <div style={{ fontSize: 12, color: "#4B5563", fontWeight: 600 }}>/100</div>
                        </>
                      )}
                    </div>
                  </div>
                );
              })()}

              {/* Status label + summary + confidence */}
              <div style={{ flex: 1, minWidth: 0 }}>
                {scoreState.mode === "baseline" ? (
                  <>
                    <div style={{ color: "#4A90D9", fontSize: 22, fontWeight: 800, marginBottom: 6, lineHeight: 1 }}>ESTABLISHING BASELINE</div>
                    <div style={{ color: "#8B92A5", fontSize: 13, lineHeight: 1.6, marginBottom: 10 }}>
                      Early data is being collected. Weight changes may reflect hydration and glycogen — no adjustments recommended yet.
                    </div>
                    <div style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                      <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#4A90D9" }} />
                      <span style={{ color: "#4A90D9", fontSize: 12, fontWeight: 700 }}>
                        Low Confidence · {confidence.daysSince || 0} Days of Data
                      </span>
                    </div>
                  </>
                ) : (
                  <>
                    <div style={{ color: scoreState.mode === "active" ? scoreBand.color : "#E8A838", fontSize: 26, fontWeight: 800, marginBottom: 6, lineHeight: 1 }}>
                      {scoreState.mode === "active" ? scoreBand.label : "PRELIMINARY"}
                    </div>
                    <div style={{ color: "#8B92A5", fontSize: 13, lineHeight: 1.6, marginBottom: 10 }}>
                      {scoreState.mode === "active"
                        ? scoreBandCoachNote[scoreBand.label].split(".")[0] + "."
                        : "Score developing — more data needed for full confidence."}
                    </div>
                    <div style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                      <div style={{ width: 7, height: 7, borderRadius: "50%", background: scoreState.mode === "active" ? "#4AD99A" : "#E8A838" }} />
                      <span style={{ color: scoreState.mode === "active" ? "#4AD99A" : "#E8A838", fontSize: 12, fontWeight: 700 }}>
                        Data Confidence: {scoreState.mode === "active" ? "HIGH" : "MEDIUM"}
                      </span>
                    </div>
                  </>
                )}
              </div>

              {/* Mini component bars — shown when not baseline, or grayed out */}
              <div style={{ display: "flex", flexDirection: "column", gap: 10, minWidth: 160, flexShrink: 0 }}>
                {[
                  { label: "STRENGTH (50%)", score: strengthResult.score, weighted: strengthResult.score !== null ? Math.round(strengthResult.score * 0.5) : null, max: 50, color: "#4A90D9" },
                  { label: "WAIST (30%)",    score: waistResult.score,    weighted: waistResult.score    !== null ? Math.round(waistResult.score    * 0.3) : null, max: 30, color: "#4AD99A" },
                  { label: "WEIGHT (20%)",   score: weightResult.score,   weighted: weightResult.score   !== null ? Math.round(weightResult.score   * 0.2) : null, max: 20, color: "#E8A838" },
                ].map(function(c) {
                  const isBaseline = scoreState.mode === "baseline";
                  return (
                    <div key={c.label}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                        <span style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>{c.label}</span>
                        <span style={{ color: isBaseline ? "#4B5563" : c.color, fontSize: 11, fontWeight: 800 }}>
                          {isBaseline ? "—" : (c.weighted !== null ? c.weighted + " / " + c.max : "—")}
                        </span>
                      </div>

            { key: "chest",  label: "Chest",  color: "#4A90D9" },
            { key: "arms",   label: "Arms",   color: "#D94A7A" },
            { key: "glutes", label: "Glutes", color: "#E87D38" },
            { key: "thighs", label: "Thighs", color: "#E8A838" },
          ].map(({ key, label, color }) => {
            const cur  = latest[key];
            const base = baseline?.[key];
            const diff = cur && base ? +(cur - base).toFixed(2) : null;
            const arrow = diff === null ? "—" : diff > 0.05 ? "⬆" : diff < -0.05 ? "⬇" : "➡";
            const ac    = diff === null ? "#3A3D4A" : diff > 0.05 ? "#4AD99A" : diff < -0.05 ? "#D94A4A" : "#8B92A5";
            return (
              <div key={key} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ color: "#8B92A5", fontSize: 12 }}>{label}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  {diff !== null && <span style={{ color: ac, fontSize: 11, fontWeight: 700 }}>{diff >= 0 ? "+" : ""}{diff}"</span>}
                  <span style={{ color: ac, fontSize: 14 }}>{arrow}</span>
                </div>
              </div>
            );
          })}
          {!latest.chest && !latest.arms && <div style={{ color: "#3A3D4A", fontSize: 11 }}>Log measurements to see development</div>}
        </div>
      </div>

      {/* ══════════════════════════════════════════════════════════════════
          SECTION 3 — TREND CHARTS (question-answering)
      ══════════════════════════════════════════════════════════════════ */}
      <div style={{ background: "#1A1D26", borderRadius: 14, border: "1px solid #2A2D3A", padding: 20 }}>
        <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 14 }}>TREND ANALYSIS</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
          {trendOptions.map(t => (
            <button key={t.id} onClick={() => setActiveTrend(t.id)}
              style={{ background: activeTrend === t.id ? t.color : "#0F1117",
                color: activeTrend === t.id ? "#0F1117" : "#8B92A5",
                border: activeTrend === t.id ? `1px solid ${t.color}` : "1px solid #2A2D3A",
                borderRadius: 20, padding: "5px 14px", fontSize: 12, fontWeight: activeTrend === t.id ? 700 : 400, cursor: "pointer" }}>
              {t.label}
            </button>
          ))}
        </div>
        {activeTrendData && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 10 }}>
              <div>
                <div style={{ color: "#E8EAF0", fontSize: 15, fontWeight: 700 }}>{activeTrendData.label}</div>
                {/* Question-answering verdict */}
                {activeTrendData.verdict && (
                  <div style={{ color: activeTrendData.verdictColor, fontSize: 12, fontWeight: 700, marginTop: 2 }}>
                    {activeTrendData.verdictEmoji} {activeTrendData.verdict}
                  </div>
                )}
              </div>
              {activeTrendData.data.length >= 2 && (() => {
                const first = activeTrendData.data[0].value;
                const last  = activeTrendData.data[activeTrendData.data.length - 1].value;
                const diff  = +(last - first).toFixed(1);
                const up    = diff >= 0;
                return (
                  <div style={{ textAlign: "right" }}>
                    <span style={{ color: activeTrendData.color, fontSize: 24, fontWeight: 800 }}>{last}</span>
                    <span style={{ color: "#8B92A5", fontSize: 12, marginLeft: 4 }}>{activeTrendData.unit}</span>
                    <div style={{ color: up ? "#4AD99A" : "#D94A4A", fontSize: 11, fontWeight: 700, marginTop: 2 }}>
                      {up ? "+" : ""}{diff} {activeTrendData.unit} since first log
                    </div>
                  </div>
                );
              })()}
            </div>
            {activeTrendData.data.length < 2 ? (
              <div style={{ color: "#3A3D4A", fontSize: 13, padding: "32px 0", textAlign: "center" }}>Log at least 2 entries to see trend</div>
            ) : (
              <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 100 }}>
                {activeTrendData.data.slice(-24).map((d, i, arr) => {
                  const vals = arr.map(x => x.value);
                  const mn = Math.min(...vals), mx = Math.max(...vals), range = mx - mn || 0.01;
                  const h = Math.max(6, ((d.value - mn) / range) * 84 + 8);
                  const isLast = i === arr.length - 1;
                  return (
                    <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                      {isLast && <div style={{ fontSize: 9, color: activeTrendData.color, fontWeight: 700 }}>{d.value}</div>}
                      <div style={{ width: "100%", height: h, background: isLast ? activeTrendData.color : activeTrendData.color + "44", borderRadius: "3px 3px 0 0" }} />
                      {(i === 0 || i === arr.length - 1 || i === Math.floor(arr.length / 2)) && (
                        <div style={{ fontSize: 8, color: "#3A3D4A", textAlign: "center" }}>{fmtDate(d.date)}</div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

      {/* ══════════════════════════════════════════════════════════════════
          SECTION 4 — PHYSIQUE MEASUREMENT DETAILS
      ══════════════════════════════════════════════════════════════════ */}
      <div>
        <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 12 }}>PHYSIQUE MEASUREMENT DETAILS</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
          {[
            { key: "chest",  label: "Chest",  unit: "in", color: "#4A90D9", series: chestSeries },
            { key: "arms",   label: "Arms",   unit: "in", color: "#D94A7A", series: armsSeries  },
            { key: "waist",  label: "Waist",  unit: "in", color: "#D94A4A", series: waistSeries },
            { key: "glutes", label: "Glutes", unit: "in", color: "#E87D38", series: glutesSeries },
            { key: "thighs", label: "Thighs", unit: "in", color: "#E8A838", series: thighsSeries },
            { key: "hips",   label: "Hips",   unit: "in", color: "#7B68EE", series: sorted.filter(l => l.hips).map(l => ({ value: l.hips, date: l.date })) },
          ].map(({ key, label, unit, color, series }) => {
            const cur  = latest[key];
            const base = baseline?.[key];
            const diff = cur && base ? +(cur - base).toFixed(1) : null;
            const up   = diff !== null && diff > 0;
            return (
              <div key={key} style={{ background: "#1A1D26", borderRadius: 10, border: "1px solid #2A2D3A", padding: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                  <div>
                    <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>{label}</div>
                    <div style={{ fontSize: 24, fontWeight: 800, color: "#E8EAF0", lineHeight: 1.2 }}>{cur ?? "—"} <span style={{ fontSize: 11, color: "#8B92A5", fontWeight: 400 }}>{unit}</span></div>
                  </div>
                  {diff !== null && (
                    <div style={{ textAlign: "right" }}>
                      <div style={{ color: up ? "#4AD99A" : "#D94A4A", fontSize: 13, fontWeight: 700 }}>{up ? "+" : ""}{diff}"</div>
                      <div style={{ color: "#4B5563", fontSize: 10 }}>from baseline</div>
                    </div>
                  )}
                </div>
                <MiniBarChart data={series.slice(-10)} color={color} height={30} />
              </div>
            );
          })}
        </div>
      </div>

      {/* ══════════════════════════════════════════════════════════════════
          SECTION 5 — HISTORICAL MEASUREMENT LOG
      ══════════════════════════════════════════════════════════════════ */}
      {recent.length > 0 && (
        <div>
          <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 12 }}>MEASUREMENT LOG</div>
          <Card>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr>{["Date", "Weight", "Chest", "Waist", "Hips", "Glutes", "Thighs", "Arms"].map(h => (
                    <th key={h} style={{ color: "#4B5563", fontWeight: 700, textAlign: "left", padding: "6px 12px", borderBottom: "1px solid #2A2D3A" }}>{h}</th>
                  ))}</tr>
                </thead>
                <tbody>
                  {recent.map((l, i) => (
                    <tr key={i} style={{ borderBottom: "1px solid #1A1D26" }}>
                      <td style={{ color: "#8B92A5", padding: "8px 12px" }}>{fmtDateLong(l.date)}</td>
                      {["weight", "chest", "waist", "hips", "glutes", "thighs", "arms"].map(k => (
                        <td key={k} style={{ color: k === "glutes" ? "#E87D38" : "#C8CDD8", padding: "8px 12px", fontWeight: k === "glutes" ? 700 : 400 }}>
                          {l[k] ? `${l[k]}${k === "weight" ? " lbs" : '"'}` : "—"}
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

        onClick={() => setExpanded(e => !e)}
        style={{ width: "100%", background: "none", border: "none", padding: "16px 20px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", textAlign: "left" }}>
        <div>
          <div style={{ color: "#E8EAF0", fontWeight: 700, fontSize: 15 }}>{new Date(d.date + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })}</div>
          <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>{d.phase}{d.compliance ? ` · Compliance: ${d.compliance}` : ""}</div>

      {expanded && (
        <div style={{ padding: "0 20px 16px", borderTop: "1px solid #2A2D3A" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, margin: "16px 0" }}>
            {[["Calories", d.total_calories, d.target_calories || 2650, "#E8A838", "kcal"],
              ["Protein", d.total_protein, d.target_protein || getTargets(phase).protein, "#4A90D9", "g"],
              ["Carbs", d.total_carbs, d.target_carbs || 220, "#7B68EE", "g"],
              ["Fat", d.total_fat, d.target_fat || 65, "#4AD9A0", "g"]].map(([label, val, target, color, unit]) => (
              <div key={label}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <span style={{ color: "#8B92A5", fontSize: 12 }}>{label}</span>
                  <span style={{ color, fontSize: 12, fontWeight: 700 }}>{val}<span style={{ color: "#4B5563" }}>/{target}{unit}</span></span>
                </div>
                <div style={{ background: "#0F1117", borderRadius: 3, height: 5 }}>
                  <div style={{ width: `${Math.min(100, (val/target)*100)}%`, height: "100%", background: color, borderRadius: 3 }} />
                </div>
              </div>
            ))}
          </div>
          {d.entries?.length > 0 && (
            <div>
              <div style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>Meal Timeline</div>
              {d.entries.map((e, ei) => (
                <div key={ei} style={{ paddingBottom: 10, marginBottom: 10, borderBottom: ei < d.entries.length - 1 ? "1px solid #2A2D3A" : "none" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 2 }}>
                    <div><span style={{ color: "#4B5563", fontSize: 11 }}>{e.entry_time} · </span><span style={{ color: "#E8EAF0", fontSize: 13, fontWeight: 600 }}>{e.meal_name}</span></div>
                    <span style={{ color: "#E8A838", fontSize: 12, fontWeight: 700 }}>{e.calories} kcal</span>
                  </div>
                  {e.items && <div style={{ color: "#4B5563", fontSize: 11, marginBottom: 3 }}>{e.items}</div>}
                  <div style={{ display: "flex", gap: 12 }}>
                    <span style={{ color: "#4A90D9", fontSize: 11 }}>{e.protein}g P</span>
                    <span style={{ color: "#7B68EE", fontSize: 11 }}>{e.carbs}g C</span>
                    <span style={{ color: "#4AD9A0", fontSize: 11 }}>{e.fat}g F</span>

              ))}
            </div>
          )}
          {d.notes && <div style={{ color: "#8B92A5", fontSize: 12, fontStyle: "italic", marginTop: 8, borderTop: "1px solid #2A2D3A", paddingTop: 8 }}>{d.notes}</div>}
        </div>
      )}
    </div>
  );
}

  return (

      {recentDays.map((d, i) => <NutritionDayCard key={i} d={d} />)}
    </div>
