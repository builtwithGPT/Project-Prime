  const startSession = (template) => {
    setSelectedTemplate(template);
    setChecklist(template.items.map((name, i) => ({ name, cue: RECOVERY_CUES[name] || "", completed: false, sort_order: i })));
    setBeforeMetrics({ energy: 3, soreness: 3, heel_pain: 0, low_back: 0 });
    setAfterMetrics({ energy: 3, soreness: 3, heel_pain: 0, low_back: 0 });
    setResultRating(null);
    setSessionStart(new Date());
    setSessionStep("before");
  };

  const toggleItem = (idx) => {
    setChecklist(prev => prev.map((item, i) => i === idx ? { ...item, completed: !item.completed } : item));
  };

  const completedCount = checklist.filter(i => i.completed).length;

  const [saveError, setSaveError] = useState("");

  const saveSession = async () => {
    setSaving(true); setSaveError("");
    const duration = sessionStart ? Math.round((new Date() - sessionStart) / 60000) : 0;
    const sessionData = {
      date: today,
      template_name: selectedTemplate.name,
      duration_minutes: duration,
      completed_count: completedCount,
      total_count: checklist.length,
      before_energy: beforeMetrics.energy,
      after_energy: afterMetrics.energy,
      before_soreness: beforeMetrics.soreness,
      after_soreness: afterMetrics.soreness,
      before_heel_pain: beforeMetrics.heel_pain,
      after_heel_pain: afterMetrics.heel_pain,
      before_low_back_tightness: beforeMetrics.low_back,
      after_low_back_tightness: afterMetrics.low_back,
      result_rating: resultRating,
      items: checklist,
    };
    // Save to DB in background — don't block UI transition
    onSaveSession(sessionData);
    setLastSession({ ...sessionData, duration });
    setSaving(false);
    setSessionStep("summary");
  };

  const endSession = () => {
    setSessionStep(null);
    setSelectedTemplate(null);
    setView("today");
  };

  const DeltaBadge = ({ before, after, label, lowerIsBetter = false }) => {
    const improved = lowerIsBetter ? after < before : after > before;
    const same = after === before;
    const color = same ? "#4B5563" : improved ? "#4AD99A" : "#D94A4A";
    return (
      <div style={{ background: "#0F1117", borderRadius: 8, padding: "10px 14px" }}>
        <div style={{ color: "#8B92A5", fontSize: 11, marginBottom: 4 }}>{label}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ color: "#E8EAF0", fontSize: 16, fontWeight: 700 }}>{before}</span>
          <span style={{ color, fontSize: 14 }}>→</span>
          <span style={{ color, fontSize: 20, fontWeight: 800 }}>{after}</span>
          {!same && <span style={{ color, fontSize: 11, fontWeight: 700 }}>{improved ? "▲ Better" : "▼ Worse"}</span>}
          {same && <span style={{ color: "#4B5563", fontSize: 11 }}>No change</span>}
        </div>
      </div>
    );
  };

  // ── ACTIVE SESSION ─────────────────────────────────────────────────────────
  if (selectedTemplate && ["before", "checklist", "after"].includes(sessionStep)) {
    return (
      <div style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 20, height: "calc(100vh - 130px)" }}>
        <div style={{ background: "#1A1D26", borderRadius: 14, border: "1px solid #2A2D3A", padding: 24, display: "flex", flexDirection: "column", overflow: "hidden" }}>

          {/* Session header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24, flexShrink: 0 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                <span style={{ fontSize: 24 }}>{selectedTemplate.icon}</span>
                <span style={{ color: selectedTemplate.color, fontSize: 20, fontWeight: 800 }}>{selectedTemplate.name}</span>
                <span style={{ background: selectedTemplate.color + "22", color: selectedTemplate.color, padding: "2px 8px", borderRadius: 4, fontSize: 11, fontWeight: 700 }}>{selectedTemplate.duration}</span>
              </div>
              <div style={{ color: "#8B92A5", fontSize: 13 }}>{selectedTemplate.purpose}</div>
            </div>
            <button onClick={() => endSession()}
              style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 8, padding: "8px 14px", fontSize: 12, cursor: "pointer" }}>
              Cancel Session
            </button>
          </div>

          {/* Step tabs */}
          <div style={{ display: "flex", background: "#0F1117", borderRadius: 8, padding: 3, marginBottom: 24, flexShrink: 0 }}>
            {[["before", "📊 Before"], ["checklist", "✅ Checklist"], ["after", "📈 After"]].map(([step, label]) => (
              <button key={step} onClick={() => setSessionStep(step)}
                style={{ flex: 1, background: sessionStep === step ? selectedTemplate.color : "none",
                  color: sessionStep === step ? "#0F1117" : "#4B5563",
                  border: "none", borderRadius: 6, padding: "8px 0", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                {label}
              </button>
            ))}
          </div>

          <div style={{ flex: 1, overflowY: "auto" }}>
            {/* BEFORE METRICS */}
            {sessionStep === "before" && (
              <div>
                <div style={{ color: "#E8EAF0", fontSize: 16, fontWeight: 700, marginBottom: 20 }}>How are you feeling right now?</div>
                <MetricSelector label="Energy" value={beforeMetrics.energy} onChange={v => setBeforeMetrics(m => ({ ...m, energy: v }))} max={5} color="#4AD99A" />
                <MetricSelector label="Muscle Soreness" value={beforeMetrics.soreness} onChange={v => setBeforeMetrics(m => ({ ...m, soreness: v }))} max={5} color="#E8A838" />
                <MetricSelector label="Heel Pain" value={beforeMetrics.heel_pain} onChange={v => setBeforeMetrics(m => ({ ...m, heel_pain: v }))} max={10} color="#D94A4A" />
                <MetricSelector label="Low Back Tightness" value={beforeMetrics.low_back} onChange={v => setBeforeMetrics(m => ({ ...m, low_back: v }))} max={10} color="#D94A4A" />
                <button onClick={() => setSessionStep("checklist")}
                  style={{ background: selectedTemplate.color, color: "#0F1117", border: "none", borderRadius: 10, height: 56, width: "100%", fontSize: 17, fontWeight: 800, cursor: "pointer", marginTop: 8 }}>
                  Start Checklist →
                </button>
              </div>
            )}

            {/* CHECKLIST */}
            {sessionStep === "checklist" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <div style={{ color: "#E8EAF0", fontSize: 16, fontWeight: 700 }}>Complete each item</div>
                  <div style={{ color: selectedTemplate.color, fontSize: 14, fontWeight: 700 }}>{completedCount}/{checklist.length}</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
                  {checklist.map((item, i) => (
                    <button key={i} onClick={() => toggleItem(i)}
                      style={{ background: item.completed ? selectedTemplate.color + "22" : "#0F1117",
                        border: item.completed ? "1px solid " + selectedTemplate.color + "44" : "1px solid #2A2D3A",
                        borderRadius: 10, padding: "14px 16px", cursor: "pointer", textAlign: "left", width: "100%" }}>
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
                        <div style={{ width: 28, height: 28, borderRadius: 8, flexShrink: 0, marginTop: 2,
                          background: item.completed ? selectedTemplate.color : "#2A2D3A",
                          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>
                          {item.completed ? "✓" : ""}
                        </div>
                        <div>
                          <div style={{ color: item.completed ? selectedTemplate.color : "#E8EAF0", fontWeight: 700, fontSize: 15, marginBottom: 3 }}>{item.name}</div>
                          {item.cue && <div style={{ color: "#8B92A5", fontSize: 12, lineHeight: 1.5 }}>{item.cue}</div>}
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
                <button onClick={() => setSessionStep("after")}
                  style={{ background: selectedTemplate.color, color: "#0F1117", border: "none", borderRadius: 10, height: 56, width: "100%", fontSize: 17, fontWeight: 800, cursor: "pointer" }}>
                  Record After Metrics →
                </button>
              </div>
            )}

            {/* AFTER METRICS */}
            {sessionStep === "after" && (
              <div>
                {/* Before comparison */}
                <div style={{ background: "#0F1117", borderRadius: 10, padding: "14px 16px", marginBottom: 20, border: "1px solid #2A2D3A" }}>
                  <div style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>Before → After</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    {[["Energy", beforeMetrics?.energy ?? 3, afterMetrics?.energy ?? 3, "#4AD99A", false],
                      ["Soreness", beforeMetrics?.soreness ?? 3, afterMetrics?.soreness ?? 3, "#E8A838", true],
                      ["Heel Pain", beforeMetrics?.heel_pain ?? 0, afterMetrics?.heel_pain ?? 0, "#D94A4A", true],
                      ["Low Back", beforeMetrics?.low_back ?? 0, afterMetrics?.low_back ?? 0, "#D94A4A", true]].map(([label, before, after, color, lib]) => {
                      const improved = lib ? after < before : after > before;
                      const same = after === before;
                      const dc = same ? "#4B5563" : improved ? "#4AD99A" : "#D94A4A";
                      return (
                        <div key={label} style={{ background: "#1A1D26", borderRadius: 8, padding: "8px 12px" }}>
                          <div style={{ color: "#8B92A5", fontSize: 11, marginBottom: 4 }}>{label}</div>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <span style={{ color: "#8B92A5", fontSize: 14, fontWeight: 700 }}>{before}</span>
                            <span style={{ color: dc }}>→</span>
                            <span style={{ color: dc, fontSize: 18, fontWeight: 800 }}>{after}</span>
                            {!same && <span style={{ color: dc, fontSize: 10 }}>{improved ? "▲" : "▼"}</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div style={{ color: "#E8EAF0", fontSize: 15, fontWeight: 700, marginBottom: 16 }}>Update your after metrics:</div>
                <MetricSelector label="Energy" value={afterMetrics.energy} onChange={v => setAfterMetrics(m => ({ ...m, energy: v }))} max={5} color="#4AD99A" />
                <MetricSelector label="Muscle Soreness" value={afterMetrics.soreness} onChange={v => setAfterMetrics(m => ({ ...m, soreness: v }))} max={5} color="#E8A838" />
                <MetricSelector label="Heel Pain" value={afterMetrics.heel_pain} onChange={v => setAfterMetrics(m => ({ ...m, heel_pain: v }))} max={10} color="#D94A4A" />
                <MetricSelector label="Low Back Tightness" value={afterMetrics.low_back} onChange={v => setAfterMetrics(m => ({ ...m, low_back: v }))} max={10} color="#D94A4A" />

                <div style={{ marginBottom: 20, marginTop: 8 }}>
                  <div style={{ color: "#8B92A5", fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>Did you leave better than you arrived?</div>
                  <div style={{ display: "flex", gap: 10 }}>
                    {[["better", "✅ Yes", "#4AD99A"], ["neutral", "➡️ Neutral", "#E8A838"], ["worse", "❌ No", "#D94A4A"]].map(([val, label, color]) => (
                      <button key={val} onClick={() => setResultRating(val)}
                        style={{ flex: 1, height: 52, borderRadius: 10, border: resultRating === val ? "2px solid " + color : "2px solid #2A2D3A",
                          background: resultRating === val ? color + "22" : "#0F1117",
                          color: resultRating === val ? color : "#4B5563", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                        {label}
                      </button>
                    ))}
                  </div>
                </div>

                <button onClick={saveSession} disabled={saving || !resultRating}
                  style={{ background: saving || !resultRating ? "#2A2D3A" : "#4AD99A",
                    color: saving || !resultRating ? "#4B5563" : "#0F1117",
                    border: "none", borderRadius: 10, height: 60, width: "100%", fontSize: 18, fontWeight: 800, cursor: saving || !resultRating ? "default" : "pointer" }}>
                  {saving ? "Saving..." : "Save Recovery Session"}
                </button>
                {saveError && <div style={{ color: "#D94A4A", fontSize: 13, marginTop: 10, background: "#D94A4A11", border: "1px solid #D94A4A44", borderRadius: 8, padding: "10px 14px" }}>{saveError}</div>}
              </div>
            )}
          </div>
        </div>

        {/* Right sidebar — progress */}
        <div style={{ display: "flex", flexDirection: "column", gap: 12, overflowY: "auto" }}>
          <div style={{ background: "#1A1D26", borderRadius: 12, border: "1px solid #2A2D3A", padding: 16 }}>
            <div style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 }}>Session Progress</div>
            <div style={{ background: "#0F1117", borderRadius: 8, padding: "12px 14px", marginBottom: 12 }}>
              <div style={{ color: "#8B92A5", fontSize: 12, marginBottom: 6 }}>Checklist</div>
              <div style={{ color: selectedTemplate.color, fontSize: 28, fontWeight: 800 }}>{completedCount}<span style={{ color: "#4B5563", fontSize: 16 }}>/{checklist.length}</span></div>
              <div style={{ background: "#1A1D26", borderRadius: 4, height: 6, marginTop: 8 }}>
                <div style={{ width: `${checklist.length > 0 ? (completedCount/checklist.length)*100 : 0}%`, height: "100%", background: selectedTemplate.color, borderRadius: 4, transition: "width 0.3s" }} />
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {checklist.map((item, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0" }}>
                  <div style={{ width: 18, height: 18, borderRadius: 4, flexShrink: 0,
                    background: item.completed ? selectedTemplate.color : "#2A2D3A",
                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11 }}>
                    {item.completed ? "✓" : ""}
                  </div>
                  <span style={{ color: item.completed ? "#E8EAF0" : "#4B5563", fontSize: 12, textDecoration: item.completed ? "none" : "none" }}>{item.name}</span>
                </div>
              ))}
            </div>
          </div>

          {sessionStep !== "before" && (
            <div style={{ background: "#1A1D26", borderRadius: 12, border: "1px solid #2A2D3A", padding: 16 }}>
              <div style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 }}>Before Metrics</div>
              {[["Energy", beforeMetrics.energy, 5, "#4AD99A"], ["Soreness", beforeMetrics.soreness, 5, "#E8A838"], ["Heel Pain", beforeMetrics.heel_pain, 10, "#D94A4A"], ["Low Back", beforeMetrics.low_back, 10, "#D94A4A"]].map(([label, val, max, color]) => (
                <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #2A2D3A" }}>
                  <span style={{ color: "#8B92A5", fontSize: 12 }}>{label}</span>
                  <span style={{ color, fontSize: 13, fontWeight: 700 }}>{val}/{max}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── SESSION SUMMARY ────────────────────────────────────────────────────────
  if (selectedTemplate && sessionStep === "summary" && lastSession) {
    const ratingConfig = { better: { color: "#4AD99A", label: "✅ Better", icon: "🎉" }, neutral: { color: "#E8A838", label: "➡️ Neutral", icon: "😐" }, worse: { color: "#D94A4A", label: "❌ Worse", icon: "😔" } };
    const rc = ratingConfig[lastSession.result_rating] || ratingConfig.neutral;
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "60vh" }}>
        <div style={{ background: "#1A1D26", borderRadius: 16, border: "1px solid #4AD99A44", padding: 40, maxWidth: 560, width: "100%", textAlign: "center" }}>
          <div style={{ fontSize: 44, marginBottom: 12 }}>{rc.icon}</div>
          <div style={{ fontSize: 26, fontWeight: 800, color: "#4AD99A", marginBottom: 4 }}>Recovery Session Complete</div>
          <div style={{ color: "#8B92A5", fontSize: 14, marginBottom: 28 }}>{lastSession.template_name} · {lastSession.duration} min · {lastSession.completed_count}/{lastSession.total_count} items</div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 24, textAlign: "left" }}>
            <DeltaBadge label="Energy" before={lastSession.before_energy} after={lastSession.after_energy} color="#4AD99A" />
            <DeltaBadge label="Muscle Soreness" before={lastSession.before_soreness} after={lastSession.after_soreness} lowerIsBetter />
            <DeltaBadge label="Heel Pain" before={lastSession.before_heel_pain} after={lastSession.after_heel_pain} lowerIsBetter />
            <DeltaBadge label="Low Back" before={lastSession.before_low_back_tightness} after={lastSession.after_low_back_tightness} lowerIsBetter />
          </div>

          <div style={{ background: rc.color + "22", border: `1px solid ${rc.color}44`, borderRadius: 10, padding: "12px 20px", marginBottom: 24 }}>
            <div style={{ color: rc.color, fontSize: 18, fontWeight: 800 }}>Did you leave better than you arrived? {rc.label}</div>
          </div>

          <button onClick={endSession}
            style={{ background: "#4AD99A", color: "#0F1117", border: "none", borderRadius: 10, height: 52, width: "100%", fontSize: 16, fontWeight: 800, cursor: "pointer" }}>
            Done
          </button>
        </div>
      </div>
    );
  }

  // ── MAIN VIEWS ─────────────────────────────────────────────────────────────
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Recovery</h2>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>Maintain the machine so training can continue for decades.</div>
        </div>
        <div style={{ display: "flex", background: "#1A1D26", borderRadius: 8, padding: 3, border: "1px solid #2A2D3A" }}>
          {[["today", "Today"], ["history", "History"], ["templates", "Templates"]].map(([id, label]) => (
            <button key={id} onClick={() => setView(id)}
              style={{ background: view === id ? "#4A90D9" : "none", color: view === id ? "#fff" : "#8B92A5",
                border: "none", borderRadius: 6, padding: "7px 16px", fontSize: 13, fontWeight: view === id ? 600 : 400, cursor: "pointer" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* TODAY VIEW */}
      {view === "today" && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
          <div>
            {todaySession ? (
              <Card style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                  <div>
                    <div style={{ color: "#4AD99A", fontWeight: 700, fontSize: 16, marginBottom: 3 }}>✓ Session Complete Today</div>
                    <div style={{ color: "#8B92A5", fontSize: 13 }}>{todaySession.template_name} · {todaySession.duration_minutes} min</div>
                    <div style={{ color: "#8B92A5", fontSize: 13 }}>{todaySession.completed_count}/{todaySession.total_count} items completed</div>
                  </div>
                  {todaySession.result_rating && (
                    <div style={{ background: todaySession.result_rating === "better" ? "#4AD99A22" : todaySession.result_rating === "neutral" ? "#E8A83822" : "#D94A4A22",
                      color: todaySession.result_rating === "better" ? "#4AD99A" : todaySession.result_rating === "neutral" ? "#E8A838" : "#D94A4A",
                      padding: "6px 12px", borderRadius: 8, fontSize: 13, fontWeight: 700 }}>
                      {todaySession.result_rating === "better" ? "✅ Better" : todaySession.result_rating === "neutral" ? "➡️ Neutral" : "❌ Worse"}
                    </div>
                  )}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {[["Energy", todaySession.before_energy, todaySession.after_energy, "#4AD99A", false],
                    ["Soreness", todaySession.before_soreness, todaySession.after_soreness, "#E8A838", true],
                    ["Heel Pain", todaySession.before_heel_pain, todaySession.after_heel_pain, "#D94A4A", true],
                    ["Low Back", todaySession.before_low_back_tightness, todaySession.after_low_back_tightness, "#D94A4A", true]].map(([label, before, after, color, lowerIsBetter]) => {
                    const improved = lowerIsBetter ? after < before : after > before;
                    const same = after === before;
                    const dc = same ? "#4B5563" : improved ? "#4AD99A" : "#D94A4A";
                    return (
                      <div key={label} style={{ background: "#0F1117", borderRadius: 8, padding: "10px 12px" }}>
                        <div style={{ color: "#8B92A5", fontSize: 11, marginBottom: 4 }}>{label}</div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ color: "#E8EAF0", fontSize: 15, fontWeight: 700 }}>{before}</span>
                          <span style={{ color: dc }}>→</span>
                          <span style={{ color: dc, fontSize: 18, fontWeight: 800 }}>{after}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </Card>
            ) : (
              <Card style={{ marginBottom: 16, textAlign: "center", padding: 32 }}>
                <div style={{ fontSize: 36, marginBottom: 12 }}>🩺</div>
                <div style={{ color: "#E8EAF0", fontSize: 17, fontWeight: 700, marginBottom: 8 }}>No recovery session today</div>
                <div style={{ color: "#8B92A5", fontSize: 13, marginBottom: 20 }}>Choose a template below to get started.</div>
              </Card>
            )}

            <SectionLabel>Start a Session</SectionLabel>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {RECOVERY_TEMPLATES.map((t, i) => (
                <button key={i} onClick={() => startSession(t)}
                  style={{ background: "#1A1D26", border: `1px solid ${t.color}44`, borderRadius: 10, padding: "14px 18px", cursor: "pointer", textAlign: "left", width: "100%" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <span style={{ fontSize: 24 }}>{t.icon}</span>
                      <div>
                        <div style={{ color: t.color, fontWeight: 700, fontSize: 15 }}>{t.name}</div>
                        <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>{t.duration} · {t.items.length} exercises</div>
                      </div>
                    </div>
                    <div style={{ color: t.color, fontSize: 20, fontWeight: 800 }}>→</div>
                  </div>
                </button>
              ))}
            </div>
          </div>

          <div>
            <Card>
              <SectionLabel>Recent Sessions</SectionLabel>
              {recentSessions.length === 0 ? (
                <div style={{ color: "#3A3D4A", fontSize: 13, textAlign: "center", padding: "20px 0" }}>No sessions yet</div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {recentSessions.slice(0, 5).map((s, i) => {
                    const rc = { better: "#4AD99A", neutral: "#E8A838", worse: "#D94A4A" }[s.result_rating] || "#4B5563";
                    return (
                      <div key={i} style={{ background: "#0F1117", borderRadius: 8, padding: "10px 12px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <span style={{ color: "#E8EAF0", fontSize: 13, fontWeight: 600 }}>{new Date(s.date + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}</span>
                          <span style={{ color: rc, fontSize: 12, fontWeight: 700 }}>{s.result_rating === "better" ? "✅" : s.result_rating === "neutral" ? "➡️" : "❌"}</span>
                        </div>
                        <div style={{ color: "#8B92A5", fontSize: 12 }}>{s.template_name} · {s.completed_count}/{s.total_count} items · {s.duration_minutes} min</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </Card>

            <Card key={i} style={{ border: `1px solid ${t.color}33` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <span style={{ fontSize: 28 }}>{t.icon}</span>
                <div>
                  <div style={{ color: t.color, fontWeight: 800, fontSize: 16 }}>{t.name}</div>

              <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 16 }}>
                {t.items.map((item, ii) => (
                  <div key={ii} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ width: 5, height: 5, borderRadius: "50%", background: t.color, flexShrink: 0 }} />

  return (
    <div style={{ background: "#1A1D26", borderRadius: 12, border: expanded ? "1px solid " + rc + "44" : "1px solid #2A2D3A", overflow: "hidden" }}>
      <button onClick={() => setExpanded(e => !e)}
        style={{ width: "100%", background: "none", border: "none", padding: "16px 20px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", textAlign: "left" }}>

          <div style={{ color: "#E8EAF0", fontWeight: 700, fontSize: 15 }}>{new Date(s.date + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })}</div>

            {[["Energy", s.before_energy, s.after_energy, false],
              ["Soreness", s.before_soreness, s.after_soreness, true],
              ["Heel Pain", s.before_heel_pain, s.after_heel_pain, true],

// ─── PHASE TRACKER ────────────────────────────────────────────────────────────
function PhaseTracker({ phase, setPhase }) {
  const [showSetup, setShowSetup] = useState(!phase);
  const [setupType, setSetupType] = useState("gain");
  const [setupStart, setSetupStart] = useState(new Date().toISOString().split("T")[0]);

  const cfg = phase ? PHASE_CONFIG[phase.type] : null;

  const startPhase = () => {
    const start = new Date(setupStart);
    const weeks = PHASE_CONFIG[setupType].weeks;
    const end = new Date(start);
    end.setDate(end.getDate() + weeks * 7);
    setPhase({ type: setupType, startDate: start.toISOString(), endDate: end.toISOString(), history: phase?.history || [] });
    setShowSetup(false);
  };

  const completePhase = () => {
    const history = [...(phase.history || []), { type: phase.type, startDate: phase.startDate, endDate: new Date().toISOString() }];
    setPhase({ ...phase, history });
    setShowSetup(true);
    setSetupType(phase.type === "gain" ? "cut" : "gain");
  };

  const getDayInfo = () => {
    if (!phase) return null;
    const start = new Date(phase.startDate), end = new Date(phase.endDate), now = new Date();
    const totalDays = Math.round((end - start) / 86400000);
    const elapsed = Math.max(0, Math.round((now - start) / 86400000));
    const remaining = Math.max(0, totalDays - elapsed);
    const pct = Math.min(100, (elapsed / totalDays) * 100);
    const week = Math.floor(elapsed / 7) + 1;
    return { totalDays, elapsed, remaining, pct, week, totalWeeks: cfg.weeks };
  };

  const info = phase ? getDayInfo() : null;
  const history = phase?.history || [];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Phase Tracker</h2>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>Bulk / Cut cycle management</div>
        </div>
        {phase && (
          <button onClick={() => { setShowSetup(true); setSetupType(phase.type); setSetupStart(new Date().toISOString().split("T")[0]); }}
            style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 13, cursor: "pointer" }}>
            Edit Phase
          </button>
        )}
      </div>

      {!phase && !showSetup && (
        <Card style={{ textAlign: "center", padding: 48 }}>
          <div style={{ fontSize: 40, marginBottom: 16 }}>🗓️</div>
          <div style={{ color: "#E8EAF0", fontSize: 18, fontWeight: 700, marginBottom: 8 }}>No active phase</div>
          <button onClick={() => setShowSetup(true)}
            style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 9, padding: "12px 28px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
            Set Up Phase
          </button>
        </Card>
      )}

      {phase && info && (
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 20, marginBottom: 20 }}>
          <Card style={{ border: `1px solid ${cfg.color}44` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                  <span style={{ fontSize: 24 }}>{cfg.icon}</span>
                  <span style={{ fontSize: 22, fontWeight: 800, color: cfg.color }}>{cfg.label}</span>
                </div>
                <div style={{ color: "#8B92A5", fontSize: 13 }}>{cfg.description}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: cfg.color, fontSize: 36, fontWeight: 800, lineHeight: 1 }}>{info.remaining}</div>
                <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>days remaining</div>
              </div>
            </div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ color: "#8B92A5", fontSize: 12 }}>Week {Math.min(info.week, info.totalWeeks)} of {info.totalWeeks}</span>
                <span style={{ color: cfg.color, fontSize: 12, fontWeight: 700 }}>{Math.round(info.pct)}% complete</span>
              </div>
              <div style={{ background: "#0F1117", borderRadius: 6, height: 10 }}>
                <div style={{ width: `${info.pct}%`, height: "100%", background: cfg.color, borderRadius: 6 }} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                <span style={{ color: "#4B5563", fontSize: 11 }}>{fmtDate(phase.startDate)}</span>
                <span style={{ color: "#4B5563", fontSize: 11 }}>{fmtDate(phase.endDate)}</span>
              </div>
            </div>

            <div style={{ display: "flex", gap: 3, marginBottom: 20 }}>
              {Array.from({ length: info.totalWeeks }).map((_, i) => {
                const done = i < info.week - 1, current = i === info.week - 1;
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                    <div style={{ width: "100%", height: 28, borderRadius: 4,
                      background: done ? cfg.color : current ? cfg.color + "66" : "#1A1D26",
                      border: current ? `1px solid ${cfg.color}` : "1px solid #2A2D3A",
                      display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {done && <span style={{ fontSize: 12 }}>✓</span>}
                      {current && <span style={{ color: cfg.color, fontSize: 10, fontWeight: 700 }}>NOW</span>}
                    </div>
                    <div style={{ color: "#3A3D4A", fontSize: 9 }}>W{i + 1}</div>
                  </div>
                );
              })}
            </div>

            <button onClick={completePhase}
              style={{ background: cfg.color, color: "#0F1117", border: "none", borderRadius: 9, padding: "11px 0", width: "100%", fontSize: 14, fontWeight: 800, cursor: "pointer" }}>
              Complete Phase → Start {phase.type === "gain" ? "Cut" : "Gain"}
            </button>
          </Card>

          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Card>
              <SectionLabel>Daily Targets</SectionLabel>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[
                  { label: "Calories", val: phase.type === "gain" ? "2,650" : "1,600", unit: "kcal", color: "#E8A838" },
                  { label: "Protein",  val: "191g", unit: "per day", color: "#4A90D9" },
                  { label: "Training", val: "3×",   unit: "/ week",  color: "#4AD9A0" },
                ].map(({ label, val, unit, color }) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#0F1117", borderRadius: 7, padding: "8px 12px" }}>
                    <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
                    <span style={{ color, fontSize: 15, fontWeight: 700 }}>{val} <span style={{ fontSize: 11, fontWeight: 400, color: "#4B5563" }}>{unit}</span></span>
                  </div>
                ))}
              </div>
            </Card>
            <Card>
              <SectionLabel>Phase Stats</SectionLabel>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[["Day", `${info.elapsed + 1} of ${info.totalDays}`], ["Started", fmtDate(phase.startDate)], ["Ends", fmtDate(phase.endDate)], ["Cycles completed", history.length]].map(([label, val]) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between" }}>
                    <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
                    <span style={{ color: "#E8EAF0", fontSize: 13, fontWeight: 700 }}>{val}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>
      )}

      {history.length > 0 && (
        <Card>
          <SectionLabel>Cycle History</SectionLabel>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {history.map((h, i) => {
              const hcfg = PHASE_CONFIG[h.type];
              const days = Math.round((new Date(h.endDate) - new Date(h.startDate)) / 86400000);
              return (
                <div key={i} style={{ background: "#0F1117", borderRadius: 8, padding: "10px 14px", border: `1px solid ${hcfg.color}33` }}>
                  <div style={{ color: hcfg.color, fontWeight: 700, fontSize: 13 }}>{hcfg.icon} {hcfg.label}</div>
                  <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>{fmtDate(h.startDate)} → {fmtDate(h.endDate)}</div>
                  <div style={{ color: "#4B5563", fontSize: 11, marginTop: 1 }}>{days} days</div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {showSetup && (
        <Modal title="Set Up Phase" onClose={() => phase && setShowSetup(false)} width={480}>
          <div style={{ marginBottom: 20 }}>
            <SectionLabel>Phase Type</SectionLabel>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {["gain", "cut"].map(type => {
                const c = PHASE_CONFIG[type];
                return (
                  <button key={type} onClick={() => setSetupType(type)}
                    style={{ background: setupType === type ? c.bg : "#0F1117", border: setupType === type ? "2px solid " + c.color : "2px solid #2A2D3A", borderRadius: 10, padding: "16px 12px", cursor: "pointer", textAlign: "left" }}>
                    <div style={{ fontSize: 22, marginBottom: 6 }}>{c.icon}</div>
                    <div style={{ color: setupType === type ? c.color : "#E8EAF0", fontWeight: 700, fontSize: 15 }}>{c.label}</div>
                    <div style={{ color: "#8B92A5", fontSize: 11, marginTop: 4 }}>{c.weeks} weeks · {c.calories} kcal/day</div>
                  </button>
                );
              })}
            </div>
          </div>
          <div style={{ marginBottom: 20 }}>
            <label style={{ color: "#8B92A5", fontSize: 11, display: "block", marginBottom: 6 }}>Start Date</label>
            <input type="date" value={setupStart} onChange={e => setSetupStart(e.target.value)} style={inputStyle} />
          </div>
          <div style={{ background: "#0F1117", borderRadius: 8, padding: "12px 16px", marginBottom: 20 }}>
            <div style={{ color: "#8B92A5", fontSize: 12, marginBottom: 4 }}>Phase ends on</div>
            <div style={{ color: PHASE_CONFIG[setupType].color, fontSize: 18, fontWeight: 700 }}>
              {(() => { const d = new Date(setupStart); d.setDate(d.getDate() + PHASE_CONFIG[setupType].weeks * 7); return fmtDateLong(d.toISOString()); })()}
            </div>
          </div>
          <button onClick={startPhase}
            style={{ background: PHASE_CONFIG[setupType].color, color: "#0F1117", border: "none", borderRadius: 9, padding: "13px 0", width: "100%", fontSize: 15, fontWeight: 800, cursor: "pointer" }}>
            Start {PHASE_CONFIG[setupType].label}
          </button>
        </Modal>
      )}
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("jdurham@outlook.com");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const signIn = async () => {
    if (!password.trim()) return;
    setLoading(true); setError("");
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: { "apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email: email.trim(), password: password.trim() }),
    });
    const data = await res.json();
    if (data.access_token) {
      onLogin(data.access_token, data.user.id, data.refresh_token);
    } else {
      setError(data.error_description || data.msg || "Invalid email or password");
    }
    setLoading(false);
  };

  return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center" }}>

          <div style={{ fontSize: 28, fontWeight: 800, color: "#E8EAF0", marginBottom: 6 }}>PROJECT PRIME</div>
          <div style={{ fontSize: 13, color: "#4B5563" }}>Build the best version of you</div>
        </div>
        <div style={{ marginBottom: 14 }}>
          <label style={{ color: "#8B92A5", fontSize: 12, display: "block", marginBottom: 6 }}>Email</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && signIn()} style={{ ...inputStyle, fontSize: 15 }} />
        </div>
        <div style={{ marginBottom: 20 }}>
          <label style={{ color: "#8B92A5", fontSize: 12, display: "block", marginBottom: 6 }}>Password</label>
          <input type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && signIn()} placeholder="Enter your password" style={{ ...inputStyle, fontSize: 15 }} />
        </div>
        {error && <div style={{ color: "#D94A4A", fontSize: 12, marginBottom: 14 }}>{error}</div>}
        <button onClick={signIn} disabled={loading || !password.trim()}
          style={{ width: "100%", background: loading || !password.trim() ? "#2A2D3A" : "#4A90D9",
            color: loading || !password.trim() ? "#4B5563" : "#fff",

          {loading ? "Signing in..." : "Sign In"}
        </button>
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("workout");
  const [showPhaseModal, setShowPhaseModal] = useState(false);
  const [exercises]                 = useState(INITIAL_EXERCISES);
  const [workoutLogs, setWorkoutLogs]     = useState([]);
  const [bodyLogs, setBodyLogs]           = useState([]);
  const [nutritionDays, setNutritionDays] = useState([]);
  const [recoveryLogs, setRecoveryLogs]   = useState([]);
  const [recoverySessions, setRecoverySessions] = useState([]);
  const [phase, setPhase]           = useState(null);
  const [loading, setLoading]       = useState(true);
  const [dbError, setDbError]       = useState(false);
  const [session, setSession]       = useState(null);
  const [userId, setUserId]         = useState(null);

  // ── Session restore ────────────────────────────────────────────────────────
  useEffect(() => {
    const stored = localStorage.getItem("pp_session") || sessionStorage.getItem("pp_session");
    if (stored) {
      try {
        const { token, uid, refreshToken } = JSON.parse(stored);
        setSession(token); setUserId(uid);
      } catch { setLoading(false); }
    } else {
      setLoading(false);
    }
  }, []);

  // ── Auto-refresh session every 45 minutes ─────────────────────────────────
  useEffect(() => {
    if (!session) return;
    const doRefresh = async () => {
      try {
        const stored = localStorage.getItem("pp_session");
        if (!stored) return;
        const { refreshToken, uid } = JSON.parse(stored);
        if (!refreshToken) return;
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
          method: "POST",
          headers: { "apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ refresh_token: refreshToken }),
        });
        const data = await res.json();
        if (data.access_token) {
          const newData = JSON.stringify({ token: data.access_token, uid, refreshToken: data.refresh_token || refreshToken });
          localStorage.setItem("pp_session", newData);
          sessionStorage.setItem("pp_session", newData);
          setSession(data.access_token);
        }
      } catch {}
    };
    // Refresh immediately on load, then every 45 minutes
    doRefresh();
    const interval = setInterval(doRefresh, 45 * 60 * 1000);
    return () => clearInterval(interval);
  }, [userId]);

  // ── Load data when session ready ───────────────────────────────────────────
  useEffect(() => {
    if (session && userId) {
      loadAll(session, userId);
    }
  }, [session, userId]);

  const loadAll = useCallback(async (token, uid) => {
    setLoading(true); setDbError(false);
    try {
      const [wData, bData, ndData, rlData, rsData, pData] = await Promise.all([
        sbGet(`workout_logs?user_id=eq.${uid}&order=date.asc&limit=5000`, token),
        sbGet(`body_logs?user_id=eq.${uid}&order=date.asc&limit=500`, token),
        sbGet(`nutrition_days?user_id=eq.${uid}&order=date.desc&limit=100`, token),
        sbGet(`recovery_logs?user_id=eq.${uid}&order=date.desc&limit=100`, token),
        sbGet(`recovery_sessions?user_id=eq.${uid}&order=date.desc&limit=100`, token),
        sbGet(`phase_data?user_id=eq.${uid}&order=created_at.desc&limit=1`, token),
      ]);

      // If any request returns 401, session is expired — force re-login
      if ([wData, bData, ndData, rlData, rsData, pData].some(d => d?._unauthorized)) {
        localStorage.removeItem("pp_session");
        sessionStorage.removeItem("pp_session");
        setSession(null); setUserId(null);
        setTab("workout");
        setLoading(false);
        return;
      }

      const lsWorkout = lsGet(LS_KEYS.workout);
      const lsBody    = lsGet(LS_KEYS.body);

      const merged = (remote, local) => {
        if (!remote) return local;
        const remoteIds = new Set(remote.map(r => r.id).filter(Boolean));
        const pending = local.filter(l => !l.id || !remoteIds.has(l.id));
        return [...remote, ...pending];
      };

      const wLogs = merged(wData, lsWorkout).map(r => ({ id: r.id, exerciseId: r.exercise_id || r.exerciseId, sets: r.sets, reps: r.reps, weight: r.weight, notes: r.notes, date: r.date }));
      const bLogs = merged(bData, lsBody).map(r => ({ id: r.id, weight: r.weight, chest: r.chest, waist: r.waist, hips: r.hips, glutes: r.glutes, thighs: r.thighs, arms: r.arms, date: r.date }));

      // Load nutrition entries for each day
      let nDays = ndData || [];
      if (nDays.length > 0) {
        const dayIds = nDays.map(d => d.id).join(",");
        const entries = await sbGet(`nutrition_entries?nutrition_day_id=in.(${dayIds})&order=created_at.asc`, token);
        nDays = nDays.map(d => ({
          ...d,
          entries: (entries || []).filter(e => e.nutrition_day_id === d.id)
        }));
      }

      setWorkoutLogs(wLogs);
      setBodyLogs(bLogs);
      setNutritionDays(nDays);
      setRecoveryLogs(rlData || []);
      setRecoverySessions(rsData || []);
      lsSet(LS_KEYS.workout, wLogs);
      lsSet(LS_KEYS.body, bLogs);

      if (pData?.[0]) {
        setPhase({ id: pData[0].id, type: pData[0].type, startDate: pData[0].start_date, endDate: pData[0].end_date, history: pData[0].history || [] });
      }
    } catch (e) { setDbError(true); }
    setLoading(false);
  }, []);

  const signOut = () => {
    localStorage.removeItem("pp_session"); sessionStorage.removeItem("pp_session");
    setSession(null); setUserId(null); setTab("workout");
    setWorkoutLogs([]); setBodyLogs([]); setNutritionDays([]); setRecoveryLogs([]); setRecoverySessions([]); setPhase(null);
  };

  // ── Workout handlers ───────────────────────────────────────────────────────
  const addWorkoutLog = async (exerciseId, entry) => {
    const localEntry = { exerciseId, ...entry, _pending: true };
    const updated = [...workoutLogs, localEntry];
    setWorkoutLogs(updated);
    lsSet(LS_KEYS.workout, updated);

    const rows = await sbPost("workout_logs", { exercise_id: exerciseId, sets: entry.sets, reps: entry.reps, weight: entry.weight, notes: entry.notes, date: entry.date, user_id: userId }, session);
    if (rows?.[0]) {
      const synced = updated.map(l => l === localEntry ? { ...entry, id: rows[0].id, exerciseId } : l);
      setWorkoutLogs(synced); lsSet(LS_KEYS.workout, synced);
      return true;
    }
    return false;
  };

  // ── Body handlers ──────────────────────────────────────────────────────────
  const addBodyLog = async (entry) => {
    const localEntry = { ...entry, _pending: true };
    const updated = [...bodyLogs, localEntry];
    setBodyLogs(updated); lsSet(LS_KEYS.body, updated);
    const rows = await sbPost("body_logs", { ...entry, user_id: userId }, session);
    if (rows?.[0]) {
      const synced = updated.map(l => l === localEntry ? { ...entry, id: rows[0].id } : l);
      setBodyLogs(synced); lsSet(LS_KEYS.body, synced);
      return true;
    }
    return false;
  };

  // ── Nutrition handlers ─────────────────────────────────────────────────────
  const saveNutritionDay = async (parsed, rawText) => {
    try {
      const dayPayload = {
        user_id: userId,
        date: parsed.date,
        phase: parsed.phase || "Gain Phase",
        target_calories: Number(parsed.targets?.calories) || 2650,
        target_protein: Number(parsed.targets?.protein) || 191,
        target_carbs: Number(parsed.targets?.carbs) || 220,
        target_fat: Number(parsed.targets?.fat) || 65,
        total_calories: Number(parsed.totals?.calories) || 0,
        total_protein: Number(parsed.totals?.protein) || 0,
        total_carbs: Number(parsed.totals?.carbs) || 0,
        total_fat: Number(parsed.totals?.fat) || 0,
        remaining_calories: Number(parsed.remaining?.calories) || 0,
        remaining_protein: Number(parsed.remaining?.protein) || 0,
        remaining_carbs: Number(parsed.remaining?.carbs) || 0,
        remaining_fat: Number(parsed.remaining?.fat) || 0,
        compliance: typeof parsed.compliance === "string" ? parsed.compliance.slice(0, 200) : null,
        notes: Array.isArray(parsed.notes) ? parsed.notes.join(" ").slice(0, 1000) : (typeof parsed.notes === "string" ? parsed.notes.slice(0, 1000) : null),
        raw_import: rawText ? rawText.slice(0, 4000) : null,
      };

      // Delete existing same-date record first
      const existing = nutritionDays.find(d => d.date === parsed.date);
      if (existing?.id) await sbDelete(`nutrition_days?id=eq.${existing.id}`, session);

      const rows = await sbPost("nutrition_days", dayPayload, session);
      if (!rows?.[0]?.id) {
        const errMsg = rows?._error ? rows.message : JSON.stringify(rows);
        console.error("nutrition_days insert failed:", errMsg);
        return { ok: false, error: `DB error: ${errMsg}` };
      }
      const dayId = rows[0].id;

      // Insert meal entries
      const entries = parsed.entries || [];
      const entryRows = [];
      for (const e of entries) {
        const eRow = await sbPost("nutrition_entries", {
          user_id: userId,
          nutrition_day_id: dayId,
          entry_time: e.time ? String(e.time).slice(0, 20) : null,
          entry_type: e.type || "food",
          meal_name: e.name ? String(e.name).slice(0, 100) : null,
          items: e.items ? String(e.items).slice(0, 500) : null,
          calories: Number(e.calories) || 0,
          protein: Number(e.protein) || 0,
          carbs: Number(e.carbs) || 0,
          fat: Number(e.fat) || 0,
        }, session);
        if (eRow?.[0]) entryRows.push(eRow[0]);
      }

      const newDay = { ...rows[0], entries: entryRows };
      setNutritionDays(prev => [newDay, ...prev.filter(d => d.date !== parsed.date)]);
      return { ok: true };
    } catch (e) {
      console.error("saveNutritionDay error:", e);
      return { ok: false, error: e.message };
    }
  };

  // ── Recovery handlers ──────────────────────────────────────────────────────
  const saveRecoveryLog = async (entry) => {
    try {
      const existing = recoveryLogs.find(r => r.date === entry.date);
      if (existing?.id) await sbDelete(`recovery_logs?id=eq.${existing.id}`, session);
      const rows = await sbPost("recovery_logs", { ...entry, user_id: userId }, session);
      if (!rows?.[0]) return false;
      setRecoveryLogs(prev => [rows[0], ...prev.filter(r => r.date !== entry.date)]);
      return true;
    } catch { return false; }
  };

  const saveRecoverySession = async (sessionData) => {
    try {
      const payload = {
        user_id: userId,
        date: sessionData.date,
        template_name: sessionData.template_name,
        duration_minutes: sessionData.duration_minutes,
        completed_count: sessionData.completed_count,
        total_count: sessionData.total_count,
        before_energy: sessionData.before_energy,
        after_energy: sessionData.after_energy,
        before_soreness: sessionData.before_soreness,
        after_soreness: sessionData.after_soreness,
        before_heel_pain: sessionData.before_heel_pain,
        after_heel_pain: sessionData.after_heel_pain,
        before_low_back_tightness: sessionData.before_low_back_tightness,
        after_low_back_tightness: sessionData.after_low_back_tightness,
        result_rating: sessionData.result_rating,
      };
      const rows = await sbPost("recovery_sessions", payload, session);
      if (rows?._error) {
        console.error("recovery_sessions insert failed:", rows.message);
        return false;
      }
      if (!rows?.[0]?.id) {
        console.error("recovery_sessions no id returned:", JSON.stringify(rows));
        return false;
      }
      const sessionId = rows[0].id;
      for (const item of (sessionData.items || [])) {
        await sbPost("recovery_session_items", {
          user_id: userId,
          recovery_session_id: sessionId,
          item_name: item.name,
          cue: item.cue || null,
          completed: item.completed,
          sort_order: item.sort_order,
        }, session);
      }
      setRecoverySessions(prev => [rows[0], ...prev.filter(s => s.date !== sessionData.date)]);
      return true;
    } catch (e) {
      console.error("saveRecoverySession error:", e);
      return false;
    }
  };

  // ── Workout summary handler ────────────────────────────────────────────────
  const saveWorkoutSummary = async (summary) => {
    try {
      await sbPost("workout_summaries", {
        user_id: userId, date: new Date().toISOString().split("T")[0],
        exercises_completed: summary.completed, exercises_total: summary.total,
        session_pf: summary.sessionPF, previous_session_pf: summary.prevPF,
        pf_change_pct: summary.pfChange, personal_records: summary.prs,
      }, session);
    } catch {}
  };

  // ── Phase handlers ─────────────────────────────────────────────────────────
  const savePhase = async (newPhase) => {
    if (newPhase?.id) {
      await sbPatch(`phase_data?id=eq.${newPhase.id}`, { type: newPhase.type, start_date: newPhase.startDate, end_date: newPhase.endDate, history: newPhase.history }, session);
    } else {
      const rows = await sbPost("phase_data", { type: newPhase.type, start_date: newPhase.startDate, end_date: newPhase.endDate, history: newPhase.history || [], user_id: userId }, session);
      if (rows?.[0]) newPhase = { ...newPhase, id: rows[0].id };
    }
    setPhase(newPhase);
  };

  // ── Derived state ──────────────────────────────────────────────────────────
  const totalExercises = workoutLogs.length;
  const phaseCfg  = phase ? PHASE_CONFIG[phase.type] : null;
  const phaseInfo = phase && phaseCfg ? (() => {
    const start = new Date(phase.startDate), end = new Date(phase.endDate), now = new Date();
    const totalDays = Math.round((end - start) / 86400000);
    const elapsed   = Math.max(0, Math.round((now - start) / 86400000));
    const remaining = Math.max(0, totalDays - elapsed);
    const week = Math.floor(elapsed / 7) + 1;
    return { remaining, week, totalWeeks: phaseCfg.weeks };
  })() : null;

  // ── Screens ────────────────────────────────────────────────────────────────
  if (!session) return <LoginScreen onLogin={(token, uid, refreshToken) => {
    const data = JSON.stringify({ token, uid, refreshToken });
    localStorage.setItem("pp_session", data);
    sessionStorage.setItem("pp_session", data);
    setSession(token); setUserId(uid);
  }} />;

  if (loading) return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
      <div style={{ fontSize: 11, color: "#4A90D9", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em" }}>DURHAM CAPITAL</div>
      <div style={{ fontSize: 32, fontWeight: 800, color: "#E8EAF0" }}>PROJECT PRIME</div>
      <div style={{ color: "#8B92A5", fontSize: 14 }}>Loading your data...</div>
    </div>
  );

  if (dbError) return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16, padding: 32 }}>
      <div style={{ fontSize: 32, fontWeight: 800, color: "#E8EAF0" }}>PROJECT PRIME</div>
      <div style={{ color: "#D94A4A", fontSize: 15, textAlign: "center" }}>Could not connect. Your locally saved data is safe — check your connection and retry.</div>
      <button onClick={() => loadAll(session, userId)} style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 8, padding: "10px 24px", fontSize: 14, cursor: "pointer" }}>Retry</button>
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100dvh", minHeight: "-webkit-fill-available", background: "#0F1117", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", color: "#E8EAF0" }}>

      {/* Phase modal */}
      {showPhaseModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 400, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#1A1D26", borderRadius: 16, padding: 8, maxWidth: 700, width: "100%", maxHeight: "90vh", overflowY: "auto", boxShadow: "0 24px 80px rgba(0,0,0,0.6)" }}>
            <div style={{ display: "flex", justifyContent: "flex-end", padding: "8px 8px 0" }}>
              <button onClick={() => setShowPhaseModal(false)} style={{ background: "#2A2D3A", border: "none", color: "#8B92A5", fontSize: 18, cursor: "pointer", width: 36, height: 36, borderRadius: 8 }}>×</button>
            </div>
            <div style={{ padding: "0 16px 16px" }}>
              <PhaseTracker phase={phase} setPhase={savePhase} />
            </div>
          </div>
        </div>
      )}

      {/* Top header */}
      <div style={{ background: "#1A1D26", borderBottom: "1px solid #2A2D3A", padding: "10px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
          <div style={{ fontSize: 10, color: "#4A90D9", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em" }}>DURHAM CAPITAL</div>
          <div style={{ fontSize: 18, fontWeight: 800, letterSpacing: "-0.5px", color: "#E8EAF0" }}>PROJECT PRIME</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {/* Phase toggle */}
          <button onClick={() => setShowPhaseModal(true)}
            style={{ background: phaseCfg ? phaseCfg.bg : "#2A2D3A", border: phaseCfg ? "1px solid " + phaseCfg.color + "44" : "1px solid #2A2D3A", borderRadius: 8, padding: "5px 12px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 14 }}>{phaseCfg ? phaseCfg.icon : "🗓️"}</span>
            {phase && phaseCfg && phaseInfo ? (
              <span style={{ color: phaseCfg.color, fontSize: 12, fontWeight: 700 }}>{phaseCfg.label} · {phaseInfo.remaining}d · Wk {Math.min(phaseInfo.week, phaseInfo.totalWeeks)}</span>
            ) : (
              <span style={{ color: "#8B92A5", fontSize: 12 }}>Set Phase</span>
            )}
          </button>
          <div style={{ background: "#0F1117", borderRadius: 6, padding: "4px 10px", fontSize: 12, color: "#4A90D9", fontWeight: 600 }}>
            {totalExercises} logged
          </div>
          <button onClick={signOut} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 12, cursor: "pointer" }}>
            Sign Out
          </button>
        </div>
      </div>

      {/* Main content */}
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px", minHeight: 0, WebkitOverflowScrolling: "touch" }}>
        {tab === "workout"   && <WorkoutTab exercises={exercises} workoutLogs={workoutLogs} onLogExercise={addWorkoutLog} onSaveSummary={saveWorkoutSummary} />}
        {tab === "progress"  && <ProgressTab exercises={exercises} workoutLogs={workoutLogs} />}
        {tab === "body"      && <BodyTab bodyLogs={bodyLogs} onSave={addBodyLog} />}
        {tab === "nutrition" && <NutritionTab nutritionDays={nutritionDays} onSaveDay={saveNutritionDay} session={session} userId={userId} />}
        {tab === "recovery"  && <RecoveryTab recoverySessions={recoverySessions} onSaveSession={saveRecoverySession} />}
      </div>

      {/* Bottom tab bar */}
      <div style={{ background: "#1A1D26", borderTop: "1px solid #2A2D3A", display: "flex", flexShrink: 0, paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
        {NAV.map(n => (
          <button key={n.id} onClick={() => setTab(n.id)}
            style={{ flex: 1, background: tab === n.id ? "#4A90D911" : "none", border: "none", padding: "10px 4px 12px", cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 2, minWidth: 0 }}>
            <span style={{ fontSize: 24 }}>{n.icon}</span>
            <span style={{ fontSize: 10, color: tab === n.id ? "#4A90D9" : "#4B5563", fontWeight: tab === n.id ? 700 : 400, whiteSpace: "nowrap" }}>{n.label}</span>
            {tab === n.id && <div style={{ width: 20, height: 2, background: "#4A90D9", borderRadius: 1, marginTop: 1 }} />}
          </button>
        ))}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
