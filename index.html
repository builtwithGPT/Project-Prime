// ─── PRIME FACTOR ─────────────────────────────────────────────────────────────
function calcPF(sets, reps, weight, type, laterality) {
  const mult = laterality === "unilateral" ? 2 : 1;
  if (type === "bodyweight") return sets * reps * 10 * mult;
  if (type === "banded")     return sets * reps * mult;
  return sets * reps * (weight || 0) * mult;
}

  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: sbHeaders(token) });
    if (!r.ok) throw new Error(r.status);
    return await r.json();

async function sbPost(path, body, token) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      method: "POST",
      headers: { ...sbHeaders(token), "Prefer": "return=representation" },
      body: JSON.stringify(body),

    return await r.json();
  } catch { return null; }

function SaveStatus({ status }) {
  if (!status) return null;
  const cfg = {
    saving:  { color: "#E8A838", text: "Saving..." },
    saved:   { color: "#4AD99A", text: "✓ Saved" },
    error:   { color: "#D94A4A", text: "⚠ Save failed — data kept locally" },
  }[status];
  return <span style={{ color: cfg.color, fontSize: 12, fontWeight: 600 }}>{cfg.text}</span>;
}

function Sparkline({ data, width = 120, height = 40 }) {
  if (!data || data.length < 2) return <span style={{ color: "#3A3D4A", fontSize: 11 }}>No history</span>;
  const vals = data.map(d => d.value);
  const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 6) - 3;
    return `${x},${y}`;
  });
  const trend = vals[vals.length - 1] >= vals[0];
  const lc = trend ? "#4AD99A" : "#D94A4A";
  return (
    <svg width={width} height={height}>
      <polyline points={pts.join(" ")} fill="none" stroke={lc} strokeWidth={2} strokeLinejoin="round" />
      <circle cx={pts[pts.length-1].split(",")[0]} cy={pts[pts.length-1].split(",")[1]} r={3.5} fill={lc} />
    </svg>
  );
}

function MacroRing({ pct, color, label, val, target, unit }) {
  const r = 36, circ = 2 * Math.PI * r;
  const dash = Math.min(pct / 100, 1) * circ;
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
      <svg width={90} height={90} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={45} cy={45} r={r} fill="none" stroke="#1A1D26" strokeWidth={8} />
        <circle cx={45} cy={45} r={r} fill="none" stroke={color} strokeWidth={8}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" />
      </svg>
      <div style={{ textAlign: "center", marginTop: -8 }}>
        <div style={{ color: "#E8EAF0", fontSize: 18, fontWeight: 700, lineHeight: 1 }}>{val}</div>
        <div style={{ color: "#8B92A5", fontSize: 10 }}>{unit} / {target}</div>
        <div style={{ color, fontSize: 11, fontWeight: 600, marginTop: 2 }}>{label}</div>
      </div>
    </div>
  );
}

  const [logSets, setLogSets]   = useState("3");
  const [logReps, setLogReps]   = useState("10");

  const [logNotes, setLogNotes] = useState("");

  const lastEntry = (id) => {
    const logs = workoutLogs.filter(x => x.exerciseId === id);
    return logs.length ? logs[logs.length - 1] : null;
  };

  const pfHistory = (id) => workoutLogs.filter(x => x.exerciseId === id).map(x => {
    const ex = exercises.find(e => e.id === id);
    return { value: calcPF(x.sets, x.reps, x.weight, ex?.type, ex?.laterality), date: x.date };
  });

  const previewPF = logSets && logReps && logging
    ? calcPF(+logSets, +logReps, +logWeight, logging.type, logging.laterality) : null;

  const openLog = (ex) => {
    const last = lastEntry(ex.id);
    setLogging(ex);
    setLogSets(last?.sets?.toString() || ex.defaultSets || "3");
    setLogReps(last?.reps?.toString() || ex.defaultReps || "10");
    setLogWeight(last?.weight?.toString() || "0");
    setLogNotes("");

    setSaveStatus("saving");
    const entry = { sets: +logSets, reps: +logReps, weight: +logWeight, notes: logNotes, date: new Date().toISOString() };

                <span style={{ background: "#4AD9D922", color: "#4AD9D9", padding: "1px 7px", borderRadius: 4, fontSize: 10, fontWeight: 700 }}>DAILY</span>
              </div>
              <div style={{ color: "#8B92A5", fontSize: 12 }}>3×15 each leg · Straight + Bent knee · Twice per day · 12-week commitment</div>
              <div style={{ color: "#E8A838", fontSize: 11, marginTop: 4 }}>⚠️ Pain during this protocol is expected and acceptable — push through.</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ color: "#4AD9D9", fontSize: 26, fontWeight: 800 }}>2×</div>
              <div style={{ color: "#4B5563", fontSize: 11 }}>per day</div>
            </div>
          </div>
        </Card>
      </div>

      {/* Today's log sidebar */}
      <div style={{ width: 280, flexShrink: 0 }}>
        <Card style={{ position: "sticky", top: 0 }}>
          <SectionLabel>Today's Log</SectionLabel>
          {workoutLogs.filter(x => new Date(x.date).toDateString() === new Date().toDateString()).length === 0 ? (
            <div style={{ color: "#3A3D4A", fontSize: 13, textAlign: "center", padding: "20px 0" }}>No exercises logged yet today</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {[...workoutLogs.filter(x => new Date(x.date).toDateString() === new Date().toDateString())].reverse().map((l, i) => {
                const ex = exercises.find(e => e.id === l.exerciseId);
                return (
                  <div key={i} style={{ background: "#0F1117", borderRadius: 8, padding: "10px 12px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ color: "#C8CDD8", fontSize: 13, fontWeight: 600 }}>{ex?.name}</span>
                      <span style={{ color: "#E8A838", fontSize: 12, fontWeight: 700 }}>PF {calcPF(l.sets, l.reps, l.weight, ex?.type, ex?.laterality).toLocaleString()}</span>
                    </div>
                    <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>
                      {l.sets}×{l.reps}{l.weight ? ` @ ${l.weight} lbs` : ""}
                      {ex?.laterality === "unilateral" && <span style={{ color: "#7B68EE", marginLeft: 6, fontSize: 11 }}>×2 sides</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      </div>

      {formGuide && (
        <Modal title={formGuide.name} onClose={() => setFormGuide(null)}>
          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            <Pill label={formGuide.muscleGroup} color={MUSCLE_COLORS[formGuide.muscleGroup] || "#4B5563"} />
            <Pill label={formGuide.laterality === "unilateral" ? "Unilateral" : "Bilateral"} color="#7B68EE" />
          </div>
          <p style={{ color: "#C8CDD8", fontSize: 15, lineHeight: 1.8, margin: 0 }}>{FORM_GUIDES[formGuide.name]}</p>
        </Modal>
      )}

      {logging && (
        <Modal title={`Log Exercise — ${logging.name}`} onClose={() => setLogging(null)}>
          <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
            <Pill label={logging.muscleGroup} color={MUSCLE_COLORS[logging.muscleGroup] || "#4B5563"} />
            {logging.laterality === "unilateral" && <Pill label="Enter reps per side — PF auto-doubled" color="#7B68EE" />}
          </div>

          {/* +/- controls */}
          <div style={{ display: "grid", gridTemplateColumns: logging.type === "weighted" ? "1fr 1fr 1fr" : "1fr 1fr", gap: 16, marginBottom: 20 }}>
            {[
              ["Sets", logSets, setLogSets, 1, 10, 1],
              ["Reps" + (logging.laterality === "unilateral" ? " (per side)" : ""), logReps, setLogReps, 1, 50, 1],
              ...(logging.type === "weighted" ? [["Weight (lbs)", logWeight, setLogWeight, 0, 200, 5]] : []),
            ].map(([label, val, setter, min, max, step]) => (
              <div key={label}>
                <label style={{ color: "#8B92A5", fontSize: 11, display: "block", marginBottom: 8, textAlign: "center" }}>{label}</label>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <button onClick={() => setter(v => String(Math.max(min, +v - step)))}
                    style={{ background: "#2A2D3A", color: "#E8EAF0", border: "none", borderRadius: 8, width: 48, height: 52, fontSize: 22, cursor: "pointer", flexShrink: 0 }}>−</button>
                  <div style={{ flex: 1, textAlign: "center", fontSize: 26, fontWeight: 800, color: "#E8EAF0", fontVariantNumeric: "tabular-nums" }}>{val}</div>
                  <button onClick={() => setter(v => String(Math.min(max, +v + step)))}
                    style={{ background: "#2A2D3A", color: "#E8EAF0", border: "none", borderRadius: 8, width: 48, height: 52, fontSize: 22, cursor: "pointer", flexShrink: 0 }}>+</button>
                </div>
              </div>
            ))}
          </div>

          {previewPF !== null && (
            <div style={{ background: "#0F1117", borderRadius: 10, padding: "12px 16px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ color: "#8B92A5", fontSize: 13 }}>Prime Factor</span>
              <span style={{ color: "#E8A838", fontSize: 28, fontWeight: 800 }}>{previewPF.toLocaleString()}</span>
            </div>
          )}

          <div style={{ marginBottom: 20 }}>
            <label style={{ color: "#8B92A5", fontSize: 11, display: "block", marginBottom: 6 }}>Notes (optional)</label>
            <textarea value={logNotes} onChange={e => setLogNotes(e.target.value)} rows={2}
              style={{ ...inputStyle, resize: "none" }} placeholder="How it felt..." />
          </div>

          <button onClick={saveExercise}
            style={{ background: "#4AD99A", color: "#0F1117", border: "none", borderRadius: 10, padding: "16px 0", width: "100%", fontSize: 18, fontWeight: 800, cursor: "pointer" }}>
            SAVE EXERCISE
          </button>
        </Modal>
      )}
    </div>
  );
}

// ─── PROGRESS TAB ─────────────────────────────────────────────────────────────
function ProgressTab({ exercises, workoutLogs }) {
  const [selected, setSelected] = useState(null);
  const [view, setView] = useState("dashboard");

  const exStats = exercises.filter(e => e.active).map(ex => {
    const logs = workoutLogs.filter(l => l.exerciseId === ex.id);
    const pfSeries = logs.map(l => ({ value: calcPF(l.sets, l.reps, l.weight, ex.type, ex.laterality), date: l.date }));
    const first = pfSeries[0]?.value, last = pfSeries[pfSeries.length - 1]?.value;
    const prev  = pfSeries[pfSeries.length - 2]?.value;
    const totalGain   = first && last  ? ((last  - first) / first * 100) : null;
    const sessionGain = last  && prev  ? ((last  - prev)  / prev  * 100) : null;
    const peak = pfSeries.length ? Math.max(...pfSeries.map(d => d.value)) : null;
    return { ex, logs, pfSeries, first, last, prev, totalGain, sessionGain, peak };
  });

  const scored = exStats.filter(s => s.totalGain !== null);
  const overallScore = scored.length ? scored.reduce((a, s) => a + s.totalGain, 0) / scored.length : null;

  const groupScores = {};
  scored.forEach(s => {
    const g = s.ex.muscleGroup;
    if (!groupScores[g]) groupScores[g] = [];
    groupScores[g].push(s.totalGain);
  });
  const groupAvgs = Object.entries(groupScores).map(([g, vals]) => ({
    group: g, avg: vals.reduce((a, v) => a + v, 0) / vals.length,
  })).sort((a, b) => b.avg - a.avg);

  const selStats = selected ? exStats.find(s => s.ex.id === selected) : null;
  const trendColor = overallScore === null ? "#4B5563" : overallScore >= 0 ? "#4AD99A" : "#D94A4A";

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Prime Factor Dashboard</h2>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>Normalized progress across all exercises</div>
        </div>
        <div style={{ display: "flex", background: "#1A1D26", borderRadius: 8, padding: 3, border: "1px solid #2A2D3A" }}>
          {[["dashboard", "Dashboard"], ["detail", "Exercise Detail"]].map(([id, label]) => (
            <button key={id} onClick={() => setView(id)}
              style={{ background: view === id ? "#4A90D9" : "none", color: view === id ? "#fff" : "#8B92A5",
                border: "none", borderRadius: 6, padding: "6px 14px", fontSize: 13, fontWeight: view === id ? 600 : 400, cursor: "pointer" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {view === "dashboard" && (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "280px 1fr", gap: 20, marginBottom: 20 }}>
            <Card style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 28, border: `1px solid ${trendColor}44` }}>
              <div style={{ color: "#8B92A5", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Overall Prime Factor Score</div>
              {overallScore !== null ? (
                <>
                  <div style={{ color: trendColor, fontSize: 52, fontWeight: 800, lineHeight: 1 }}>
                    {overallScore >= 0 ? "+" : ""}{overallScore.toFixed(1)}%
                  </div>
                  <div style={{ color: "#4B5563", fontSize: 12, marginTop: 8, textAlign: "center" }}>
                    avg gain across {scored.length} exercise{scored.length !== 1 ? "s" : ""}
                  </div>
                </>
              ) : (
                <div style={{ color: "#3A3D4A", fontSize: 14, textAlign: "center" }}>Log at least 2 sessions to see your score</div>
              )}
            </Card>

            <Card>
              <SectionLabel>Prime Factor by Muscle Group</SectionLabel>
              {groupAvgs.length === 0 ? (
                <div style={{ color: "#3A3D4A", fontSize: 13 }}>No data yet</div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {groupAvgs.map(({ group, avg }) => {
                    const color = MUSCLE_COLORS[group] || "#4B5563";
                    const pct = Math.min(100, Math.max(0, avg));
                    return (
                      <div key={group}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <span style={{ color, fontSize: 13, fontWeight: 600 }}>{group}</span>
                          <span style={{ color: avg >= 0 ? "#4AD99A" : "#D94A4A", fontSize: 13, fontWeight: 700 }}>
                            {avg >= 0 ? "+" : ""}{avg.toFixed(1)}%
                          </span>
                        </div>
                        <div style={{ background: "#0F1117", borderRadius: 4, height: 6 }}>
                          <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 4 }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </Card>
          </div>

          <SectionLabel>All Exercises — Click to Drill Down</SectionLabel>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
            {exStats.map(({ ex, pfSeries, totalGain, sessionGain }) => {
              const color = MUSCLE_COLORS[ex.muscleGroup] || "#4B5563";
              const gainColor = totalGain === null ? "#4B5563" : totalGain >= 0 ? "#4AD99A" : "#D94A4A";
              return (
                <div key={ex.id} onClick={() => { setSelected(ex.id); setView("detail"); }}
                  style={{ background: "#1A1D26", border: "1px solid #2A2D3A", borderRadius: 10, padding: "14px 16px", cursor: "pointer" }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = color}
                  onMouseLeave={e => e.currentTarget.style.borderColor = "#2A2D3A"}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                    <div>
                      <div style={{ color: "#E8EAF0", fontWeight: 600, fontSize: 13, marginBottom: 2 }}>{ex.name}</div>
                      <Pill label={ex.muscleGroup} color={color} />
                    </div>
                    <div style={{ textAlign: "right" }}>
                      {totalGain !== null ? (
                        <>
                          <div style={{ color: gainColor, fontSize: 18, fontWeight: 800 }}>{totalGain >= 0 ? "+" : ""}{totalGain.toFixed(1)}%</div>
                          <div style={{ color: "#4B5563", fontSize: 10 }}>total gain</div>
                        </>
                      ) : (
                        <div style={{ color: "#3A3D4A", fontSize: 11 }}>no data</div>
                      )}
                    </div>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
                    <div>
                      <Sparkline data={pfSeries} width={90} height={32} />
                      <div style={{ color: "#4B5563", fontSize: 10, marginTop: 2 }}>{pfSeries.length} session{pfSeries.length !== 1 ? "s" : ""}</div>
                    </div>
                    {sessionGain !== null && (
                      <div style={{ textAlign: "right" }}>
                        <div style={{ color: sessionGain >= 0 ? "#4AD99A" : "#D94A4A", fontSize: 12, fontWeight: 700 }}>{sessionGain >= 0 ? "+" : ""}{sessionGain.toFixed(1)}%</div>
                        <div style={{ color: "#4B5563", fontSize: 10 }}>last session</div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view === "detail" && (
        <div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 24 }}>
            {exercises.filter(e => e.active).map(e => (
              <button key={e.id} onClick={() => setSelected(e.id)}
                style={{ background: selected === e.id ? MUSCLE_COLORS[e.muscleGroup] : "#1A1D26",
                  color: selected === e.id ? "#fff" : "#8B92A5",
                  border: `1px solid ${selected === e.id ? MUSCLE_COLORS[e.muscleGroup] : "#2A2D3A"}`,
                  borderRadius: 20, padding: "7px 16px", fontSize: 13, cursor: "pointer", fontWeight: selected === e.id ? 700 : 400 }}>
                {e.name}
              </button>
            ))}
          </div>

          {selStats && (
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 20 }}>
              <Card>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
                  <div>
                    <div style={{ fontSize: 17, fontWeight: 700, color: "#E8EAF0" }}>{selStats.ex.name}</div>
                    <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>
                      {selStats.ex.laterality === "unilateral" ? "Unilateral — PF = sets × reps × weight × 2" : "Bilateral — PF = sets × reps × weight"}
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 16 }}>
                    {selStats.totalGain !== null && (
                      <div style={{ textAlign: "right" }}>
                        <div style={{ color: selStats.totalGain >= 0 ? "#4AD99A" : "#D94A4A", fontSize: 22, fontWeight: 800 }}>
                          {selStats.totalGain >= 0 ? "+" : ""}{selStats.totalGain.toFixed(1)}%
                        </div>
                        <div style={{ color: "#4B5563", fontSize: 11 }}>total gain</div>
                      </div>
                    )}
                    {selStats.peak && (
                      <div style={{ textAlign: "right" }}>
                        <div style={{ color: "#E8A838", fontSize: 22, fontWeight: 800 }}>{selStats.peak.toLocaleString()}</div>
                        <div style={{ color: "#4B5563", fontSize: 11 }}>peak PF</div>
                      </div>
                    )}
                  </div>
                </div>
                {/* Bar chart */}
                {selStats.pfSeries.length === 0 ? (
                  <div style={{ color: "#3A3D4A", textAlign: "center", padding: "40px 0", fontSize: 13 }}>No sessions logged yet</div>
                ) : (
                  <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 140 }}>
                    {selStats.pfSeries.slice(-12).map((d, i, arr) => {
                      const maxV = Math.max(...arr.map(x => x.value));
                      const h = Math.max(6, (d.value / maxV) * 120);
                      const isLast = i === arr.length - 1;
                      return (
                        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                          {isLast && <div style={{ fontSize: 10, color: "#E8A838", fontWeight: 700 }}>{d.value.toLocaleString()}</div>}
                          <div style={{ width: "100%", height: h, background: isLast ? "#E8A838" : "#4A90D9", borderRadius: "4px 4px 0 0", opacity: isLast ? 1 : 0.5 }} />
                          <div style={{ fontSize: 8, color: "#3A3D4A", transform: "rotate(-30deg)", transformOrigin: "top center", marginTop: 4 }}>{fmtDate(d.date)}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </Card>

              <Card>
                <SectionLabel>Session History</SectionLabel>
                <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 380, overflowY: "auto" }}>
                  {selStats.logs.length === 0 ? (
                    <div style={{ color: "#3A3D4A", fontSize: 13, textAlign: "center", padding: "20px 0" }}>No sessions yet</div>
                  ) : [...selStats.logs].reverse().map((l, i) => (
                    <div key={i} style={{ background: "#0F1117", borderRadius: 8, padding: "10px 12px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between" }}>
                        <span style={{ color: "#8B92A5", fontSize: 12 }}>{fmtDate(l.date)}</span>
                        <span style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>PF {calcPF(l.sets, l.reps, l.weight, selStats.ex.type, selStats.ex.laterality).toLocaleString()}</span>
                      </div>
                      <div style={{ color: "#C8CDD8", fontSize: 13, marginTop: 2 }}>
                        {l.sets}×{l.reps}{l.weight ? ` @ ${l.weight} lbs` : ""}
                        {selStats.ex.laterality === "unilateral" && <span style={{ color: "#7B68EE", marginLeft: 6, fontSize: 11 }}>×2 sides</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </Card>
            </div>
          )}
          {!selected && <div style={{ color: "#3A3D4A", textAlign: "center", padding: "60px 0", fontSize: 14 }}>Select an exercise above to see detail</div>}
        </div>
      )}
    </div>
  );
}

// ─── BODY TAB ─────────────────────────────────────────────────────────────────
function BodyTab({ bodyLogs, onSave }) {
  const [showForm, setShowForm] = useState(false);
  const [fields, setFields] = useState({ weight: "", chest: "", waist: "", hips: "", glutes: "", thighs: "", arms: "" });
  const [saveStatus, setSaveStatus] = useState(null);
  const setF = (k) => (e) => setFields(f => ({ ...f, [k]: e.target.value }));

  const handleSave = async () => {
    setSaveStatus("saving");
    const ok = await onSave({ date: new Date().toISOString(), ...Object.fromEntries(Object.entries(fields).map(([k, v]) => [k, Number(v) || 0])) });
    setSaveStatus(ok ? "saved" : "error");
    setTimeout(() => setSaveStatus(null), 3000);
    setShowForm(false);
    setFields({ weight: "", chest: "", waist: "", hips: "", glutes: "", thighs: "", arms: "" });
  };

  const recent = [...bodyLogs].reverse().slice(0, 10);
  const weightData = bodyLogs.filter(l => l.weight).map(l => ({ value: l.weight, date: l.date }));
  const latestWeight = weightData.length ? weightData[weightData.length - 1].value : null;
  const startWeight  = weightData.length ? weightData[0].value : null;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Body Tracking</h2>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>Log every 3 days</div>
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <SaveStatus status={saveStatus} />
          <button onClick={() => setShowForm(true)}
            style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 8, padding: "9px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
            + Log Today
          </button>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 20, marginBottom: 24 }}>
        <Card>
          <SectionLabel>Current Weight</SectionLabel>
          <div style={{ fontSize: 40, fontWeight: 800, color: "#E8EAF0", lineHeight: 1 }}>{latestWeight ? `${latestWeight}` : "—"}</div>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 4 }}>lbs</div>
          {startWeight && latestWeight && startWeight !== latestWeight && (
            <div style={{ color: latestWeight < startWeight ? "#4AD99A" : "#D94A4A", fontSize: 14, fontWeight: 700, marginTop: 8 }}>
              {latestWeight < startWeight ? "↓" : "↑"} {Math.abs(latestWeight - startWeight).toFixed(1)} lbs from start
            </div>
          )}
        </Card>
        <Card style={{ gridColumn: "span 2" }}>
          <SectionLabel>Weight Trend</SectionLabel>
          {weightData.length < 2 ? (
            <div style={{ color: "#3A3D4A", fontSize: 13 }}>Log at least 2 entries to see trend</div>
          ) : (
            <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 70 }}>
              {weightData.slice(-20).map((d, i) => {
                const vals = weightData.slice(-20).map(x => x.value);
                const min = Math.min(...vals), max = Math.max(...vals);
                const h = Math.max(4, ((d.value - min) / (max - min + 0.1)) * 60 + 10);
                const isLast = i === Math.min(weightData.length, 20) - 1;
                return <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center" }}>
                  {isLast && <div style={{ color: "#4A90D9", fontSize: 10, marginBottom: 2 }}>{d.value}</div>}
                  <div style={{ width: "100%", height: h, background: isLast ? "#4A90D9" : "#2A2D3A", borderRadius: "2px 2px 0 0" }} />
                </div>;
              })}
            </div>
          )}
        </Card>
      </div>

      {recent.length > 0 && (
        <Card>
          <SectionLabel>Measurement History</SectionLabel>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr>{["Date", "Weight", "Chest", "Waist", "Hips", "Glutes", "Thighs", "Arms"].map(h => (
                  <th key={h} style={{ color: "#4B5563", fontWeight: 700, textAlign: "left", padding: "6px 12px", borderBottom: "1px solid #2A2D3A" }}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {recent.map((l, i) => (
                  <tr key={i} style={{ borderBottom: "1px solid #1A1D26" }}>
                    <td style={{ color: "#8B92A5", padding: "8px 12px" }}>{fmtDateLong(l.date)}</td>
                    {["weight", "chest", "waist", "hips", "glutes", "thighs", "arms"].map(k => (
                      <td key={k} style={{ color: k === "glutes" ? "#E87D38" : "#C8CDD8", padding: "8px 12px", fontWeight: k === "glutes" ? 700 : 400 }}>
                        {l[k] ? `${l[k]}${k === "weight" ? " lbs" : '"'}` : "—"}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      {showForm && (
        <Modal title="Log Body Measurements" onClose={() => setShowForm(false)} width={520}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 20 }}>
            {[["Weight (lbs)", "weight"], ["Chest (in)", "chest"], ["Waist (in)", "waist"], ["Hips (in)", "hips"], ["Glutes (in)", "glutes"], ["Thighs (in)", "thighs"], ["Arms (in)", "arms"]].map(([label, k]) => (
              <div key={k}>
                <label style={{ color: k === "glutes" ? "#E87D38" : "#8B92A5", fontSize: 11, display: "block", marginBottom: 6, fontWeight: k === "glutes" ? 700 : 400 }}>{label}{k === "glutes" ? " ★" : ""}</label>
                <input type="number" value={fields[k]} onChange={setF(k)} style={inputStyle} />
              </div>
            ))}
          </div>
          <button onClick={handleSave}
            style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 9, padding: "13px 0", width: "100%", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
            Save
          </button>
        </Modal>
      )}
    </div>
  );
}

// ─── NUTRITION TAB ────────────────────────────────────────────────────────────
function NutritionTab({ nutritionLogs, onSave, onEdit, onDelete }) {
  const [showAdd, setShowAdd] = useState(false);
  const [selectedDate, setSelectedDate] = useState(new Date().toDateString());
  const [editingIdx, setEditingIdx] = useState(null);
  const [editFields, setEditFields] = useState({});
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [addFields, setAddFields] = useState({ calories: "", protein: "", carbs: "", fat: "", notes: "" });
  const [saveStatus, setSaveStatus] = useState(null);

  const T = NUTRITION_TARGETS;

  const today = nutritionLogs.filter(l => new Date(l.date).toDateString() === new Date().toDateString());
  const todayTotals = today.reduce((a, l) => ({
    calories: a.calories + (l.calories || 0), protein: a.protein + (l.protein || 0),
    carbs: a.carbs + (l.carbs || 0), fat: a.fat + (l.fat || 0),
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

  const allDates = [...new Set([new Date().toDateString(), ...nutritionLogs.map(l => new Date(l.date).toDateString())])].sort((a, b) => new Date(b) - new Date(a)).slice(0, 30);
  const dayLogs = nutritionLogs.map((l, i) => ({ ...l, globalIdx: i })).filter(l => new Date(l.date).toDateString() === selectedDate).sort((a, b) => new Date(a.date) - new Date(b.date));
  const dayTotals = dayLogs.reduce((a, l) => ({ calories: a.calories + (l.calories || 0), protein: a.protein + (l.protein || 0), carbs: a.carbs + (l.carbs || 0), fat: a.fat + (l.fat || 0) }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

  const fmtDay = (ds) => {
    const today = new Date().toDateString(), yesterday = new Date(Date.now() - 86400000).toDateString();
    if (ds === today) return "Today"; if (ds === yesterday) return "Yesterday";
    return new Date(ds).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
  };

  const handleAdd = async () => {
    setSaveStatus("saving");
    const ok = await onSave({ date: new Date().toISOString(), calories: +addFields.calories, protein: +addFields.protein, carbs: +addFields.carbs, fat: +addFields.fat, notes: addFields.notes });
    setSaveStatus(ok ? "saved" : "error");
    setTimeout(() => setSaveStatus(null), 3000);
    setAddFields({ calories: "", protein: "", carbs: "", fat: "", notes: "" });
    setShowAdd(false);
  };

  const saveEdit = async () => {
    await onEdit(editingIdx, { calories: +editFields.calories, protein: +editFields.protein, carbs: +editFields.carbs, fat: +editFields.fat, notes: editFields.notes });
    setEditingIdx(null);
  };

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 20 }}>
      <div style={{ display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Nutrition Log</h2>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <SaveStatus status={saveStatus} />
            <button onClick={() => setShowAdd(true)}
              style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 8, padding: "9px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
              + Add Meal
            </button>
          </div>
        </div>

        {/* Date nav */}
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
          {allDates.map(ds => (
            <button key={ds} onClick={() => { setSelectedDate(ds); setEditingIdx(null); }}
              style={{ background: selectedDate === ds ? "#4A90D9" : "#1A1D26", color: selectedDate === ds ? "#fff" : "#8B92A5",
                border: `1px solid ${selectedDate === ds ? "#4A90D9" : "#2A2D3A"}`, borderRadius: 20,
                padding: "5px 14px", fontSize: 12, cursor: "pointer", fontWeight: selectedDate === ds ? 700 : 400 }}>
              {fmtDay(ds)}
            </button>
          ))}
        </div>

        {/* Day summary */}
        <Card style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
            <div style={{ color: "#E8EAF0", fontWeight: 700 }}>{fmtDay(selectedDate)}</div>
            <div style={{ color: "#8B92A5", fontSize: 12 }}>{dayLogs.length} meal{dayLogs.length !== 1 ? "s" : ""}</div>
          </div>
          <div style={{ display: "flex", gap: 16 }}>
            {[["Calories", dayTotals.calories, T.calories, "#E8A838", "kcal"],
              ["Protein",  dayTotals.protein,  T.protein,  "#4A90D9", "g"],
              ["Carbs",    dayTotals.carbs,    T.carbs,    "#7B68EE", "g"],
              ["Fat",      dayTotals.fat,      T.fat,      "#4AD9A0", "g"]].map(([label, val, target, color, unit]) => (
              <div key={label} style={{ flex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <span style={{ color: "#8B92A5", fontSize: 11 }}>{label}</span>
                  <span style={{ color, fontSize: 11, fontWeight: 700 }}>{val}<span style={{ color: "#4B5563" }}>/{target}{unit}</span></span>
                </div>
                <div style={{ background: "#0F1117", borderRadius: 3, height: 4 }}>
                  <div style={{ width: `${Math.min(100, (val/target)*100)}%`, height: "100%", background: color, borderRadius: 3 }} />
                </div>
              </div>
            ))}
          </div>
        </Card>

        {showAdd && (
          <Card style={{ marginBottom: 16, border: "1px solid #4A90D944" }}>
            <SectionLabel>Add Meal Entry</SectionLabel>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10, marginBottom: 12 }}>
              {[["Calories", "calories"], ["Protein (g)", "protein"], ["Carbs (g)", "carbs"], ["Fat (g)", "fat"]].map(([lbl, k]) => (
                <div key={k}>
                  <label style={{ color: "#8B92A5", fontSize: 10, display: "block", marginBottom: 4 }}>{lbl}</label>
                  <input type="number" value={addFields[k]} onChange={e => setAddFields(f => ({ ...f, [k]: e.target.value }))} style={inputStyle} />
                </div>
              ))}
            </div>
            <div style={{ marginBottom: 12 }}>
              <label style={{ color: "#8B92A5", fontSize: 10, display: "block", marginBottom: 4 }}>Meal Name</label>
              <input value={addFields.notes} onChange={e => setAddFields(f => ({ ...f, notes: e.target.value }))} style={inputStyle} placeholder="e.g. Breakfast — eggs + sourdough" />
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={handleAdd} style={{ flex: 1, background: "#4A90D9", color: "#fff", border: "none", borderRadius: 7, padding: "10px 0", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Save</button>
              <button onClick={() => setShowAdd(false)} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 7, padding: "10px 16px", fontSize: 13, cursor: "pointer" }}>Cancel</button>
            </div>
          </Card>
        )}

        {dayLogs.length === 0 ? (
          <div style={{ color: "#3A3D4A", textAlign: "center", padding: "40px 0", fontSize: 14 }}>No meals logged — use + Add Meal above.</div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {dayLogs.map((entry, i) => (
              <Card key={i} style={{ padding: "14px 16px" }}>
                {editingIdx === entry.globalIdx ? (
                  <div>
                    <div style={{ color: "#E8EAF0", fontWeight: 600, marginBottom: 12 }}>Editing: {entry.notes || "Meal"}</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10, marginBottom: 12 }}>
                      {[["Calories", "calories"], ["Protein", "protein"], ["Carbs", "carbs"], ["Fat", "fat"]].map(([lbl, k]) => (
                        <div key={k}>
                          <label style={{ color: "#8B92A5", fontSize: 10, display: "block", marginBottom: 4 }}>{lbl}</label>
                          <input type="number" value={editFields[k]} onChange={e => setEditFields(f => ({ ...f, [k]: e.target.value }))} style={inputStyle} />
                        </div>
                      ))}
                    </div>
                    <div style={{ marginBottom: 12 }}>
                      <input value={editFields.notes} onChange={e => setEditFields(f => ({ ...f, notes: e.target.value }))} style={inputStyle} placeholder="Meal name" />
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={saveEdit} style={{ flex: 1, background: "#4AD99A", color: "#0F1117", border: "none", borderRadius: 7, padding: "8px 0", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Save</button>
                      <button onClick={() => setEditingIdx(null)} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 7, padding: "8px 16px", fontSize: 13, cursor: "pointer" }}>Cancel</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                        <span style={{ color: "#E8EAF0", fontWeight: 600, fontSize: 14 }}>{entry.notes || "Meal"}</span>
                        <span style={{ color: "#4B5563", fontSize: 11 }}>{new Date(entry.date).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })}</span>
                      </div>
                      <div style={{ display: "flex", gap: 16 }}>
                        <span style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>{entry.calories} kcal</span>
                        <span style={{ color: "#4A90D9", fontSize: 13 }}>{entry.protein}g protein</span>
                        <span style={{ color: "#7B68EE", fontSize: 13 }}>{entry.carbs}g carbs</span>
                        <span style={{ color: "#4AD9A0", fontSize: 13 }}>{entry.fat}g fat</span>
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => { setEditingIdx(entry.globalIdx); setEditFields({ calories: entry.calories, protein: entry.protein, carbs: entry.carbs, fat: entry.fat, notes: entry.notes || "" }); }}
                        style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 6, padding: "8px 12px", fontSize: 12, cursor: "pointer", height: 44 }}>✏️ Edit</button>
                      {confirmDelete === entry.globalIdx ? (
                        <>
                          <button onClick={() => { onDelete(entry.globalIdx); setConfirmDelete(null); }}
                            style={{ background: "#D94A4A", color: "#fff", border: "none", borderRadius: 6, padding: "8px 12px", fontSize: 12, cursor: "pointer", fontWeight: 700, height: 44 }}>Confirm</button>
                          <button onClick={() => setConfirmDelete(null)}
                            style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 6, padding: "8px 10px", fontSize: 12, cursor: "pointer", height: 44 }}>✕</button>
                        </>
                      ) : (
                        <button onClick={() => setConfirmDelete(entry.globalIdx)}
                          style={{ background: "#2A2D3A", color: "#4B5563", border: "none", borderRadius: 6, padding: "8px 10px", fontSize: 12, cursor: "pointer", height: 44 }}>🗑️</button>
                      )}
                    </div>
                  </div>
                )}
              </Card>
            ))}
          </div>
        )}
      </div>

      {/* Right sidebar — macro targets reference */}
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <Card>
          <SectionLabel>Today's Progress</SectionLabel>
          {[["Calories", todayTotals.calories, T.calories, "#E8A838", "kcal"],
            ["Protein",  todayTotals.protein,  T.protein,  "#4A90D9", "g"],
            ["Carbs",    todayTotals.carbs,    T.carbs,    "#7B68EE", "g"],
            ["Fat",      todayTotals.fat,      T.fat,      "#4AD9A0", "g"]].map(([label, val, target, color, unit]) => {
            const pct = Math.min(100, (val / target) * 100);
            return (
              <div key={label} style={{ marginBottom: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                  <span style={{ color: "#8B92A5", fontSize: 12 }}>{label}</span>
                  <span style={{ color, fontSize: 12, fontWeight: 700 }}>{val}<span style={{ color: "#4B5563", fontWeight: 400 }}>/{target}{unit}</span></span>
                </div>
                <div style={{ background: "#0F1117", borderRadius: 4, height: 6, marginBottom: 2 }}>
                  <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 4 }} />
                </div>
                <div style={{ color: "#4B5563", fontSize: 10 }}>{Math.max(0, target - val)}{unit} remaining</div>
              </div>
            );
          })}
        </Card>

        <Card>
          <SectionLabel>Gain Phase Targets</SectionLabel>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {[["Calories", "2,650", "kcal/day", "#E8A838"],
              ["Protein",  "191g",  "per day",  "#4A90D9"],
              ["Carbs",    "220g",  "per day",  "#7B68EE"],
              ["Fat",      "65g",   "per day",  "#4AD9A0"],
              ["Surplus",  "+250",  "vs 2,400 maint.", "#4AD99A"]].map(([label, val, unit, color]) => (
              <div key={label} style={{ background: "#0F1117", borderRadius: 7, padding: "8px 12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ color: "#8B92A5", fontSize: 12 }}>{label}</span>
                <div style={{ textAlign: "right" }}>
                  <span style={{ color, fontSize: 14, fontWeight: 700 }}>{val}</span>
                  <div style={{ color: "#4B5563", fontSize: 10 }}>{unit}</div>
                </div>
              </div>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );
}

// ─── PHASE TRACKER ────────────────────────────────────────────────────────────
function PhaseTracker({ phase, setPhase }) {
  const [showSetup, setShowSetup] = useState(!phase);
  const [setupType, setSetupType] = useState("gain");
  const [setupStart, setSetupStart] = useState(new Date().toISOString().split("T")[0]);

  const cfg = phase ? PHASE_CONFIG[phase.type] : null;

  const startPhase = () => {
    const start = new Date(setupStart);
    const weeks = PHASE_CONFIG[setupType].weeks;
    const end = new Date(start);
    end.setDate(end.getDate() + weeks * 7);
    setPhase({ type: setupType, startDate: start.toISOString(), endDate: end.toISOString(), history: phase?.history || [] });
    setShowSetup(false);
  };

  const completePhase = () => {
    const history = [...(phase.history || []), { type: phase.type, startDate: phase.startDate, endDate: new Date().toISOString() }];
    setPhase({ ...phase, history });
    setShowSetup(true);
    setSetupType(phase.type === "gain" ? "cut" : "gain");
  };

  const getDayInfo = () => {
    if (!phase) return null;
    const start = new Date(phase.startDate), end = new Date(phase.endDate), now = new Date();
    const totalDays = Math.round((end - start) / 86400000);
    const elapsed = Math.max(0, Math.round((now - start) / 86400000));
    const remaining = Math.max(0, totalDays - elapsed);
    const pct = Math.min(100, (elapsed / totalDays) * 100);
    const week = Math.floor(elapsed / 7) + 1;
    return { totalDays, elapsed, remaining, pct, week, totalWeeks: cfg.weeks };
  };

  const info = phase ? getDayInfo() : null;
  const history = phase?.history || [];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Phase Tracker</h2>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>Bulk / Cut cycle management</div>
        </div>
        {phase && (
          <button onClick={() => { setShowSetup(true); setSetupType(phase.type); setSetupStart(new Date().toISOString().split("T")[0]); }}
            style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 13, cursor: "pointer" }}>
            Edit Phase
          </button>
        )}
      </div>

      {!phase && !showSetup && (
        <Card style={{ textAlign: "center", padding: 48 }}>
          <div style={{ fontSize: 40, marginBottom: 16 }}>🗓️</div>
          <div style={{ color: "#E8EAF0", fontSize: 18, fontWeight: 700, marginBottom: 8 }}>No active phase</div>
          <button onClick={() => setShowSetup(true)}
            style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 9, padding: "12px 28px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
            Set Up Phase
          </button>
        </Card>
      )}

      {phase && info && (
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 20, marginBottom: 20 }}>
          <Card style={{ border: `1px solid ${cfg.color}44` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                  <span style={{ fontSize: 24 }}>{cfg.icon}</span>
                  <span style={{ fontSize: 22, fontWeight: 800, color: cfg.color }}>{cfg.label}</span>
                </div>
                <div style={{ color: "#8B92A5", fontSize: 13 }}>{cfg.description}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: cfg.color, fontSize: 36, fontWeight: 800, lineHeight: 1 }}>{info.remaining}</div>
                <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>days remaining</div>
              </div>
            </div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ color: "#8B92A5", fontSize: 12 }}>Week {Math.min(info.week, info.totalWeeks)} of {info.totalWeeks}</span>
                <span style={{ color: cfg.color, fontSize: 12, fontWeight: 700 }}>{Math.round(info.pct)}% complete</span>
              </div>
              <div style={{ background: "#0F1117", borderRadius: 6, height: 10 }}>
                <div style={{ width: `${info.pct}%`, height: "100%", background: cfg.color, borderRadius: 6 }} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                <span style={{ color: "#4B5563", fontSize: 11 }}>{fmtDate(phase.startDate)}</span>
                <span style={{ color: "#4B5563", fontSize: 11 }}>{fmtDate(phase.endDate)}</span>
              </div>
            </div>

            <div style={{ display: "flex", gap: 3, marginBottom: 20 }}>
              {Array.from({ length: info.totalWeeks }).map((_, i) => {
                const done = i < info.week - 1, current = i === info.week - 1;
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                    <div style={{ width: "100%", height: 28, borderRadius: 4,
                      background: done ? cfg.color : current ? cfg.color + "66" : "#1A1D26",
                      border: current ? `1px solid ${cfg.color}` : "1px solid #2A2D3A",
                      display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {done && <span style={{ fontSize: 12 }}>✓</span>}
                      {current && <span style={{ color: cfg.color, fontSize: 10, fontWeight: 700 }}>NOW</span>}
                    </div>
                    <div style={{ color: "#3A3D4A", fontSize: 9 }}>W{i + 1}</div>
                  </div>
                );
              })}
            </div>

            <button onClick={completePhase}
              style={{ background: cfg.color, color: "#0F1117", border: "none", borderRadius: 9, padding: "11px 0", width: "100%", fontSize: 14, fontWeight: 800, cursor: "pointer" }}>
              Complete Phase → Start {phase.type === "gain" ? "Cut" : "Gain"}
            </button>
          </Card>

          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Card>
              <SectionLabel>Daily Targets</SectionLabel>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[
                  { label: "Calories", val: phase.type === "gain" ? "2,650" : "1,600", unit: "kcal", color: "#E8A838" },
                  { label: "Protein",  val: "191g", unit: "per day", color: "#4A90D9" },
                  { label: "Training", val: "3×",   unit: "/ week",  color: "#4AD9A0" },
                ].map(({ label, val, unit, color }) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#0F1117", borderRadius: 7, padding: "8px 12px" }}>
                    <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
                    <span style={{ color, fontSize: 15, fontWeight: 700 }}>{val} <span style={{ fontSize: 11, fontWeight: 400, color: "#4B5563" }}>{unit}</span></span>
                  </div>
                ))}
              </div>
            </Card>
            <Card>
              <SectionLabel>Phase Stats</SectionLabel>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[["Day", `${info.elapsed + 1} of ${info.totalDays}`], ["Started", fmtDate(phase.startDate)], ["Ends", fmtDate(phase.endDate)], ["Cycles completed", history.length]].map(([label, val]) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between" }}>
                    <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
                    <span style={{ color: "#E8EAF0", fontSize: 13, fontWeight: 700 }}>{val}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>
      )}

      {history.length > 0 && (
        <Card>
          <SectionLabel>Cycle History</SectionLabel>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {history.map((h, i) => {
              const hcfg = PHASE_CONFIG[h.type];
              const days = Math.round((new Date(h.endDate) - new Date(h.startDate)) / 86400000);
              return (
                <div key={i} style={{ background: "#0F1117", borderRadius: 8, padding: "10px 14px", border: `1px solid ${hcfg.color}33` }}>
                  <div style={{ color: hcfg.color, fontWeight: 700, fontSize: 13 }}>{hcfg.icon} {hcfg.label}</div>
                  <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>{fmtDate(h.startDate)} → {fmtDate(h.endDate)}</div>
                  <div style={{ color: "#4B5563", fontSize: 11, marginTop: 1 }}>{days} days</div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {showSetup && (
        <Modal title="Set Up Phase" onClose={() => phase && setShowSetup(false)} width={480}>
          <div style={{ marginBottom: 20 }}>
            <SectionLabel>Phase Type</SectionLabel>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {["gain", "cut"].map(type => {
                const c = PHASE_CONFIG[type];
                return (
                  <button key={type} onClick={() => setSetupType(type)}
                    style={{ background: setupType === type ? c.bg : "#0F1117", border: `2px solid ${setupType === type ? c.color : "#2A2D3A"}`, borderRadius: 10, padding: "16px 12px", cursor: "pointer", textAlign: "left" }}>
                    <div style={{ fontSize: 22, marginBottom: 6 }}>{c.icon}</div>
                    <div style={{ color: setupType === type ? c.color : "#E8EAF0", fontWeight: 700, fontSize: 15 }}>{c.label}</div>
                    <div style={{ color: "#8B92A5", fontSize: 11, marginTop: 4 }}>{c.weeks} weeks · {c.calories} kcal/day</div>
                  </button>
                );
              })}
            </div>
          </div>
          <div style={{ marginBottom: 20 }}>
            <label style={{ color: "#8B92A5", fontSize: 11, display: "block", marginBottom: 6 }}>Start Date</label>
            <input type="date" value={setupStart} onChange={e => setSetupStart(e.target.value)} style={inputStyle} />
          </div>
          <div style={{ background: "#0F1117", borderRadius: 8, padding: "12px 16px", marginBottom: 20 }}>
            <div style={{ color: "#8B92A5", fontSize: 12, marginBottom: 4 }}>Phase ends on</div>
            <div style={{ color: PHASE_CONFIG[setupType].color, fontSize: 18, fontWeight: 700 }}>
              {(() => { const d = new Date(setupStart); d.setDate(d.getDate() + PHASE_CONFIG[setupType].weeks * 7); return fmtDateLong(d.toISOString()); })()}
            </div>
          </div>
          <button onClick={startPhase}
            style={{ background: PHASE_CONFIG[setupType].color, color: "#0F1117", border: "none", borderRadius: 9, padding: "13px 0", width: "100%", fontSize: 15, fontWeight: 800, cursor: "pointer" }}>
            Start {PHASE_CONFIG[setupType].label}
          </button>
        </Modal>
      )}
    </div>
  );
}

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("jdurham@outlook.com");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const signIn = async () => {
    if (!password.trim()) return;
    setLoading(true); setError("");
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: { "apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email: email.trim(), password: password.trim() }),
    });
    const data = await res.json();
    if (data.access_token) {
      onLogin(data.access_token, data.user.id);
    } else {
      setError(data.error_description || data.msg || "Invalid email or password");
    }
    setLoading(false);
  };

  return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center" }}>
      <div style={{ width: 380, padding: 40, background: "#1A1D26", borderRadius: 16, border: "1px solid #2A2D3A" }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ fontSize: 11, color: "#4A90D9", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 8 }}>DURHAM CAPITAL</div>
          <div style={{ fontSize: 28, fontWeight: 800, color: "#E8EAF0", marginBottom: 6 }}>PROJECT PRIME</div>
          <div style={{ fontSize: 13, color: "#4B5563" }}>Build the best version of you</div>
        </div>
        <div style={{ marginBottom: 14 }}>
          <label style={{ color: "#8B92A5", fontSize: 12, display: "block", marginBottom: 6 }}>Email</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && signIn()} style={{ ...inputStyle, fontSize: 15 }} />
        </div>
        <div style={{ marginBottom: 20 }}>
          <label style={{ color: "#8B92A5", fontSize: 12, display: "block", marginBottom: 6 }}>Password</label>
          <input type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && signIn()} placeholder="Enter your password" style={{ ...inputStyle, fontSize: 15 }} />
        </div>
        {error && <div style={{ color: "#D94A4A", fontSize: 12, marginBottom: 14 }}>{error}</div>}
        <button onClick={signIn} disabled={loading || !password.trim()}
          style={{ width: "100%", background: loading || !password.trim() ? "#2A2D3A" : "#4A90D9",
            color: loading || !password.trim() ? "#4B5563" : "#fff",
            border: "none", borderRadius: 9, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: loading || !password.trim() ? "default" : "pointer" }}>
          {loading ? "Signing in..." : "Sign In"}
        </button>
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]               = useState("workout");
  const [exercises]                 = useState(INITIAL_EXERCISES);
  const [workoutLogs, setWorkoutLogs]     = useState([]);
  const [bodyLogs, setBodyLogs]           = useState([]);
  const [nutritionLogs, setNutritionLogs] = useState([]);
  const [phase, setPhase]           = useState(null);
  const [loading, setLoading]       = useState(true);
  const [dbError, setDbError]       = useState(false);
  const [session, setSession]       = useState(null);
  const [userId, setUserId]         = useState(null);

  // ── Session restore ────────────────────────────────────────────────────────
  useEffect(() => {
    const stored = localStorage.getItem("pp_session") || sessionStorage.getItem("pp_session");
    if (stored) {
      try {
        const { token, uid } = JSON.parse(stored);
        setSession(token); setUserId(uid);
      } catch { setLoading(false); }
    } else {
      setLoading(false);
    }
  }, []);

  // ── Load data when session ready ───────────────────────────────────────────
  useEffect(() => {
    if (session && userId) {
      const data = JSON.stringify({ token: session, uid: userId });
      localStorage.setItem("pp_session", data);
      sessionStorage.setItem("pp_session", data);
      loadAll(session, userId);
    }
  }, [session, userId]);

  const loadAll = useCallback(async (token, uid) => {
    setLoading(true); setDbError(false);
    try {
      const [wData, bData, nData, pData] = await Promise.all([
        sbGet(`workout_logs?user_id=eq.${uid}&order=date.asc&limit=5000`, token),
        sbGet(`body_logs?user_id=eq.${uid}&order=date.asc&limit=500`, token),
        sbGet(`nutrition_logs?user_id=eq.${uid}&order=date.asc&limit=5000`, token),
        sbGet(`phase_data?user_id=eq.${uid}&order=created_at.desc&limit=1`, token),
      ]);

      const lsWorkout   = lsGet(LS_KEYS.workout);
      const lsBody      = lsGet(LS_KEYS.body);
      const lsNutrition = lsGet(LS_KEYS.nutrition);

      const merged = (remote, local) => {
        if (!remote) return local;
        const remoteIds = new Set(remote.map(r => r.id).filter(Boolean));
        const pending = local.filter(l => !l.id || !remoteIds.has(l.id));
        return [...remote, ...pending];
      };

      const wLogs = merged(wData, lsWorkout).map(r => ({ id: r.id, exerciseId: r.exercise_id || r.exerciseId, sets: r.sets, reps: r.reps, weight: r.weight, notes: r.notes, date: r.date }));
      const bLogs = merged(bData, lsBody).map(r => ({ id: r.id, weight: r.weight, chest: r.chest, waist: r.waist, hips: r.hips, glutes: r.glutes, thighs: r.thighs, arms: r.arms, date: r.date }));
      const nLogs = merged(nData, lsNutrition).map(r => ({ id: r.id, calories: r.calories, protein: r.protein, carbs: r.carbs, fat: r.fat, notes: r.notes, date: r.date }));

      setWorkoutLogs(wLogs);
      setBodyLogs(bLogs);
      setNutritionLogs(nLogs);
      lsSet(LS_KEYS.workout, wLogs);
      lsSet(LS_KEYS.body, bLogs);
      lsSet(LS_KEYS.nutrition, nLogs);

      if (pData?.[0]) {
        setPhase({ id: pData[0].id, type: pData[0].type, startDate: pData[0].start_date, endDate: pData[0].end_date, history: pData[0].history || [] });
      }
    } catch (e) { setDbError(true); }
    setLoading(false);
  }, []);

  const signOut = () => {
    localStorage.removeItem("pp_session"); sessionStorage.removeItem("pp_session");
    setSession(null); setUserId(null);
    setWorkoutLogs([]); setBodyLogs([]); setNutritionLogs([]); setPhase(null);
  };

  // ── Workout handlers ───────────────────────────────────────────────────────
  const addWorkoutLog = async (exerciseId, entry) => {
    const localEntry = { exerciseId, ...entry, _pending: true };
    const updated = [...workoutLogs, localEntry];
    setWorkoutLogs(updated);
    lsSet(LS_KEYS.workout, updated);

    const rows = await sbPost("workout_logs", { exercise_id: exerciseId, sets: entry.sets, reps: entry.reps, weight: entry.weight, notes: entry.notes, date: entry.date, user_id: userId }, session);
    if (rows?.[0]) {
      const synced = updated.map(l => l === localEntry ? { ...entry, id: rows[0].id, exerciseId } : l);
      setWorkoutLogs(synced); lsSet(LS_KEYS.workout, synced);
      return true;
    }
    return false;
  };

  // ── Body handlers ──────────────────────────────────────────────────────────
  const addBodyLog = async (entry) => {
    const localEntry = { ...entry, _pending: true };
    const updated = [...bodyLogs, localEntry];
    setBodyLogs(updated); lsSet(LS_KEYS.body, updated);
    const rows = await sbPost("body_logs", { ...entry, user_id: userId }, session);
    if (rows?.[0]) {
      const synced = updated.map(l => l === localEntry ? { ...entry, id: rows[0].id } : l);
      setBodyLogs(synced); lsSet(LS_KEYS.body, synced);
      return true;
    }
    return false;
  };

  // ── Nutrition handlers ─────────────────────────────────────────────────────
  const addNutritionLog = async (entry) => {
    const localEntry = { ...entry, _pending: true };
    const updated = [...nutritionLogs, localEntry];
    setNutritionLogs(updated); lsSet(LS_KEYS.nutrition, updated);
    const rows = await sbPost("nutrition_logs", { calories: entry.calories, protein: entry.protein, carbs: entry.carbs, fat: entry.fat, notes: entry.notes, date: entry.date, user_id: userId }, session);
    if (rows?.[0]) {
      const synced = updated.map(l => l === localEntry ? { ...entry, id: rows[0].id } : l);
      setNutritionLogs(synced); lsSet(LS_KEYS.nutrition, synced);
      return true;
    }
    return false;
  };

  const editNutritionLog = async (idx, updated) => {
    const entry = nutritionLogs[idx];
    const newLogs = nutritionLogs.map((l, i) => i === idx ? { ...l, ...updated } : l);
    setNutritionLogs(newLogs); lsSet(LS_KEYS.nutrition, newLogs);
    if (entry?.id) await sbPatch(`nutrition_logs?id=eq.${entry.id}`, updated, session);
  };

  const deleteNutritionLog = async (idx) => {
    const entry = nutritionLogs[idx];
    const newLogs = nutritionLogs.filter((_, i) => i !== idx);
    setNutritionLogs(newLogs); lsSet(LS_KEYS.nutrition, newLogs);
    if (entry?.id) await sbDelete(`nutrition_logs?id=eq.${entry.id}`, session);
  };

  // ── Phase handlers ─────────────────────────────────────────────────────────
  const savePhase = async (newPhase) => {
    if (newPhase?.id) {
      await sbPatch(`phase_data?id=eq.${newPhase.id}`, { type: newPhase.type, start_date: newPhase.startDate, end_date: newPhase.endDate, history: newPhase.history }, session);
    } else {
      const rows = await sbPost("phase_data", { type: newPhase.type, start_date: newPhase.startDate, end_date: newPhase.endDate, history: newPhase.history || [], user_id: userId }, session);
      if (rows?.[0]) newPhase = { ...newPhase, id: rows[0].id };
    }
    setPhase(newPhase);
  };

  // ── Derived state ──────────────────────────────────────────────────────────
  const totalExercises = workoutLogs.length;
  const phaseCfg  = phase ? PHASE_CONFIG[phase.type] : null;
  const phaseInfo = phase && phaseCfg ? (() => {
    const start = new Date(phase.startDate), end = new Date(phase.endDate), now = new Date();
    const totalDays = Math.round((end - start) / 86400000);
    const elapsed   = Math.max(0, Math.round((now - start) / 86400000));
    const remaining = Math.max(0, totalDays - elapsed);
    const week = Math.floor(elapsed / 7) + 1;
    return { remaining, week, totalWeeks: phaseCfg.weeks };
  })() : null;

  // ── Screens ────────────────────────────────────────────────────────────────
  if (!session) return <LoginScreen onLogin={(token, uid) => { setSession(token); setUserId(uid); }} />;

  if (loading) return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
      <div style={{ fontSize: 11, color: "#4A90D9", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em" }}>DURHAM CAPITAL</div>
      <div style={{ fontSize: 32, fontWeight: 800, color: "#E8EAF0" }}>PROJECT PRIME</div>
      <div style={{ color: "#8B92A5", fontSize: 14 }}>Loading your data...</div>
    </div>
  );

  if (dbError) return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16, padding: 32 }}>
      <div style={{ fontSize: 32, fontWeight: 800, color: "#E8EAF0" }}>PROJECT PRIME</div>
      <div style={{ color: "#D94A4A", fontSize: 15, textAlign: "center" }}>Could not connect. Your locally saved data is safe — check your connection and retry.</div>
      <button onClick={() => loadAll(session, userId)} style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 8, padding: "10px 24px", fontSize: 14, cursor: "pointer" }}>Retry</button>
    </div>
  );

  return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", color: "#E8EAF0" }}>
      {/* Sidebar */}
      <div style={{ width: 220, background: "#1A1D26", borderRight: "1px solid #2A2D3A", display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "24px 20px 20px" }}>
          <div style={{ fontSize: 11, color: "#4A90D9", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 4 }}>DURHAM CAPITAL</div>
          <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: "-0.5px", color: "#E8EAF0", lineHeight: 1 }}>PROJECT PRIME</div>
          <div style={{ fontSize: 11, color: "#4B5563", marginTop: 4 }}>Build the best version of you</div>
        </div>
        <nav style={{ flex: 1, padding: "0 10px" }}>
          {NAV.map(n => (
            <button key={n.id} onClick={() => setTab(n.id)}
              style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "11px 12px", borderRadius: 9, border: "none", cursor: "pointer", marginBottom: 3,
                background: tab === n.id ? "#4A90D922" : "none", color: tab === n.id ? "#4A90D9" : "#8B92A5",
                fontWeight: tab === n.id ? 700 : 400, fontSize: 14, textAlign: "left" }}>
              <span style={{ fontSize: 18 }}>{n.icon}</span>
              {n.label}
              {tab === n.id && <div style={{ marginLeft: "auto", width: 3, height: 16, background: "#4A90D9", borderRadius: 2 }} />}
            </button>
          ))}
        </nav>
        <div style={{ padding: 16, borderTop: "1px solid #2A2D3A", display: "flex", flexDirection: "column", gap: 10 }}>
          {phase && phaseCfg && phaseInfo && (
            <div style={{ background: phaseCfg.bg, borderRadius: 8, padding: "10px 12px", border: `1px solid ${phaseCfg.color}44` }}>
              <div style={{ color: phaseCfg.color, fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>{phaseCfg.label}</div>
              <div style={{ color: phaseCfg.color, fontSize: 20, fontWeight: 800, marginTop: 2 }}>{phaseInfo.remaining}d left</div>
              <div style={{ color: "#4B5563", fontSize: 10, marginTop: 1 }}>Week {Math.min(phaseInfo.week, phaseInfo.totalWeeks)} of {phaseInfo.totalWeeks}</div>
            </div>
          )}
          <div style={{ background: "#0F1117", borderRadius: 8, padding: "10px 12px" }}>
            <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>Exercises Logged</div>
            <div style={{ color: "#4A90D9", fontSize: 24, fontWeight: 800, marginTop: 2 }}>{totalExercises}</div>
          </div>
          <button onClick={signOut} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 7, padding: "8px 0", fontSize: 12, cursor: "pointer", width: "100%" }}>
            Sign Out
          </button>
        </div>
      </div>

      {/* Main content */}
      <div style={{ flex: 1, overflowY: "auto", padding: 32 }}>
        {tab === "workout"  && <WorkoutTab exercises={exercises} workoutLogs={workoutLogs} onLogExercise={addWorkoutLog} />}
        {tab === "progress" && <ProgressTab exercises={exercises} workoutLogs={workoutLogs} />}
        {tab === "body"     && <BodyTab bodyLogs={bodyLogs} onSave={addBodyLog} />}
        {tab === "nutrition"&& <NutritionTab nutritionLogs={nutritionLogs} onSave={addNutritionLog} onEdit={editNutritionLog} onDelete={deleteNutritionLog} />}
        {tab === "phase"    && <PhaseTracker phase={phase} setPhase={savePhase} />}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
