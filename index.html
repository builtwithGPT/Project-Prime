// ─── STRENGTH FACTOR ──────────────────────────────────────────────────────────
function calcPF(sets, reps, weight, type, laterality) {
  const mult = laterality === "unilateral" ? 2 : 1;
  if (type === "bodyweight") return sets * reps * 10 * mult;
  if (type === "banded")     return sets * reps * mult;
  return sets * reps * (weight || 0) * mult;
}

  const res = await fetch(AI_WORKER, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({

      max_tokens: maxTokens,
      messages: [
        { role: "system", content: systemPrompt },

}

// Flattens a template's exerciseNames (resolving grouped entries) into an
// ordered list of { name, groupLabel } so callers can map to live exercise objects.
function flattenTemplate(template) {
  const out = [];
  template.exerciseNames.forEach(entry => {
    if (typeof entry === "string") {
      out.push({ name: entry, groupLabel: null });
    } else {
      entry.names.forEach(n => out.push({ name: n, groupLabel: entry.group }));
    }
  });
  return out;
}

// inferTemplateName — maps logged exercise count to template name using fixed thresholds.
// Real flattened exercise counts per template: Express=7, Full Body=13, Extended=16.
// Ranges account for skipped exercises within a session:
//   1–7   logged → Express Workout
//   8–14  logged → Full Body Workout
//   15+   logged → Extended Workout
function inferTemplateName(loggedExerciseIds) {
  const count = loggedExerciseIds.length;
  if (count <= 7)  return "Express Workout";
  if (count <= 14) return "Full Body Workout";
  return "Extended Workout";
}

// Bodyweight/banded exercises with no history show their default prescription
// instead of "Set starting weight" since there's no weight to set.
function suggestedText(ex, lastE) {
  if (lastE) {
    return `${ex.defaultSets}×${ex.defaultReps}`;
  }
  if (ex.type === "weighted") return "Set starting weight";
  if (ex.type === "banded")   return `${ex.defaultSets}×${ex.defaultReps} each side`;
  if (ex.name.toLowerCase().includes("pull") || ex.name.toLowerCase().includes("chin")) {
    return "Bodyweight to technical failure";
  }
  return `${ex.defaultSets}×${ex.defaultReps}`;
}

// ── Exercise baseline storage ─────────────────────────────────────────────────
// Baselines are stored as { [exerciseId]: { date, sf, setAt } }
// Multiple baselines can be set over time; the most recent is always the active one.
// History of all baselines is kept in the "history" array on each entry.
const BASELINES_KEY = "pp_exercise_baselines";
function getBaselines() {
  try { return JSON.parse(localStorage.getItem(BASELINES_KEY) || "{}"); } catch { return {}; }
}
function getBaseline(exerciseId) {
  return getBaselines()[String(exerciseId)] || null;
}
function setBaseline(exerciseId, date, sf) {
  const all = getBaselines();
  const key = String(exerciseId);
  const prev = all[key] || null;
  const history = prev ? [...(prev.history || []), { date: prev.date, sf: prev.sf, setAt: prev.setAt }] : [];
  all[key] = { date, sf, setAt: new Date().toISOString(), history };
  try { localStorage.setItem(BASELINES_KEY, JSON.stringify(all)); } catch {}
  return all[key];
}

      const bm = draft.beforeMetrics || {};
      const am = draft.afterMetrics  || {};
      const metricsChanged = am.energy !== 3 || am.soreness !== 3 || am.heel_pain !== 0 || am.low_back !== 0;
      return anyDone || metricsChanged;
    }
    if (draft.completedSets) {
      return Object.values(draft.completedSets).some(function(sets) { return sets.length > 0; });
    }
    return false;
  })();
  return hasMeaningfulProgress ? "stale-meaningful" : "stale-empty";
}

function SaveStatus({ status }) {
  if (!status) return null;
  const cfg = {
    saving:  { color: "#E8A838", text: "Saving..." },
    saved:   { color: "#4AD99A", text: "✓ Saved" },
    error:   { color: "#D94A4A", text: "⚠ Save failed — data kept locally" },
  }[status];
  return <span style={{ color: cfg.color, fontSize: 12, fontWeight: 600 }}>{cfg.text}</span>;
}

function Sparkline({ data, width = 120, height = 40 }) {
  if (!data || data.length === 0) return <span style={{ color: "#3A3D4A", fontSize: 11 }}>No history</span>;
  if (data.length === 1) {
    return (
      <svg width={width} height={height}>
        <circle cx={width/2} cy={height/2} r={4} fill="#4A90D9" />
      </svg>
    );
  }
  const vals = data.map(d => d.value);
  const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 6) - 3;
    return `${x},${y}`;
  });
  const trend = vals[vals.length - 1] >= vals[0];
  const lc = trend ? "#4AD99A" : "#D94A4A";

  // Linear regression trendline
  const n = vals.length;
  const sumX = vals.reduce((s, _, i) => s + i, 0);
  const sumY = vals.reduce((s, v) => s + v, 0);
  const sumXY = vals.reduce((s, v, i) => s + i * v, 0);
  const sumX2 = vals.reduce((s, _, i) => s + i * i, 0);
  const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;
  const ty1 = height - ((intercept - min) / range) * (height - 6) - 3;
  const ty2 = height - (((intercept + slope * (n - 1)) - min) / range) * (height - 6) - 3;

  return (
    <svg width={width} height={height}>
      <line x1={0} y1={ty1} x2={width} y2={ty2} stroke={lc} strokeWidth={2} strokeLinecap="round" />
      <circle cx={width} cy={ty2} r={3.5} fill={lc} />
    </svg>
  );
}

function MacroRing({ pct, color, label, val, target, unit }) {
  const r = 36, circ = 2 * Math.PI * r;
  const dash = Math.min(pct / 100, 1) * circ;
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
      <svg width={90} height={90} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={45} cy={45} r={r} fill="none" stroke="#1A1D26" strokeWidth={8} />
        <circle cx={45} cy={45} r={r} fill="none" stroke={color} strokeWidth={8}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" />
      </svg>
      <div style={{ textAlign: "center", marginTop: -8 }}>
        <div style={{ color: "#E8EAF0", fontSize: 18, fontWeight: 700, lineHeight: 1 }}>{val}</div>
        <div style={{ color: "#8B92A5", fontSize: 10 }}>{unit} / {target}</div>
        <div style={{ color, fontSize: 11, fontWeight: 600, marginTop: 2 }}>{label}</div>
      </div>
    </div>
  );
}

// ─── WORKOUT TAB ──────────────────────────────────────────────────────────────
function WorkoutTab({ exercises, workoutLogs, onLogExercise, onEditSet, onSaveSummary, session, userId }) {
  // ── Session template selection — default Full Body (60 min) ────────────────
  const [selectedTemplateId, setSelectedTemplateId] = useState("full");
  const selectedTemplate = WORKOUT_TEMPLATES.find(t => t.id === selectedTemplateId) || WORKOUT_TEMPLATES[1];

  // active — the ordered, resolved exercise list for the CURRENTLY SELECTED session.
  // This drives both the pre-workout preview list and (via startWorkout/loadExercise)
  // the active workout navigation, sidebar, and progress bar — so swapping templates
  // automatically reshapes the whole session without touching downstream logic.
  // groupLabel travels alongside each resolved exercise for UI grouping (Arms Superset etc.)
  // but each entry remains its own full exercise object/log — no combined PF entities.
  const active = flattenTemplate(selectedTemplate)
    .map(entry => {
      const match = exercises.find(e => e.name === entry.name && e.active);
      return match ? { ...match, groupLabel: entry.groupLabel } : null;
    })
    .filter(Boolean);

  // ── Top-level mode ──────────────────────────────────────────────────────────
  const [activeMode, setActiveMode]     = useState(false);
  const [workoutStartedAt, setWorkoutStartedAt] = useState(null); // ms timestamp — drives elapsed-time stat
  const [elapsedSeconds, setElapsedSeconds] = useState(0);
  // todayKey — local YYYY-MM-DD used as the session key
  const todayKey = new Date().toLocaleDateString("en-CA"); // YYYY-MM-DD in local time

  const [workoutEnded, setWorkoutEnded] = useState(() => {
    try {
      const s = localStorage.getItem("pp_workout_ended");
      if (!s) return false;
      const { date, ended } = JSON.parse(s);
      // Accept both old format (toDateString) and new format (en-CA) for migration
      const todayOld = new Date().toDateString();
      return ended && (date === todayKey || date === todayOld);
    } catch { return false; }
  });
  const [workoutSummary, setWorkoutSummary] = useState(null);
  const [showSummaryPreview, setShowSummaryPreview] = useState(false); // View Workout Summary (mid-workout, non-terminal)

  // ── Exercise navigation ─────────────────────────────────────────────────────
  const [currentIdx, setCurrentIdx] = useState(0);
  const [loggedIds,  setLoggedIds]  = useState(new Set());
  const [skippedIds, setSkippedIds] = useState(new Set()); // exercises skipped this session — contribute no PF

  // ── Per-set state ───────────────────────────────────────────────────────────
  // completedSets: { [exerciseId]: [ {setNum, reps, weight, rir, notes, pf, ts}, ... ] }
  const [completedSets, setCompletedSets] = useState({});
  // currentSet: the set currently being staged (before tapping Complete)
  const [currentSetNum,    setCurrentSetNum]    = useState(1);
  const [currentSetWeight, setCurrentSetWeight] = useState("0");
  const [currentSetReps,   setCurrentSetReps]   = useState("10");
  const [currentSetRir,    setCurrentSetRir]    = useState("");
  const [currentSetNotes,  setCurrentSetNotes]  = useState("");

  // ── Rest timer ──────────────────────────────────────────────────────────────
  const [resting,       setResting]       = useState(false);
  const [restSeconds,   setRestSeconds]   = useState(60);
  const [restTotal,     setRestTotal]     = useState(60);
  const restRef = useRef(null);

  // ── UI state ────────────────────────────────────────────────────────────────
  const [showFormGuide,   setShowFormGuide]   = useState(false);
  const [saveStatus,      setSaveStatus]      = useState(null);
  const [jumpConfirm,     setJumpConfirm]     = useState(null); // {targetIdx}
  const [exerciseDone,    setExerciseDone]    = useState(false); // post-exercise completion moment
  const [workoutDraftPrompt, setWorkoutDraftPrompt] = useState(null); // null | { status, draft }
  const [additionalWorkoutConfirm, setAdditionalWorkoutConfirm] = useState(null); // null | { completedTemplateName }

  // ── Draft persistence ────────────────────────────────────────────────────────
  // Check for draft on mount
  useEffect(() => {
    if (activeMode) return; // don't interrupt active workout
    const draft = loadDraft(DRAFT_KEYS.workout);
    const status = getDraftStatus(draft);
    if (status === "stale-empty") { clearDraft(DRAFT_KEYS.workout); return; }
    if (status === "today" || status === "stale-meaningful") {
      setWorkoutDraftPrompt({ status, draft });
    }
  }, []);

  // Save draft whenever active workout state changes
  useEffect(() => {
    if (!activeMode) return;
    saveDraft(DRAFT_KEYS.workout, {
      selectedTemplateId,
      currentIdx,
      completedSets,
      loggedIds: [...loggedIds],
      currentSetNum,
      currentSetWeight,
      currentSetReps,
      currentSetRir,
      exerciseDone,
      workoutStartedAt,
    });
  }, [activeMode, currentIdx, completedSets, loggedIds, currentSetNum, currentSetWeight, currentSetReps, exerciseDone]);

  // Live elapsed-time ticker for the stats row — updates once per second while active
  useEffect(() => {
    if (!activeMode || !workoutStartedAt) return;
    const tick = () => setElapsedSeconds(Math.max(0, Math.round((Date.now() - workoutStartedAt) / 1000)));
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [activeMode, workoutStartedAt]);

  const resumeWorkoutDraft = (draft) => {
    if (draft.selectedTemplateId) setSelectedTemplateId(draft.selectedTemplateId);
    setCurrentIdx(draft.currentIdx || 0);
    setCompletedSets(draft.completedSets || {});
    setLoggedIds(new Set([...workoutLogs.filter(l => new Date(l.date).toLocaleDateString("en-CA") === new Date().toLocaleDateString("en-CA")).map(l => l.exerciseId), ...(draft.loggedIds || [])]));
    setCurrentSetNum(draft.currentSetNum || 1);
    setCurrentSetWeight(draft.currentSetWeight || "0");
    setCurrentSetReps(draft.currentSetReps || "10");
    setCurrentSetRir(draft.currentSetRir || "");
    setExerciseDone(draft.exerciseDone || false);
    setWorkoutStartedAt(draft.workoutStartedAt || Date.now());
    setWorkoutDraftPrompt(null);
    setActiveMode(true);
  };

  const discardWorkoutDraft = () => {
    clearDraft(DRAFT_KEYS.workout);
    setWorkoutDraftPrompt(null);
  };

  // ── Derived ─────────────────────────────────────────────────────────────────
  const todayKey2 = new Date().toLocaleDateString("en-CA");
  const todayLogs = workoutLogs.filter(x => new Date(x.date).toLocaleDateString("en-CA") === todayKey2);
  const sessionPF = todayLogs.reduce((sum, l) => {
    const ex = exercises.find(e => e.id === l.exerciseId);
    return sum + calcPF(l.sets, l.reps, l.weight, ex?.type, ex?.laterality);
  }, 0);

  const lastEntry = (id) => {
    // Exclude today's logs so this always returns the most recent PRIOR session entry.
    // workoutLogs is updated immediately when a set is saved, so without this filter
    // the Last box, lastExPF, and bestEverPF all pick up today's entry and show stale/zero comparisons.
    const todayStr = new Date().toLocaleDateString("en-CA");
    const logs = workoutLogs.filter(x => Number(x.exerciseId) === Number(id) && new Date(x.date).toLocaleDateString("en-CA") !== todayStr);
    return logs.length ? logs[logs.length - 1] : null;
  };

  const ex = active[currentIdx];
  const exSets = ex ? (completedSets[ex.id] || []) : [];
  const targetSets = ex ? (+ex.defaultSets || 3) : 3;
  const targetReps = ex ? (+ex.defaultReps || 10) : 10;
  const last = ex ? lastEntry(ex.id) : null;
  const color = ex ? (MUSCLE_COLORS[ex.muscleGroup] || "#4B5563") : "#4B5563";

  // Live PF for the current set being staged
  const stagedPF = ex ? calcPF(1, +currentSetReps, +currentSetWeight, ex.type, ex.laterality) : 0;
  // PF accumulated for this exercise so far
  const exAccumPF = exSets.reduce((s, set) => s + (set.pf || 0), 0);
  // Last session PF for this exercise — excludes today so "vs Last Session" always compares
  // against a prior session, not the entry that was just saved moments ago.
  const lastExPF = ex ? (() => {
    const todayStr = new Date().toLocaleDateString("en-CA");
    const h = workoutLogs.filter(x => Number(x.exerciseId) === Number(ex.id) && new Date(x.date).toLocaleDateString("en-CA") !== todayStr);
    return h.length ? calcPF(h[h.length-1].sets, h[h.length-1].reps, h[h.length-1].weight, ex.type, ex.laterality) : null;
  })() : null;

  // bestEverPF — highest Strength Factor ever logged for this exercise, across ALL PRIOR history.
  // Excludes today so the PR badge on the Exercise Complete screen compares the current session
  // against historical bests, not against itself (which would always be false).
  const bestEverPF = ex ? (() => {
    const todayStr = new Date().toLocaleDateString("en-CA");
    const h = workoutLogs.filter(x => Number(x.exerciseId) === Number(ex.id) && new Date(x.date).toLocaleDateString("en-CA") !== todayStr);
    if (!h.length) return null;
    return h.reduce((best, l) => Math.max(best, calcPF(l.sets, l.reps, l.weight, ex.type, ex.laterality)), 0);
  })() : null;

  // ── Rest timer logic ────────────────────────────────────────────────────────
  const startRest = (seconds = 60) => {
    setRestSeconds(seconds); setRestTotal(seconds); setResting(true);
    clearInterval(restRef.current);
    restRef.current = setInterval(() => {
      setRestSeconds(s => { if (s <= 1) { clearInterval(restRef.current); setResting(false); return 0; } return s - 1; });
    }, 1000);
  };
  const stopRest  = () => { clearInterval(restRef.current); setResting(false); };
  const skipRest  = () => stopRest();
  const adjustRest = (delta) => {
    setRestSeconds(s => Math.max(0, s + delta));
    setRestTotal(t => Math.max(0, t + delta));
  };
  const resetRest = () => { clearInterval(restRef.current); startRest(60); };
  useEffect(() => () => clearInterval(restRef.current), []);

  // ── Load exercise ───────────────────────────────────────────────────────────
  const loadExercise = (idx, force = false) => {
    const target = active[idx];
    if (!target) return;
    const alreadyDone = loggedIds.has(active[currentIdx]?.id) || todayLogs.some(l => l.exerciseId === active[currentIdx]?.id);
    const hasPendingSets = (completedSets[active[currentIdx]?.id] || []).length > 0 && !alreadyDone;

    if (hasPendingSets && !force) {
      setJumpConfirm({ targetIdx: idx }); return;
    }
    const prevEntry = lastEntry(target.id);
    const prevSets  = completedSets[target.id] || [];
    const lastSetWeight = prevSets.length ? prevSets[prevSets.length - 1].weight : null;
    setCurrentIdx(idx);
    setReviewExerciseId(null); // leaving review mode (if any) — this is now the active exercise
    setCurrentSetNum(prevSets.length + 1);
    setCurrentSetWeight(String(lastSetWeight ?? prevEntry?.weight ?? 0));
    setCurrentSetReps(String(prevEntry?.reps ?? target.defaultReps ?? 10));
    setCurrentSetRir("");
    setCurrentSetNotes("");
    setShowFormGuide(false);
    setSaveStatus(null);
    setExerciseDone(false);
    stopRest();
  };

  // ── Review mode — viewing/editing a COMPLETED exercise without disturbing the active one ──
  const [reviewExerciseId, setReviewExerciseId] = useState(null);
  const [editingSet, setEditingSet] = useState(null); // { logId, setNum, reps, weight, rir, notes } | null
  const [editDraft, setEditDraft] = useState(null); // working copy of editingSet's fields while modal is open — lives here, not inside the nested modal component, so the 1s elapsed-time re-render doesn't reset it
  const [editSaving, setEditSaving] = useState(false); // lifted out of EditSetModal — nested-component local state was lost on the 1s ticker remount

  // ── Complete a single set ───────────────────────────────────────────────────
  const completeSet = () => {
    if (!ex) return;
    const setData = {
      setNum:  currentSetNum,
      reps:    +currentSetReps,
      weight:  +currentSetWeight,
      rir:     currentSetRir !== "" ? currentSetRir : null, // "0".."4" or "5+"
      notes:   currentSetNotes || "",
      pf:      calcPF(1, +currentSetReps, +currentSetWeight, ex.type, ex.laterality),
      ts:      new Date().toISOString(),
    };
    const updated = [...exSets, setData];
    setCompletedSets(prev => ({ ...prev, [ex.id]: updated }));
    // Seed next set from this one
    setCurrentSetNum(currentSetNum + 1);
    // weight stays the same, reps stay the same
    setCurrentSetRir("");
    setCurrentSetNotes("");
    startRest(60);
  };

  // ── Complete the whole exercise — upsert (one log per exercise per day) ──────
  const completeExercise = async () => {
    if (!ex || exSets.length === 0) return;
    setSaveStatus("saving");

    const totalReps = Math.round(exSets.reduce((s, x) => s + x.reps, 0) / exSets.length);
    const avgWeight = Math.round(exSets.reduce((s, x) => s + x.weight, 0) / exSets.length * 10) / 10;
    const entry = {
      sets:   exSets.length,
      reps:   totalReps,
      weight: avgWeight,
      notes:  exSets.map(s => `Set ${s.setNum}: ${s.reps}r@${s.weight}lbs${s.rir !== null && s.rir !== undefined && s.rir !== "" ? ` RIR${s.rir}` : ""}`).join(" | "),
      date:   new Date().toISOString(),
      setDetails: exSets.map(s => ({ setNum: s.setNum, reps: s.reps, weight: s.weight, rir: s.rir ?? null, notes: s.notes || "" })),
    };

    // Check if this exercise already has a log for today (upsert logic)
    const existingToday = todayLogs.find(l => Number(l.exerciseId) === Number(ex.id));
    const result = await onLogExercise(ex.id, entry, existingToday?.id || null);
    const ok = result?.ok ?? result; // support both old bool and new {ok, freshLogs}
    const freshLogs = result?.freshLogs || null;
    if (ok) {
      setSaveStatus("saved");
      setLoggedIds(prev => new Set([...prev, ex.id]));
      setExerciseDone(true);
      stopRest();
      // Store freshLogs so advanceToNext can pass them to endWorkout
      latestLogsRef.current = freshLogs;
    } else {
      setSaveStatus("error");
      setTimeout(() => setSaveStatus(null), 4000);
    }
  };

  // ── After exercise saved — show completion moment, then advance ────────────
  const latestLogsRef = useRef(null);
  const advanceToNext = () => {
    const fresh = latestLogsRef.current;
    const freshToday = fresh
      ? fresh.filter(x => new Date(x.date).toLocaleDateString("en-CA") === new Date().toLocaleDateString("en-CA"))
      : todayLogs;
    const nextIdx = active.findIndex((e, i) => i > currentIdx && !loggedIds.has(e.id) && !freshToday.some(l => Number(l.exerciseId) === Number(e.id)));
    if (nextIdx !== -1) {
      loadExercise(nextIdx, true);
    } else {
      endWorkout(fresh);
    }
  };

  // ── Complete the FINAL set of an exercise — logs the set AND finishes the exercise
  // in one action. No rest timer, no separate "Finish Exercise" tap required.
  // If this is also the last exercise of the workout, skips the Exercise Complete
  // screen entirely and goes straight to Workout Complete.
  const completeFinalSet = async () => {
    if (!ex) return;
    const finalSetData = {
      setNum:  currentSetNum,
      reps:    +currentSetReps,
      weight:  +currentSetWeight,
      rir:     currentSetRir !== "" ? currentSetRir : null,
      notes:   currentSetNotes || "",
      pf:      calcPF(1, +currentSetReps, +currentSetWeight, ex.type, ex.laterality),
      ts:      new Date().toISOString(),
    };
    const finalExSets = [...exSets, finalSetData];
    setCompletedSets(prev => ({ ...prev, [ex.id]: finalExSets }));
    setCurrentSetRir(""); setCurrentSetNotes("");

    setSaveStatus("saving");
    const totalReps = Math.round(finalExSets.reduce((s, x) => s + x.reps, 0) / finalExSets.length);
    const avgWeight = Math.round(finalExSets.reduce((s, x) => s + x.weight, 0) / finalExSets.length * 10) / 10;
    const entry = {
      sets:   finalExSets.length,
      reps:   totalReps,
      weight: avgWeight,
      notes:  finalExSets.map(s => `Set ${s.setNum}: ${s.reps}r@${s.weight}lbs${s.rir !== null && s.rir !== undefined && s.rir !== "" ? ` RIR${s.rir}` : ""}`).join(" | "),
      date:   new Date().toISOString(),
      setDetails: finalExSets.map(s => ({ setNum: s.setNum, reps: s.reps, weight: s.weight, rir: s.rir ?? null, notes: s.notes || "" })),
    };

    const existingToday = todayLogs.find(l => Number(l.exerciseId) === Number(ex.id));
    const result = await onLogExercise(ex.id, entry, existingToday?.id || null);
    const ok = result?.ok ?? result;
    const freshLogs = result?.freshLogs || null;
    if (!ok) {
      setSaveStatus("error");
      setTimeout(() => setSaveStatus(null), 4000);
      return;
    }
    setSaveStatus("saved");
    const newLoggedIds = new Set([...loggedIds, ex.id]);
    setLoggedIds(newLoggedIds);
    stopRest();
    latestLogsRef.current = freshLogs;

    // Determine if this was the last exercise of the workout
    const freshToday = freshLogs
      ? freshLogs.filter(x => new Date(x.date).toLocaleDateString("en-CA") === new Date().toLocaleDateString("en-CA"))
      : todayLogs;
    const nextIdx = active.findIndex((e, i) => i > currentIdx && !newLoggedIds.has(e.id) && !freshToday.some(l => Number(l.exerciseId) === Number(e.id)));

    if (nextIdx === -1) {
      // Last exercise of the workout — skip Exercise Complete, go straight to Workout Complete
      endWorkout(freshLogs);
    } else {
      // More exercises remain — show Exercise Complete moment
      setExerciseDone(true);
    }
  };

  // ── Skip current exercise — advances without logging, contributes no PF ────
  const skipExercise = () => {
    if (!ex) return;
    setSkippedIds(prev => new Set([...prev, ex.id]));
    setCompletedSets(prev => { const n = { ...prev }; delete n[ex.id]; return n; });
    const nextIdx = active.findIndex((e, i) => i > currentIdx && !loggedIds.has(e.id) && e.id !== ex.id && !todayLogs.some(l => Number(l.exerciseId) === Number(e.id)));
    if (nextIdx !== -1) {
      loadExercise(nextIdx, true);
    } else {
      endWorkout();
    }
  };

  // ── Start / End workout ─────────────────────────────────────────────────────
  const startWorkout = () => {
    setLoggedIds(new Set(todayLogs.map(l => l.exerciseId)));
    setWorkoutEnded(false); setWorkoutSummary(null);
    setCompletedSets({});
    // Preserve workoutStartedAt if a session is already live (i.e. user tapped "Back to Workout"
    // and is now resuming). Only stamp a new start time for a genuinely fresh session.
    if (!workoutStartedAt) setWorkoutStartedAt(Date.now());
    // Remove ended flag — allow amend on same day
    localStorage.removeItem("pp_workout_ended");
    // Start from first incomplete exercise (or exercise 0 for fresh start)
    const firstUndone = active.findIndex(e => !todayLogs.some(l => Number(l.exerciseId) === Number(e.id)));
    loadExercise(firstUndone >= 0 ? firstUndone : 0, true);
    setActiveMode(true);
  };

  // endWorkout accepts optional freshLogs — avoids stale closure when called right after a state update
  const endWorkout = (freshLogs) => {
    clearDraft(DRAFT_KEYS.workout);
    const todayLocalKey = new Date().toLocaleDateString("en-CA");
    const allLogs = freshLogs || workoutLogs;

    // The exercise IDs that belong to the current template (e.g. Express, Full Body, Extended).
    // All comparisons are scoped to this set so "VS Last" always means
    // "last time I did this same template", not "last workout day regardless of type".
    const activeExIds = new Set(active.map(e => Number(e.id)));

    // Today's logs, scoped to the current template's exercises
    const tLogs = allLogs.filter(x =>
      new Date(x.date).toLocaleDateString("en-CA") === todayLocalKey &&
      activeExIds.has(Number(x.exerciseId))
    );

    // All prior logs scoped to the current template's exercises
    const prevAllLogs = allLogs.filter(x =>
      new Date(x.date).toLocaleDateString("en-CA") !== todayLocalKey &&
      activeExIds.has(Number(x.exerciseId))
    );

    // Find the most recent prior day that has at least one of this template's exercises —
    // this is the "last time this template was run" anchor for the VS Last comparison.
    const prevDates = [...new Set(prevAllLogs.map(l => new Date(l.date).toLocaleDateString("en-CA")))]
      .sort((a, b) => new Date(b) - new Date(a));
    const prevSessLogs = prevDates.length
      ? prevAllLogs.filter(l => new Date(l.date).toLocaleDateString("en-CA") === prevDates[0])
      : [];

    const curPF  = tLogs.reduce((sum, l) => { const e = exercises.find(x => x.id === l.exerciseId); return sum + calcPF(l.sets, l.reps, l.weight, e?.type, e?.laterality); }, 0);
    const prevPF = prevSessLogs.reduce((sum, l) => { const e = exercises.find(x => x.id === l.exerciseId); return sum + calcPF(l.sets, l.reps, l.weight, e?.type, e?.laterality); }, 0);
    const pfChange = prevPF > 0 ? ((curPF - prevPF) / prevPF * 100) : null;

    // PRs: for each exercise in the current template completed today, check if today's SF
    // beats the best SF ever recorded for that exercise on any prior day.
    let prs = 0;
    tLogs.forEach(l => {
      const e = exercises.find(x => x.id === l.exerciseId); if (!e) return;
      const thisPF = calcPF(l.sets, l.reps, l.weight, e.type, e.laterality);
      const bestPrev = prevAllLogs
        .filter(x => Number(x.exerciseId) === Number(l.exerciseId))
        .reduce((best, x) => Math.max(best, calcPF(x.sets, x.reps, x.weight, e.type, e.laterality)), 0);
      if (thisPF > bestPrev && bestPrev > 0) prs++;
    });

    const uniqueCompleted = new Set(tLogs.map(l => Number(l.exerciseId))).size;
    const durationMinutes = workoutStartedAt ? Math.round((Date.now() - workoutStartedAt) / 60000) : null;
    // Persist duration keyed by date so Workout History can read it back after page reload
    if (durationMinutes !== null) {
      try {
        const durStore = JSON.parse(localStorage.getItem("pp_workout_durations") || "{}");
        durStore[todayLocalKey] = durationMinutes;
        localStorage.setItem("pp_workout_durations", JSON.stringify(durStore));
      } catch {}
    }
    const summary = { completed: uniqueCompleted, total: active.length, sessionPF: curPF, prevPF, pfChange, prs, templateId: selectedTemplateId, durationMinutes };
    setWorkoutSummary(summary);
    setActiveMode(false); setWorkoutEnded(true); setCompletedSets({});
    localStorage.setItem("pp_workout_ended", JSON.stringify({ date: new Date().toLocaleDateString("en-CA"), ended: true }));
    setLoggedIds(new Set());
    onSaveSummary && onSaveSummary(summary);
  };

  // ── WORKOUT SUMMARY MODAL ──────────────────────────────────────────────────
  const renderWorkoutSummaryModal = () => {
    // Terminal mode: workout actually ended, workoutSummary has the final frozen stats.
    // Preview mode: user tapped "View Workout Summary" mid-workout — compute live stats from current logs.
    if (!workoutSummary && !showSummaryPreview) return null;

    let completed, total, sPF, prevPF, pfChange, prs, isPreview;
    if (workoutSummary) {
      ({ completed, total, sessionPF: sPF, prevPF, pfChange, prs } = workoutSummary);
      isPreview = false;
    } else {
      // Live preview — recompute from current todayLogs scoped to the current template,
      // matching the same logic as endWorkout so the mid-workout summary is consistent.
      isPreview = true;
      total = active.length;
      completed = active.filter(e => loggedIds.has(e.id) || todayLogs.some(l => Number(l.exerciseId) === Number(e.id))).length;
      sPF = sessionPF;
      const todayLocalKey = new Date().toLocaleDateString("en-CA");
      const activeExIdsPreview = new Set(active.map(e => Number(e.id)));
      const prevAllLogsPreview = workoutLogs.filter(x =>
        new Date(x.date).toLocaleDateString("en-CA") !== todayLocalKey &&
        activeExIdsPreview.has(Number(x.exerciseId))
      );
      const prevDates = [...new Set(prevAllLogsPreview.map(l => new Date(l.date).toLocaleDateString("en-CA")))].sort((a, b) => new Date(b) - new Date(a));
      const prevSessLogs = prevDates.length ? prevAllLogsPreview.filter(l => new Date(l.date).toLocaleDateString("en-CA") === prevDates[0]) : [];
      prevPF = prevSessLogs.reduce((sum, l) => { const e = exercises.find(x => x.id === l.exerciseId); return sum + calcPF(l.sets, l.reps, l.weight, e?.type, e?.laterality); }, 0);
      pfChange = prevPF > 0 ? ((sPF - prevPF) / prevPF * 100) : null;
      prs = 0; // PR detection omitted from live preview for simplicity/speed
    }

    return (
      <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 500, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}
        onClick={() => isPreview && setShowSummaryPreview(false)}>
        <div style={{ background: "#1A1D26", borderRadius: 20, border: "1px solid #4AD99A44", padding: 48, maxWidth: 520, width: "100%", textAlign: "center" }}
          onClick={e => e.stopPropagation()}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>{isPreview ? "📊" : "🏆"}</div>
          <div style={{ fontSize: 30, fontWeight: 800, color: "#4AD99A", marginBottom: 4 }}>{isPreview ? "WORKOUT SUMMARY" : "WORKOUT COMPLETE"}</div>
          <div style={{ color: "#4B5563", fontSize: 14, marginBottom: 36 }}>{fmtDateLong(new Date())}</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 32 }}>
            {[
              ["Exercises", `${completed}/${total}`, "#E8EAF0"],
              ["Session SF", (sPF||0).toLocaleString(), "#E8A838"],
              ["vs Last", pfChange !== null ? `${pfChange >= 0 ? "+" : ""}${pfChange.toFixed(1)}%` : "First", pfChange === null ? "#4B5563" : pfChange >= 0 ? "#4AD99A" : "#D94A4A"],
              isPreview ? ["Status", completed === total ? "Complete" : "In Progress", completed === total ? "#4AD99A" : "#E8A838"] : ["New PRs", prs, prs > 0 ? "#FFD700" : "#4B5563"],
            ].map(([label, val, color]) => (
              <div key={label} style={{ background: "#0F1117", borderRadius: 12, padding: "20px 16px" }}>
                <div style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>{label}</div>
                <div style={{ fontSize: 34, fontWeight: 800, color }}>{val}</div>
              </div>
            ))}
          </div>
          <button onClick={() => isPreview ? setShowSummaryPreview(false) : setWorkoutSummary(null)}
            style={{ width: "100%", background: "#4AD99A", color: "#0F1117", border: "none", borderRadius: 12, height: 56, fontSize: 18, fontWeight: 800, cursor: "pointer" }}>
            {isPreview ? "Close" : "Done"}
          </button>
        </div>
      </div>
    );
  };

  // ── JUMP CONFIRMATION MODAL ────────────────────────────────────────────────
  const renderJumpConfirmModal = () => {
    if (!jumpConfirm) return null;
    return (
      <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 400, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ background: "#1A1D26", borderRadius: 16, border: "1px solid #E8A83844", padding: 32, maxWidth: 400, width: "100%", textAlign: "center" }}>
          <div style={{ fontSize: 24, marginBottom: 12 }}>⚠️</div>
          <div style={{ color: "#E8EAF0", fontWeight: 700, fontSize: 17, marginBottom: 8 }}>Unsaved Sets</div>
          <div style={{ color: "#8B92A5", fontSize: 13, marginBottom: 24, lineHeight: 1.6 }}>
            You have {exSets.length} completed set{exSets.length !== 1 ? "s" : ""} for <strong style={{ color: "#E8EAF0" }}>{ex?.name}</strong> that haven't been saved as an exercise log yet.
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <button onClick={() => { setJumpConfirm(null); completeExercise().then(() => setTimeout(() => loadExercise(jumpConfirm.targetIdx, true), 500)); }}
              style={{ background: "#4AD99A", color: "#0F1117", border: "none", borderRadius: 10, height: 48, fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
              Save & Continue
            </button>
            <button onClick={() => { setCompletedSets(p => { const n = {...p}; delete n[ex.id]; return n; }); setJumpConfirm(null); loadExercise(jumpConfirm.targetIdx, true); }}
              style={{ background: "#D94A4A22", color: "#D94A4A", border: "1px solid #D94A4A44", borderRadius: 10, height: 48, fontSize: 15, cursor: "pointer" }}>
              Discard Sets
            </button>
            <button onClick={() => setJumpConfirm(null)}
              style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 10, height: 40, fontSize: 14, cursor: "pointer" }}>
              Cancel — Stay Here
            </button>
          </div>
        </div>
      </div>
    );
  };

  // ── Edit Set modal — handles both in-progress (in-memory) sets and persisted log sets ──
  const renderEditSetModal = () => {
    if (!editingSet || !editDraft) return null;
    const exMeta = editingSet.inMemory
      ? exercises.find(x => x.id === editingSet.exerciseId)
      : exercises.find(x => x.id === Number(workoutLogs.find(l => l.id === editingSet.logId)?.exerciseId));
    const isBodyweightLike = exMeta?.type === "bodyweight" || exMeta?.type === "banded";

    const setField = (k) => (v) => setEditDraft(prev => ({ ...prev, [k]: v }));

    const save = async () => {
      setEditSaving(true);
      const reps = editDraft.reps, weight = isBodyweightLike ? 0 : editDraft.weight, rir = editDraft.rir, notes = editDraft.notes;
      if (editingSet.inMemory) {
        // Edit a set still in React state (current exercise, not yet saved to Supabase)
        setCompletedSets(prev => {
          const list = (prev[editingSet.exerciseId] || []).map(s => {
            if (s.setNum !== editingSet.setNum) return s;
            return { ...s, reps: +reps, weight: +weight, rir: rir === "" ? null : rir, notes,
              pf: calcPF(1, +reps, +weight, exMeta?.type, exMeta?.laterality) };
          });
          return { ...prev, [editingSet.exerciseId]: list };
        });
        setEditSaving(false);
        setEditingSet(null);
        setEditDraft(null);
      } else {
        // Edit a set already persisted to a workout_logs row — recalculate aggregate via onEditSet
        const result = await onEditSet(editingSet.logId, editingSet.setNum, { reps: +reps, weight: +weight, rir: rir === "" ? null : rir, notes });
        setEditSaving(false);
        if (result?.ok) { setEditingSet(null); setEditDraft(null); }
      }
    };

    const cancel = () => { setEditingSet(null); setEditDraft(null); setEditSaving(false); };

    return (
      <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 500, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}
        onClick={() => !saving && cancel()}>
        <div style={{ background: "#1A1D26", borderRadius: 16, border: "1px solid #2A2D3A", padding: 28, maxWidth: 380, width: "100%" }}
          onClick={e => e.stopPropagation()}>
          <div style={{ color: "#E8EAF0", fontWeight: 700, fontSize: 17, marginBottom: 20 }}>Edit Set {editingSet.setNum}</div>

          <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
            {!isBodyweightLike && (
              <div style={{ flex: 1 }}>
                <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>Weight (lbs)</div>
                <input type="number" value={editDraft.weight} onChange={e => setField("weight")(e.target.value)}
                  style={{ width: "100%", background: "#0F1117", border: "1px solid #2A2D3A", borderRadius: 8, padding: "10px 12px", color: "#E8EAF0", fontSize: 15 }} />
              </div>
            )}
            <div style={{ flex: 1 }}>
              <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>
                {exMeta?.laterality === "unilateral" ? "Reps (per side)" : "Reps"}
              </div>
              <input type="number" value={editDraft.reps} onChange={e => setField("reps")(e.target.value)}
                style={{ width: "100%", background: "#0F1117", border: "1px solid #2A2D3A", borderRadius: 8, padding: "10px 12px", color: "#E8EAF0", fontSize: 15 }} />
            </div>
          </div>
          {isBodyweightLike && (
            <div style={{ color: "#4B5563", fontSize: 11, marginTop: -10, marginBottom: 16 }}>
              {exMeta?.type === "banded" ? "Banded exercise — no weight to track." : "Bodyweight exercise — no weight to track."}
            </div>
          )}

          <div style={{ marginBottom: 16 }}>
            <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>RIR</div>
            <div style={{ display: "flex", gap: 6 }}>
              {["0","1","2","3","4","5+"].map(r => (
                <button key={r} onClick={() => setField("rir")(r)}
                  style={{ flex: 1, height: 36, border: "none", borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer",
                    background: editDraft.rir === r ? "#4A90D9" : "#2A2D3A", color: editDraft.rir === r ? "#fff" : "#4B5563" }}>
                  {r}
                </button>
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 24 }}>
            <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>Notes</div>
            <input value={editDraft.notes} onChange={e => setField("notes")(e.target.value)}
              style={{ width: "100%", background: "#0F1117", border: "1px solid #2A2D3A", borderRadius: 8, padding: "10px 12px", color: "#E8EAF0", fontSize: 13 }} />
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={cancel} disabled={editSaving}
              style={{ flex: 1, background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 10, height: 46, fontSize: 14, cursor: "pointer" }}>
              Cancel
            </button>
            <button onClick={save} disabled={editSaving}
              style={{ flex: 1, background: editSaving ? "#2A2D3A" : "#4A90D9", color: editSaving ? "#4B5563" : "#fff", border: "none", borderRadius: 10, height: 46, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
              {editSaving ? "Saving…" : "Save Changes"}
            </button>
          </div>
        </div>
      </div>
    );
  };


  // ─────────────────────────────────────────────────────────────────────────────
  // LIST VIEW (pre-workout)
  // ─────────────────────────────────────────────────────────────────────────────
  if (!activeMode) {
    // Group consecutive entries that share a groupLabel (Arms Superset, Core Circuit)
    // into a single display row, while keeping each underlying exercise as its own object.
    const displayRows = [];
    active.forEach(e => {
      if (e.groupLabel) {
        const lastRow = displayRows[displayRows.length - 1];
        if (lastRow && lastRow.groupLabel === e.groupLabel) {
          lastRow.exercises.push(e);
        } else {
          displayRows.push({ groupLabel: e.groupLabel, exercises: [e] });
        }
      } else {
        displayRows.push({ groupLabel: null, exercises: [e] });
      }
    });

    // Determine which templates are fully completed today
    const isTemplateCompleted = (t) => {
      const tExIds = flattenTemplate(t).map(entry => {
        const match = exercises.find(e => e.name === entry.name && e.active);
        return match ? Number(match.id) : null;
      }).filter(Boolean);
      return tExIds.length > 0 && tExIds.every(id => todayLogs.some(l => Number(l.exerciseId) === id));
    };
    const selectedTemplateCompleted = isTemplateCompleted(selectedTemplate);
    const completedTemplateName = WORKOUT_TEMPLATES.find(t => isTemplateCompleted(t))?.label || null;

    return (
      <div>
        {renderWorkoutSummaryModal()}
        {renderEditSetModal()}

        {/* Workout draft recovery prompt */}
        {workoutDraftPrompt && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 600, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
            <div style={{ background: "#1A1D26", borderRadius: 16, border: "1px solid #4A90D944", padding: 32, maxWidth: 420, width: "100%" }}>
              <div style={{ fontSize: 28, marginBottom: 12, textAlign: "center" }}>💪</div>
              <div style={{ color: "#E8EAF0", fontSize: 18, fontWeight: 700, marginBottom: 8, textAlign: "center" }}>
                {workoutDraftPrompt.status === "today" ? "Resume previous workout?" : "Unfinished workout found"}
              </div>
              <div style={{ color: "#8B92A5", fontSize: 13, marginBottom: 16, textAlign: "center", lineHeight: 1.6 }}>
                {workoutDraftPrompt.status === "today"
                  ? "You have an unfinished workout from earlier today."
                  : "Previous unfinished workout from " + new Date((workoutDraftPrompt.draft.date || new Date().toLocaleDateString("en-CA")) + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" }) + "."}
              </div>
              {workoutDraftPrompt.draft.completedSets && (
                <div style={{ background: "#0F1117", borderRadius: 8, padding: "10px 14px", marginBottom: 20, textAlign: "center" }}>
                  <div style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>
                    {Object.values(workoutDraftPrompt.draft.completedSets).reduce(function(t, s) { return t + s.length; }, 0)} sets completed across {Object.keys(workoutDraftPrompt.draft.completedSets).filter(function(k) { return workoutDraftPrompt.draft.completedSets[k].length > 0; }).length} exercises
                  </div>
                </div>
              )}
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {workoutDraftPrompt.status === "today" && (
                  <button onClick={() => resumeWorkoutDraft(workoutDraftPrompt.draft)}
                    style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 10, height: 52, fontSize: 16, fontWeight: 800, cursor: "pointer" }}>
                    Resume Workout
                  </button>
                )}
                <button onClick={discardWorkoutDraft}
                  style={{ background: "#D94A4A22", color: "#D94A4A", border: "1px solid #D94A4A44", borderRadius: 10, height: 48, fontSize: 14, cursor: "pointer" }}>
                  {workoutDraftPrompt.status === "today" ? "Discard & Start Fresh" : "Discard Old Workout"}
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Additional workout confirmation modal */}
        {additionalWorkoutConfirm && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 600, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
            <div style={{ background: "#1A1D26", borderRadius: 16, border: "1px solid #4A90D944", padding: 32, maxWidth: 420, width: "100%", textAlign: "center" }}>
              <div style={{ fontSize: 32, marginBottom: 12 }}>✅</div>
              <div style={{ color: "#E8EAF0", fontSize: 18, fontWeight: 700, marginBottom: 12 }}>Already Completed Today</div>
              <div style={{ color: "#8B92A5", fontSize: 14, marginBottom: 24, lineHeight: 1.7 }}>
                You have already completed today's <span style={{ color: "#E8EAF0", fontWeight: 700 }}>{additionalWorkoutConfirm.completedTemplateName}</span>. Would you like to start an additional workout?
              </div>
              <div style={{ display: "flex", gap: 12 }}>
                <button onClick={() => setAdditionalWorkoutConfirm(null)}
                  style={{ flex: 1, background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 10, height: 52, fontSize: 15, cursor: "pointer" }}>
                  Cancel
                </button>
                <button onClick={() => { setAdditionalWorkoutConfirm(null); startWorkout(); }}
                  style={{ flex: 1, background: "#4A90D9", color: "#fff", border: "none", borderRadius: 10, height: 52, fontSize: 15, fontWeight: 800, cursor: "pointer" }}>
                  Start Workout
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div>
            <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Today's Workout</h2>
            <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>{fmtDateLong(new Date())} · Choose your session</div>
          </div>
          {(() => {
            // Has the selected template been started (any of its exercises logged today)?
            // Resume only if this specific template is genuinely mid-session:
            // some of its exercises are logged today AND no workout has been formally ended.
            // workoutEnded=true means a session was completed/ended — no template should Resume.
            const selectedHasLogsToday = active.some(e => todayLogs.some(l => Number(l.exerciseId) === Number(e.id)));
            const selectedInProgress = selectedHasLogsToday && !workoutEnded && !selectedTemplateCompleted;
            if (selectedTemplateCompleted) return null; // editing via pencil icons only
            if (selectedInProgress) {
              // Genuinely mid-session — Resume goes straight in, no confirmation needed
              return (
                <button onClick={startWorkout}
                  style={{ background: selectedTemplate.color, color: "#0F1117", border: "none", borderRadius: 10, padding: "13px 32px", fontSize: 16, fontWeight: 800, cursor: "pointer" }}>
                  Resume Workout
                </button>
              );
            }
            // Not started — Start; if another template already done today, show confirmation first
            return (
              <button onClick={() => { if (completedTemplateName) { setAdditionalWorkoutConfirm({ completedTemplateName }); } else { startWorkout(); } }}
                style={{ background: selectedTemplate.color, color: "#0F1117", border: "none", borderRadius: 10, padding: "13px 32px", fontSize: 16, fontWeight: 800, cursor: "pointer" }}>
                Start Workout
              </button>
            );
          })()}
        </div>

        {/* Session cards */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 14, marginBottom: 28 }}>
          {WORKOUT_TEMPLATES.map(t => {
            const isSelected = t.id === selectedTemplateId;
            const tCompleted = isTemplateCompleted(t);
            const handleSelect = () => {
              // Just select the template — confirmation fires only when user taps Start Workout
              setSelectedTemplateId(t.id);
            };
            return (
              <div key={t.id} onClick={handleSelect} style={{
                background: "#1A1D26",
                borderRadius: 14,
                border: isSelected ? `1px solid ${t.color}88` : tCompleted ? `1px solid ${t.color}55` : "1px solid #2A2D3A",
                boxShadow: isSelected ? `0 0 0 1px ${t.color}44` : "none",
                padding: 20,
                display: "flex", flexDirection: "column", gap: 6,
                cursor: "pointer",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ color: t.color, fontSize: 11, fontWeight: 700, letterSpacing: "0.08em" }}>{t.duration}</span>
                  {tCompleted && (
                    <span style={{ background: t.color + "22", color: t.color, padding: "2px 8px", borderRadius: 5, fontSize: 10, fontWeight: 700, letterSpacing: "0.04em" }}>✓ DONE TODAY</span>
                  )}
                  {!tCompleted && t.badge && (
                    <span style={{ background: t.color + "22", color: t.color, padding: "2px 8px", borderRadius: 5, fontSize: 10, fontWeight: 700, letterSpacing: "0.04em" }}>★ {t.badge.toUpperCase()}</span>
                  )}
                </div>
                <div style={{ color: "#E8EAF0", fontSize: 17, fontWeight: 800, marginTop: 2 }}>{t.label}</div>
                <div style={{ color: "#8B92A5", fontSize: 12.5, lineHeight: 1.5, marginBottom: 10, minHeight: 36 }}>{t.description}</div>
                <button onClick={(e) => { e.stopPropagation(); handleSelect(); }}
                  style={{
                    background: isSelected ? t.color : tCompleted ? t.color + "22" : "transparent",
                    color: isSelected ? "#0F1117" : t.color,
                    border: isSelected ? "none" : `1px solid ${t.color}66`,
                    borderRadius: 9, padding: "10px 0", fontSize: 13, fontWeight: 700, cursor: "pointer",
                  }}>
                  {tCompleted ? (isSelected ? "✓ Completed" : "View Workout") : (isSelected ? "✓ Selected" : "Choose This Workout")}
                </button>
              </div>
            );
          })}
        </div>

        {/* Below cards: completed template shows today's editable results; otherwise normal preview */}
        {selectedTemplateCompleted ? (
          <div style={{ background: "#1A1D26", borderRadius: 14, border: `1px solid ${selectedTemplate.color}44`, padding: 20, marginBottom: 20 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: selectedTemplate.color }} />
                <div style={{ color: "#E8EAF0", fontSize: 15, fontWeight: 700 }}>{selectedTemplate.label} — Today's Results</div>
              </div>
              <div style={{ color: selectedTemplate.color, fontSize: 13, fontWeight: 700 }}>
                {active.filter(e => todayLogs.some(l => Number(l.exerciseId) === Number(e.id))).length}/{active.length} exercises
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {displayRows.map((row, i) => {
                const primary = row.exercises[0];
                const todayLog = todayLogs.find(l => Number(l.exerciseId) === Number(primary.id));
                const isMulti = row.exercises.length > 1 || row.groupLabel;
                const exColor = MUSCLE_COLORS[primary.muscleGroup] || "#4B5563";
                const pf = todayLog ? calcPF(todayLog.sets, todayLog.reps, todayLog.weight, primary.type, primary.laterality) : 0;
                // PR detection: today's SF vs best-ever prior SF for this exercise
                const todayStr = new Date().toLocaleDateString("en-CA");
                const priorLogs = workoutLogs.filter(x => Number(x.exerciseId) === Number(primary.id) && new Date(x.date).toLocaleDateString("en-CA") !== todayStr);
                const bestPriorPF = priorLogs.length ? priorLogs.reduce((best, l) => Math.max(best, calcPF(l.sets, l.reps, l.weight, primary.type, primary.laterality)), 0) : 0;
                const isPR = todayLog && pf > 0 && bestPriorPF > 0 && pf > bestPriorPF;
                return (
                  <div key={i} style={{ background: "#0F1117", borderRadius: 10, border: isPR ? "1px solid #FFD70044" : todayLog ? "1px solid #2A2D3A" : "1px solid #1A1D26", padding: "12px 16px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{ width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
                        background: isPR ? "#FFD700" : todayLog ? selectedTemplate.color : "#2A2D3A",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: isPR ? 14 : 12, color: "#0F1117", fontWeight: 800 }}>
                        {isPR ? "🏆" : todayLog ? "✓" : i + 1}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                          <span style={{ fontWeight: 700, color: "#E8EAF0", fontSize: 14 }}>{row.groupLabel || primary.name}</span>
                          <span style={{ background: exColor + "22", color: exColor, padding: "2px 8px", borderRadius: 5, fontSize: 10, fontWeight: 700, textTransform: "uppercase" }}>{primary.muscleGroup}</span>
                          {isPR && <span style={{ background: "#FFD70022", color: "#FFD700", padding: "2px 8px", borderRadius: 5, fontSize: 10, fontWeight: 700, letterSpacing: "0.04em" }}>🏆 NEW PR</span>}
                        </div>
                        {isMulti && <div style={{ color: "#4B5563", fontSize: 11.5, marginTop: 2 }}>{row.exercises.map(e => e.name).join(" + ")}</div>}
                        {isPR && <div style={{ color: "#FFD700", fontSize: 11, marginTop: 2 }}>+{(((pf - bestPriorPF) / bestPriorPF) * 100).toFixed(1)}% vs previous best ({bestPriorPF.toLocaleString()} SF)</div>}
                      </div>
                      {todayLog ? (
                        <div style={{ display: "flex", alignItems: "center", gap: 16, flexShrink: 0 }}>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ color: "#E8EAF0", fontSize: 13, fontWeight: 700 }}>
                              {todayLog.sets}×{todayLog.reps}{todayLog.weight ? ` @ ${todayLog.weight} lbs` : ""}
                            </div>
                            <div style={{ color: "#E8A838", fontSize: 11, fontWeight: 700 }}>SF {pf.toLocaleString()}</div>
                          </div>
                        </div>
                      ) : (
                        <div style={{ color: "#3A3D4A", fontSize: 12, flexShrink: 0 }}>Skipped</div>
                      )}
                    </div>
                    {todayLog?.setDetails && todayLog.setDetails.length > 0 && (
                      <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #2A2D3A", display: "flex", flexDirection: "column", gap: 4 }}>
                        {todayLog.setDetails.map(s => (
                          <div key={s.setNum} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 0" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                              <span style={{ color: "#4B5563", fontSize: 12 }}>Set {s.setNum}</span>
                              <span style={{ color: "#E8EAF0", fontSize: 12, fontWeight: 700 }}>{s.reps} reps{s.weight > 0 ? ` @ ${s.weight} lbs` : ""}</span>
                              {s.rir !== null && s.rir !== undefined && s.rir !== "" && <span style={{ background: "#4A90D922", color: "#4A90D9", fontSize: 10, padding: "1px 6px", borderRadius: 4, fontWeight: 700 }}>RIR {s.rir}</span>}
                            </div>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                              <span style={{ color: "#E8A838", fontSize: 12 }}>{calcPF(1, s.reps, s.weight, primary.type, primary.laterality).toLocaleString()} SF</span>
                              <button onClick={() => { const init = { inMemory: false, logId: todayLog.id, setNum: s.setNum, reps: String(s.reps), weight: String(s.weight), rir: s.rir ?? "", notes: s.notes || "" }; setEditingSet(init); setEditDraft(init); }}
                                disabled={!todayLog.id}
                                style={{ background: "none", border: "none", color: todayLog.id ? "#4B5563" : "#2A2D3A", cursor: todayLog.id ? "pointer" : "not-allowed", fontSize: 13, padding: 2 }}
                                title="Edit set">✎</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
          <div style={{ background: "#1A1D26", borderRadius: 14, border: "1px solid #2A2D3A", padding: 20, marginBottom: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: selectedTemplate.color }} />
              <div style={{ color: "#E8EAF0", fontSize: 15, fontWeight: 700 }}>
                {selectedTemplate.label} ({selectedTemplate.duration.replace(" MIN", " Min")})
              </div>
            </div>
            <div style={{ color: "#8B92A5", fontSize: 12.5, marginBottom: 16, marginLeft: 16 }}>{selectedTemplate.description}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {displayRows.map((row, i) => {
                const isMulti = row.exercises.length > 1 || row.groupLabel;
                const primary = row.exercises[0];
                const lastE = lastEntry(primary.id);
                return (
                  <div key={i} style={{ background: "#0F1117", borderRadius: 10, border: "1px solid #2A2D3A", padding: "12px 16px", display: "flex", alignItems: "center", gap: 14 }}>
                    <div style={{ width: 26, height: 26, borderRadius: "50%", background: "#2A2D3A", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 12, color: "#8B92A5", fontWeight: 700 }}>
                      {i + 1}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                        <span style={{ fontWeight: 700, color: "#E8EAF0", fontSize: 14 }}>{row.groupLabel || primary.name}</span>
                        <span style={{ background: (MUSCLE_COLORS[primary.muscleGroup] || "#4B5563") + "22", color: MUSCLE_COLORS[primary.muscleGroup] || "#4B5563", padding: "2px 8px", borderRadius: 5, fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.04em" }}>
                          {primary.muscleGroup}
                        </span>
                      </div>
                      {isMulti && (
                        <div style={{ color: "#4B5563", fontSize: 11.5, marginTop: 2 }}>
                          {row.exercises.map(e => e.name).join(" + ")}
                        </div>
                      )}
                    </div>
                    <div style={{ textAlign: "left", flexShrink: 0, width: 150, paddingLeft: 8 }}>
                      <div style={{ color: "#4B5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.04em" }}>Last</div>
                      <div style={{ color: "#8B92A5", fontSize: 12, fontWeight: 600 }}>
                        {lastE ? `${lastE.sets}x${lastE.reps}${lastE.weight ? ` @ ${lastE.weight} lbs` : ""}` : "No history"}
                      </div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0, width: 150 }}>
                      <div style={{ color: "#4B5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.04em" }}>Suggested</div>
                      <div style={{ color: "#E8A838", fontSize: 12, fontWeight: 700 }}>
                        {suggestedText(primary, lastE)}
                      </div>
                    </div>
                    <span style={{ color: "#3A3D4A", fontSize: 16, width: 12, flexShrink: 0, textAlign: "center" }}>›</span>
                  </div>
                );
              })}
            </div>
          {/* Start Workout button inside the exercise preview panel — triggers confirmation if another workout already done today */}
          <button onClick={() => {
              if (completedTemplateName) {
                setAdditionalWorkoutConfirm({ completedTemplateName });
              } else {
                startWorkout();
              }
            }}
            style={{ marginTop: 16, width: "100%", background: selectedTemplate.color, color: "#0F1117", border: "none", borderRadius: 12, height: 56, fontSize: 17, fontWeight: 800, cursor: "pointer" }}>
            {completedTemplateName ? "Start Additional Workout" : "Start Workout"}
          </button>
        </div>
        )}
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // ACTIVE WORKOUT MODE
  // ─────────────────────────────────────────────────────────────────────────────
  if (!ex) return null;
  const isLastSet   = currentSetNum > targetSets;
  const readyToLift = !resting && !exerciseDone;

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 16, height: "calc(100dvh - 160px)" }}>
      {renderWorkoutSummaryModal()}
      {renderJumpConfirmModal()}
      {renderEditSetModal()}

      {/* ── MAIN PANEL ───────────────────────────────────────────────────── */}
      <div style={{ display: "flex", flexDirection: "column", gap: 14, overflowY: "auto", overflowX: "hidden", WebkitOverflowScrolling: "touch" }}>

        {reviewExerciseId ? (() => {
          const reviewEx = exercises.find(x => x.id === reviewExerciseId);
          const reviewLog = todayLogs.find(l => Number(l.exerciseId) === Number(reviewExerciseId));
          if (!reviewEx) return null;
          return (
            <>
              {/* Header bar — review mode */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ background: "#E8A83822", color: "#E8A838", padding: "4px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700, letterSpacing: "0.06em" }}>REVIEWING — COMPLETED</span>
                  <span style={{ background: (MUSCLE_COLORS[reviewEx.muscleGroup] || "#4B5563") + "22", color: MUSCLE_COLORS[reviewEx.muscleGroup] || "#4B5563", padding: "4px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700, letterSpacing: "0.06em" }}>{reviewEx.muscleGroup.toUpperCase()}</span>
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setReviewExerciseId(null)} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 8, padding: "6px 14px", fontSize: 12, cursor: "pointer" }}>
                    ← Back to {ex.name}
                  </button>
                  <button onClick={() => endWorkout()} style={{ background: "#D94A4A22", color: "#D94A4A", border: "1px solid #D94A4A44", borderRadius: 8, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                    End Workout
                  </button>
                </div>
              </div>

              <div style={{ fontSize: 28, fontWeight: 800, color: "#E8EAF0", lineHeight: 1.1 }}>{reviewEx.name}</div>

              {reviewLog ? (
                <div style={{ background: "#1A1D26", borderRadius: 12, border: "1px solid #2A2D3A", padding: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                    <div style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>Today's Sets</div>
                    <div style={{ color: "#E8A838", fontSize: 14, fontWeight: 700 }}>
                      {calcPF(reviewLog.sets, reviewLog.reps, reviewLog.weight, reviewEx.type, reviewEx.laterality).toLocaleString()} SF total
                    </div>
                  </div>

                  {reviewLog.setDetails && reviewLog.setDetails.length > 0 ? (
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      {reviewLog.setDetails.map(s => (
                        <div key={s.setNum} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#0F1117", borderRadius: 8, padding: "10px 14px" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <span style={{ color: "#8B92A5", fontSize: 13 }}>Set {s.setNum}</span>
                            <span style={{ color: "#E8EAF0", fontSize: 13, fontWeight: 700 }}>{s.reps} reps {s.weight > 0 ? `@ ${s.weight} lbs` : ""}</span>
                            {s.rir !== null && s.rir !== undefined && s.rir !== "" && <span style={{ background: "#4A90D922", color: "#4A90D9", fontSize: 11, padding: "1px 6px", borderRadius: 4, fontWeight: 700 }}>RIR {s.rir}</span>}
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <span style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>{calcPF(1, s.reps, s.weight, reviewEx.type, reviewEx.laterality).toLocaleString()} SF</span>
                            <button onClick={() => { if (!reviewLog.id) return; const init = { inMemory: false, logId: reviewLog.id, setNum: s.setNum, reps: String(s.reps), weight: String(s.weight), rir: s.rir ?? "", notes: s.notes || "" }; setEditingSet(init); setEditDraft(init); }}
                              disabled={!reviewLog.id}
                              style={{ background: "none", border: "none", color: reviewLog.id ? "#4B5563" : "#2A2D3A", cursor: reviewLog.id ? "pointer" : "not-allowed", fontSize: 13, padding: 2 }}
                              title={reviewLog.id ? "Edit set" : "Still syncing — try again in a moment"}>✎</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div>
                      <div style={{ color: "#8B92A5", fontSize: 14, marginBottom: 4 }}>
                        {reviewLog.sets}×{reviewLog.reps}{reviewLog.weight ? ` @ ${reviewLog.weight} lbs` : ""}
                      </div>
                      <div style={{ color: "#3A3D4A", fontSize: 12 }}>This entry was logged before per-set detail was tracked — only aggregate totals are available, so individual sets can't be edited.</div>
                    </div>
                  )}
                </div>
              ) : (
                <div style={{ color: "#3A3D4A", fontSize: 13 }}>No log found for this exercise today.</div>
              )}
            </>
          );
        })() : (
        <>

        {/* Header bar */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ background: color + "22", color, padding: "4px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700, letterSpacing: "0.06em" }}>{ex.muscleGroup.toUpperCase()}</span>
            {ex.laterality === "unilateral" && <span style={{ background: "#7B68EE22", color: "#7B68EE", padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 700 }}>UNILATERAL</span>}
            {ex.flag && <span style={{ background: "#E8A83822", color: "#E8A838", padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 700 }}>{ex.flag}</span>}
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => setActiveMode(false)} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 8, padding: "6px 14px", fontSize: 12, cursor: "pointer" }}>
              ← Back to Workout
            </button>
            <button onClick={() => endWorkout()} style={{ background: "#D94A4A22", color: "#D94A4A", border: "1px solid #D94A4A44", borderRadius: 8, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
              End Workout
            </button>
          </div>
        </div>

        {/* Stats row — elapsed time / exercises completed / session PF */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
          {[
            ["Elapsed Time", workoutStartedAt ? `${String(Math.floor(elapsedSeconds / 3600)).padStart(2,"0")}:${String(Math.floor((elapsedSeconds % 3600) / 60)).padStart(2,"0")}:${String(elapsedSeconds % 60).padStart(2,"0")}` : "00:00:00", "#E8EAF0"],
            ["Exercises Completed", `${active.filter(e => loggedIds.has(e.id) || todayLogs.some(l => Number(l.exerciseId) === Number(e.id))).length}/${active.length}`, "#4AD99A"],
            ["Session Strength Factor", sessionPF.toLocaleString(), "#E8A838"],
          ].map(([label, val, color]) => (
            <div key={label} style={{ background: "#1A1D26", borderRadius: 10, border: "1px solid #2A2D3A", padding: "10px 14px" }}>
              <div style={{ color: "#4B5563", fontSize: 9, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>{label}</div>
              <div style={{ color, fontSize: 18, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>{val}</div>
            </div>
          ))}
        </div>

        {/* Exercise name + last session */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontSize: 32, fontWeight: 800, color: "#E8EAF0", lineHeight: 1.1 }}>{ex.name}</div>
            {showFormGuide ? (
              <div style={{ background: "#0F1117", borderRadius: 8, padding: "10px 14px", fontSize: 13, color: "#C8CDD8", lineHeight: 1.7, marginTop: 8, cursor: "pointer", maxWidth: 500 }} onClick={() => setShowFormGuide(false)}>
                {FORM_GUIDES[ex.name]} <span style={{ color: "#4B5563", fontSize: 11 }}>(tap to hide)</span>
              </div>
            ) : (
              <button onClick={() => setShowFormGuide(true)} style={{ background: "none", border: "none", color: "#4B5563", fontSize: 12, cursor: "pointer", padding: "4px 0", textDecoration: "underline", marginTop: 4 }}>
                Show form guide
              </button>
            )}
          </div>
          {last && (
            <div style={{ background: "#0F1117", borderRadius: 10, padding: "10px 16px", border: "1px solid #2A2D3A", textAlign: "right", flexShrink: 0, marginLeft: 16 }}>
              <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4 }}>Last — {fmtDate(last.date)}</div>
              <div style={{ color: "#E8EAF0", fontSize: 15, fontWeight: 700 }}>{last.weight ? `${last.weight} lbs` : "BW"} · {last.sets}×{last.reps}</div>
              <div style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>SF {calcPF(last.sets, last.reps, last.weight, ex.type, ex.laterality).toLocaleString()}</div>
            </div>
          )}
        </div>

        {/* ── EXERCISE COMPLETE MOMENT ────────────────────────────────────── */}
        {exerciseDone && (
          <div style={{ background: "#4AD99A0D", border: "1px solid #4AD99A44", borderRadius: 16, padding: 28, textAlign: "center", flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16 }}>
            <div style={{ fontSize: 48 }}>✅</div>
            <div style={{ color: "#4AD99A", fontSize: 26, fontWeight: 800, letterSpacing: "0.02em" }}>EXERCISE COMPLETE</div>
            <div style={{ color: "#E8EAF0", fontSize: 20, fontWeight: 700, marginTop: -8 }}>{ex.name}</div>
            <div style={{ display: "flex", gap: 24, justifyContent: "center" }}>
              <div style={{ textAlign: "center" }}>
                <div style={{ color: "#E8A838", fontSize: 32, fontWeight: 800 }}>{exAccumPF.toLocaleString()}</div>
                <div style={{ color: "#4B5563", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em" }}>Strength Factor</div>
              </div>
              {lastExPF && (
                <div style={{ textAlign: "center" }}>
                  <div style={{ color: exAccumPF > lastExPF ? "#4AD99A" : exAccumPF < lastExPF ? "#D94A4A" : "#E8A838", fontSize: 32, fontWeight: 800 }}>
                    {exAccumPF > lastExPF ? "+" : ""}{(((exAccumPF - lastExPF) / lastExPF) * 100).toFixed(1)}%
                  </div>
                  <div style={{ color: "#4B5563", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em" }}>vs Last Session</div>
                </div>
              )}
              <div style={{ textAlign: "center" }}>
                <div style={{ color: "#E8EAF0", fontSize: 32, fontWeight: 800 }}>{exSets.length}</div>
                <div style={{ color: "#4B5563", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em" }}>Sets Completed</div>
              </div>
            </div>
            {/* True PR: highest Strength Factor ever achieved for this exercise, not just vs last session */}
            {bestEverPF !== null && exAccumPF > bestEverPF && (
              <div style={{ background: "#FFD70022", border: "1px solid #FFD70044", borderRadius: 8, padding: "8px 20px", color: "#FFD700", fontSize: 14, fontWeight: 700 }}>
                🏆 NEW PERSONAL RECORD
              </div>
            )}
            <div style={{ display: "flex", flexDirection: "column", gap: 6, width: "100%", maxWidth: 340, marginTop: 8 }}>
              <div style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4 }}>Sets Completed</div>
              {exSets.map(s => (
                <div key={s.setNum} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#0F1117", borderRadius: 6, padding: "6px 12px" }}>
                  <span style={{ color: "#8B92A5", fontSize: 12 }}>Set {s.setNum}</span>
                  <span style={{ color: "#E8EAF0", fontSize: 12, fontWeight: 600 }}>{s.reps} reps {s.weight > 0 ? `@ ${s.weight} lbs` : ""}</span>
                  {s.rir !== null && s.rir !== undefined && s.rir !== "" && <span style={{ background: "#4A90D922", color: "#4A90D9", fontSize: 10, padding: "1px 5px", borderRadius: 4, fontWeight: 700 }}>RIR {s.rir}</span>}
                  <span style={{ color: "#E8A838", fontSize: 12 }}>{s.pf.toLocaleString()} SF</span>
                </div>
              ))}
              {exSets.some(s => s.notes) && (
                <div style={{ marginTop: 4, textAlign: "left" }}>
                  {exSets.filter(s => s.notes).map(s => (
                    <div key={s.setNum} style={{ color: "#4B5563", fontSize: 11, marginTop: 2 }}>Set {s.setNum}: "{s.notes}"</div>
                  ))}
                </div>
              )}
            </div>
            <button onClick={advanceToNext}
              style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 14, height: 68, width: "100%", maxWidth: 380, fontSize: 20, fontWeight: 800, cursor: "pointer", letterSpacing: "0.04em", marginTop: 8 }}>
              NEXT EXERCISE →
            </button>
          </div>
        )}

        {/* ── REST TIMER STATE ─────────────────────────────────────────────── */}
        {!exerciseDone && resting && (
          <div style={{ background: "#0F1117", border: "1px solid #2A2D3A", borderRadius: 16, padding: 28, flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 20 }}>
            <div style={{ color: "#4B5563", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em" }}>RESTING</div>

            {/* Circular countdown */}
            <div style={{ position: "relative", width: 160, height: 160 }}>
              <svg width="160" height="160" style={{ transform: "rotate(-90deg)" }}>
                <circle cx="80" cy="80" r="70" fill="none" stroke="#2A2D3A" strokeWidth="8" />
                <circle cx="80" cy="80" r="70" fill="none" stroke="#4AD99A" strokeWidth="8"
                  strokeDasharray={`${2 * Math.PI * 70}`}
                  strokeDashoffset={`${2 * Math.PI * 70 * (1 - restSeconds / restTotal)}`}
                  strokeLinecap="round" style={{ transition: "stroke-dashoffset 1s linear" }} />
              </svg>
              <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                <div style={{ fontSize: 48, fontWeight: 800, color: "#4AD99A", fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>
                  {String(Math.floor(restSeconds / 60)).padStart(2, "0")}:{String(restSeconds % 60).padStart(2, "0")}
                </div>
