  const [dbError, setDbError]       = useState(false);
  const [session, setSession]       = useState(null);
  const [userId, setUserId]         = useState(null);

  // ── Session restore ────────────────────────────────────────────────────────
  useEffect(() => {
    const stored = localStorage.getItem("pp_session") || sessionStorage.getItem("pp_session");
    if (stored) {
      try {
        const { token, uid, refreshToken } = JSON.parse(stored);
        setSession(token); setUserId(uid);
      } catch { setLoading(false); }
    } else {
      setLoading(false);
    }
  }, []);

  // ── Auto-refresh session every 45 minutes ─────────────────────────────────
  useEffect(() => {
    if (!session) return;
    const refresh = async () => {
      try {
        const stored = localStorage.getItem("pp_session");
        if (!stored) return;
        const { token } = JSON.parse(stored);
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
          method: "POST",
          headers: { "apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ refresh_token: token }),
        });
        const data = await res.json();
        if (data.access_token) {
          const newData = JSON.stringify({ token: data.access_token, uid: userId });
          localStorage.setItem("pp_session", newData);
          sessionStorage.setItem("pp_session", newData);
          setSession(data.access_token);
        }
      } catch {}
    };
    const interval = setInterval(refresh, 45 * 60 * 1000);
    return () => clearInterval(interval);
  }, [session, userId]);

  // ── Load data when session ready ───────────────────────────────────────────
  useEffect(() => {
    if (session && userId) {
      const data = JSON.stringify({ token: session, uid: userId });
      localStorage.setItem("pp_session", data);
      sessionStorage.setItem("pp_session", data);
      loadAll(session, userId);
    }
  }, [session, userId]);

  const loadAll = useCallback(async (token, uid) => {
    setLoading(true); setDbError(false);
    try {
      const [wData, bData, ndData, rlData, pData] = await Promise.all([
        sbGet(`workout_logs?user_id=eq.${uid}&order=date.asc&limit=5000`, token),
        sbGet(`body_logs?user_id=eq.${uid}&order=date.asc&limit=500`, token),
        sbGet(`nutrition_days?user_id=eq.${uid}&order=date.desc&limit=100`, token),
        sbGet(`recovery_logs?user_id=eq.${uid}&order=date.desc&limit=100`, token),
        sbGet(`phase_data?user_id=eq.${uid}&order=created_at.desc&limit=1`, token),
      ]);

      const lsWorkout = lsGet(LS_KEYS.workout);
      const lsBody    = lsGet(LS_KEYS.body);

      const merged = (remote, local) => {
        if (!remote) return local;
        const remoteIds = new Set(remote.map(r => r.id).filter(Boolean));
        const pending = local.filter(l => !l.id || !remoteIds.has(l.id));
        return [...remote, ...pending];
      };

      const wLogs = merged(wData, lsWorkout).map(r => ({ id: r.id, exerciseId: r.exercise_id || r.exerciseId, sets: r.sets, reps: r.reps, weight: r.weight, notes: r.notes, date: r.date }));
      const bLogs = merged(bData, lsBody).map(r => ({ id: r.id, weight: r.weight, chest: r.chest, waist: r.waist, hips: r.hips, glutes: r.glutes, thighs: r.thighs, arms: r.arms, date: r.date }));

      // Load nutrition entries for each day
      let nDays = ndData || [];
      if (nDays.length > 0) {
        const dayIds = nDays.map(d => d.id).join(",");
        const entries = await sbGet(`nutrition_entries?nutrition_day_id=in.(${dayIds})&order=created_at.asc`, token);
        nDays = nDays.map(d => ({
          ...d,
          entries: (entries || []).filter(e => e.nutrition_day_id === d.id)
        }));
      }

      setWorkoutLogs(wLogs);
      setBodyLogs(bLogs);
      setNutritionDays(nDays);
      setRecoveryLogs(rlData || []);
      lsSet(LS_KEYS.workout, wLogs);
      lsSet(LS_KEYS.body, bLogs);

      if (pData?.[0]) {
        setPhase({ id: pData[0].id, type: pData[0].type, startDate: pData[0].start_date, endDate: pData[0].end_date, history: pData[0].history || [] });
      }
    } catch (e) { setDbError(true); }
    setLoading(false);
  }, []);

  const signOut = () => {
    localStorage.removeItem("pp_session"); sessionStorage.removeItem("pp_session");
    setSession(null); setUserId(null);
    setWorkoutLogs([]); setBodyLogs([]); setNutritionDays([]); setRecoveryLogs([]); setPhase(null);
  };

  // ── Workout handlers ───────────────────────────────────────────────────────
  const addWorkoutLog = async (exerciseId, entry) => {
    const localEntry = { exerciseId, ...entry, _pending: true };
    const updated = [...workoutLogs, localEntry];
    setWorkoutLogs(updated);
    lsSet(LS_KEYS.workout, updated);

    const rows = await sbPost("workout_logs", { exercise_id: exerciseId, sets: entry.sets, reps: entry.reps, weight: entry.weight, notes: entry.notes, date: entry.date, user_id: userId }, session);
    if (rows?.[0]) {
      const synced = updated.map(l => l === localEntry ? { ...entry, id: rows[0].id, exerciseId } : l);
      setWorkoutLogs(synced); lsSet(LS_KEYS.workout, synced);
      return true;
    }
    return false;
  };

  // ── Body handlers ──────────────────────────────────────────────────────────
  const addBodyLog = async (entry) => {
    const localEntry = { ...entry, _pending: true };
    const updated = [...bodyLogs, localEntry];
    setBodyLogs(updated); lsSet(LS_KEYS.body, updated);
    const rows = await sbPost("body_logs", { ...entry, user_id: userId }, session);
    if (rows?.[0]) {
      const synced = updated.map(l => l === localEntry ? { ...entry, id: rows[0].id } : l);
      setBodyLogs(synced); lsSet(LS_KEYS.body, synced);
      return true;
    }
    return false;
  };

  // ── Nutrition handlers ─────────────────────────────────────────────────────
  const saveNutritionDay = async (parsed, rawText) => {
    try {
      const dayPayload = {
        user_id: userId,
        date: parsed.date,
        phase: parsed.phase || "Gain Phase",
        target_calories: Number(parsed.targets?.calories) || 2650,
        target_protein: Number(parsed.targets?.protein) || 191,
        target_carbs: Number(parsed.targets?.carbs) || 220,
        target_fat: Number(parsed.targets?.fat) || 65,
        total_calories: Number(parsed.totals?.calories) || 0,
        total_protein: Number(parsed.totals?.protein) || 0,
        total_carbs: Number(parsed.totals?.carbs) || 0,
        total_fat: Number(parsed.totals?.fat) || 0,
        remaining_calories: Number(parsed.remaining?.calories) || 0,
        remaining_protein: Number(parsed.remaining?.protein) || 0,
        remaining_carbs: Number(parsed.remaining?.carbs) || 0,
        remaining_fat: Number(parsed.remaining?.fat) || 0,
        compliance: typeof parsed.compliance === "string" ? parsed.compliance.slice(0, 200) : null,
        notes: Array.isArray(parsed.notes) ? parsed.notes.join(" ").slice(0, 1000) : (typeof parsed.notes === "string" ? parsed.notes.slice(0, 1000) : null),
        raw_import: rawText ? rawText.slice(0, 4000) : null,
      };

      // Delete existing same-date record first
      const existing = nutritionDays.find(d => d.date === parsed.date);
      if (existing?.id) await sbDelete(`nutrition_days?id=eq.${existing.id}`, session);

      const rows = await sbPost("nutrition_days", dayPayload, session);
      if (!rows?.[0]?.id) {
        const errMsg = rows?._error ? rows.message : JSON.stringify(rows);
        console.error("nutrition_days insert failed:", errMsg);
        return { ok: false, error: `DB error: ${errMsg}` };
      }
      const dayId = rows[0].id;

      // Insert meal entries
      const entries = parsed.entries || [];
      const entryRows = [];
      for (const e of entries) {
        const eRow = await sbPost("nutrition_entries", {
          user_id: userId,
          nutrition_day_id: dayId,
          entry_time: e.time ? String(e.time).slice(0, 20) : null,
          entry_type: e.type || "food",
          meal_name: e.name ? String(e.name).slice(0, 100) : null,
          items: e.items ? String(e.items).slice(0, 500) : null,
          calories: Number(e.calories) || 0,
          protein: Number(e.protein) || 0,
          carbs: Number(e.carbs) || 0,
          fat: Number(e.fat) || 0,
        }, session);
        if (eRow?.[0]) entryRows.push(eRow[0]);
      }

      const newDay = { ...rows[0], entries: entryRows };
      setNutritionDays(prev => [newDay, ...prev.filter(d => d.date !== parsed.date)]);
      return { ok: true };
    } catch (e) {
      console.error("saveNutritionDay error:", e);
      return { ok: false, error: e.message };
    }
  };

  // ── Recovery handlers ──────────────────────────────────────────────────────
  const saveRecoveryLog = async (entry) => {
    try {
      const existing = recoveryLogs.find(r => r.date === entry.date);
      if (existing?.id) await sbDelete(`recovery_logs?id=eq.${existing.id}`, session);
      const rows = await sbPost("recovery_logs", { ...entry, user_id: userId }, session);
      if (!rows?.[0]) return false;
      setRecoveryLogs(prev => [rows[0], ...prev.filter(r => r.date !== entry.date)]);
      return true;
    } catch { return false; }
  };

  // ── Workout summary handler ────────────────────────────────────────────────
  const saveWorkoutSummary = async (summary) => {
    try {
      await sbPost("workout_summaries", {
        user_id: userId, date: new Date().toISOString().split("T")[0],
        exercises_completed: summary.completed, exercises_total: summary.total,
        session_pf: summary.sessionPF, previous_session_pf: summary.prevPF,
        pf_change_pct: summary.pfChange, personal_records: summary.prs,
      }, session);
    } catch {}
  };

  // ── Phase handlers ─────────────────────────────────────────────────────────
  const savePhase = async (newPhase) => {
    if (newPhase?.id) {
      await sbPatch(`phase_data?id=eq.${newPhase.id}`, { type: newPhase.type, start_date: newPhase.startDate, end_date: newPhase.endDate, history: newPhase.history }, session);
    } else {
      const rows = await sbPost("phase_data", { type: newPhase.type, start_date: newPhase.startDate, end_date: newPhase.endDate, history: newPhase.history || [], user_id: userId }, session);
      if (rows?.[0]) newPhase = { ...newPhase, id: rows[0].id };
    }
    setPhase(newPhase);
  };

  // ── Derived state ──────────────────────────────────────────────────────────
  const totalExercises = workoutLogs.length;
  const phaseCfg  = phase ? PHASE_CONFIG[phase.type] : null;
  const phaseInfo = phase && phaseCfg ? (() => {
    const start = new Date(phase.startDate), end = new Date(phase.endDate), now = new Date();
    const totalDays = Math.round((end - start) / 86400000);
    const elapsed   = Math.max(0, Math.round((now - start) / 86400000));
    const remaining = Math.max(0, totalDays - elapsed);
    const week = Math.floor(elapsed / 7) + 1;
    return { remaining, week, totalWeeks: phaseCfg.weeks };
  })() : null;

  // ── Screens ────────────────────────────────────────────────────────────────
  if (!session) return <LoginScreen onLogin={(token, uid, refreshToken) => {
    const data = JSON.stringify({ token, uid, refreshToken });
    localStorage.setItem("pp_session", data);
    sessionStorage.setItem("pp_session", data);
    setSession(token); setUserId(uid);
  }} />;

  if (loading) return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
      <div style={{ fontSize: 11, color: "#4A90D9", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em" }}>DURHAM CAPITAL</div>
      <div style={{ fontSize: 32, fontWeight: 800, color: "#E8EAF0" }}>PROJECT PRIME</div>
      <div style={{ color: "#8B92A5", fontSize: 14 }}>Loading your data...</div>
    </div>
  );

  if (dbError) return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16, padding: 32 }}>
      <div style={{ fontSize: 32, fontWeight: 800, color: "#E8EAF0" }}>PROJECT PRIME</div>
      <div style={{ color: "#D94A4A", fontSize: 15, textAlign: "center" }}>Could not connect. Your locally saved data is safe — check your connection and retry.</div>
      <button onClick={() => loadAll(session, userId)} style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 8, padding: "10px 24px", fontSize: 14, cursor: "pointer" }}>Retry</button>
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100dvh", minHeight: "-webkit-fill-available", background: "#0F1117", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", color: "#E8EAF0" }}>

      {/* Phase modal */}
      {showPhaseModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 400, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#1A1D26", borderRadius: 16, padding: 8, maxWidth: 700, width: "100%", maxHeight: "90vh", overflowY: "auto", boxShadow: "0 24px 80px rgba(0,0,0,0.6)" }}>
            <div style={{ display: "flex", justifyContent: "flex-end", padding: "8px 8px 0" }}>
              <button onClick={() => setShowPhaseModal(false)} style={{ background: "#2A2D3A", border: "none", color: "#8B92A5", fontSize: 18, cursor: "pointer", width: 36, height: 36, borderRadius: 8 }}>×</button>
            </div>
            <div style={{ padding: "0 16px 16px" }}>
              <PhaseTracker phase={phase} setPhase={savePhase} />
            </div>
          </div>
        </div>
      )}

      {/* Top header */}
      <div style={{ background: "#1A1D26", borderBottom: "1px solid #2A2D3A", padding: "10px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
          <div style={{ fontSize: 10, color: "#4A90D9", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em" }}>DURHAM CAPITAL</div>
          <div style={{ fontSize: 18, fontWeight: 800, letterSpacing: "-0.5px", color: "#E8EAF0" }}>PROJECT PRIME</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {/* Phase toggle */}
          <button onClick={() => setShowPhaseModal(true)}
            style={{ background: phaseCfg ? phaseCfg.bg : "#2A2D3A", border: `1px solid ${phaseCfg ? phaseCfg.color + "44" : "#2A2D3A"}`, borderRadius: 8, padding: "5px 12px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 14 }}>{phaseCfg ? phaseCfg.icon : "🗓️"}</span>
            {phase && phaseCfg && phaseInfo ? (
              <span style={{ color: phaseCfg.color, fontSize: 12, fontWeight: 700 }}>{phaseCfg.label} · {phaseInfo.remaining}d · Wk {Math.min(phaseInfo.week, phaseInfo.totalWeeks)}</span>
            ) : (
              <span style={{ color: "#8B92A5", fontSize: 12 }}>Set Phase</span>
            )}
          </button>
          <div style={{ background: "#0F1117", borderRadius: 6, padding: "4px 10px", fontSize: 12, color: "#4A90D9", fontWeight: 600 }}>
            {totalExercises} logged
          </div>
          <button onClick={signOut} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 12, cursor: "pointer" }}>
            Sign Out
          </button>
        </div>
      </div>

      {/* Main content */}
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px", minHeight: 0, WebkitOverflowScrolling: "touch" }}>
        {tab === "workout"   && <WorkoutTab exercises={exercises} workoutLogs={workoutLogs} onLogExercise={addWorkoutLog} onSaveSummary={saveWorkoutSummary} />}
        {tab === "progress"  && <ProgressTab exercises={exercises} workoutLogs={workoutLogs} />}
        {tab === "body"      && <BodyTab bodyLogs={bodyLogs} onSave={addBodyLog} />}
        {tab === "nutrition" && <NutritionTab nutritionDays={nutritionDays} onSaveDay={saveNutritionDay} session={session} userId={userId} />}
        {tab === "recovery"  && <RecoveryTab recoveryLogs={recoveryLogs} onSave={saveRecoveryLog} />}
      </div>

      {/* Bottom tab bar */}
      <div style={{ background: "#1A1D26", borderTop: "1px solid #2A2D3A", display: "flex", flexShrink: 0, paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
        {NAV.map(n => (
          <button key={n.id} onClick={() => setTab(n.id)}
            style={{ flex: 1, background: tab === n.id ? "#4A90D911" : "none", border: "none", padding: "10px 4px 12px", cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 2, minWidth: 0 }}>
            <span style={{ fontSize: 24 }}>{n.icon}</span>
            <span style={{ fontSize: 10, color: tab === n.id ? "#4A90D9" : "#4B5563", fontWeight: tab === n.id ? 700 : 400, whiteSpace: "nowrap" }}>{n.label}</span>
            {tab === n.id && <div style={{ width: 20, height: 2, background: "#4A90D9", borderRadius: 1, marginTop: 1 }} />}
          </button>
        ))}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
