// ─── PRIME FACTOR ─────────────────────────────────────────────────────────────
function calcPF(sets, reps, weight, type, laterality) {
  const mult = laterality === "unilateral" ? 2 : 1;
  if (type === "bodyweight") return sets * reps * 10 * mult;
  if (type === "banded")     return sets * reps * mult;
  return sets * reps * (weight || 0) * mult;
}

  }[status];
  return <span style={{ color: cfg.color, fontSize: 12, fontWeight: 600 }}>{cfg.text}</span>;
}

function Sparkline({ data, width = 120, height = 40 }) {
  if (!data || data.length === 0) return <span style={{ color: "#3A3D4A", fontSize: 11 }}>No history</span>;
  if (data.length === 1) {
    return (
      <svg width={width} height={height}>
        <circle cx={width/2} cy={height/2} r={4} fill="#4A90D9" />
      </svg>
    );
  }
  const vals = data.map(d => d.value);
  const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 6) - 3;
    return `${x},${y}`;
  });
  const trend = vals[vals.length - 1] >= vals[0];
  const lc = trend ? "#4AD99A" : "#D94A4A";
  return (
    <svg width={width} height={height}>
      <polyline points={pts.join(" ")} fill="none" stroke={lc} strokeWidth={2} strokeLinejoin="round" />
      <circle cx={pts[pts.length-1].split(",")[0]} cy={pts[pts.length-1].split(",")[1]} r={3.5} fill={lc} />
    </svg>
  );
}

function MacroRing({ pct, color, label, val, target, unit }) {
  const r = 36, circ = 2 * Math.PI * r;
  const dash = Math.min(pct / 100, 1) * circ;
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
      <svg width={90} height={90} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={45} cy={45} r={r} fill="none" stroke="#1A1D26" strokeWidth={8} />
        <circle cx={45} cy={45} r={r} fill="none" stroke={color} strokeWidth={8}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" />
      </svg>
      <div style={{ textAlign: "center", marginTop: -8 }}>
        <div style={{ color: "#E8EAF0", fontSize: 18, fontWeight: 700, lineHeight: 1 }}>{val}</div>
        <div style={{ color: "#8B92A5", fontSize: 10 }}>{unit} / {target}</div>
        <div style={{ color, fontSize: 11, fontWeight: 600, marginTop: 2 }}>{label}</div>
      </div>
    </div>
  );
}

// ─── WORKOUT TAB ──────────────────────────────────────────────────────────────
function WorkoutTab({ exercises, workoutLogs, onLogExercise, onSaveSummary }) {
  const active = exercises.filter(e => e.active);
  const [activeMode, setActiveMode] = useState(false);
  const [workoutEnded, setWorkoutEnded] = useState(() => {
    try {
      const stored = localStorage.getItem("pp_workout_ended");
      if (!stored) return false;
      const { date, ended } = JSON.parse(stored);
      return date === new Date().toDateString() && ended;
    } catch { return false; }
  });
  const [workoutSummary, setWorkoutSummary] = useState(null);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [logSets, setLogSets] = useState("3");
  const [logReps, setLogReps] = useState("10");
  const [logWeight, setLogWeight] = useState("0");
  const [logNotes, setLogNotes] = useState("");
  const [saveStatus, setSaveStatus] = useState(null);
  const [showFormGuide, setShowFormGuide] = useState(false);
  const [loggedIds, setLoggedIds] = useState(new Set());

  const todayLogs = workoutLogs.filter(x => new Date(x.date).toDateString() === new Date().toDateString());

  const lastEntry = (id) => {
    const logs = workoutLogs.filter(x => Number(x.exerciseId) === Number(id));
    return logs.length ? logs[logs.length - 1] : null;
  };

  const pfHistory = (id) => {
    const ex = exercises.find(e => Number(e.id) === Number(id));
    return workoutLogs.filter(x => Number(x.exerciseId) === Number(id)).map(x => ({
      value: calcPF(x.sets, x.reps, x.weight, ex?.type, ex?.laterality), date: x.date
    }));
  };

  const sessionPF = todayLogs.reduce((sum, l) => {
    const ex = exercises.find(e => e.id === l.exerciseId);
    return sum + calcPF(l.sets, l.reps, l.weight, ex?.type, ex?.laterality);
  }, 0);

  const loadExercise = (idx) => {
    const ex = active[idx];
    if (!ex) return;
    const last = lastEntry(ex.id);
    setCurrentIdx(idx);
    setLogSets(last?.sets?.toString() || ex.defaultSets || "3");
    setLogReps(last?.reps?.toString() || ex.defaultReps || "10");
    setLogWeight(last?.weight?.toString() || "0");
    setLogNotes("");
    setShowFormGuide(false);
    setSaveStatus(null);
  };

  const startWorkout = () => {
    setLoggedIds(new Set(todayLogs.map(l => l.exerciseId)));
    setWorkoutEnded(false);
    setWorkoutSummary(null);
    localStorage.removeItem("pp_workout_ended");
    loadExercise(0);
    setActiveMode(true);
  };

  const endWorkout = () => {
    // Compute session PF directly from today's logs
    const currentSessionPF = todayLogs.reduce((sum, l) => {
      const ex = exercises.find(e => e.id === l.exerciseId);
      return sum + calcPF(l.sets, l.reps, l.weight, ex?.type, ex?.laterality);
    }, 0);
    // Exercises completed today
    const todayCompleted = active.filter(e => loggedIds.has(e.id) || todayLogs.some(l => l.exerciseId === e.id));
    // Previous session PF
    const prevDayLogs = workoutLogs.filter(x => new Date(x.date).toDateString() !== new Date().toDateString());
    const prevDates = [...new Set(prevDayLogs.map(l => new Date(l.date).toDateString()))].sort((a, b) => new Date(b) - new Date(a));
    const prevSessionLogs = prevDates.length ? prevDayLogs.filter(l => new Date(l.date).toDateString() === prevDates[0]) : [];
    const prevPF = prevSessionLogs.reduce((sum, l) => {
      const ex = exercises.find(e => e.id === l.exerciseId);
      return sum + calcPF(l.sets, l.reps, l.weight, ex?.type, ex?.laterality);
    }, 0);
    const pfChange = prevPF > 0 ? ((currentSessionPF - prevPF) / prevPF * 100) : null;
    // Count PRs
    let prs = 0;
    todayLogs.forEach(l => {
      const ex = exercises.find(e => e.id === l.exerciseId);
      if (!ex) return;
      const thisPF = calcPF(l.sets, l.reps, l.weight, ex.type, ex.laterality);
      const hist = workoutLogs.filter(x => x.exerciseId === l.exerciseId && new Date(x.date).toDateString() !== new Date().toDateString());
      const bestPrev = hist.reduce((best, x) => Math.max(best, calcPF(x.sets, x.reps, x.weight, ex.type, ex.laterality)), 0);
      if (thisPF > bestPrev && bestPrev > 0) prs++;
    });
    const summary = { completed: todayCompleted.length, total: active.length, sessionPF: currentSessionPF, prevPF, pfChange, prs };
    setWorkoutSummary(summary);
    setActiveMode(false);
    setWorkoutEnded(true);
    localStorage.setItem("pp_workout_ended", JSON.stringify({ date: new Date().toDateString(), ended: true }));
    setLoggedIds(new Set());
    onSaveSummary && onSaveSummary(summary);
  };

  const saveExercise = async () => {
    const ex = active[currentIdx];
    setSaveStatus("saving");
    const entry = { sets: +logSets, reps: +logReps, weight: +logWeight, notes: logNotes, date: new Date().toISOString() };
    const ok = await onLogExercise(ex.id, entry);
    if (ok) {
      setSaveStatus("saved");
      setLoggedIds(prev => new Set([...prev, ex.id]));
      setTimeout(() => {
        setSaveStatus(null);
        if (currentIdx < active.length - 1) {
          loadExercise(currentIdx + 1);
        }
      }, 800);
    } else {
      // Save failed — data is still in localStorage, don't advance
      setSaveStatus("error");
      setTimeout(() => setSaveStatus(null), 4000);
    }
  };

  const previewPF = active[currentIdx]
    ? calcPF(+logSets, +logReps, +logWeight, active[currentIdx].type, active[currentIdx].laterality)
    : 0;

  const lastPF = active[currentIdx] ? (() => {
    const hist = pfHistory(active[currentIdx].id);
    return hist.length ? hist[hist.length - 1].value : null;
  })() : null;

  const pfDiff = previewPF && lastPF ? ((previewPF - lastPF) / lastPF * 100) : null;

  // ── WORKOUT SUMMARY MODAL ────────────────────────────────────────────────────
  const WorkoutSummaryModal = () => {
    if (!workoutSummary) return null;
    const { completed, total, sessionPF: summaryPF, prevPF, pfChange, prs } = workoutSummary;
    return (
      <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 500, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ background: "#1A1D26", borderRadius: 20, border: "1px solid #4AD99A44", padding: 48, maxWidth: 520, width: "100%", textAlign: "center", boxShadow: "0 32px 80px rgba(0,0,0,0.8)" }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🏆</div>
          <div style={{ fontSize: 30, fontWeight: 800, color: "#4AD99A", marginBottom: 4 }}>WORKOUT COMPLETE</div>
          <div style={{ color: "#4B5563", fontSize: 14, marginBottom: 36 }}>{fmtDateLong(new Date())}</div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 32 }}>
            <div style={{ background: "#0F1117", borderRadius: 12, padding: "20px 16px" }}>
              <div style={{ color: "#4B5563", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Exercises</div>
              <div style={{ fontSize: 36, fontWeight: 800, color: "#E8EAF0" }}>{completed}<span style={{ fontSize: 18, color: "#4B5563" }}>/{total}</span></div>
            </div>
            <div style={{ background: "#0F1117", borderRadius: 12, padding: "20px 16px" }}>
              <div style={{ color: "#4B5563", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Session PF</div>
              <div style={{ fontSize: 36, fontWeight: 800, color: "#E8A838" }}>{(summaryPF || 0).toLocaleString()}</div>
            </div>
            <div style={{ background: "#0F1117", borderRadius: 12, padding: "20px 16px" }}>
              <div style={{ color: "#4B5563", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>vs Last Workout</div>
              {pfChange !== null ? (
                <div style={{ fontSize: 36, fontWeight: 800, color: pfChange >= 0 ? "#4AD99A" : "#D94A4A" }}>
                  {pfChange >= 0 ? "+" : ""}{pfChange.toFixed(1)}%
                </div>
              ) : (
                <div style={{ fontSize: 20, fontWeight: 700, color: "#4B5563" }}>First session</div>
              )}
            </div>
            <div style={{ background: "#0F1117", borderRadius: 12, padding: "20px 16px" }}>
              <div style={{ color: "#4B5563", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>New PRs</div>
              <div style={{ fontSize: 36, fontWeight: 800, color: prs > 0 ? "#FFD700" : "#4B5563" }}>{prs}</div>
            </div>
          </div>

          <div style={{ display: "flex", gap: 12 }}>
            <button onClick={() => setWorkoutSummary(null)}
              style={{ flex: 1, background: "#4AD99A", color: "#0F1117", border: "none", borderRadius: 12, height: 56, fontSize: 18, fontWeight: 800, cursor: "pointer" }}>
              Done
            </button>
            <button onClick={() => { setWorkoutSummary(null); setWorkoutEnded(false); startWorkout(); }}
              style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 12, height: 56, padding: "0 20px", fontSize: 14, cursor: "pointer" }}>
              Continue
            </button>
          </div>
        </div>
      </div>
    );
  };

  // ── LIST VIEW ────────────────────────────────────────────────────────────────
  if (!activeMode) {
    const GROUP_ORDER = ["Warm-up", "Chest", "Back", "Glutes", "Hamstrings", "Legs", "Shoulders", "Arms", "Core"];
    const byGroup = {};
    GROUP_ORDER.forEach(g => { byGroup[g] = []; });
    active.forEach(e => { (byGroup[e.muscleGroup] = byGroup[e.muscleGroup] || []).push(e); });

    return (
      <div>
        <WorkoutSummaryModal />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <div>
            <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Today's Workout</h2>
            <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>{fmtDateLong(new Date())} · {todayLogs.length} exercises logged today</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            {todayLogs.length > 0 && <div style={{ color: "#E8A838", fontSize: 14, fontWeight: 700 }}>Session PF {sessionPF.toLocaleString()}</div>}
            <button onClick={startWorkout}
              style={{ background: "#4AD99A", color: "#0F1117", border: "none", borderRadius: 10, padding: "12px 28px", fontSize: 16, fontWeight: 800, cursor: "pointer" }}>
              {todayLogs.length > 0 && !workoutEnded ? "Resume Workout" : workoutEnded ? "New Workout" : "Start Workout"}
            </button>
          </div>
        </div>

        {GROUP_ORDER.filter(g => byGroup[g]?.length > 0).map(group => (
          <div key={group} style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <div style={{ width: 3, height: 16, background: MUSCLE_COLORS[group] || "#4B5563", borderRadius: 2 }} />
              <span style={{ color: MUSCLE_COLORS[group] || "#4B5563", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>{group}</span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {byGroup[group].map(ex => {
                const last = lastEntry(ex.id);
                const logged = todayLogs.some(l => l.exerciseId === ex.id);
                return (
                  <div key={ex.id} style={{ background: "#1A1D26", borderRadius: 10, border: `1px solid ${logged ? "#4AD99A44" : "#2A2D3A"}`, padding: "12px 16px", display: "flex", alignItems: "center", gap: 16 }}>
                    <div style={{ width: 28, height: 28, borderRadius: "50%", background: logged ? "#4AD99A" : "#2A2D3A", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 14 }}>
                      {logged ? "✓" : ""}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                        <span style={{ fontWeight: 700, color: "#E8EAF0", fontSize: 14 }}>{ex.name}</span>
                        {ex.superset && <span style={{ background: "#E8A83822", color: "#E8A838", padding: "1px 6px", borderRadius: 4, fontSize: 10, fontWeight: 700 }}>⚡ SS</span>}
                        {ex.laterality === "unilateral" && <span style={{ background: "#7B68EE22", color: "#7B68EE", padding: "1px 6px", borderRadius: 4, fontSize: 10, fontWeight: 700 }}>UNI</span>}
                      </div>
                      {last ? (
                        <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>Last: {last.sets}×{last.reps}{last.weight ? ` @ ${last.weight} lbs` : ""} — PF {calcPF(last.sets, last.reps, last.weight, ex.type, ex.laterality).toLocaleString()}</div>
                      ) : (
                        <div style={{ color: "#3A3D4A", fontSize: 12, marginTop: 2 }}>No previous sessions</div>
                      )}
                    </div>
                    <div style={{ color: "#4B5563", fontSize: 11 }}>{ex.defaultSets}×{ex.defaultReps}</div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}

        <div style={{ background: "#1A1D26", borderRadius: 10, border: "1px solid #4AD9D933", padding: "14px 18px", marginTop: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ color: "#4AD9D9", fontWeight: 700, fontSize: 13 }}>Alfredson Eccentric Calf Protocol <span style={{ background: "#4AD9D922", padding: "1px 6px", borderRadius: 4, fontSize: 10 }}>DAILY</span></div>
            <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 3 }}>3×15 each leg · Straight + Bent knee · Twice per day</div>
            <div style={{ color: "#E8A838", fontSize: 11, marginTop: 2 }}>⚠️ Pain is expected and acceptable — push through.</div>
          </div>
          <div style={{ color: "#4AD9D9", fontSize: 24, fontWeight: 800 }}>2×/day</div>
        </div>
      </div>
    );
  }

  // ── ACTIVE WORKOUT MODE ──────────────────────────────────────────────────────
  const ex = active[currentIdx];
  if (!ex) return null;
  const last = lastEntry(ex.id);
  const color = MUSCLE_COLORS[ex.muscleGroup] || "#4B5563";

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 16, height: "calc(100vh - 130px)" }}>
      <WorkoutSummaryModal />
      <div style={{ background: "#1A1D26", borderRadius: 14, border: "1px solid #2A2D3A", padding: 24, display: "flex", flexDirection: "column", gap: 16, overflow: "hidden" }}>

        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
              <span style={{ background: color + "22", color, padding: "4px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700, letterSpacing: "0.06em" }}>{ex.muscleGroup.toUpperCase()}</span>
              {ex.superset && <span style={{ background: "#E8A83822", color: "#E8A838", padding: "4px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>⚡ SUPERSET w/ {ex.superset}</span>}
              {ex.laterality === "unilateral" && <span style={{ background: "#7B68EE22", color: "#7B68EE", padding: "4px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>UNILATERAL — enter reps per side</span>}
              {ex.flag && <span style={{ background: "#E8A83822", color: "#E8A838", padding: "4px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>{ex.flag}</span>}
            </div>
            <div style={{ fontSize: 34, fontWeight: 800, color: "#E8EAF0", lineHeight: 1.1, marginBottom: 8 }}>{ex.name}</div>
            {showFormGuide ? (
              <div style={{ background: "#0F1117", borderRadius: 8, padding: "12px 14px", fontSize: 13, color: "#C8CDD8", lineHeight: 1.7, cursor: "pointer" }} onClick={() => setShowFormGuide(false)}>
                {FORM_GUIDES[ex.name]} <span style={{ color: "#4B5563", fontSize: 11 }}>(tap to hide)</span>
              </div>
            ) : (
              <button onClick={() => setShowFormGuide(true)} style={{ background: "none", border: "none", color: "#4B5563", fontSize: 12, cursor: "pointer", padding: 0, textDecoration: "underline" }}>
                Show form guide
              </button>
            )}
          </div>
          <button onClick={() => setActiveMode(false)}
            style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 11, cursor: "pointer", flexShrink: 0, marginLeft: 16 }}>
            ← Back to list
          </button>
        </div>

        {/* Last performance */}
        <div style={{ background: "#0F1117", borderRadius: 10, padding: "14px 18px", border: "1px solid #2A2D3A" }}>
          <div style={{ fontSize: 11, color: "#4B5563", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>
            {last ? `Last Session — ${fmtDate(last.date)}` : "No previous sessions"}
          </div>
          {last ? (
            <div style={{ display: "flex", gap: 28, alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 26, fontWeight: 800, color: "#E8EAF0" }}>{last.weight ? `${last.weight} lbs` : "BW"}</div>
                <div style={{ fontSize: 11, color: "#4B5563" }}>weight</div>
              </div>
              <div>
                <div style={{ fontSize: 26, fontWeight: 800, color: "#E8EAF0" }}>{last.sets} × {last.reps}</div>
                <div style={{ fontSize: 11, color: "#4B5563" }}>sets × reps</div>
              </div>
              <div style={{ marginLeft: "auto", textAlign: "right" }}>
                <div style={{ fontSize: 26, fontWeight: 800, color: "#E8A838" }}>{calcPF(last.sets, last.reps, last.weight, ex.type, ex.laterality).toLocaleString()}</div>
                <div style={{ fontSize: 11, color: "#4B5563" }}>prime factor</div>
              </div>
            </div>
          ) : (
            <div style={{ color: "#3A3D4A", fontSize: 13 }}>First session — set your baseline</div>
          )}
        </div>

        {/* +/- controls */}
        <div style={{ display: "grid", gridTemplateColumns: ex.type === "weighted" ? "1fr 1fr 1fr" : "1fr 1fr", gap: 14 }}>
          {[
            ["SETS", logSets, setLogSets, 1, 10, 1],
            [ex.laterality === "unilateral" ? "REPS / SIDE" : "REPS", logReps, setLogReps, 1, 50, 1],
            ...(ex.type === "weighted" ? [["WEIGHT (lbs)", logWeight, setLogWeight, 0, 300, 5]] : []),
          ].map(([label, val, setter, min, max, step]) => (
            <div key={label} style={{ background: "#0F1117", borderRadius: 10, padding: "14px", border: "1px solid #2A2D3A", textAlign: "center" }}>
              <div style={{ fontSize: 11, color: "#4B5563", fontWeight: 700, letterSpacing: "0.08em", marginBottom: 12 }}>{label}</div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12 }}>
                <button onClick={() => setter(v => String(Math.max(min, +v - step)))}
                  style={{ width: 56, height: 56, background: "#2A2D3A", border: "none", borderRadius: 10, fontSize: 26, color: "#E8EAF0", cursor: "pointer", flexShrink: 0 }}>−</button>
                <div style={{ fontSize: 36, fontWeight: 800, color: "#E8EAF0", minWidth: 60, fontVariantNumeric: "tabular-nums" }}>{val}</div>
                <button onClick={() => setter(v => String(Math.min(max, +v + step)))}
                  style={{ width: 56, height: 56, background: "#2A2D3A", border: "none", borderRadius: 10, fontSize: 26, color: "#E8EAF0", cursor: "pointer", flexShrink: 0 }}>+</button>
              </div>
            </div>
          ))}
        </div>

        {/* PF preview with PR/progress indicator */}
        <div style={{ background: "#0F1117", borderRadius: 10, padding: "12px 18px", border: `1px solid ${
          previewPF > 0 && lastPF && previewPF > lastPF * 1.05 ? "#FFD70044" :
          pfDiff !== null && pfDiff >= 0 ? "#4AD99A44" : "#2A2D3A"}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ color: "#8B92A5", fontSize: 14 }}>Prime Factor</div>
          <div style={{ fontSize: 32, fontWeight: 800, color: "#E8A838", fontVariantNumeric: "tabular-nums" }}>{previewPF.toLocaleString()}</div>
          {pfDiff !== null && (
            <div style={{ textAlign: "right" }}>
              {previewPF > 0 && lastPF && previewPF > lastPF * 1.05 ? (
                <div style={{ color: "#FFD700", fontSize: 18, fontWeight: 800 }}>🥇 NEW PR</div>
              ) : (
                <div style={{ color: pfDiff > 2 ? "#4AD99A" : pfDiff >= -2 ? "#E8A838" : "#D94A4A", fontSize: 14, fontWeight: 700 }}>
                  {pfDiff > 2 ? "▲" : pfDiff >= -2 ? "▬" : "▼"} {pfDiff >= 0 ? "+" : ""}{pfDiff.toFixed(1)}%
                </div>
              )}
              <div style={{ color: "#4B5563", fontSize: 11 }}>vs last session</div>
            </div>
          )}
        </div>

        {/* Notes */}
        <input value={logNotes} onChange={e => setLogNotes(e.target.value)}
          placeholder="Notes (optional)"
          style={{ ...inputStyle, fontSize: 13 }} />

        {/* Save button */}
        <button onClick={saveExercise} disabled={saveStatus === "saving"}
          style={{ background: saveStatus === "saved" ? "#2A2D3A" : "#4AD99A", color: saveStatus === "saved" ? "#4AD99A" : "#0F1117",
            border: saveStatus === "saved" ? "2px solid #4AD99A" : "none",
            borderRadius: 12, height: 64, width: "100%", fontSize: 20, fontWeight: 800, cursor: "pointer", letterSpacing: "0.04em", transition: "all 0.2s" }}>
          {saveStatus === "saving" ? "Saving..." : saveStatus === "saved" ? "✓ Saved — advancing..." : saveStatus === "error" ? "⚠ Sync failed — data saved locally" : "SAVE EXERCISE"}
        </button>

        {/* Prev/Next */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <button onClick={() => currentIdx > 0 && loadExercise(currentIdx - 1)} disabled={currentIdx === 0}
            style={{ background: "#2A2D3A", color: currentIdx === 0 ? "#3A3D4A" : "#8B92A5", border: "none", borderRadius: 10, height: 48, fontSize: 15, cursor: currentIdx === 0 ? "default" : "pointer" }}>
            ← Previous
          </button>
          <button onClick={() => currentIdx < active.length - 1 && loadExercise(currentIdx + 1)} disabled={currentIdx === active.length - 1}
            style={{ background: "#2A2D3A", color: currentIdx === active.length - 1 ? "#3A3D4A" : "#E8EAF0", border: "none", borderRadius: 10, height: 48, fontSize: 15, fontWeight: 600, cursor: currentIdx === active.length - 1 ? "default" : "pointer" }}>
            Next Exercise →
          </button>
        </div>
      </div>

      {/* RIGHT: exercise list + today's log */}
      <div style={{ display: "flex", flexDirection: "column", gap: 12, overflow: "hidden" }}>

        {/* Exercise plan */}
        <div style={{ background: "#1A1D26", borderRadius: 12, border: "1px solid #2A2D3A", padding: 16, flex: 1, overflowY: "auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 11, color: "#4B5563", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>Workout Plan</div>
            <button onClick={endWorkout}
              style={{ background: "#D94A4A22", color: "#D94A4A", border: "1px solid #D94A4A44", borderRadius: 7, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
              End Workout
            </button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {active.map((e, i) => {
              const isActive = i === currentIdx;
              const isDone = loggedIds.has(e.id) || todayLogs.some(l => l.exerciseId === e.id);
              const eColor = MUSCLE_COLORS[e.muscleGroup] || "#4B5563";
              return (
                <div key={e.id} onClick={() => loadExercise(i)}
                  style={{ padding: "9px 12px", borderRadius: 8, display: "flex", alignItems: "center", gap: 10, cursor: "pointer",
                    background: isActive ? "#4A90D911" : "none",
                    border: isActive ? "1px solid #4A90D944" : "1px solid transparent",
                    opacity: isDone && !isActive ? 0.5 : 1 }}>
                  <div style={{ width: 22, height: 22, borderRadius: "50%", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800,
                    background: isDone ? "#4AD99A" : isActive ? "#4A90D9" : "#2A2D3A",
                    color: isDone || isActive ? (isDone ? "#0F1117" : "#fff") : "#4B5563" }}>
                    {isDone ? "✓" : i + 1}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12, fontWeight: isActive ? 700 : 400, color: isActive ? "#4A90D9" : isDone ? "#8B92A5" : "#C8CDD8",
                      textDecoration: isDone && !isActive ? "line-through" : "none", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                      {e.name}
                    </div>
                    <div style={{ fontSize: 10, color: "#4B5563" }}>{e.defaultSets}×{e.defaultReps} · {e.muscleGroup}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Today's log */}
        <div style={{ background: "#1A1D26", borderRadius: 12, border: "1px solid #2A2D3A", padding: 14, flexShrink: 0 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 11, color: "#4B5563", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>Today's Log</div>
            <div style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>PF {sessionPF.toLocaleString()}</div>
          </div>
          {todayLogs.length === 0 ? (
            <div style={{ color: "#3A3D4A", fontSize: 12, textAlign: "center", padding: "8px 0" }}>Nothing logged yet</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 5, maxHeight: 180, overflowY: "auto" }}>
              {[...todayLogs].reverse().map((l, i) => {
                const lEx = exercises.find(e => e.id === l.exerciseId);
                return (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "5px 0", borderBottom: "1px solid #2A2D3A" }}>
                    <span style={{ fontSize: 12, color: "#8B92A5", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{lEx?.name}</span>
                    <span style={{ fontSize: 12, color: "#E8A838", fontWeight: 700, flexShrink: 0, marginLeft: 8 }}>{calcPF(l.sets, l.reps, l.weight, lEx?.type, lEx?.laterality).toLocaleString()}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── PROGRESS TAB ─────────────────────────────────────────────────────────────
function ProgressTab({ exercises, workoutLogs }) {
  const [selected, setSelected] = useState(null);
  const [view, setView] = useState("dashboard");

  const exStats = exercises.filter(e => e.active).map(ex => {
    const logs = workoutLogs.filter(l => Number(l.exerciseId) === Number(ex.id));
    const pfSeries = logs.map(l => ({ value: calcPF(l.sets, l.reps, l.weight, ex.type, ex.laterality), date: l.date }));
    const first = pfSeries[0]?.value, last = pfSeries[pfSeries.length - 1]?.value;
    const prev  = pfSeries[pfSeries.length - 2]?.value;
    const totalGain   = first && last  ? ((last  - first) / first * 100) : null;
    const sessionGain = last  && prev  ? ((last  - prev)  / prev  * 100) : null;
    const peak = pfSeries.length ? Math.max(...pfSeries.map(d => d.value)) : null;
    return { ex, logs, pfSeries, first, last, prev, totalGain, sessionGain, peak };
  });

  const scored = exStats.filter(s => s.totalGain !== null);
  const overallScore = scored.length ? scored.reduce((a, s) => a + s.totalGain, 0) / scored.length : null;

  const groupScores = {};
  scored.forEach(s => {
    const g = s.ex.muscleGroup;
    if (!groupScores[g]) groupScores[g] = [];
    groupScores[g].push(s.totalGain);
  });
  const groupAvgs = Object.entries(groupScores).map(([g, vals]) => ({
    group: g, avg: vals.reduce((a, v) => a + v, 0) / vals.length,
  })).sort((a, b) => b.avg - a.avg);

  const selStats = selected ? exStats.find(s => s.ex.id === selected) : null;
  const trendColor = overallScore === null ? "#4B5563" : overallScore >= 0 ? "#4AD99A" : "#D94A4A";

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Prime Factor Dashboard</h2>

              const change = prevPF ? ((dayPF - prevPF) / prevPF * 100) : null;
              return (

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>

                      <div style={{ color: "#4B5563", fontSize: 11 }}>session PF</div>
                      {change !== null && (

                      )}

                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {logs.map((l, j) => {
                      const ex = exercises.find(e => Number(e.id) === Number(l.exerciseId));

                        <div key={j} style={{ background: "#0F1117", borderRadius: 6, padding: "6px 10px", border: "1px solid #2A2D3A" }}>
                          <div style={{ color: "#C8CDD8", fontSize: 12, fontWeight: 600 }}>{ex?.name}</div>

                        </div>
                      );
                    })}
                  </div>
                </Card>
              );
            });
          })()}
        </div>
      )}
    </div>
  );
}

// ─── BODY TAB ─────────────────────────────────────────────────────────────────
function BodyTab({ bodyLogs, onSave }) {
  const [showForm, setShowForm] = useState(false);
  const [fields, setFields] = useState({ weight: "", chest: "", waist: "", hips: "", glutes: "", thighs: "", arms: "" });
  const [saveStatus, setSaveStatus] = useState(null);
  const setF = (k) => (e) => setFields(f => ({ ...f, [k]: e.target.value }));

  const handleSave = async () => {
    setSaveStatus("saving");
    const ok = await onSave({ date: new Date().toISOString(), ...Object.fromEntries(Object.entries(fields).map(([k, v]) => [k, Number(v) || 0])) });
    setSaveStatus(ok ? "saved" : "error");
    setTimeout(() => setSaveStatus(null), 3000);
    setShowForm(false);
    setFields({ weight: "", chest: "", waist: "", hips: "", glutes: "", thighs: "", arms: "" });
  };

  const recent = [...bodyLogs].reverse().slice(0, 10);
  const weightData = bodyLogs.filter(l => l.weight).map(l => ({ value: l.weight, date: l.date }));
  const latestWeight = weightData.length ? weightData[weightData.length - 1].value : null;
  const startWeight  = weightData.length ? weightData[0].value : null;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Body Tracking</h2>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>Log every 3 days</div>
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <SaveStatus status={saveStatus} />
          <button onClick={() => setShowForm(true)}
            style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 8, padding: "9px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
            + Log Today
          </button>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 20, marginBottom: 24 }}>
        <Card>
          <SectionLabel>Current Weight</SectionLabel>
          <div style={{ fontSize: 40, fontWeight: 800, color: "#E8EAF0", lineHeight: 1 }}>{latestWeight ? `${latestWeight}` : "—"}</div>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 4 }}>lbs</div>
          {startWeight && latestWeight && startWeight !== latestWeight && (
            <div style={{ color: latestWeight < startWeight ? "#4AD99A" : "#D94A4A", fontSize: 14, fontWeight: 700, marginTop: 8 }}>
              {latestWeight < startWeight ? "↓" : "↑"} {Math.abs(latestWeight - startWeight).toFixed(1)} lbs from start
            </div>
          )}
        </Card>
        <Card style={{ gridColumn: "span 2" }}>
          <SectionLabel>Weight Trend</SectionLabel>
          {weightData.length < 2 ? (
            <div style={{ color: "#3A3D4A", fontSize: 13 }}>Log at least 2 entries to see trend</div>
          ) : (
            <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 70 }}>
              {weightData.slice(-20).map((d, i) => {
                const vals = weightData.slice(-20).map(x => x.value);
                const min = Math.min(...vals), max = Math.max(...vals);
                const h = Math.max(4, ((d.value - min) / (max - min + 0.1)) * 60 + 10);
                const isLast = i === Math.min(weightData.length, 20) - 1;
                return <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center" }}>
                  {isLast && <div style={{ color: "#4A90D9", fontSize: 10, marginBottom: 2 }}>{d.value}</div>}
                  <div style={{ width: "100%", height: h, background: isLast ? "#4A90D9" : "#2A2D3A", borderRadius: "2px 2px 0 0" }} />
                </div>;
              })}
            </div>
          )}
        </Card>
      </div>

      {recent.length > 0 && (
        <Card>
          <SectionLabel>Measurement History</SectionLabel>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr>{["Date", "Weight", "Chest", "Waist", "Hips", "Glutes", "Thighs", "Arms"].map(h => (
                  <th key={h} style={{ color: "#4B5563", fontWeight: 700, textAlign: "left", padding: "6px 12px", borderBottom: "1px solid #2A2D3A" }}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {recent.map((l, i) => (
                  <tr key={i} style={{ borderBottom: "1px solid #1A1D26" }}>
                    <td style={{ color: "#8B92A5", padding: "8px 12px" }}>{fmtDateLong(l.date)}</td>
                    {["weight", "chest", "waist", "hips", "glutes", "thighs", "arms"].map(k => (
                      <td key={k} style={{ color: k === "glutes" ? "#E87D38" : "#C8CDD8", padding: "8px 12px", fontWeight: k === "glutes" ? 700 : 400 }}>
                        {l[k] ? `${l[k]}${k === "weight" ? " lbs" : '"'}` : "—"}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      {showForm && (
        <Modal title="Log Body Measurements" onClose={() => setShowForm(false)} width={520}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 20 }}>
            {[["Weight (lbs)", "weight"], ["Chest (in)", "chest"], ["Waist (in)", "waist"], ["Hips (in)", "hips"], ["Glutes (in)", "glutes"], ["Thighs (in)", "thighs"], ["Arms (in)", "arms"]].map(([label, k]) => (

            ))}
          </div>
          <button onClick={handleSave}
            style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 9, padding: "13px 0", width: "100%", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
            Save
          </button>
        </Modal>
      )}
    </div>
  );
}

// ─── NUTRITION TAB ────────────────────────────────────────────────────────────
function NutritionTab({ nutritionDays, onSaveDay, session, userId }) {
  const [view, setView] = useState("log"); // "log" | "import" | "history"
  const [pasteText, setPasteText] = useState("");
  const [parsing, setParsing] = useState(false);
  const [parseError, setParseError] = useState("");
  const [preview, setPreview] = useState(null);
  const [saving, setSaving] = useState(false);
  const [savedMsg, setSavedMsg] = useState("");

  const T = NUTRITION_TARGETS;
  const today = new Date().toISOString().split("T")[0];
  const todayRecord = nutritionDays.find(d => d.date === today);
  const recentDays = [...nutritionDays].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 14);

  const parseWithGPT = async () => {
    if (!pasteText.trim()) return;
    setParsing(true); setParseError(""); setPreview(null);
    try {
      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${OPENAI_KEY}` },
        body: JSON.stringify({
          model: "gpt-4o",
          max_tokens: 2000,
          messages: [{
            role: "system",
            content: `You are a nutrition data extractor. The user will paste nutrition information in ANY format — it could be structured, conversational, a list of meals, or anything else. Your job is to extract the data and return ONLY a valid JSON object with no markdown, no backticks, no explanation.

Always return this exact JSON structure (use null for missing fields, 0 for missing numbers):
{
  "date": "YYYY-MM-DD",
  "phase": "Gain Phase",
  "targets": {"calories": 2650, "protein": 191, "carbs": 220, "fat": 65},
  "totals": {"calories": number, "protein": number, "carbs": number, "fat": number},
  "remaining": {"calories": number, "protein": number, "carbs": number, "fat": number},
  "compliance": "string or null",
  "notes": "string or null",
  "entries": [
    {
      "time": "HH:MM AM/PM or null",
      "type": "food",
      "name": "meal name",
      "items": "comma separated food items",
      "calories": number,
      "protein": number,
      "carbs": number,
      "fat": number
    }
  ]
}

Rules:
- If date is not specified, use today: ${today}
- If targets are not specified, use defaults: 2650 cal, 191g protein, 220g carbs, 65g fat
- Calculate remaining = targets - totals
- Extract every meal or food entry you can find
- If macros for a specific meal are partially given, estimate the rest
- Return ONLY the JSON object, nothing else`
          }, {
            role: "user",
            content: pasteText
          }]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.choices?.[0]?.message?.content?.trim();
      if (!text) throw new Error("Empty response");
      const cleaned = text.replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/```\s*$/i, "").trim();
      const parsed = JSON.parse(cleaned);
      // Ensure required fields exist
      if (!parsed.totals) parsed.totals = { calories: 0, protein: 0, carbs: 0, fat: 0 };
      if (!parsed.targets) parsed.targets = { calories: 2650, protein: 191, carbs: 220, fat: 65 };
      if (!parsed.remaining) parsed.remaining = {
        calories: parsed.targets.calories - parsed.totals.calories,
        protein: parsed.targets.protein - parsed.totals.protein,
        carbs: parsed.targets.carbs - parsed.totals.carbs,
        fat: parsed.targets.fat - parsed.totals.fat,
      };
      if (!parsed.entries) parsed.entries = [];
      if (!parsed.date) parsed.date = today;
      setPreview(parsed);
    } catch (e) {
      setParseError(`Parse failed: ${e.message}. Try pasting again or check your OpenAI key.`);
    }
    setParsing(false);
  };

  const [saveError, setSaveError] = useState("");

  const saveDay = async () => {
    if (!preview) return;
    setSaving(true); setSaveError("");
    const result = await onSaveDay(preview, pasteText);
    if (result?.ok) {
      setSavedMsg("Nutrition record saved.");
      setPreview(null); setPasteText(""); setView("log");
      setTimeout(() => setSavedMsg(""), 3000);
    } else {
      setSaveError(result?.error || "Save failed — check browser console for details.");
    }
    setSaving(false);
  };

  const MacroBar = ({ label, val, target, color }) => {
    const pct = Math.min(100, (val / target) * 100);
    return (
      <div style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
          <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
          <span style={{ color, fontSize: 13, fontWeight: 700 }}>{val}<span style={{ color: "#4B5563" }}>/{target}{label === "Calories" ? " kcal" : "g"}</span></span>
        </div>
        <div style={{ background: "#0F1117", borderRadius: 4, height: 8 }}>
          <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 4 }} />
        </div>
        <div style={{ color: "#4B5563", fontSize: 10, marginTop: 2 }}>{Math.max(0, target - val)}{label === "Calories" ? " kcal" : "g"} remaining</div>
      </div>
    );
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Nutrition</h2>
        <div style={{ display: "flex", background: "#1A1D26", borderRadius: 8, padding: 3, border: "1px solid #2A2D3A" }}>
          {[["log", "Today"], ["import", "Import"], ["history", "History"]].map(([id, label]) => (
            <button key={id} onClick={() => setView(id)}
              style={{ background: view === id ? "#4A90D9" : "none", color: view === id ? "#fff" : "#8B92A5",
                border: "none", borderRadius: 6, padding: "7px 18px", fontSize: 13, fontWeight: view === id ? 600 : 400, cursor: "pointer" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {savedMsg && <div style={{ background: "#4AD99A22", border: "1px solid #4AD99A44", color: "#4AD99A", borderRadius: 8, padding: "10px 16px", marginBottom: 16, fontWeight: 600 }}>{savedMsg}</div>}

      {/* TODAY VIEW */}
      {view === "log" && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
          <div>
            {todayRecord ? (
              <Card>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                  <div>
                    <div style={{ color: "#E8EAF0", fontWeight: 700, fontSize: 16 }}>Today — {todayRecord.phase || "Gain Phase"}</div>
                    {todayRecord.compliance && <div style={{ color: "#4AD99A", fontSize: 12, marginTop: 3 }}>Compliance: {todayRecord.compliance}</div>}
                  </div>
                  <button onClick={() => setView("import")}
                    style={{ background: "#4A90D922", color: "#4A90D9", border: "1px solid #4A90D944", borderRadius: 7, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                    Update
                  </button>
                </div>
                <MacroBar label="Calories" val={todayRecord.total_calories || 0} target={todayRecord.target_calories || T.calories} color="#E8A838" />
                <MacroBar label="Protein" val={todayRecord.total_protein || 0} target={todayRecord.target_protein || T.protein} color="#4A90D9" />
                <MacroBar label="Carbs" val={todayRecord.total_carbs || 0} target={todayRecord.target_carbs || T.carbs} color="#7B68EE" />
                <MacroBar label="Fat" val={todayRecord.total_fat || 0} target={todayRecord.target_fat || T.fat} color="#4AD9A0" />

                <div style={{ fontSize: 40, marginBottom: 16 }}>🥩</div>

            {/* Meal timeline */}

          <div>

                ["Carbs", `${T.carbs}g`, "per day", "#7B68EE"],
                ["Fat", `${T.fat}g`, "per day", "#4AD9A0"],

                  <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
                  <div style={{ textAlign: "right" }}>
                    <span style={{ color, fontSize: 14, fontWeight: 700 }}>{val}</span>
                    <div style={{ color: "#4B5563", fontSize: 10 }}>{unit}</div>
                  </div>
                </div>
              ))}
            </Card>
          </div>
        </div>
      )}

      {/* IMPORT VIEW */}
      {view === "import" && (
        <div style={{ maxWidth: 700 }}>
          {!preview ? (
            <Card>
              <SectionLabel>Paste Daily Nutrition Record</SectionLabel>
              <div style={{ color: "#8B92A5", fontSize: 13, marginBottom: 16, lineHeight: 1.6 }}>
                Ask ChatGPT: <span style={{ color: "#4A90D9", fontStyle: "italic" }}>"Recap the daily nutrition statement/record for Prime App."</span> Then paste the result below.
              </div>
              <textarea value={pasteText} onChange={e => setPasteText(e.target.value)}
                placeholder="Paste any nutrition information here — meals, totals, a ChatGPT recap, or any format. GPT-4o will extract the data automatically..."

              {parseError && <div style={{ color: "#D94A4A", fontSize: 13, marginTop: 12 }}>{parseError}</div>}

                </button>
                <button onClick={() => { setPasteText(""); setParseError(""); setView("log"); }}

          ) : (
            <div>
              <Card style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>

                    <div style={{ color: "#E8EAF0", fontWeight: 700, fontSize: 16 }}>Preview — {preview.date}</div>
                    <div style={{ color: "#8B92A5", fontSize: 13 }}>{preview.phase}</div>
                  </div>
                  {preview.compliance && <span style={{ background: "#4AD99A22", color: "#4AD99A", padding: "4px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>Compliance: {preview.compliance}</span>}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                  <div>
                    <SectionLabel>Totals</SectionLabel>
                    <MacroBar label="Calories" val={preview.totals?.calories || 0} target={preview.targets?.calories || T.calories} color="#E8A838" />
                    <MacroBar label="Protein" val={preview.totals?.protein || 0} target={preview.targets?.protein || T.protein} color="#4A90D9" />
                    <MacroBar label="Carbs" val={preview.totals?.carbs || 0} target={preview.targets?.carbs || T.carbs} color="#7B68EE" />
                    <MacroBar label="Fat" val={preview.totals?.fat || 0} target={preview.targets?.fat || T.fat} color="#4AD9A0" />
                  </div>
                  <div>
                    <SectionLabel>Remaining</SectionLabel>
                    {[["Calories", preview.remaining?.calories || 0, "#E8A838"],
                      ["Protein", `${preview.remaining?.protein || 0}g`, "#4A90D9"],
                      ["Carbs", `${preview.remaining?.carbs || 0}g`, "#7B68EE"],
                      ["Fat", `${preview.remaining?.fat || 0}g`, "#4AD9A0"]].map(([label, val, color]) => (
                      <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid #2A2D3A" }}>
                        <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
                        <span style={{ color, fontSize: 13, fontWeight: 700 }}>{val}</span>
                      </div>
                    ))}
                  </div>
                </div>
                {preview.notes && <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 16, fontStyle: "italic", borderTop: "1px solid #2A2D3A", paddingTop: 12 }}>{preview.notes}</div>}
              </Card>

              {preview.entries?.length > 0 && (
                <Card style={{ marginBottom: 16 }}>
                  <SectionLabel>Meal Timeline ({preview.entries.length} entries)</SectionLabel>
                  {preview.entries.map((e, i) => (
                    <div key={i} style={{ paddingBottom: 12, marginBottom: 12, borderBottom: i < preview.entries.length - 1 ? "1px solid #2A2D3A" : "none" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                        <div>
                          <span style={{ color: "#8B92A5", fontSize: 11 }}>{e.time} · </span>
                          <span style={{ color: "#E8EAF0", fontSize: 14, fontWeight: 600 }}>{e.name}</span>
                        </div>
                        <span style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>{e.calories} kcal</span>
                      </div>
                      {e.items && <div style={{ color: "#4B5563", fontSize: 12, marginBottom: 3 }}>{e.items}</div>}
                      <div style={{ display: "flex", gap: 12 }}>
                        <span style={{ color: "#4A90D9", fontSize: 12 }}>{e.protein}g P</span>
                        <span style={{ color: "#7B68EE", fontSize: 12 }}>{e.carbs}g C</span>
                        <span style={{ color: "#4AD9A0", fontSize: 12 }}>{e.fat}g F</span>
                      </div>
                    </div>
                  ))}
                </Card>
              )}

              <div style={{ display: "flex", gap: 12 }}>
                <button onClick={saveDay} disabled={saving}
                  style={{ flex: 1, background: saving ? "#2A2D3A" : "#4AD99A", color: saving ? "#4B5563" : "#0F1117",
                    border: "none", borderRadius: 10, height: 56, fontSize: 17, fontWeight: 800, cursor: saving ? "default" : "pointer" }}>
                  {saving ? "Saving..." : "Save Nutrition Record"}
                </button>
                <button onClick={() => setPreview(null)}
                  style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 10, height: 56, padding: "0 20px", fontSize: 14, cursor: "pointer" }}>
                  Re-paste
                </button>
              </div>
              {saveError && <div style={{ color: "#D94A4A", fontSize: 13, marginTop: 12, background: "#D94A4A11", border: "1px solid #D94A4A44", borderRadius: 8, padding: "10px 14px" }}>{saveError}</div>}
            </div>
          )}
        </div>
      )}

      {/* HISTORY VIEW */}
      {view === "history" && (
        <div>
          {recentDays.length === 0 ? (
            <Card style={{ textAlign: "center", padding: 40 }}>
              <div style={{ color: "#3A3D4A", fontSize: 14 }}>No nutrition records yet.</div>
            </Card>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {recentDays.map((d, i) => {
                const [expanded, setExpanded] = useState(false);
                return (
                  <Card key={i} style={{ padding: "16px 20px", cursor: "pointer" }} onClick={() => setExpanded(e => !e)}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <div style={{ color: "#E8EAF0", fontWeight: 700, fontSize: 15 }}>{new Date(d.date + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })}</div>
                        <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>{d.phase} {d.compliance ? `· Compliance: ${d.compliance}` : ""}</div>
                      </div>
                      <div style={{ display: "flex", gap: 20, alignItems: "center" }}>
                        <div style={{ display: "flex", gap: 20, textAlign: "right" }}>
                          <div><div style={{ color: "#E8A838", fontSize: 18, fontWeight: 700 }}>{d.total_calories}</div><div style={{ color: "#4B5563", fontSize: 10 }}>kcal</div></div>
                          <div><div style={{ color: "#4A90D9", fontSize: 18, fontWeight: 700 }}>{d.total_protein}g</div><div style={{ color: "#4B5563", fontSize: 10 }}>protein</div></div>
                          <div><div style={{ color: d.total_calories >= (d.target_calories || 2400) ? "#4AD99A" : "#E8A838", fontSize: 18, fontWeight: 700 }}>
                            {Math.round((d.total_calories / (d.target_calories || 2650)) * 100)}%
                          </div><div style={{ color: "#4B5563", fontSize: 10 }}>of target</div></div>
                        </div>
                        <div style={{ color: "#4B5563", fontSize: 18 }}>{expanded ? "▲" : "▼"}</div>
                      </div>
                    </div>

                    {expanded && (
                      <div style={{ marginTop: 16, borderTop: "1px solid #2A2D3A", paddingTop: 16 }} onClick={e => e.stopPropagation()}>
                        {/* Macro bars */}
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
                          {[["Calories", d.total_calories, d.target_calories || 2650, "#E8A838", "kcal"],
                            ["Protein", d.total_protein, d.target_protein || 191, "#4A90D9", "g"],
                            ["Carbs", d.total_carbs, d.target_carbs || 220, "#7B68EE", "g"],
                            ["Fat", d.total_fat, d.target_fat || 65, "#4AD9A0", "g"]].map(([label, val, target, color, unit]) => (
                            <div key={label}>
                              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                                <span style={{ color: "#8B92A5", fontSize: 12 }}>{label}</span>
                                <span style={{ color, fontSize: 12, fontWeight: 700 }}>{val}<span style={{ color: "#4B5563" }}>/{target}{unit}</span></span>
                              </div>
                              <div style={{ background: "#0F1117", borderRadius: 3, height: 5 }}>
                                <div style={{ width: `${Math.min(100, (val/target)*100)}%`, height: "100%", background: color, borderRadius: 3 }} />
                              </div>
                            </div>
                          ))}
                        </div>

                        {/* Meal timeline */}
                        {d.entries?.length > 0 && (
                          <div>
                            <div style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>Meal Timeline</div>
                            {d.entries.map((e, ei) => (
                              <div key={ei} style={{ paddingBottom: 10, marginBottom: 10, borderBottom: ei < d.entries.length - 1 ? "1px solid #2A2D3A" : "none" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 2 }}>
                                  <div>
                                    <span style={{ color: "#4B5563", fontSize: 11 }}>{e.entry_time} · </span>
                                    <span style={{ color: "#E8EAF0", fontSize: 13, fontWeight: 600 }}>{e.meal_name}</span>
                                  </div>
                                  <span style={{ color: "#E8A838", fontSize: 12, fontWeight: 700 }}>{e.calories} kcal</span>
                                </div>
                                {e.items && <div style={{ color: "#4B5563", fontSize: 11, marginBottom: 3 }}>{e.items}</div>}
                                <div style={{ display: "flex", gap: 12 }}>
                                  <span style={{ color: "#4A90D9", fontSize: 11 }}>{e.protein}g P</span>
                                  <span style={{ color: "#7B68EE", fontSize: 11 }}>{e.carbs}g C</span>
                                  <span style={{ color: "#4AD9A0", fontSize: 11 }}>{e.fat}g F</span>
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                        {d.notes && <div style={{ color: "#8B92A5", fontSize: 12, fontStyle: "italic", marginTop: 8, borderTop: "1px solid #2A2D3A", paddingTop: 8 }}>{d.notes}</div>}
                      </div>
                    )}
                  </Card>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── RECOVERY TAB ────────────────────────────────────────────────────────────
function RecoveryTab({ recoveryLogs, onSave }) {
  const today = new Date().toISOString().split("T")[0];
  const todayLog = recoveryLogs.find(r => r.date === today);
  const [editing, setEditing] = useState(!todayLog);
  const [fields, setFields] = useState({
    sleep_quality: todayLog?.sleep_quality || 3,
    energy: todayLog?.energy || 3,
    muscle_soreness: todayLog?.muscle_soreness || 3,
    heel_pain: todayLog?.heel_pain || 0,
    low_back_pain: todayLog?.low_back_pain || 0,
    alfredson_morning_straight: todayLog?.alfredson_morning_straight || false,
    alfredson_morning_bent: todayLog?.alfredson_morning_bent || false,
    alfredson_evening_straight: todayLog?.alfredson_evening_straight || false,
    alfredson_evening_bent: todayLog?.alfredson_evening_bent || false,
    notes: todayLog?.notes || "",
  });
  const [saving, setSaving] = useState(false);
  const [saveStatus, setSaveStatus] = useState(null);

  const setF = (k, v) => setFields(f => ({ ...f, [k]: v }));

  const handleSave = async () => {
    setSaving(true);
    const ok = await onSave({ ...fields, date: today });
    setSaveStatus(ok ? "saved" : "error");
    setTimeout(() => setSaveStatus(null), 3000);
    setEditing(false);
    setSaving(false);
  };

  const alfredsonComplete = [fields.alfredson_morning_straight, fields.alfredson_morning_bent, fields.alfredson_evening_straight, fields.alfredson_evening_bent].filter(Boolean).length;

  // Weekly Alfredson compliance
  const last7 = recoveryLogs.filter(r => {
    const d = new Date(r.date);
    const now = new Date();
    return (now - d) / 86400000 <= 7;
  });
  const weeklyCompliance = last7.length ? Math.round(last7.reduce((sum, r) => {
    const done = [r.alfredson_morning_straight, r.alfredson_morning_bent, r.alfredson_evening_straight, r.alfredson_evening_bent].filter(Boolean).length;
    return sum + (done / 4);
  }, 0) / last7.length * 100) : null;

  const StarRating = ({ label, value, onChange, max = 5, color = "#4A90D9" }) => (
    <div style={{ marginBottom: 20 }}>
      <div style={{ color: "#8B92A5", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>{label}</div>
      <div style={{ display: "flex", gap: 8 }}>
        {Array.from({ length: max }).map((_, i) => (
          <button key={i} onClick={() => onChange(i + 1)}
            style={{ width: 52, height: 52, borderRadius: 8, border: `2px solid ${i < value ? color : "#2A2D3A"}`,
              background: i < value ? color + "22" : "#0F1117", color: i < value ? color : "#4B5563",
              fontSize: 18, fontWeight: 800, cursor: "pointer" }}>
            {i + 1}
          </button>
        ))}
      </div>
    </div>
  );

  const PainSlider = ({ label, value, onChange, color }) => (
    <div style={{ marginBottom: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
        <span style={{ color: "#8B92A5", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>{label}</span>
        <span style={{ color: value === 0 ? "#4AD99A" : value <= 3 ? "#E8A838" : "#D94A4A", fontSize: 18, fontWeight: 800 }}>{value}/10</span>
      </div>
      <div style={{ display: "flex", gap: 6 }}>
        {Array.from({ length: 11 }).map((_, i) => (
          <button key={i} onClick={() => onChange(i)}
            style={{ flex: 1, height: 44, borderRadius: 6, border: "none",
              background: i === value ? (i === 0 ? "#4AD99A" : i <= 3 ? "#E8A838" : "#D94A4A") : "#2A2D3A",
              color: i === value ? "#0F1117" : "#4B5563", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            {i}
          </button>
        ))}
      </div>
    </div>
  );

  const AlfredsonCheck = ({ label, checked, onChange }) => (
    <button onClick={() => onChange(!checked)}
      style={{ display: "flex", alignItems: "center", gap: 12, background: checked ? "#4AD99A22" : "#0F1117",
        border: `1px solid ${checked ? "#4AD99A44" : "#2A2D3A"}`, borderRadius: 8, padding: "12px 16px",
        cursor: "pointer", width: "100%", textAlign: "left" }}>
      <div style={{ width: 24, height: 24, borderRadius: 6, background: checked ? "#4AD99A" : "#2A2D3A",
        display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>
        {checked ? "✓" : ""}
      </div>
      <span style={{ color: checked ? "#4AD99A" : "#8B92A5", fontSize: 14, fontWeight: checked ? 700 : 400 }}>{label}</span>
    </button>
  );

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 24 }}>
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <div>
            <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Recovery & Durability</h2>
            <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>{fmtDateLong(new Date())}</div>
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>

// ─── PHASE TRACKER ────────────────────────────────────────────────────────────
function PhaseTracker({ phase, setPhase }) {
  const [showSetup, setShowSetup] = useState(!phase);
  const [setupType, setSetupType] = useState("gain");
  const [setupStart, setSetupStart] = useState(new Date().toISOString().split("T")[0]);

  const cfg = phase ? PHASE_CONFIG[phase.type] : null;

  const startPhase = () => {
    const start = new Date(setupStart);
    const weeks = PHASE_CONFIG[setupType].weeks;
    const end = new Date(start);
    end.setDate(end.getDate() + weeks * 7);
    setPhase({ type: setupType, startDate: start.toISOString(), endDate: end.toISOString(), history: phase?.history || [] });
    setShowSetup(false);
  };

  const completePhase = () => {
    const history = [...(phase.history || []), { type: phase.type, startDate: phase.startDate, endDate: new Date().toISOString() }];
    setPhase({ ...phase, history });
    setShowSetup(true);
    setSetupType(phase.type === "gain" ? "cut" : "gain");
  };

  const getDayInfo = () => {
    if (!phase) return null;
    const start = new Date(phase.startDate), end = new Date(phase.endDate), now = new Date();
    const totalDays = Math.round((end - start) / 86400000);
    const elapsed = Math.max(0, Math.round((now - start) / 86400000));
    const remaining = Math.max(0, totalDays - elapsed);
    const pct = Math.min(100, (elapsed / totalDays) * 100);
    const week = Math.floor(elapsed / 7) + 1;
    return { totalDays, elapsed, remaining, pct, week, totalWeeks: cfg.weeks };
  };

  const info = phase ? getDayInfo() : null;
  const history = phase?.history || [];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Phase Tracker</h2>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>Bulk / Cut cycle management</div>
        </div>
        {phase && (
          <button onClick={() => { setShowSetup(true); setSetupType(phase.type); setSetupStart(new Date().toISOString().split("T")[0]); }}
            style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 13, cursor: "pointer" }}>
            Edit Phase
          </button>
        )}
      </div>

      {!phase && !showSetup && (
        <Card style={{ textAlign: "center", padding: 48 }}>
          <div style={{ fontSize: 40, marginBottom: 16 }}>🗓️</div>
          <div style={{ color: "#E8EAF0", fontSize: 18, fontWeight: 700, marginBottom: 8 }}>No active phase</div>
          <button onClick={() => setShowSetup(true)}
            style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 9, padding: "12px 28px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
            Set Up Phase
          </button>
        </Card>
      )}

      {phase && info && (
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 20, marginBottom: 20 }}>
          <Card style={{ border: `1px solid ${cfg.color}44` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                  <span style={{ fontSize: 24 }}>{cfg.icon}</span>
                  <span style={{ fontSize: 22, fontWeight: 800, color: cfg.color }}>{cfg.label}</span>
                </div>
                <div style={{ color: "#8B92A5", fontSize: 13 }}>{cfg.description}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: cfg.color, fontSize: 36, fontWeight: 800, lineHeight: 1 }}>{info.remaining}</div>
                <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>days remaining</div>
              </div>
            </div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ color: "#8B92A5", fontSize: 12 }}>Week {Math.min(info.week, info.totalWeeks)} of {info.totalWeeks}</span>
                <span style={{ color: cfg.color, fontSize: 12, fontWeight: 700 }}>{Math.round(info.pct)}% complete</span>
              </div>
              <div style={{ background: "#0F1117", borderRadius: 6, height: 10 }}>
                <div style={{ width: `${info.pct}%`, height: "100%", background: cfg.color, borderRadius: 6 }} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                <span style={{ color: "#4B5563", fontSize: 11 }}>{fmtDate(phase.startDate)}</span>
                <span style={{ color: "#4B5563", fontSize: 11 }}>{fmtDate(phase.endDate)}</span>
              </div>
            </div>

            <div style={{ display: "flex", gap: 3, marginBottom: 20 }}>
              {Array.from({ length: info.totalWeeks }).map((_, i) => {
                const done = i < info.week - 1, current = i === info.week - 1;
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                    <div style={{ width: "100%", height: 28, borderRadius: 4,
                      background: done ? cfg.color : current ? cfg.color + "66" : "#1A1D26",
                      border: current ? `1px solid ${cfg.color}` : "1px solid #2A2D3A",
                      display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {done && <span style={{ fontSize: 12 }}>✓</span>}
                      {current && <span style={{ color: cfg.color, fontSize: 10, fontWeight: 700 }}>NOW</span>}
                    </div>
                    <div style={{ color: "#3A3D4A", fontSize: 9 }}>W{i + 1}</div>
                  </div>
                );
              })}
            </div>

            <button onClick={completePhase}
              style={{ background: cfg.color, color: "#0F1117", border: "none", borderRadius: 9, padding: "11px 0", width: "100%", fontSize: 14, fontWeight: 800, cursor: "pointer" }}>
              Complete Phase → Start {phase.type === "gain" ? "Cut" : "Gain"}
            </button>
          </Card>

          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Card>
              <SectionLabel>Daily Targets</SectionLabel>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[
                  { label: "Calories", val: phase.type === "gain" ? "2,650" : "1,600", unit: "kcal", color: "#E8A838" },
                  { label: "Protein",  val: "191g", unit: "per day", color: "#4A90D9" },
                  { label: "Training", val: "3×",   unit: "/ week",  color: "#4AD9A0" },
                ].map(({ label, val, unit, color }) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#0F1117", borderRadius: 7, padding: "8px 12px" }}>
                    <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
                    <span style={{ color, fontSize: 15, fontWeight: 700 }}>{val} <span style={{ fontSize: 11, fontWeight: 400, color: "#4B5563" }}>{unit}</span></span>
                  </div>
                ))}
              </div>
            </Card>
            <Card>
              <SectionLabel>Phase Stats</SectionLabel>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[["Day", `${info.elapsed + 1} of ${info.totalDays}`], ["Started", fmtDate(phase.startDate)], ["Ends", fmtDate(phase.endDate)], ["Cycles completed", history.length]].map(([label, val]) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between" }}>
                    <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
                    <span style={{ color: "#E8EAF0", fontSize: 13, fontWeight: 700 }}>{val}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>
      )}

      {history.length > 0 && (
        <Card>
          <SectionLabel>Cycle History</SectionLabel>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {history.map((h, i) => {
              const hcfg = PHASE_CONFIG[h.type];
              const days = Math.round((new Date(h.endDate) - new Date(h.startDate)) / 86400000);
              return (
                <div key={i} style={{ background: "#0F1117", borderRadius: 8, padding: "10px 14px", border: `1px solid ${hcfg.color}33` }}>
                  <div style={{ color: hcfg.color, fontWeight: 700, fontSize: 13 }}>{hcfg.icon} {hcfg.label}</div>
                  <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>{fmtDate(h.startDate)} → {fmtDate(h.endDate)}</div>
                  <div style={{ color: "#4B5563", fontSize: 11, marginTop: 1 }}>{days} days</div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {showSetup && (
        <Modal title="Set Up Phase" onClose={() => phase && setShowSetup(false)} width={480}>
          <div style={{ marginBottom: 20 }}>
            <SectionLabel>Phase Type</SectionLabel>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {["gain", "cut"].map(type => {
                const c = PHASE_CONFIG[type];
                return (
                  <button key={type} onClick={() => setSetupType(type)}
                    style={{ background: setupType === type ? c.bg : "#0F1117", border: `2px solid ${setupType === type ? c.color : "#2A2D3A"}`, borderRadius: 10, padding: "16px 12px", cursor: "pointer", textAlign: "left" }}>
                    <div style={{ fontSize: 22, marginBottom: 6 }}>{c.icon}</div>
                    <div style={{ color: setupType === type ? c.color : "#E8EAF0", fontWeight: 700, fontSize: 15 }}>{c.label}</div>
                    <div style={{ color: "#8B92A5", fontSize: 11, marginTop: 4 }}>{c.weeks} weeks · {c.calories} kcal/day</div>
                  </button>
                );
              })}
            </div>
          </div>
          <div style={{ marginBottom: 20 }}>
            <label style={{ color: "#8B92A5", fontSize: 11, display: "block", marginBottom: 6 }}>Start Date</label>
            <input type="date" value={setupStart} onChange={e => setSetupStart(e.target.value)} style={inputStyle} />
          </div>
          <div style={{ background: "#0F1117", borderRadius: 8, padding: "12px 16px", marginBottom: 20 }}>
            <div style={{ color: "#8B92A5", fontSize: 12, marginBottom: 4 }}>Phase ends on</div>
            <div style={{ color: PHASE_CONFIG[setupType].color, fontSize: 18, fontWeight: 700 }}>
              {(() => { const d = new Date(setupStart); d.setDate(d.getDate() + PHASE_CONFIG[setupType].weeks * 7); return fmtDateLong(d.toISOString()); })()}
            </div>
          </div>
          <button onClick={startPhase}
            style={{ background: PHASE_CONFIG[setupType].color, color: "#0F1117", border: "none", borderRadius: 9, padding: "13px 0", width: "100%", fontSize: 15, fontWeight: 800, cursor: "pointer" }}>
            Start {PHASE_CONFIG[setupType].label}
          </button>
        </Modal>
      )}
    </div>
  );
}

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("jdurham@outlook.com");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const signIn = async () => {
    if (!password.trim()) return;
    setLoading(true); setError("");
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: { "apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email: email.trim(), password: password.trim() }),
    });
    const data = await res.json();
    if (data.access_token) {
      onLogin(data.access_token, data.user.id, data.refresh_token);
    } else {
      setError(data.error_description || data.msg || "Invalid email or password");
    }
    setLoading(false);
  };

  return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center" }}>
      <div style={{ width: 380, padding: 40, background: "#1A1D26", borderRadius: 16, border: "1px solid #2A2D3A" }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ fontSize: 11, color: "#4A90D9", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 8 }}>DURHAM CAPITAL</div>
          <div style={{ fontSize: 28, fontWeight: 800, color: "#E8EAF0", marginBottom: 6 }}>PROJECT PRIME</div>
          <div style={{ fontSize: 13, color: "#4B5563" }}>Build the best version of you</div>
        </div>
        <div style={{ marginBottom: 14 }}>
          <label style={{ color: "#8B92A5", fontSize: 12, display: "block", marginBottom: 6 }}>Email</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && signIn()} style={{ ...inputStyle, fontSize: 15 }} />
        </div>
        <div style={{ marginBottom: 20 }}>
          <label style={{ color: "#8B92A5", fontSize: 12, display: "block", marginBottom: 6 }}>Password</label>
          <input type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && signIn()} placeholder="Enter your password" style={{ ...inputStyle, fontSize: 15 }} />
        </div>
        {error && <div style={{ color: "#D94A4A", fontSize: 12, marginBottom: 14 }}>{error}</div>}
        <button onClick={signIn} disabled={loading || !password.trim()}
          style={{ width: "100%", background: loading || !password.trim() ? "#2A2D3A" : "#4A90D9",
            color: loading || !password.trim() ? "#4B5563" : "#fff",
            border: "none", borderRadius: 9, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: loading || !password.trim() ? "default" : "pointer" }}>
          {loading ? "Signing in..." : "Sign In"}
        </button>
      </div>
    </div>
  );
}
