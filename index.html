                <div style={{ color: "#4B5563", fontSize: 11, marginTop: 4 }}>remaining</div>
              </div>
            </div>

            {/* Next set preview */}
            <div style={{ background: "#1A1D26", borderRadius: 10, padding: "14px 24px", border: "1px solid #2A2D3A", textAlign: "center" }}>
              <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 6 }}>
                {isLastSet ? "FINISHING EXERCISE" : `UP NEXT — SET ${currentSetNum} OF ${targetSets}`}
              </div>
              <div style={{ color: "#E8EAF0", fontSize: 22, fontWeight: 800 }}>
                {isLastSet ? "All sets complete" : `${currentSetWeight} lbs × ${currentSetReps} reps`}
              </div>
            </div>

            {/* Timer controls */}
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
              {[["−30s", () => adjustRest(-30)], ["Reset", resetRest], ["+30s", () => adjustRest(30)]].map(([label, fn]) => (
                <button key={label} onClick={fn}
                  style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 8, padding: "10px 18px", fontSize: 14, cursor: "pointer" }}>
                  {label}
                </button>
              ))}
              <button onClick={skipRest}
                style={{ background: "#4A90D922", color: "#4A90D9", border: "1px solid #4A90D944", borderRadius: 8, padding: "10px 18px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                Skip Rest →
              </button>
            </div>
          </div>
        )}

        {/* ── READY TO LIFT STATE ──────────────────────────────────────────── */}
        {!exerciseDone && restSeconds === 0 && !resting && exSets.length > 0 && !isLastSet && (
          <div style={{ background: "#4AD99A0D", border: "1px solid #4AD99A44", borderRadius: 12, padding: "14px 20px", display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#4AD99A", boxShadow: "0 0 8px #4AD99A" }} />
            <span style={{ color: "#4AD99A", fontSize: 16, fontWeight: 800, letterSpacing: "0.06em" }}>READY TO LIFT</span>
          </div>
        )}

        {/* ── CURRENT SET PANEL ────────────────────────────────────────────── */}
        {!exerciseDone && !resting && (
          <div style={{ background: "#1A1D26", border: "2px solid #4A90D944", borderRadius: 16, padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", gap: 16 }}>

            {/* Set counter */}
            <div style={{ textAlign: "center" }}>
              <div style={{ color: "#4A90D9", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 4 }}>CURRENT SET</div>
              <div style={{ fontSize: 15, color: "#8B92A5" }}>
                Set <span style={{ color: "#E8EAF0", fontWeight: 800, fontSize: 22 }}>{Math.min(currentSetNum, targetSets)}</span> of <span style={{ fontWeight: 700 }}>{targetSets}</span>
              </div>
            </div>

            {/* Weight + Reps controls */}
            <div style={{ display: "grid", gridTemplateColumns: ex.type === "weighted" ? "1fr 1fr" : "1fr", gap: 14 }}>
              {ex.type === "weighted" && (
                <div style={{ background: "#0F1117", borderRadius: 12, padding: 16, textAlign: "center" }}>
                  <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 12 }}>WEIGHT (lbs)</div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12 }}>
                    <button onClick={() => setCurrentSetWeight(w => String(Math.max(0, +w - 5)))}
                      style={{ width: 64, height: 64, background: "#2A2D3A", border: "none", borderRadius: 12, fontSize: 30, color: "#E8EAF0", cursor: "pointer" }}>−</button>
                    <div style={{ fontSize: 48, fontWeight: 800, color: "#E8EAF0", minWidth: 80, fontVariantNumeric: "tabular-nums" }}>{currentSetWeight}</div>
                    <button onClick={() => setCurrentSetWeight(w => String(Math.min(400, +w + 5)))}
                      style={{ width: 64, height: 64, background: "#2A2D3A", border: "none", borderRadius: 12, fontSize: 30, color: "#E8EAF0", cursor: "pointer" }}>+</button>
                  </div>
                </div>
              )}
              <div style={{ background: "#0F1117", borderRadius: 12, padding: 16, textAlign: "center" }}>
                <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 12 }}>
                  {ex.laterality === "unilateral" ? "REPS / SIDE" : "REPS"}
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12 }}>
                  <button onClick={() => setCurrentSetReps(r => String(Math.max(1, +r - 1)))}
                    style={{ width: 64, height: 64, background: "#2A2D3A", border: "none", borderRadius: 12, fontSize: 30, color: "#E8EAF0", cursor: "pointer" }}>−</button>
                  <div style={{ fontSize: 48, fontWeight: 800, color: "#E8EAF0", minWidth: 80, fontVariantNumeric: "tabular-nums" }}>{currentSetReps}</div>
                  <button onClick={() => setCurrentSetReps(r => String(Math.min(100, +r + 1)))}
                    style={{ width: 64, height: 64, background: "#2A2D3A", border: "none", borderRadius: 12, fontSize: 30, color: "#E8EAF0", cursor: "pointer" }}>+</button>
                </div>
              </div>
            </div>

            {/* RIR (Reps In Reserve) + live SF */}
            <div>
              <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8, textAlign: "center" }}>
                Reps In Reserve (RIR)
              </div>
              <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 6 }}>
                {["0","1","2","3","4","5+"].map(r => (
                  <button key={r} onClick={() => setCurrentSetRir(r)}
                    style={{ width: 44, height: 40, border: "none", borderRadius: 8, fontSize: 14, fontWeight: 700, cursor: "pointer",
                      background: currentSetRir === r ? "#4A90D9" : "#2A2D3A",
                      color:      currentSetRir === r ? "#fff"     : "#4B5563" }}>
                    {r}
                  </button>
                ))}
              </div>
              {currentSetRir !== "" && (
                <div style={{ textAlign: "center", color: "#4B5563", fontSize: 11 }}>
                  {currentSetRir === "0" ? "Taken to failure" : `${currentSetRir} reps in reserve`}
                </div>
              )}
            </div>

            <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center" }}>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: "#E8A838", fontSize: 22, fontWeight: 800 }}>{stagedPF.toLocaleString()}</div>
                <div style={{ color: "#4B5563", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>Set SF</div>
              </div>
            </div>

            {/* Notes (optional) */}
            <div>
              <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>Notes (optional)</div>
              <input value={currentSetNotes} onChange={e => setCurrentSetNotes(e.target.value)}
                placeholder="Add a note for this set..."
                style={{ width: "100%", background: "#0F1117", border: "1px solid #2A2D3A", borderRadius: 8, padding: "10px 12px", color: "#E8EAF0", fontSize: 13 }} />
            </div>

            {/* COMPLETE SET button — the hero. On the final set, this single tap both
                logs the set AND finishes the exercise (and the workout, if applicable) —
                no separate "Finish Exercise" tap required. */}
            {(() => {
              const isFinalSetOfExercise = currentSetNum >= targetSets;
              if (!isFinalSetOfExercise) {
                return (
                  <button onClick={completeSet}
                    style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 16, height: 80, width: "100%", fontSize: 22, fontWeight: 800, cursor: "pointer", letterSpacing: "0.04em", boxShadow: "0 4px 24px #4A90D944" }}>
                    ✓ COMPLETE SET {currentSetNum}
                  </button>
                );
              }
              // Determine whether this is also the last remaining exercise of the workout,
              // to decide between "& Finish Exercise" vs "& Finish Workout" labeling.
              const remainingAfterThis = active.filter((e, i) => i !== currentIdx && !loggedIds.has(e.id) && !todayLogs.some(l => Number(l.exerciseId) === Number(e.id)));
              const isLastExerciseOfWorkout = remainingAfterThis.length === 0;
              const label = saveStatus === "saving" ? "Saving…"
                : saveStatus === "error" ? "⚠ Sync failed — saved locally"
                : `✓ COMPLETE SET ${currentSetNum} & FINISH ${isLastExerciseOfWorkout ? "WORKOUT" : "EXERCISE"}`;
              return (
                <button onClick={completeFinalSet} disabled={saveStatus === "saving"}
                  style={{ background: saveStatus === "saving" ? "#2A2D3A" : "#4AD99A", color: saveStatus === "saving" ? "#4B5563" : "#0F1117",
                    border: "none", borderRadius: 16, height: 80, width: "100%", fontSize: 19, fontWeight: 800, cursor: "pointer", letterSpacing: "0.02em", boxShadow: "0 4px 24px #4AD99A44" }}>
                  {label}
                </button>
              );
            })()}

            {/* Completed sets log */}
            {exSets.length > 0 && (
              <div>
                <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Completed Sets</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {exSets.map(s => (
                    <div key={s.setNum} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#0F1117", borderRadius: 8, padding: "8px 14px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ color: "#4AD99A", fontSize: 14 }}>✓</span>
                        <span style={{ color: "#8B92A5", fontSize: 13 }}>Set {s.setNum}</span>
                        <span style={{ color: "#E8EAF0", fontSize: 13, fontWeight: 700 }}>{s.reps} reps {s.weight > 0 ? `@ ${s.weight} lbs` : ""}</span>
                        {s.rir !== null && s.rir !== undefined && s.rir !== "" && <span style={{ background: "#4A90D922", color: "#4A90D9", fontSize: 11, padding: "1px 6px", borderRadius: 4, fontWeight: 700 }}>RIR {s.rir}</span>}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>{s.pf.toLocaleString()} SF</span>
                        <button onClick={() => { const init = { inMemory: true, exerciseId: ex.id, setNum: s.setNum, reps: String(s.reps), weight: String(s.weight), rir: s.rir ?? "", notes: s.notes || "" }; setEditingSet(init); setEditDraft(init); }}
                          style={{ background: "none", border: "none", color: "#4B5563", cursor: "pointer", fontSize: 13, padding: 2 }} title="Edit set">✎</button>
                      </div>
                    </div>
                  ))}
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 14px" }}>
                    <span style={{ color: "#4B5563", fontSize: 12 }}>Exercise total</span>
                    <span style={{ color: "#E8A838", fontSize: 13, fontWeight: 800 }}>{exAccumPF.toLocaleString()} SF
                      {lastExPF && <span style={{ color: exAccumPF >= lastExPF ? "#4AD99A" : "#D94A4A", fontSize: 11, marginLeft: 8 }}>
                        ({exAccumPF >= lastExPF ? "+" : ""}{(((exAccumPF - lastExPF) / lastExPF) * 100).toFixed(1)}%)
                      </span>}
                    </span>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
        </>
        )}
      </div>

      {/* ── SIDEBAR ──────────────────────────────────────────────────────────── */}
      <div style={{ display: "flex", flexDirection: "column", gap: 12, overflowY: "auto", overflowX: "hidden", WebkitOverflowScrolling: "touch", minHeight: 0 }}>

        {/* Workout Plan */}
        <div style={{ background: "#1A1D26", borderRadius: 12, border: "1px solid #2A2D3A", padding: 16, height: 320, flexShrink: 0, display: "flex", flexDirection: "column" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <div style={{ fontSize: 10, color: "#4B5563", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>Workout Plan</div>
            <div style={{ color: "#8B92A5", fontSize: 11 }}>{active.filter(e => loggedIds.has(e.id) || todayLogs.some(l => l.exerciseId === e.id)).length}/{active.length}</div>
          </div>
          {/* Progress bar */}
          <div style={{ height: 3, background: "#2A2D3A", borderRadius: 2, marginBottom: 12 }}>
            <div style={{ height: "100%", background: "#4AD99A", borderRadius: 2, transition: "width 0.3s",
              width: `${(active.filter(e => loggedIds.has(e.id) || todayLogs.some(l => l.exerciseId === e.id)).length / active.length) * 100}%` }} />
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 3, overflowY: "auto", flex: 1, minHeight: 0 }}>
            {active.map((e, i) => {
              const isActive = i === currentIdx && !reviewExerciseId;
              const isDone   = loggedIds.has(e.id) || todayLogs.some(l => l.exerciseId === e.id);
              const isSkipped = skippedIds.has(e.id) && !isDone;
              const isReviewing = reviewExerciseId === e.id;
              const hasSets  = (completedSets[e.id] || []).length > 0;
              return (
                <div key={e.id} onClick={() => {
                    if (isActive) return;
                    if (isDone) { setReviewExerciseId(e.id); }
                    else { loadExercise(i); }
                  }}
                  style={{ padding: "9px 12px", borderRadius: 8, display: "flex", alignItems: "center", gap: 10,
                    cursor: isActive ? "default" : "pointer",
                    background: isActive ? "#4A90D911" : isReviewing ? "#E8A83811" : "none",
                    border: isActive ? "1px solid #4A90D944" : isReviewing ? "1px solid #E8A83844" : "1px solid transparent",
                    opacity: (isDone || isSkipped) && !isActive && !isReviewing ? 0.5 : 1 }}>
                  <div style={{ width: 22, height: 22, borderRadius: "50%", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800,
                    background: isDone ? "#4AD99A" : isSkipped ? "#D94A4A44" : isActive ? "#4A90D9" : hasSets ? "#E8A83844" : "#2A2D3A",
                    color: isDone ? "#0F1117" : isSkipped ? "#D94A4A" : isActive ? "#fff" : hasSets ? "#E8A838" : "#4B5563" }}>
                    {isDone ? "✓" : isSkipped ? "⏭" : hasSets ? exSets.length : i + 1}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 14, fontWeight: isActive || isReviewing ? 700 : 500,
                      color: isActive ? "#4A90D9" : isReviewing ? "#E8A838" : isDone ? "#8B92A5" : isSkipped ? "#6B7280" : "#C8CDD8",
                      textDecoration: (isDone || isSkipped) && !isActive && !isReviewing ? "line-through" : "none",
                      whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                      {e.name}
                    </div>
                    <div style={{ fontSize: 12, color: "#4B5563" }}>{e.defaultSets}×{e.defaultReps} · {e.muscleGroup}</div>
                  </div>
                  {isDone && !isActive && <span style={{ color: "#4B5563", fontSize: 11 }}>{isReviewing ? "Reviewing" : "Tap to review"}</span>}
                  {isSkipped && !isActive && <span style={{ color: "#D94A4A", fontSize: 11 }}>Skipped</span>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Coach Tip — cycles with set number */}
        {(() => {
          const tips = COACH_TIPS[ex?.name];
          const tipIdx = tips ? (Math.max(0, currentSetNum - 1)) % tips.length : -1;
          const tip = tips ? tips[tipIdx] : null;
          return (
            <div style={{ background: "#1A1D26", borderRadius: 12, border: "1px solid #4A90D933", padding: 16, flexShrink: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <span style={{ fontSize: 16 }}>💬</span>
                <div style={{ color: "#4A90D9", fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em" }}>
                  Coach Tip · Set {Math.min(currentSetNum, targetSets)}
                </div>
              </div>
              {tip ? (
                <div style={{ color: "#C8CDD8", fontSize: 16, lineHeight: 1.7, fontStyle: "italic" }}>
                  "{tip}"
                </div>
              ) : (
                <div style={{ color: "#4B5563", fontSize: 13 }}>No tips available for this exercise.</div>
              )}
              {tips && (
                <div style={{ display: "flex", gap: 4, marginTop: 10 }}>
                  {tips.map((_, i) => (
                    <div key={i} style={{ height: 3, flex: 1, borderRadius: 2, background: i === tipIdx ? "#4A90D9" : "#2A2D3A", transition: "background 0.3s" }} />
                  ))}
                </div>
              )}
              {/* Session SF compact */}
              <div style={{ marginTop: 12, paddingTop: 10, borderTop: "1px solid #2A2D3A", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>Session SF</span>
                <span style={{ color: "#E8A838", fontSize: 16, fontWeight: 800 }}>{sessionPF.toLocaleString()}</span>
              </div>
            </div>
          );
        })()}

        {/* Muscle Focus — lightweight text card, not anatomy art */}
        {(() => {
          const focus = MUSCLE_FOCUS[ex?.name];
          if (!focus) return null;
          return (
            <div style={{ background: "#1A1D26", borderRadius: 12, border: "1px solid #2A2D3A", padding: 16, flexShrink: 0 }}>
              <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>Muscle Focus</div>
              <div style={{ marginBottom: focus.secondary.length ? 8 : 0 }}>
                <span style={{ color: "#7B68EE", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>Primary</span>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 6 }}>
                  {focus.primary.map(m => (
                    <span key={m} style={{ background: "#7B68EE22", color: "#7B68EE", padding: "3px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>{m}</span>
                  ))}
                </div>
              </div>
              {focus.secondary.length > 0 && (
                <div>
                  <span style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>Secondary</span>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 6 }}>
                    {focus.secondary.map(m => (
                      <span key={m} style={{ background: "#2A2D3A", color: "#8B92A5", padding: "3px 10px", borderRadius: 6, fontSize: 12, fontWeight: 600 }}>{m}</span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })()}

        {/* Quick Actions */}
        {!exerciseDone && (
          <div style={{ background: "#1A1D26", borderRadius: 12, border: "1px solid #2A2D3A", padding: 16, flexShrink: 0 }}>
            <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>Quick Actions</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <button onClick={skipExercise}
                style={{ display: "flex", alignItems: "center", gap: 10, background: "none", border: "none", color: "#8B92A5", fontSize: 13, padding: "8px 4px", cursor: "pointer", textAlign: "left", borderRadius: 6 }}>
                <span style={{ fontSize: 14 }}>⏭</span> Skip Exercise
              </button>
              <button disabled
                style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "none", border: "none", color: "#3A3D4A", fontSize: 13, padding: "8px 4px", cursor: "not-allowed", textAlign: "left", borderRadius: 6 }}>
                <span style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ fontSize: 14 }}>＋</span> Add Exercise</span>
                <span style={{ background: "#2A2D3A", color: "#4B5563", fontSize: 9, fontWeight: 700, padding: "2px 7px", borderRadius: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>Coming Soon</span>
              </button>
              <button onClick={() => setShowSummaryPreview(true)}
                style={{ display: "flex", alignItems: "center", gap: 10, background: "none", border: "none", color: "#8B92A5", fontSize: 13, padding: "8px 4px", cursor: "pointer", textAlign: "left", borderRadius: 6 }}>
                <span style={{ fontSize: 14 }}>📊</span> View Workout Summary
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


// ─── PROGRESS TAB ─────────────────────────────────────────────────────────────
function ProgressTab({ exercises, workoutLogs }) {
  const [selected, setSelected] = useState(null);
  const [view, setView] = useState("dashboard");
  const [baselines, setBaselines] = useState(() => getBaselines());
  const [showBaselineConfirm, setShowBaselineConfirm] = useState(false);

  const exStats = exercises.filter(e => e.active).map(ex => {
    const logs = workoutLogs.filter(l => Number(l.exerciseId) === Number(ex.id));
    // Sort by date ascending, deduplicate same-day entries keeping highest PF
    const byDate = {};
    logs.forEach(l => {
      const pf = calcPF(l.sets, l.reps, l.weight, ex.type, ex.laterality);
      if (!byDate[l.date] || pf > byDate[l.date]) byDate[l.date] = pf;
    });
    const pfSeries = Object.keys(byDate).sort().map(date => ({ value: byDate[date], date }));

    // Baseline: use the active recalibration baseline if one exists for this exercise,
    // otherwise fall back to the first recorded session.
    const baseline = baselines[String(ex.id)] || null;
    const baselineEntry = baseline
      ? pfSeries.find(p => p.date >= baseline.date) || pfSeries[0]
      : pfSeries[0];
    const first = baselineEntry?.value;
    const last  = pfSeries[pfSeries.length - 1]?.value;
    const prev  = pfSeries[pfSeries.length - 2]?.value;
    const totalGain   = first && last  ? ((last  - first) / first * 100) : null;
    const sessionGain = last  && prev  ? ((last  - prev)  / prev  * 100) : null;
    const peak = pfSeries.length ? Math.max(...pfSeries.map(d => d.value)) : null;
    return { ex, logs, pfSeries, first, last, prev, totalGain, sessionGain, peak, baseline, baselineEntry };
  });

  const scored = exStats.filter(s => s.totalGain !== null);
  const overallScore = scored.length ? scored.reduce((a, s) => a + s.totalGain, 0) / scored.length : null;

  const groupScores = {};
  scored.forEach(s => {
    const g = s.ex.muscleGroup;
    if (!groupScores[g]) groupScores[g] = [];
    groupScores[g].push(s.totalGain);
  });
  const groupAvgs = Object.entries(groupScores).map(([g, vals]) => ({
    group: g, avg: vals.reduce((a, v) => a + v, 0) / vals.length,
  })).sort((a, b) => b.avg - a.avg);

  const selStats = selected ? exStats.find(s => s.ex.id === selected) : null;
  const trendColor = overallScore === null ? "#4B5563" : overallScore >= 0 ? "#4AD99A" : "#D94A4A";

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Strength Factor Dashboard</h2>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>Normalized progress across all exercises</div>
        </div>
        <div style={{ display: "flex", background: "#1A1D26", borderRadius: 8, padding: 3, border: "1px solid #2A2D3A" }}>
          {[["dashboard", "Dashboard"], ["detail", "Exercise Detail"], ["history", "Workout History"]].map(([id, label]) => (
            <button key={id} onClick={() => setView(id)}
              style={{ background: view === id ? "#4A90D9" : "none", color: view === id ? "#fff" : "#8B92A5",
                border: "none", borderRadius: 6, padding: "6px 14px", fontSize: 13, fontWeight: view === id ? 600 : 400, cursor: "pointer" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {view === "dashboard" && (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "280px 1fr", gap: 20, marginBottom: 20 }}>
            <Card style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 28, border: `1px solid ${trendColor}44` }}>
              <div style={{ color: "#8B92A5", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Overall Strength Factor Score</div>
              {overallScore !== null ? (
                <>
                  <div style={{ color: trendColor, fontSize: 52, fontWeight: 800, lineHeight: 1 }}>
                    {overallScore >= 0 ? "+" : ""}{overallScore.toFixed(1)}%
                  </div>
                  <div style={{ color: "#4B5563", fontSize: 12, marginTop: 8, textAlign: "center" }}>
                    avg gain across {scored.length} exercise{scored.length !== 1 ? "s" : ""}
                  </div>
                </>
              ) : (
                <div style={{ color: "#3A3D4A", fontSize: 14, textAlign: "center" }}>Log at least 2 sessions to see your score</div>
              )}
            </Card>

            <Card>
              <SectionLabel>Strength Factor by Muscle Group</SectionLabel>
              {groupAvgs.length === 0 ? (
                <div style={{ color: "#3A3D4A", fontSize: 13 }}>No data yet</div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {groupAvgs.map(({ group, avg }) => {
                    const color = MUSCLE_COLORS[group] || "#4B5563";
                    const pct = Math.min(100, Math.max(0, avg));
                    return (
                      <div key={group}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <span style={{ color, fontSize: 13, fontWeight: 600 }}>{group}</span>
                          <span style={{ color: avg >= 0 ? "#4AD99A" : "#D94A4A", fontSize: 13, fontWeight: 700 }}>
                            {avg >= 0 ? "+" : ""}{avg.toFixed(1)}%
                          </span>
                        </div>
                        <div style={{ background: "#0F1117", borderRadius: 4, height: 6 }}>
                          <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 4 }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </Card>
          </div>

          <SectionLabel>All Exercises — Click to Drill Down</SectionLabel>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
            {exStats.map(({ ex, pfSeries, totalGain, sessionGain }) => {
              const color = MUSCLE_COLORS[ex.muscleGroup] || "#4B5563";
              const gainColor = totalGain === null ? "#4B5563" : totalGain >= 0 ? "#4AD99A" : "#D94A4A";
              return (
                <div key={ex.id} onClick={() => { setSelected(ex.id); setView("detail"); }}
                  style={{ background: "#1A1D26", border: "1px solid #2A2D3A", borderRadius: 10, padding: "14px 16px", cursor: "pointer" }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = color}
                  onMouseLeave={e => e.currentTarget.style.borderColor = "#2A2D3A"}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                    <div>
                      <div style={{ color: "#E8EAF0", fontWeight: 600, fontSize: 13, marginBottom: 2 }}>{ex.name}</div>
                      <Pill label={ex.muscleGroup} color={color} />
                    </div>
                    <div style={{ textAlign: "right" }}>
                      {totalGain !== null ? (
                        <>
                          <div style={{ color: gainColor, fontSize: 18, fontWeight: 800 }}>{totalGain >= 0 ? "+" : ""}{totalGain.toFixed(1)}%</div>
                          <div style={{ color: "#4B5563", fontSize: 10 }}>{baselines[String(ex.id)] ? "from baseline" : "total gain"}</div>
                        </>
                      ) : (
                        <div style={{ color: "#3A3D4A", fontSize: 11 }}>no data</div>
                      )}
                    </div>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
                    <div>
                      <Sparkline data={pfSeries} width={90} height={32} />
                      <div style={{ color: "#4B5563", fontSize: 10, marginTop: 2 }}>{pfSeries.length} session{pfSeries.length !== 1 ? "s" : ""}</div>
                    </div>
                    {sessionGain !== null && (
                      <div style={{ textAlign: "right" }}>
                        <div style={{ color: sessionGain >= 0 ? "#4AD99A" : "#D94A4A", fontSize: 12, fontWeight: 700 }}>{sessionGain >= 0 ? "+" : ""}{sessionGain.toFixed(1)}%</div>
                        <div style={{ color: "#4B5563", fontSize: 10 }}>last session</div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view === "detail" && (
        <div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 24 }}>
            {exercises.filter(e => e.active).map(e => (
              <button key={e.id} onClick={() => setSelected(e.id)}
                style={{ background: selected === e.id ? MUSCLE_COLORS[e.muscleGroup] : "#1A1D26",
                  color: selected === e.id ? "#fff" : "#8B92A5",
                  border: selected === e.id ? "1px solid " + MUSCLE_COLORS[e.muscleGroup] : "1px solid #2A2D3A",
                  borderRadius: 20, padding: "7px 16px", fontSize: 13, cursor: "pointer", fontWeight: selected === e.id ? 700 : 400 }}>
                {e.name}
              </button>
            ))}
          </div>

          {selStats && (
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 20 }}>
              {/* Set New Baseline confirmation modal */}
              {showBaselineConfirm && selStats && (() => {
                const latestLog = [...selStats.logs].sort((a,b) => new Date(b.date)-new Date(a.date))[0];
                const latestSF  = latestLog ? calcPF(latestLog.sets, latestLog.reps, latestLog.weight, selStats.ex.type, selStats.ex.laterality) : 0;
                const latestDate = latestLog ? new Date(latestLog.date).toLocaleDateString("en-CA") : null;
                return (
                  <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:600, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
                    <div style={{ background:"#1A1D26", borderRadius:16, border:"1px solid #4A90D944", padding:32, maxWidth:440, width:"100%" }}>
                      <div style={{ fontSize:28, marginBottom:12, textAlign:"center" }}>⭐</div>
                      <div style={{ color:"#E8EAF0", fontSize:18, fontWeight:700, marginBottom:8, textAlign:"center" }}>Set New Baseline</div>
                      <div style={{ color:"#8B92A5", fontSize:13, marginBottom:20, lineHeight:1.7, textAlign:"center" }}>
                        Set the most recent session as the new baseline for <span style={{ color:"#E8EAF0", fontWeight:700 }}>{selStats.ex.name}</span>?
                      </div>
                      <div style={{ background:"#0F1117", borderRadius:10, padding:"14px 18px", marginBottom:20 }}>
                        <div style={{ color:"#4B5563", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:10 }}>This will:</div>
                        {["Preserve all workout history","Preserve PR history","Preserve all Strength Factor values","Reset future % gain calculations from this session forward"].map((item,i) => (
                          <div key={i} style={{ display:"flex", gap:8, marginBottom:6 }}>
                            <span style={{ color:"#4AD99A", fontSize:12, flexShrink:0 }}>✓</span>
                            <span style={{ color:"#C8CDD8", fontSize:13 }}>{item}</span>
                          </div>
                        ))}
                      </div>
                      {latestLog && (
                        <div style={{ background:"#4A90D911", border:"1px solid #4A90D933", borderRadius:8, padding:"10px 14px", marginBottom:20, textAlign:"center" }}>
                          <div style={{ color:"#4A90D9", fontSize:12, fontWeight:700 }}>New Baseline</div>
                          <div style={{ color:"#E8EAF0", fontSize:15, fontWeight:700, marginTop:4 }}>{fmtDate(latestLog.date)} · SF {latestSF.toLocaleString()}</div>
                          <div style={{ color:"#8B92A5", fontSize:12, marginTop:2 }}>{latestLog.sets}×{latestLog.reps}{latestLog.weight ? ` @ ${latestLog.weight} lbs` : ""}</div>
                        </div>
                      )}
                      <div style={{ display:"flex", gap:12 }}>
                        <button onClick={() => setShowBaselineConfirm(false)}
                          style={{ flex:1, background:"#2A2D3A", color:"#8B92A5", border:"none", borderRadius:10, height:52, fontSize:15, cursor:"pointer" }}>
                          Cancel
                        </button>
                        <button onClick={() => {
                            if (!latestDate || !latestSF) return;
                            setBaseline(selStats.ex.id, latestDate, latestSF);
                            setBaselines(getBaselines());
                            setShowBaselineConfirm(false);
                          }}
                          style={{ flex:1, background:"#4A90D9", color:"#fff", border:"none", borderRadius:10, height:52, fontSize:15, fontWeight:800, cursor:"pointer" }}>
                          ⭐ Set New Baseline
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })()}

              <Card>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
                  <div>
                    <div style={{ fontSize: 17, fontWeight: 700, color: "#E8EAF0" }}>{selStats.ex.name}</div>
                    <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>
                      {selStats.ex.laterality === "unilateral" ? "Unilateral — SF = sets × reps × weight × 2" : "Bilateral — SF = sets × reps × weight"}
                    </div>
                    {/* Active baseline indicator */}
                    {selStats.baseline && (
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:8, background:"#4A90D911", border:"1px solid #4A90D933", borderRadius:6, padding:"4px 10px", display:"inline-flex" }}>
                        <span style={{ fontSize:12 }}>⭐</span>
                        <span style={{ color:"#4A90D9", fontSize:12, fontWeight:700 }}>
                          Baseline set {fmtDate(selStats.baseline.date)} · SF {selStats.baseline.sf.toLocaleString()}
                        </span>
                      </div>
                    )}
                  </div>
                  <div style={{ display: "flex", gap: 16, alignItems:"flex-start" }}>
                    {selStats.totalGain !== null && (
                      <div style={{ textAlign: "right" }}>
                        <div style={{ color: selStats.totalGain >= 0 ? "#4AD99A" : "#D94A4A", fontSize: 22, fontWeight: 800 }}>
                          {selStats.totalGain >= 0 ? "+" : ""}{selStats.totalGain.toFixed(1)}%
                        </div>
                        <div style={{ color: "#4B5563", fontSize: 11 }}>{selStats.baseline ? "gain from baseline" : "total gain"}</div>
                      </div>
                    )}
                    {selStats.peak && (
                      <div style={{ textAlign: "right" }}>
                        <div style={{ color: "#E8A838", fontSize: 22, fontWeight: 800 }}>{selStats.peak.toLocaleString()}</div>
                        <div style={{ color: "#4B5563", fontSize: 11 }}>peak SF</div>
                      </div>
                    )}
                  </div>
                </div>
                {/* Line chart with trendline */}
                {selStats.pfSeries.length === 0 ? (
                  <div style={{ color: "#3A3D4A", textAlign: "center", padding: "40px 0", fontSize: 13 }}>No sessions logged yet</div>
                ) : (() => {
                  const series = selStats.pfSeries;
                  const W = 560, H = 140, padL = 48, padR = 12, padT = 16, padB = 28;
                  const iW = W - padL - padR, iH = H - padT - padB;
                  const vals = series.map(d => d.value);
                  const minV = Math.min(...vals), maxV = Math.max(...vals), rangeV = maxV - minV || 1;
                  const xOf = (i) => padL + (i / (series.length - 1 || 1)) * iW;
                  const yOf = (v) => padT + iH - ((v - minV) / rangeV) * iH;
                  const pts = series.map((d, i) => `${xOf(i)},${yOf(d.value)}`).join(" ");
                  const gainColor = selStats.totalGain >= 0 ? "#4AD99A" : "#D94A4A";

                  // Linear regression
                  const n = vals.length;
                  const sumX = vals.reduce((s, _, i) => s + i, 0);
                  const sumY = vals.reduce((s, v) => s + v, 0);
                  const sumXY = vals.reduce((s, v, i) => s + i * v, 0);
                  const sumX2 = vals.reduce((s, _, i) => s + i * i, 0);
                  const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                  const intercept = (sumY - slope * sumX) / n;
                  const trendY1 = yOf(intercept);
                  const trendY2 = yOf(intercept + slope * (n - 1));

                  // Y axis labels (3 ticks: min, mid, max)
                  const yTicks = [minV, minV + rangeV / 2, maxV];

                  // X axis labels: first, middle, last date
                  const xLabels = [
                    { i: 0, label: fmtDate(series[0].date) },
                    { i: Math.floor((series.length - 1) / 2), label: fmtDate(series[Math.floor((series.length - 1) / 2)].date) },
                    { i: series.length - 1, label: fmtDate(series[series.length - 1].date) },
                  ].filter((v, idx, arr) => arr.findIndex(a => a.i === v.i) === idx);

                  return (
                    <div style={{ overflowX: "auto" }}>
                      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}>
                        {/* Grid lines */}
                        {yTicks.map((v, i) => (
                          <line key={i} x1={padL} y1={yOf(v)} x2={W - padR} y2={yOf(v)}
                            stroke="#2A2D3A" strokeWidth={1} />
                        ))}
                        {/* Y axis labels */}
                        {yTicks.map((v, i) => (
                          <text key={i} x={padL - 6} y={yOf(v) + 4} textAnchor="end"
                            fill="#4B5563" fontSize={10}>{Math.round(v).toLocaleString()}</text>
                        ))}
                        {/* X axis labels */}
                        {xLabels.map(({ i, label }) => (
                          <text key={i} x={xOf(i)} y={H - 4} textAnchor="middle"
                            fill="#4B5563" fontSize={10}>{label}</text>
                        ))}
                        {/* Trendline */}
                        <line x1={xOf(0)} y1={trendY1} x2={xOf(n - 1)} y2={trendY2}
                          stroke={gainColor} strokeWidth={1.5} strokeOpacity={0.3} strokeDasharray="4 3" />
                        {/* Baseline vertical marker */}
                        {selStats.baseline && (() => {
                          const bIdx = series.findIndex(p => p.date >= selStats.baseline.date);
                          if (bIdx < 0) return null;
                          const bx = xOf(bIdx);
                          return (
                            <g>
                              <line x1={bx} y1={padT} x2={bx} y2={H - padB} stroke="#4A90D9" strokeWidth={1.5} strokeDasharray="4 3" strokeOpacity={0.8} />
                              <text x={bx + 4} y={padT + 10} fill="#4A90D9" fontSize={9} fontWeight="700">⭐ Baseline</text>
                            </g>
                          );
                        })()}
                        {/* Data line */}
                        <polyline points={pts} fill="none" stroke={gainColor} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round" />
                        {/* Dots on each point */}
                        {series.map((d, i) => (
                          <circle key={i} cx={xOf(i)} cy={yOf(d.value)} r={i === series.length - 1 ? 4.5 : 3}
                            fill={i === series.length - 1 ? gainColor : "#1A1D26"}
                            stroke={gainColor} strokeWidth={1.5} />
                        ))}
                        {/* Last value label */}
                        <text x={xOf(n - 1) + 6} y={yOf(vals[n - 1]) + 4} fill="#E8A838" fontSize={11} fontWeight="700">
                          {vals[n - 1].toLocaleString()}
                        </text>
                      </svg>
                    </div>
                  );
                })()}
              </Card>

              {/* ⭐ Set New Baseline button */}
              <div style={{ marginTop:0 }}>
                <button onClick={() => setShowBaselineConfirm(true)}
                  disabled={selStats.logs.length === 0}
                  style={{ width:"100%", background: selStats.logs.length ? "#4A90D911" : "#2A2D3A", color: selStats.logs.length ? "#4A90D9" : "#4B5563",
                    border: selStats.logs.length ? "1px solid #4A90D944" : "1px solid #2A2D3A",
                    borderRadius:10, height:44, fontSize:14, fontWeight:700, cursor: selStats.logs.length ? "pointer" : "default" }}>
                  ⭐ Set New Baseline
                </button>
              </div>

              <Card>
                <SectionLabel>Session History</SectionLabel>
                <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 380, overflowY: "auto" }}>
                  {selStats.logs.length === 0 ? (
                    <div style={{ color: "#3A3D4A", fontSize: 13, textAlign: "center", padding: "20px 0" }}>No sessions yet</div>
                  ) : [...selStats.logs].sort((a, b) => new Date(b.date) - new Date(a.date)).map((l, i) => {
                    const lDate = new Date(l.date).toLocaleDateString("en-CA");
                    const isBaseline = selStats.baseline && lDate === selStats.baseline.date;
                    const lSF = calcPF(l.sets, l.reps, l.weight, selStats.ex.type, selStats.ex.laterality);
                    return (
                      <div key={i} style={{ background: isBaseline ? "#4A90D911" : "#0F1117", borderRadius: 8, padding: "10px 12px", border: isBaseline ? "1px solid #4A90D944" : "none" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems:"center" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                            <span style={{ color: "#8B92A5", fontSize: 12 }}>{fmtDate(l.date)}</span>
                            {isBaseline && <span style={{ background:"#4A90D922", color:"#4A90D9", fontSize:10, fontWeight:700, padding:"1px 6px", borderRadius:4 }}>⭐ BASELINE</span>}
                          </div>
                          <span style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>SF {lSF.toLocaleString()}</span>
                        </div>
                        <div style={{ color: "#C8CDD8", fontSize: 13, marginTop: 2 }}>
                          {l.sets}×{l.reps}{l.weight ? ` @ ${l.weight} lbs` : ""}
                          {selStats.ex.laterality === "unilateral" && <span style={{ color: "#7B68EE", marginLeft: 6, fontSize: 11 }}>×2 sides</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </Card>
            </div>
          )}
          {!selected && <div style={{ color: "#3A3D4A", textAlign: "center", padding: "60px 0", fontSize: 14 }}>Select an exercise above to see detail</div>}
        </div>
      )}

      {view === "history" && (
        <div>
          {(() => {
            // Group workout logs by day
            const days = {};
            workoutLogs.forEach(l => {
              const day = new Date(l.date).toDateString();
              if (!days[day]) days[day] = [];
              days[day].push(l);
            });
            const sorted = Object.entries(days).sort((a, b) => new Date(b[0]) - new Date(a[0]));
            if (sorted.length === 0) return <Card style={{ textAlign: "center", padding: 48 }}><div style={{ color: "#3A3D4A", fontSize: 14 }}>No workout sessions yet.</div></Card>;
            return sorted.map(([day, logs], i) => {
              const dayPF = logs.reduce((sum, l) => {
                const ex = exercises.find(e => e.id === l.exerciseId);
                return sum + calcPF(l.sets, l.reps, l.weight, ex?.type, ex?.laterality);
              }, 0);
              const prevDay = sorted[i + 1];
              const prevPF = prevDay ? prevDay[1].reduce((sum, l) => {
                const ex = exercises.find(e => e.id === l.exerciseId);
                return sum + calcPF(l.sets, l.reps, l.weight, ex?.type, ex?.laterality);
              }, 0) : null;
              const change = prevPF ? ((dayPF - prevPF) / prevPF * 100) : null;
              const dayKey = new Date(day).toLocaleDateString("en-CA");
              const workoutName = inferTemplateName(logs.map(l => l.exerciseId));
              const durStore = (() => { try { return JSON.parse(localStorage.getItem("pp_workout_durations") || "{}"); } catch { return {}; } })();
              const storedDuration = durStore[dayKey] || null;
              return (
                <Card key={day} style={{ marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                    <div>
                      <div style={{ color: "#E8EAF0", fontWeight: 700, fontSize: 15 }}>{fmtDateLong(new Date(day))}</div>
                      {workoutName && (
                        <div style={{ color: "#4A90D9", fontSize: 13, fontWeight: 700, marginTop: 2 }}>{workoutName}{storedDuration ? ` · ${storedDuration} min` : ""}</div>
                      )}
                      <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>{logs.length} exercise{logs.length !== 1 ? "s" : ""} logged</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ color: "#E8A838", fontSize: 22, fontWeight: 800 }}>{dayPF.toLocaleString()}</div>
                      <div style={{ color: "#4B5563", fontSize: 11 }}>session SF</div>
                      {change !== null && (
                        <div style={{ color: change >= 0 ? "#4AD99A" : "#D94A4A", fontSize: 12, fontWeight: 700 }}>
                          {change >= 0 ? "+" : ""}{change.toFixed(1)}% vs prev
                        </div>
                      )}
                    </div>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {logs.map((l, j) => {
                      const ex = exercises.find(e => Number(e.id) === Number(l.exerciseId));
                      const pf = calcPF(l.sets, l.reps, l.weight, ex?.type, ex?.laterality);
                      return (
                        <div key={j} style={{ background: "#0F1117", borderRadius: 6, padding: "6px 10px", border: "1px solid #2A2D3A" }}>
                          <div style={{ color: "#C8CDD8", fontSize: 12, fontWeight: 600 }}>{ex?.name}</div>
                          <div style={{ color: "#8B92A5", fontSize: 11 }}>{l.sets}×{l.reps}{l.weight ? ` @ ${l.weight}lbs` : ""} · <span style={{ color: "#E8A838" }}>SF {pf.toLocaleString()}</span></div>
                        </div>
                      );
                    })}
                  </div>
                </Card>
              );
            });
          })()}
        </div>
      )}
    </div>
  );
}

// ── Mini bar chart for Body tab trend panels ────────────────────────────────
function MiniBarChart({ data, color = "#4A90D9", height = 56 }) {
  if (!data || data.length < 2) return <div style={{ color: "#3A3D4A", fontSize: 11 }}>Not enough data</div>;
  const vals = data.map(d => d.value);
  const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 0.01;
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height }}>
      {data.slice(-16).map((d, i, arr) => {
        const h = Math.max(4, ((d.value - min) / range) * (height - 8) + 4);
        const isLast = i === arr.length - 1;
        return (
          <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center" }}>
            {isLast && <div style={{ fontSize: 9, color, fontWeight: 700, marginBottom: 1 }}>{d.value}</div>}
            <div style={{ width: "100%", height: h, background: isLast ? color : color + "44", borderRadius: "2px 2px 0 0" }} />
          </div>
        );
      })}
    </div>
  );
}

  const phaseEnd   = new Date(phaseStart); phaseEnd.setDate(phaseStart.getDate() + 84); // 12 weeks from start
  const dateStr = d => d.toLocaleDateString("en-CA");
  const dayOffset = n => { const d = new Date(phaseStart); d.setDate(phaseStart.getDate() + n); return d; };

  // ── 1. Phase ────────────────────────────────────────────────────────────────

        user_id: userId, type: "gain",
        start_date: dateStr(phaseStart), end_date: dateStr(phaseEnd),
        history: [],
      }]),
    });
  }

  // ── 2. Body logs — daily weight + weekly measurements ────────────────────
  const bodyLogs = [];
