function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("jdurham@outlook.com");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [mode, setMode] = useState("signin"); // "signin" | "signup"
  const [signupDone, setSignupDone] = useState(false);

  const signIn = async () => {
    if (!password.trim()) return;
    setLoading(true); setError("");
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: { "apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email: email.trim(), password: password.trim() }),
    });
    const data = await res.json();
    if (data.access_token) {
      onLogin(data.access_token, data.user.id, data.refresh_token, data.user?.email || email.trim());
    } else {
      setError(data.error_description || data.msg || "Invalid email or password");
    }
    setLoading(false);
  };

  const signUp = async () => {
    if (!password.trim() || password.trim().length < 6) {
      setError("Password must be at least 6 characters."); return;
    }
    setLoading(true); setError("");
    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: "POST",
      headers: { "apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email: email.trim(), password: password.trim() }),
    });
    const data = await res.json();
    if (data.id || data.user?.id || data.access_token) {
      // If email confirmation is disabled, log straight in
      if (data.access_token) {
        onLogin(data.access_token, data.user.id, data.refresh_token, data.user?.email || email.trim());
      } else {
        setSignupDone(true);
      }
    } else {
      setError(data.error_description || data.msg || data.message || "Sign up failed. Try a different email.");
    }
    setLoading(false);
  };

  if (signupDone) {
    return (
      <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center" }}>
        <div style={{ width: 380, padding: 40, background: "#1A1D26", borderRadius: 16, border: "1px solid #4AD99A44", textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 16 }}>✅</div>
          <div style={{ color: "#4AD99A", fontSize: 20, fontWeight: 800, marginBottom: 8 }}>Account Created!</div>
          <div style={{ color: "#8B92A5", fontSize: 13, marginBottom: 24, lineHeight: 1.6 }}>
            Check your email for a confirmation link, then sign in below.
          </div>
          <button onClick={() => { setMode("signin"); setSignupDone(false); setPassword(""); }}
            style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 9, padding: "12px 0", width: "100%", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
            Go to Sign In
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center" }}>
      <div style={{ width: 380, padding: 40, background: "#1A1D26", borderRadius: 16, border: "1px solid #2A2D3A" }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ fontSize: 11, color: "#4A90D9", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 8 }}>DURHAM CAPITAL</div>
          <div style={{ fontSize: 28, fontWeight: 800, color: "#E8EAF0", marginBottom: 6 }}>PROJECT PRIME</div>
          <div style={{ fontSize: 13, color: "#4B5563" }}>{mode === "signin" ? "Build the best version of you" : "Create a new account"}</div>
        </div>
        <div style={{ marginBottom: 14 }}>
          <label style={{ color: "#8B92A5", fontSize: 12, display: "block", marginBottom: 6 }}>Email</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)}
            onKeyDown={e => e.key === "Enter" && (mode === "signin" ? signIn() : signUp())}
            style={{ ...inputStyle, fontSize: 15 }} />
        </div>
        <div style={{ marginBottom: 20 }}>
          <label style={{ color: "#8B92A5", fontSize: 12, display: "block", marginBottom: 6 }}>Password{mode === "signup" ? " (min 6 characters)" : ""}</label>
          <input type="password" value={password} onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === "Enter" && (mode === "signin" ? signIn() : signUp())}
            placeholder={mode === "signin" ? "Enter your password" : "Choose a password"} style={{ ...inputStyle, fontSize: 15 }} />
        </div>
        {error && <div style={{ color: "#D94A4A", fontSize: 12, marginBottom: 14 }}>{error}</div>}
        <button onClick={mode === "signin" ? signIn : signUp} disabled={loading || !password.trim()}
          style={{ width: "100%", background: loading || !password.trim() ? "#2A2D3A" : "#4A90D9",
            color: loading || !password.trim() ? "#4B5563" : "#fff",
            border: "none", borderRadius: 9, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: loading || !password.trim() ? "default" : "pointer" }}>
          {loading ? (mode === "signin" ? "Signing in..." : "Creating account...") : (mode === "signin" ? "Sign In" : "Create Account")}
        </button>
        <div style={{ textAlign: "center", marginTop: 16 }}>
          {mode === "signin" ? (
            <span style={{ color: "#4B5563", fontSize: 12 }}>
              Need a new account?{" "}
              <button onClick={() => { setMode("signup"); setError(""); setEmail(""); setPassword(""); }}
                style={{ background: "none", border: "none", color: "#4A90D9", fontSize: 12, cursor: "pointer", textDecoration: "underline", padding: 0 }}>
                Create account
              </button>
            </span>
          ) : (
            <span style={{ color: "#4B5563", fontSize: 12 }}>
              Already have an account?{" "}
              <button onClick={() => { setMode("signin"); setError(""); setPassword(""); }}
                style={{ background: "none", border: "none", color: "#4A90D9", fontSize: 12, cursor: "pointer", textDecoration: "underline", padding: 0 }}>
                Sign in
              </button>
            </span>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("workout");
  const [showPhaseModal, setShowPhaseModal] = useState(false);
  const [exercises]                 = useState(INITIAL_EXERCISES);
  const [workoutLogs, setWorkoutLogs]     = useState([]);
  const [bodyLogs, setBodyLogs]           = useState([]);
  const [nutritionDays, setNutritionDays] = useState([]);
  const [recoveryLogs, setRecoveryLogs]   = useState([]);
  const [recoverySessions, setRecoverySessions] = useState([]);
  const [phase, setPhase]           = useState(null);
  const [loading, setLoading]       = useState(true);
  const [dbError, setDbError]       = useState(false);
  const [session, setSession]       = useState(null);
  const [userId, setUserId]         = useState(null);
  const [userEmail, setUserEmail]   = useState(null);
  const [seeding, setSeeding]       = useState(false);
  const [seedResult, setSeedResult] = useState(null);
  const [devModal, setDevModal]     = useState(null); // null | "seed" | "clear"
  const [devConfirmText, setDevConfirmText] = useState("");
  const isDevUser = userEmail === DEV_EMAIL;

  // ── Session restore ────────────────────────────────────────────────────────
  // ── loadAll — fetches all data for user from Supabase ──────────────────────
  const loadAll = useCallback(async (token, uid) => {
    setLoading(true); setDbError(false);
    try {
      const [wData, bData, ndData, rlData, rsData, pData] = await Promise.all([
        sbGet(`workout_logs?user_id=eq.${uid}&order=date.asc&limit=5000`, token),
        sbGet(`body_logs?user_id=eq.${uid}&order=date.asc&limit=500`, token),
        sbGet(`nutrition_days?user_id=eq.${uid}&order=date.desc&limit=100`, token),
        sbGet(`recovery_logs?user_id=eq.${uid}&order=date.desc&limit=100`, token),
        sbGet(`recovery_sessions?user_id=eq.${uid}&order=date.desc&limit=100`, token),
        sbGet(`phase_data?user_id=eq.${uid}&order=created_at.desc&limit=1`, token),
      ]);

      // If any request returns 401, session expired — force re-login
      if ([wData, bData, ndData, rlData, rsData, pData].some(d => d?._unauthorized)) {
        localStorage.removeItem("pp_session");
        sessionStorage.removeItem("pp_session");
        setSession(null); setUserId(null);
        setTab("workout");
        setLoading(false);
        return;
      }

      const lsWorkout = lsGet(LS_KEYS.workout);
      const lsBody    = lsGet(LS_KEYS.body);

      const merged = (remote, local) => {
        if (!remote) return local;
        const remoteIds = new Set(remote.map(r => r.id).filter(Boolean));
        const pending = local.filter(l => !l.id || !remoteIds.has(l.id));
        return [...remote, ...pending];
      };

      const wLogs = merged(wData, lsWorkout).map(r => ({ id: r.id, exerciseId: r.exercise_id || r.exerciseId, sets: r.sets, reps: r.reps, weight: r.weight, notes: r.notes, date: r.date, setDetails: r.set_details || r.setDetails || null })).sort((a, b) => new Date(a.date) - new Date(b.date));
      const bLogs = merged(bData, lsBody).map(r => ({ id: r.id, weight: r.weight, chest: r.chest, waist: r.waist, hips: r.hips, glutes: r.glutes, thighs: r.thighs, arms: r.arms, date: r.date }));

      // Load nutrition entries for each day
      let nDays = ndData || [];
      if (nDays.length > 0) {
        const dayIds = nDays.map(d => d.id).join(",");
        const entries = await sbGet(`nutrition_entries?nutrition_day_id=in.(${dayIds})&order=created_at.asc`, token);
        nDays = nDays.map(d => ({
          ...d,
          entries: (entries || []).filter(e => e.nutrition_day_id === d.id)
        }));
      }

      setWorkoutLogs(wLogs);
      setBodyLogs(bLogs);
      setNutritionDays(nDays);
      setRecoveryLogs(rlData || []);
      setRecoverySessions(rsData || []);
      lsSet(LS_KEYS.workout, wLogs);
      lsSet(LS_KEYS.body, bLogs);

      if (pData?.[0]) {
        setPhase({ id: pData[0].id, type: pData[0].type, startDate: pData[0].start_date, endDate: pData[0].end_date, history: pData[0].history || [], targets: pData[0].targets || null });
      } else {
        setPhase(null);
      }
    } catch (e) { setDbError(true); }
    setLoading(false);
  }, []);

  // ── Boot: refresh token FIRST, then load data ─────────────────────────────
  // This prevents the "empty app" bug when the access token expires overnight.
  // We refresh before setting session state so loadAll always gets a valid token.
  useEffect(() => {
    const boot = async () => {
      const stored = localStorage.getItem("pp_session") || sessionStorage.getItem("pp_session");
      if (!stored) { setLoading(false); return; }
      let parsed;
      try { parsed = JSON.parse(stored); } catch { setLoading(false); return; }
      let { token, uid, refreshToken } = parsed;

      if (refreshToken) {
        try {
          const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
            method: "POST",
            headers: { "apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json" },
            body: JSON.stringify({ refresh_token: refreshToken }),
          });
          const data = await res.json();
          if (data.access_token) {
            token = data.access_token;
            const newStored = JSON.stringify({ token, uid, refreshToken: data.refresh_token || refreshToken });
            localStorage.setItem("pp_session", newStored);
            sessionStorage.setItem("pp_session", newStored);
          } else if (data.error === "invalid_grant") {
            // Refresh token fully expired — require sign-in again
            localStorage.removeItem("pp_session"); sessionStorage.removeItem("pp_session");
            setLoading(false); return;
          }
          // If refresh fails for other reasons (network), fall through with existing token
        } catch {}
      }

      setSession(token);
      setUserId(uid);
      // Extract email from JWT
      try {
        const payload = JSON.parse(atob(token.split(".")[1]));
        if (payload.email) setUserEmail(payload.email);
      } catch {}
      loadAll(token, uid); // call directly with fresh token, don't wait for state
    };
    boot();
  }, []);

  // ── Auto-refresh every 45 minutes while app is open ───────────────────────
  useEffect(() => {
    if (!session) return;
    const doRefresh = async () => {
      try {
        const stored = localStorage.getItem("pp_session");
        if (!stored) return;
        const { refreshToken, uid } = JSON.parse(stored);
        if (!refreshToken) return;
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
          method: "POST",
          headers: { "apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ refresh_token: refreshToken }),
        });
        const data = await res.json();
        if (data.access_token) {
          const newData = JSON.stringify({ token: data.access_token, uid, refreshToken: data.refresh_token || refreshToken });
          localStorage.setItem("pp_session", newData);
          sessionStorage.setItem("pp_session", newData);
          setSession(data.access_token);
        }
      } catch {}
    };
    const interval = setInterval(doRefresh, 45 * 60 * 1000);
    return () => clearInterval(interval);
  }, [userId]);

  const signOut = () => {
    // Clear session tokens
    localStorage.removeItem("pp_session");
    sessionStorage.removeItem("pp_session");
    // Clear ALL local data caches so next user starts from DB only
    Object.values(LS_KEYS).forEach(k => { try { localStorage.removeItem(k); } catch {} });
    localStorage.removeItem("pp_weekly_review");
    localStorage.removeItem("pp_score_history");
    localStorage.removeItem("pp_nutrition_targets");
    localStorage.removeItem("pp_workout_ended");
    localStorage.removeItem("pp_draft_workout");
    localStorage.removeItem("pp_draft_recovery");
    // Clear all React state
    setSession(null); setUserId(null); setUserEmail(null); setTab("workout");
    setWorkoutLogs([]); setBodyLogs([]); setNutritionDays([]);
    setRecoveryLogs([]); setRecoverySessions([]); setPhase(null);
  };

  // ── Workout handlers ───────────────────────────────────────────────────────
  // addWorkoutLog — upserts: PATCH if existingId provided, POST otherwise
  // Always succeeds locally (localStorage fallback). Returns { ok, freshLogs }.
  // entry.setDetails (optional) — array of { setNum, reps, weight, rir, notes } — persisted to
  // the set_details JSONB column. Older rows/logs without setDetails remain aggregate-only.
  const addWorkoutLog = async (exerciseId, entry, existingId = null) => {
    const payload = { exercise_id: exerciseId, sets: entry.sets, reps: entry.reps, weight: entry.weight, notes: entry.notes, date: entry.date, user_id: userId, set_details: entry.setDetails || null };

    if (existingId) {
      // Optimistically update state first
      const optimistic = workoutLogs.map(l => l.id === existingId ? { ...l, ...entry, exerciseId, setDetails: entry.setDetails || l.setDetails || null } : l);
      setWorkoutLogs(optimistic); lsSet(LS_KEYS.workout, optimistic);
      // Then try DB patch (failure is non-fatal — local state already updated)
      sbPatch(`workout_logs?id=eq.${existingId}`, payload, session).catch(() => {});
      return { ok: true, freshLogs: optimistic };
    }

    // INSERT — optimistic local add first
    const localEntry = { exerciseId, ...entry, _localId: Date.now() };
    const optimistic = [...workoutLogs, localEntry];
    setWorkoutLogs(optimistic); lsSet(LS_KEYS.workout, optimistic);

    // Then sync to DB
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/workout_logs`, {
        method: "POST",
        headers: { ...sbHeaders(session), "Prefer": "return=representation" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const errText = await res.text().catch(() => "");
        console.error("[addWorkoutLog] POST failed:", res.status, errText, "payload:", payload);
      } else {
        const rows = await res.json();
        if (Array.isArray(rows) && rows[0]?.id) {
          const synced = optimistic.map(l => l === localEntry ? { ...entry, id: rows[0].id, exerciseId } : l);
          setWorkoutLogs(synced); lsSet(LS_KEYS.workout, synced);
          return { ok: true, freshLogs: synced };
        }
      }
    } catch (e) {
      console.error("[addWorkoutLog] POST threw:", e);
    }
    // DB failed but local entry exists — still report ok so UI advances (offline-friendly),
    // but the local entry has no real id, so it can't be edited at the set level until it syncs.
    return { ok: true, freshLogs: optimistic };
  };

  // editWorkoutSet — edits one set within a log's set_details, recalculates the aggregate
  // row (sets/reps/weight) from the corrected set_details, and persists both.
  // Returns { ok, freshLogs }.
  const editWorkoutSet = async (logId, setNum, updatedFields) => {
    const log = workoutLogs.find(l => l.id === logId);
    console.log("[editWorkoutSet] logId:", logId, "setNum:", setNum, "updatedFields:", updatedFields);
    console.log("[editWorkoutSet] found log:", log);
    if (!log || !log.setDetails) { console.log("[editWorkoutSet] ABORT — no log or no setDetails"); return { ok: false }; }
    const newSetDetails = log.setDetails.map(s => s.setNum === setNum ? { ...s, ...updatedFields } : s);
    console.log("[editWorkoutSet] old setDetails:", log.setDetails, "new setDetails:", newSetDetails);
    const totalReps = Math.round(newSetDetails.reduce((s, x) => s + x.reps, 0) / newSetDetails.length);
    const avgWeight = Math.round(newSetDetails.reduce((s, x) => s + x.weight, 0) / newSetDetails.length * 10) / 10;
    const notes = newSetDetails.map(s => `Set ${s.setNum}: ${s.reps}r@${s.weight}lbs${s.rir !== null && s.rir !== undefined ? ` RIR${s.rir}` : ""}`).join(" | ");
    const result = await addWorkoutLog(log.exerciseId, {
      sets: newSetDetails.length, reps: totalReps, weight: avgWeight, notes, date: log.date, setDetails: newSetDetails,
    }, logId);
    console.log("[editWorkoutSet] addWorkoutLog result:", result);
    return result;
  };

  // ── Body handlers ──────────────────────────────────────────────────────────
  const addBodyLog = async (entry) => {
    const rows = await sbPost("body_logs", { ...entry, user_id: userId }, session);
    if (rows?.[0]) {
      const newEntry = { id: rows[0].id, weight: rows[0].weight, chest: rows[0].chest, waist: rows[0].waist, hips: rows[0].hips, glutes: rows[0].glutes, thighs: rows[0].thighs, arms: rows[0].arms, date: rows[0].date };
      const updated = [...bodyLogs, newEntry];
      setBodyLogs(updated);
      lsSet(LS_KEYS.body, updated);
      return true;
    }
    // Save to localStorage as fallback
    const localEntry = { ...entry, _pending: true };
    const updated = [...bodyLogs, localEntry];
    setBodyLogs(updated);
    lsSet(LS_KEYS.body, updated);
    return false;
  };

  // ── Nutrition handlers ─────────────────────────────────────────────────────
  const saveNutritionDay = async (parsed, rawText) => {
    try {
      const dayPayload = {
        user_id: userId,
        date: parsed.date,
        phase: parsed.phase || "Gain Phase",
        target_calories: Number(parsed.targets?.calories) || 2650,
        target_protein: Number(parsed.targets?.protein) || getTargets(phase).protein,
        target_carbs: Number(parsed.targets?.carbs) || 220,
        target_fat: Number(parsed.targets?.fat) || 65,
        total_calories: Number(parsed.totals?.calories) || 0,
        total_protein: Number(parsed.totals?.protein) || 0,
        total_carbs: Number(parsed.totals?.carbs) || 0,
        total_fat: Number(parsed.totals?.fat) || 0,
        remaining_calories: Number(parsed.remaining?.calories) || 0,
        remaining_protein: Number(parsed.remaining?.protein) || 0,
        remaining_carbs: Number(parsed.remaining?.carbs) || 0,
        remaining_fat: Number(parsed.remaining?.fat) || 0,
        compliance: typeof parsed.compliance === "string" ? parsed.compliance.slice(0, 200) : null,
        notes: Array.isArray(parsed.notes) ? parsed.notes.join(" ").slice(0, 1000) : (typeof parsed.notes === "string" ? parsed.notes.slice(0, 1000) : null),
        raw_import: rawText ? rawText.slice(0, 4000) : null,
      };

      // Delete existing same-date record first
      const existing = nutritionDays.find(d => d.date === parsed.date);
      if (existing?.id) await sbDelete(`nutrition_days?id=eq.${existing.id}`, session);

      const rows = await sbPost("nutrition_days", dayPayload, session);
      if (!rows?.[0]?.id) {
        const errMsg = rows?._error ? rows.message : JSON.stringify(rows);
        console.error("nutrition_days insert failed:", errMsg);
        return { ok: false, error: `DB error: ${errMsg}` };
      }
      const dayId = rows[0].id;

      // Insert meal entries
      const entries = parsed.entries || [];
      const entryRows = [];
      for (const e of entries) {
        const eRow = await sbPost("nutrition_entries", {
          user_id: userId,
          nutrition_day_id: dayId,
          entry_time: e.time ? String(e.time).slice(0, 20) : null,
          entry_type: e.type || "food",
          meal_name: e.name ? String(e.name).slice(0, 100) : null,
          items: e.items ? String(e.items).slice(0, 500) : null,
          calories: Number(e.calories) || 0,
          protein: Number(e.protein) || 0,
          carbs: Number(e.carbs) || 0,
          fat: Number(e.fat) || 0,
        }, session);
        if (eRow?.[0]) entryRows.push(eRow[0]);
      }

      const newDay = { ...rows[0], entries: entryRows };
      setNutritionDays(prev => [newDay, ...prev.filter(d => d.date !== parsed.date)]);
      return { ok: true };
    } catch (e) {
      console.error("saveNutritionDay error:", e);
      return { ok: false, error: e.message };
    }
  };

  // ── Recovery handlers ──────────────────────────────────────────────────────
  const saveRecoveryLog = async (entry) => {
    try {
      const existing = recoveryLogs.find(r => r.date === entry.date);
      if (existing?.id) await sbDelete(`recovery_logs?id=eq.${existing.id}`, session);
      const rows = await sbPost("recovery_logs", { ...entry, user_id: userId }, session);
      if (!rows?.[0]) return false;
      setRecoveryLogs(prev => [rows[0], ...prev.filter(r => r.date !== entry.date)]);
      return true;
    } catch { return false; }
  };

  const saveRecoverySession = async (sessionData) => {
    try {
      const payload = {
        user_id: userId,
        date: sessionData.date,
        template_name: sessionData.template_name,
        duration_minutes: sessionData.duration_minutes,
        completed_count: sessionData.completed_count,
        total_count: sessionData.total_count,
        before_energy: sessionData.before_energy,
        after_energy: sessionData.after_energy,
        before_soreness: sessionData.before_soreness,
        after_soreness: sessionData.after_soreness,
        before_heel_pain: sessionData.before_heel_pain,
        after_heel_pain: sessionData.after_heel_pain,
        before_low_back_tightness: sessionData.before_low_back_tightness,
        after_low_back_tightness: sessionData.after_low_back_tightness,
        result_rating: sessionData.result_rating,
      };
      const rows = await sbPost("recovery_sessions", payload, session);
      if (rows?._error) {
        console.error("recovery_sessions insert failed:", rows.message);
        return false;
      }
      if (!rows?.[0]?.id) {
        console.error("recovery_sessions no id returned:", JSON.stringify(rows));
        return false;
      }
      const sessionId = rows[0].id;
      for (const item of (sessionData.items || [])) {
        await sbPost("recovery_session_items", {
          user_id: userId,
          recovery_session_id: sessionId,
          item_name: item.name,
          cue: item.cue || null,
          completed: item.completed,
          sort_order: item.sort_order,
        }, session);
      }
      setRecoverySessions(prev => [rows[0], ...prev.filter(s => s.date !== sessionData.date)]);
      return true;
    } catch (e) {
      console.error("saveRecoverySession error:", e);
      return false;
    }
  };

  // ── Workout summary handler ────────────────────────────────────────────────
  const saveWorkoutSummary = async (summary) => {
    try {
      await sbPost("workout_summaries", {
        user_id: userId, date: new Date().toISOString().split("T")[0],
        exercises_completed: summary.completed, exercises_total: summary.total,
        session_pf: summary.sessionPF, previous_session_pf: summary.prevPF,
        pf_change_pct: summary.pfChange, personal_records: summary.prs,
        template_id: summary.templateId || null,
        duration_minutes: summary.durationMinutes || null,
      }, session);
    } catch {}
  };

  // ── Phase handlers ─────────────────────────────────────────────────────────
  const savePhase = async (newPhase) => {
    // Supabase date columns require YYYY-MM-DD format — strip any timestamp suffix
    const toDateStr = (d) => d ? d.split("T")[0] : d;
    const payload = {
      type: newPhase.type,
      start_date: toDateStr(newPhase.startDate),
      end_date: toDateStr(newPhase.endDate),
      history: newPhase.history || [],
      targets: newPhase.targets || null,
    };
    if (newPhase?.id) {
      const ok = await sbPatch(`phase_data?id=eq.${newPhase.id}`, payload, session);
      if (!ok) {
        console.error("savePhase PATCH failed — id:", newPhase.id, "payload:", payload);
        // Attempt to re-fetch phase to confirm state
        const refreshed = await sbGet(`phase_data?user_id=eq.${userId}&order=created_at.desc&limit=1`, session);
        if (refreshed?.[0]) {
          newPhase = { ...newPhase, id: refreshed[0].id };
          await sbPatch(`phase_data?id=eq.${refreshed[0].id}`, payload, session);
        }
      }
    } else {
      const rows = await sbPost("phase_data", { ...payload, user_id: userId }, session);
      if (rows?.[0]) newPhase = { ...newPhase, id: rows[0].id };
    }
    setPhase(newPhase);
    // Clear old separate nutrition targets — phase is now the source of truth
    try { localStorage.removeItem("pp_nutrition_targets"); } catch {}
  };

  // ── Derived state ──────────────────────────────────────────────────────────
  const totalExercises = workoutLogs.length;
  const phaseCfg  = phase ? PHASE_CONFIG[phase.type] : null;
  const phaseInfo = phase && phaseCfg ? (() => {
    const start = new Date(phase.startDate), end = new Date(phase.endDate), now = new Date();
    const totalDays = Math.round((end - start) / 86400000);
    const elapsed   = Math.max(0, Math.round((now - start) / 86400000));
    const remaining = Math.max(0, totalDays - elapsed);
    const week = Math.floor(elapsed / 7) + 1;
    return { remaining, week, totalWeeks: phaseCfg.weeks };
  })() : null;

  // ── Screens ────────────────────────────────────────────────────────────────
  if (!session) return <LoginScreen onLogin={(token, uid, refreshToken, email) => {
    const data = JSON.stringify({ token, uid, refreshToken });
    localStorage.setItem("pp_session", data);
    sessionStorage.setItem("pp_session", data);
    setSession(token); setUserId(uid);
    if (email) setUserEmail(email);
    // Also fetch email from JWT if not passed
    if (!email) {
      try {
        const payload = JSON.parse(atob(token.split(".")[1]));
        setUserEmail(payload.email || null);
      } catch {}
    }
  }} />;

  if (loading) return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
      <div style={{ fontSize: 32, fontWeight: 800, color: "#E8EAF0" }}>PROJECT PRIME</div>
      <div style={{ color: "#8B92A5", fontSize: 14 }}>Loading your data...</div>
    </div>
  );

  if (dbError) return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16, padding: 32 }}>
      <div style={{ fontSize: 32, fontWeight: 800, color: "#E8EAF0" }}>PROJECT PRIME</div>
      <div style={{ color: "#D94A4A", fontSize: 15, textAlign: "center" }}>Could not connect. Your locally saved data is safe — check your connection and retry.</div>
      <button onClick={() => loadAll(session, userId)} style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 8, padding: "10px 24px", fontSize: 14, cursor: "pointer" }}>Retry</button>
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100dvh", minHeight: "-webkit-fill-available", background: "#0F1117", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", color: "#E8EAF0" }}>

      {/* Phase modal */}
      {showPhaseModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 400, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#1A1D26", borderRadius: 16, padding: 8, maxWidth: 700, width: "100%", maxHeight: "90vh", overflowY: "auto", boxShadow: "0 24px 80px rgba(0,0,0,0.6)" }}>
            <div style={{ display: "flex", justifyContent: "flex-end", padding: "8px 8px 0" }}>
              <button onClick={() => setShowPhaseModal(false)} style={{ background: "#2A2D3A", border: "none", color: "#8B92A5", fontSize: 18, cursor: "pointer", width: 36, height: 36, borderRadius: 8 }}>×</button>
            </div>
            <div style={{ padding: "0 16px 16px" }}>
              <PhaseTracker phase={phase} setPhase={savePhase} />
            </div>
          </div>
        </div>
      )}

      {/* Top header */}
      <div style={{ background: "#1A1D26", borderBottom: "1px solid #2A2D3A", padding: "10px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
          <div style={{ fontSize: 18, fontWeight: 800, letterSpacing: "-0.5px", color: "#E8EAF0" }}>PROJECT PRIME</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {/* Phase toggle */}
          <button onClick={() => setShowPhaseModal(true)}
            style={{ background: phaseCfg ? phaseCfg.bg : "#2A2D3A", border: phaseCfg ? "1px solid " + phaseCfg.color + "44" : "1px solid #2A2D3A", borderRadius: 8, padding: "5px 12px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 14 }}>{phaseCfg ? phaseCfg.icon : "🗓️"}</span>
            {phase && phaseCfg && phaseInfo ? (
              <span style={{ color: phaseCfg.color, fontSize: 12, fontWeight: 700 }}>{phaseCfg.label} · {phaseInfo.remaining}d · Wk {Math.min(phaseInfo.week, phaseInfo.totalWeeks)}</span>
            ) : (
              <span style={{ color: "#8B92A5", fontSize: 12 }}>Set Phase</span>
            )}
          </button>
          <button onClick={signOut} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 12, cursor: "pointer" }}>
            Sign Out
          </button>
        </div>
      </div>

      {/* DEV BANNER — only visible when logged in as dev account */}
      {isDevUser && (
        <>
          {/* Dev modal */}
          {devModal && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 700, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
              <div style={{ background: "#1A1D26", borderRadius: 16, border: "1px solid #E8A83866", padding: 32, maxWidth: 440, width: "100%" }}>
                <div style={{ color: "#E8A838", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 16 }}>
                  {devModal === "seed" ? "🌱 DEV DATA SEEDING" : "🗑️ CLEAR DEV DATA"}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10, background: "#0F1117", borderRadius: 10, padding: "14px 16px", marginBottom: 20, fontSize: 13 }}>
                  <div><span style={{ color: "#4B5563" }}>Signed in as: </span><span style={{ color: "#4AD99A", fontWeight: 700 }}>{userEmail}</span></div>
                  <div><span style={{ color: "#4B5563" }}>Target user_id: </span><span style={{ color: "#8B92A5", fontFamily: "monospace", fontSize: 11 }}>{userId}</span></div>
                  <div style={{ color: "#4B5563", fontSize: 12, borderTop: "1px solid #2A2D3A", paddingTop: 10, marginTop: 4 }}>
                    {devModal === "seed"
                      ? "This will insert 90 days of synthetic Project Prime data for this account only."
                      : "This will permanently delete ALL data for this account. Real account is unaffected."}
                  </div>
                </div>
                <div style={{ marginBottom: 16 }}>
                  <label style={{ color: "#8B92A5", fontSize: 12, display: "block", marginBottom: 6 }}>
                    Type <strong style={{ color: devModal === "seed" ? "#E8A838" : "#D94A4A" }}>{devModal === "seed" ? "SEED" : "CLEAR"}</strong> to continue
                  </label>
                  <input autoFocus value={devConfirmText} onChange={e => setDevConfirmText(e.target.value.toUpperCase())}
                    placeholder={devModal === "seed" ? "SEED" : "CLEAR"}
                    style={{ ...inputStyle, fontSize: 15, fontWeight: 700, letterSpacing: "0.1em", textAlign: "center" }} />
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => { setDevModal(null); setDevConfirmText(""); }}
                    style={{ flex: 1, background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 9, height: 48, fontSize: 14, cursor: "pointer" }}>
                    Cancel
                  </button>
                  <button
                    disabled={seeding || (devModal === "seed" ? devConfirmText !== "SEED" : devConfirmText !== "CLEAR")}
                    onClick={async () => {
                      if (devModal === "seed") {
                        setSeeding(true); setDevModal(null); setDevConfirmText("");
                        localStorage.removeItem("pp_draft_workout");
                        localStorage.removeItem("pp_draft_recovery");
                        const result = await seedDevData(session, userId);
                        setSeedResult(result); setSeeding(false);
                        loadAll(session, userId);
                      } else {
                        setSeeding(true); setDevModal(null); setDevConfirmText("");
                        // Clear all dev data for this user_id
                        const h = { "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer " + session, "Content-Type": "application/json" };
                        await Promise.all([
                          fetch(SUPABASE_URL + "/rest/v1/workout_logs?user_id=eq." + userId,    { method: "DELETE", headers: h }),
                          fetch(SUPABASE_URL + "/rest/v1/body_logs?user_id=eq." + userId,       { method: "DELETE", headers: h }),
                          fetch(SUPABASE_URL + "/rest/v1/nutrition_days?user_id=eq." + userId,  { method: "DELETE", headers: h }),
                          fetch(SUPABASE_URL + "/rest/v1/recovery_sessions?user_id=eq." + userId, { method: "DELETE", headers: h }),
                          fetch(SUPABASE_URL + "/rest/v1/phase_data?user_id=eq." + userId,      { method: "DELETE", headers: h }),
                        ]);
                        // Clear localStorage caches so stale data doesn't flood back in via merge logic
                        localStorage.removeItem(LS_KEYS.workout);
                        localStorage.removeItem(LS_KEYS.body);
                        localStorage.removeItem("pp_weekly_review");
                        localStorage.removeItem("pp_score_history");
                        localStorage.removeItem("pp_workout_ended");
                        localStorage.removeItem("pp_draft_workout");
                        localStorage.removeItem("pp_draft_recovery");
                        setSeedResult(null); setSeeding(false);
                        loadAll(session, userId);
                      }
                    }}
                    style={{ flex: 1, background: seeding || (devModal === "seed" ? devConfirmText !== "SEED" : devConfirmText !== "CLEAR") ? "#2A2D3A" : devModal === "seed" ? "#E8A838" : "#D94A4A",
                      color: seeding || (devModal === "seed" ? devConfirmText !== "SEED" : devConfirmText !== "CLEAR") ? "#4B5563" : "#0F1117",
                      border: "none", borderRadius: 9, height: 48, fontSize: 14, fontWeight: 800, cursor: "pointer" }}>
                    {seeding ? "Working..." : devModal === "seed" ? "Seed Data" : "Clear All Data"}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Dev toolbar */}
          <div style={{ background: "#E8A83811", borderBottom: "2px solid #E8A83866", padding: "7px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <span style={{ color: "#E8A838", fontSize: 12, fontWeight: 700 }}>🧪 DEV ACCOUNT</span>
              <span style={{ color: "#4B5563", fontSize: 11, fontFamily: "monospace" }}>{userEmail}</span>
              {seeding && <span style={{ color: "#8B92A5", fontSize: 11 }}>Working...</span>}
              {seedResult && !seeding && <span style={{ color: "#4AD99A", fontSize: 11 }}>✓ {seedResult.workoutLogs} workouts · {seedResult.bodyLogs} body logs · {seedResult.nutritionLogs} nutrition · {seedResult.recoverySessions} recovery</span>}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => { setDevModal("clear"); setDevConfirmText(""); }} disabled={seeding}
                style={{ background: "#D94A4A22", color: "#D94A4A", border: "1px solid #D94A4A44", borderRadius: 7, padding: "5px 12px", fontSize: 12, fontWeight: 700, cursor: seeding ? "default" : "pointer" }}>
                🗑️ Clear Dev Data
              </button>
              <button onClick={() => { setDevModal("seed"); setDevConfirmText(""); }} disabled={seeding}
                style={{ background: seeding ? "#2A2D3A" : "#E8A838", color: seeding ? "#4B5563" : "#0F1117", border: "none", borderRadius: 7, padding: "5px 12px", fontSize: 12, fontWeight: 700, cursor: seeding ? "default" : "pointer" }}>
                🌱 Seed Dev Data
              </button>
            </div>
          </div>
        </>
      )}

      {/* Main content */}
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px 0", minHeight: 0, WebkitOverflowScrolling: "touch", paddingBottom: "calc(env(safe-area-inset-bottom, 0px) + 20px)" }}>
        {tab === "workout"   && <WorkoutTab exercises={exercises} workoutLogs={workoutLogs} onLogExercise={addWorkoutLog} onEditSet={editWorkoutSet} onSaveSummary={saveWorkoutSummary} session={session} userId={userId} />}
        {tab === "progress"  && <ProgressTab exercises={exercises} workoutLogs={workoutLogs} />}
        {tab === "body"      && <BodyTab bodyLogs={bodyLogs} onSave={addBodyLog} workoutLogs={workoutLogs} exercises={exercises} nutritionDays={nutritionDays} recoverySessions={recoverySessions} phase={phase} phaseInfo={phaseInfo} />}
        {tab === "nutrition" && <NutritionTab nutritionDays={nutritionDays} onSaveDay={saveNutritionDay} session={session} userId={userId} phase={phase} />}
        {tab === "recovery"  && <RecoveryTab recoverySessions={recoverySessions} onSaveSession={saveRecoverySession} />}
      </div>

      {/* Bottom tab bar */}
      <div style={{ background: "#1A1D26", borderTop: "1px solid #2A2D3A", display: "flex", flexShrink: 0, paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
        {NAV.map(n => (
          <button key={n.id} onClick={() => setTab(n.id)}
            style={{ flex: 1, background: tab === n.id ? "#4A90D911" : "none", border: "none", padding: "10px 4px 12px", cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 2, minWidth: 0 }}>
            <span style={{ fontSize: 24 }}>{n.icon}</span>
            <span style={{ fontSize: 10, color: tab === n.id ? "#4A90D9" : "#4B5563", fontWeight: tab === n.id ? 700 : 400, whiteSpace: "nowrap" }}>{n.label}</span>
            {tab === n.id && <div style={{ width: 20, height: 2, background: "#4A90D9", borderRadius: 1, marginTop: 1 }} />}
          </button>
        ))}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
