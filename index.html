function NutritionTab({ nutritionDays, onSaveDay, session, userId, phase }) {
  const [view, setView] = useState("log"); // "log" | "history"
  const [pasteText, setPasteText] = useState("");
  const [parsing, setParsing] = useState(false);
  const [parseError, setParseError] = useState("");
  const [preview, setPreview] = useState(null);
  const [saving, setSaving] = useState(false);
  const [savedMsg, setSavedMsg] = useState("");

  // Targets come from phase (single source of truth) — edit in Phase Tracker
  const T = getTargets(phase);
  const today = new Date().toISOString().split("T")[0];
  const todayRecord = nutritionDays.find(d => d.date === today);
  const recentDays = [...nutritionDays].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 14);

  const parseWithGPT = async () => {
    if (!pasteText.trim()) return;
    setParsing(true); setParseError(""); setPreview(null);
    const systemPrompt = `You are a nutrition data extractor. Extract data from ANY format and return ONLY valid JSON, no markdown, no explanation.

Return this exact structure:
{
  "date": "YYYY-MM-DD",
  "phase": "${phase ? (phase.type === 'gain' ? 'Gain Phase' : 'Cut Phase') : 'Gain Phase'}",
  "targets": {"calories": ${T.calories}, "protein": ${T.protein}, "carbs": ${T.carbs}, "fat": ${T.fat}},
  "totals": {"calories": 0, "protein": 0, "carbs": 0, "fat": 0},
  "remaining": {"calories": 0, "protein": 0, "carbs": 0, "fat": 0},
  "compliance": null,
  "notes": null,
  "entries": [{"time": null, "name": "meal name", "items": "foods", "calories": 0, "protein": 0, "carbs": 0, "fat": 0}]
}

Rules: use today (${today}) if no date given. Calculate remaining = targets - totals. Return ONLY the JSON.`;
    try {
      const cleaned = await callAI(systemPrompt, pasteText, 2000);
      const parsed = JSON.parse(cleaned);
      if (!parsed.totals)    parsed.totals    = { calories: 0, protein: 0, carbs: 0, fat: 0 };
      if (!parsed.targets)   parsed.targets   = { calories: T.calories, protein: T.protein, carbs: T.carbs, fat: T.fat };
      if (!parsed.remaining) parsed.remaining = {
        calories: parsed.targets.calories - parsed.totals.calories,
        protein:  parsed.targets.protein  - parsed.totals.protein,
        carbs:    parsed.targets.carbs    - parsed.totals.carbs,
        fat:      parsed.targets.fat      - parsed.totals.fat,
      };
      if (!parsed.entries) parsed.entries = [];
      if (!parsed.date)    parsed.date    = today;
      setPreview(parsed);
    } catch (e) {
      setParseError(`Parse failed: ${e.message}. Try pasting again.`);
    }
    setParsing(false);
  };

    const [saveError, setSaveError] = useState("");

  const saveDay = async () => {
    if (!preview) return;
    setSaving(true); setSaveError("");
    const result = await onSaveDay(preview, pasteText);
    if (result?.ok) {
      setSavedMsg("Nutrition record saved.");
      setPreview(null); setPasteText(""); setView("log");
      setTimeout(() => setSavedMsg(""), 3000);
    } else {
      setSaveError(result?.error || "Save failed — check browser console for details.");
    }
    setSaving(false);
  };

  const MacroBar = ({ label, val, target, color }) => {
    const pct = Math.min(100, (val / target) * 100);
    return (
      <div style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
          <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
          <span style={{ color, fontSize: 13, fontWeight: 700 }}>{val}<span style={{ color: "#4B5563" }}>/{target}{label === "Calories" ? " kcal" : "g"}</span></span>
        </div>
        <div style={{ background: "#0F1117", borderRadius: 4, height: 8 }}>
          <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 4 }} />
        </div>
        <div style={{ color: "#4B5563", fontSize: 10, marginTop: 2 }}>{Math.max(0, target - val)}{label === "Calories" ? " kcal" : "g"} remaining</div>
      </div>
    );
  };

  return (
    <div>
      {/* Header + tab switcher */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Nutrition</h2>
        <div style={{ display: "flex", background: "#1A1D26", borderRadius: 8, padding: 3, border: "1px solid #2A2D3A" }}>
          {[["log", "Log Daily Nutrition"], ["history", "History"]].map(([id, label]) => (
            <button key={id} onClick={() => { setView(id); setPreview(null); setPasteText(""); setParseError(""); }}
              style={{ background: view === id ? "#4A90D9" : "none", color: view === id ? "#fff" : "#8B92A5",
                border: "none", borderRadius: 6, padding: "7px 20px", fontSize: 13, fontWeight: view === id ? 600 : 400, cursor: "pointer" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {savedMsg && <div style={{ background: "#4AD99A22", border: "1px solid #4AD99A44", color: "#4AD99A", borderRadius: 8, padding: "10px 16px", marginBottom: 16, fontWeight: 600 }}>{savedMsg}</div>}

      {/* ── LOG DAILY NUTRITION VIEW ──────────────────────────────────────── */}
      {view === "log" && !preview && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>

          {/* LEFT — Paste area (always visible, no instruction block) */}
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <Card>
              <textarea value={pasteText} onChange={e => setPasteText(e.target.value)}
                placeholder="Paste any nutrition information here — meals, totals, a ChatGPT recap, or any format. GPT-4o will extract the data automatically..."
                style={{ ...inputStyle, height: todayRecord ? 260 : 340, resize: "vertical", fontSize: 13, lineHeight: 1.6 }} />
              {parseError && <div style={{ color: "#D94A4A", fontSize: 13, marginTop: 10 }}>{parseError}</div>}
              <button onClick={parseWithGPT} disabled={parsing || !pasteText.trim()}
                style={{ width: "100%", marginTop: 14, background: parsing || !pasteText.trim() ? "#2A2D3A" : "#4A90D9",
                  color: parsing || !pasteText.trim() ? "#4B5563" : "#fff",
                  border: "none", borderRadius: 10, height: 52, fontSize: 15, fontWeight: 700, cursor: parsing || !pasteText.trim() ? "default" : "pointer" }}>
                {parsing ? "Parsing with GPT-4o..." : "Record Daily Nutrition"}
              </button>
            </Card>

            {/* Meal timeline — shows below paste when today has data */}
            {todayRecord?.entries?.length > 0 && (
              <Card>
                <SectionLabel>Meal Timeline</SectionLabel>
                {todayRecord.entries.map((e, i) => (
                  <div key={i} style={{ paddingBottom: 12, marginBottom: 12, borderBottom: i < todayRecord.entries.length - 1 ? "1px solid #2A2D3A" : "none" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <div>
                        <span style={{ color: "#8B92A5", fontSize: 11 }}>{e.entry_time} · </span>
                        <span style={{ color: "#E8EAF0", fontSize: 14, fontWeight: 600 }}>{e.meal_name}</span>
                      </div>
                      <span style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>{e.calories} kcal</span>
                    </div>
                    {e.items && <div style={{ color: "#4B5563", fontSize: 12, marginBottom: 4 }}>{e.items}</div>}
                    <div style={{ display: "flex", gap: 12 }}>
                      <span style={{ color: "#4A90D9", fontSize: 12 }}>{e.protein}g P</span>
                      <span style={{ color: "#7B68EE", fontSize: 12 }}>{e.carbs}g C</span>
                      <span style={{ color: "#4AD9A0", fontSize: 12 }}>{e.fat}g F</span>
                    </div>
                  </div>
                ))}
              </Card>
            )}
          </div>

          {/* RIGHT — Today's summary + editable targets */}
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

            {/* Today macro summary */}
            {todayRecord ? (
              <Card>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <div>
                    <div style={{ color: "#E8EAF0", fontWeight: 700, fontSize: 16 }}>Today — {todayRecord.phase || "Gain Phase"}</div>
                    {todayRecord.compliance && <div style={{ color: "#4AD99A", fontSize: 12, marginTop: 2 }}>Compliance: {todayRecord.compliance}</div>}
                  </div>
                </div>
                <MacroBar label="Calories" val={todayRecord.total_calories || 0} target={todayRecord.target_calories || T.calories} color="#E8A838" />
                <MacroBar label="Protein"  val={todayRecord.total_protein  || 0} target={todayRecord.target_protein  || T.protein}   color="#4A90D9" />
                <MacroBar label="Carbs"    val={todayRecord.total_carbs    || 0} target={todayRecord.target_carbs    || T.carbs}     color="#7B68EE" />
                <MacroBar label="Fat"      val={todayRecord.total_fat      || 0} target={todayRecord.target_fat      || T.fat}       color="#4AD9A0" />

              </Card>
            ) : null}

            {/* Phase Targets — edit in Phase Tracker (single source of truth) */}
            <Card>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <SectionLabel style={{ margin: 0 }}>Phase Targets</SectionLabel>
                <span style={{ color: "#4B5563", fontSize: 11 }}>Edit in Phase Tracker</span>
              </div>
              {[
                { key: "calories", label: "Calories", unit: "kcal/day", color: "#E8A838" },
                { key: "protein",  label: "Protein",  unit: "g/day",    color: "#4A90D9" },
                { key: "carbs",    label: "Carbs",    unit: "g/day",    color: "#7B68EE" },
                { key: "fat",      label: "Fat",      unit: "g/day",    color: "#4AD9A0" },
              ].map(({ key, label, unit, color }) => (
                <div key={key} style={{ background: "#0F1117", borderRadius: 7, padding: "10px 12px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
                  <div style={{ textAlign: "right" }}>
                    <span style={{ color, fontSize: 14, fontWeight: 700 }}>{T[key]}</span>
                    <div style={{ color: "#4B5563", fontSize: 10 }}>{unit}</div>
                  </div>
                </div>
              ))}
            </Card>
          </div>
        </div>
      )}

      {/* ── PREVIEW + CONFIRM ────────────────────────────────────────────── */}
      {view === "log" && preview && (
        <div style={{ maxWidth: 700 }}>
          <Card style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <div>
                <div style={{ color: "#E8EAF0", fontWeight: 700, fontSize: 16 }}>Preview — {preview.date}</div>
                <div style={{ color: "#8B92A5", fontSize: 13 }}>{preview.phase}</div>
              </div>
              {preview.compliance && <span style={{ background: "#4AD99A22", color: "#4AD99A", padding: "4px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>Compliance: {preview.compliance}</span>}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
              <div>
                <SectionLabel>Totals</SectionLabel>
                <MacroBar label="Calories" val={preview.totals?.calories || 0} target={preview.targets?.calories || T.calories} color="#E8A838" />
                <MacroBar label="Protein"  val={preview.totals?.protein  || 0} target={preview.targets?.protein  || T.protein}   color="#4A90D9" />
                <MacroBar label="Carbs"    val={preview.totals?.carbs    || 0} target={preview.targets?.carbs    || T.carbs}     color="#7B68EE" />
                <MacroBar label="Fat"      val={preview.totals?.fat      || 0} target={preview.targets?.fat      || T.fat}       color="#4AD9A0" />
              </div>
              <div>
                <SectionLabel>Remaining</SectionLabel>
                {[["Calories", preview.remaining?.calories || 0, "#E8A838"],
                  ["Protein",  `${preview.remaining?.protein || 0}g`, "#4A90D9"],
                  ["Carbs",    `${preview.remaining?.carbs   || 0}g`, "#7B68EE"],
                  ["Fat",      `${preview.remaining?.fat     || 0}g`, "#4AD9A0"]].map(([label, val, color]) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid #2A2D3A" }}>
                    <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
                    <span style={{ color, fontSize: 13, fontWeight: 700 }}>{val}</span>
                  </div>
                ))}
              </div>
            </div>
            {preview.notes && <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 16, fontStyle: "italic", borderTop: "1px solid #2A2D3A", paddingTop: 12 }}>{preview.notes}</div>}
          </Card>

          {preview.entries?.length > 0 && (
            <Card style={{ marginBottom: 16 }}>
              <SectionLabel>Meal Timeline ({preview.entries.length} entries)</SectionLabel>
              {preview.entries.map((e, i) => (
                <div key={i} style={{ paddingBottom: 12, marginBottom: 12, borderBottom: i < preview.entries.length - 1 ? "1px solid #2A2D3A" : "none" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                    <div>
                      <span style={{ color: "#8B92A5", fontSize: 11 }}>{e.time} · </span>
                      <span style={{ color: "#E8EAF0", fontSize: 14, fontWeight: 600 }}>{e.name}</span>
                    </div>
                    <span style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>{e.calories} kcal</span>
                  </div>
                  {e.items && <div style={{ color: "#4B5563", fontSize: 12, marginBottom: 3 }}>{e.items}</div>}
                  <div style={{ display: "flex", gap: 12 }}>
                    <span style={{ color: "#4A90D9", fontSize: 12 }}>{e.protein}g P</span>
                    <span style={{ color: "#7B68EE", fontSize: 12 }}>{e.carbs}g C</span>
                    <span style={{ color: "#4AD9A0", fontSize: 12 }}>{e.fat}g F</span>
                  </div>
                </div>
              ))}
            </Card>
          )}

          <div style={{ display: "flex", gap: 12 }}>
            <button onClick={saveDay} disabled={saving}
              style={{ flex: 1, background: saving ? "#2A2D3A" : "#4AD99A", color: saving ? "#4B5563" : "#0F1117",
                border: "none", borderRadius: 10, height: 56, fontSize: 17, fontWeight: 800, cursor: saving ? "default" : "pointer" }}>
              {saving ? "Saving..." : "Save Nutrition Record"}
            </button>
            <button onClick={() => setPreview(null)}
              style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 10, height: 56, padding: "0 20px", fontSize: 14, cursor: "pointer" }}>
              Re-paste
            </button>
          </div>
          {saveError && <div style={{ color: "#D94A4A", fontSize: 13, marginTop: 12, background: "#D94A4A11", border: "1px solid #D94A4A44", borderRadius: 8, padding: "10px 14px" }}>{saveError}</div>}
        </div>
      )}

      {/* ── HISTORY VIEW ─────────────────────────────────────────────────── */}
      {view === "history" && (
        <NutritionHistoryView recentDays={recentDays} />
      )}
    </div>
  );
}

function RecoveryTab({ recoverySessions, onSaveSession }) {
  const [view, setView] = useState("recover");
  const [sessionStep, setSessionStep] = useState(null);
  const [selectedTemplate, setSelectedTemplate] = useState(null);
  const [checklist, setChecklist] = useState([]);
  const [beforeMetrics, setBeforeMetrics] = useState({ energy: 3, soreness: 3, heel_pain: 0, low_back: 0 });
  const [afterMetrics, setAfterMetrics] = useState({ energy: 3, soreness: 3, heel_pain: 0, low_back: 0 });
  const [resultRating, setResultRating] = useState(null);
  const [sessionStart, setSessionStart] = useState(null);
  const [saving, setSaving] = useState(false);
  const [saveError, setSaveError] = useState("");
  const [lastSession, setLastSession] = useState(null);
  const [draftPrompt, setDraftPrompt] = useState(null); // null | { status, draft }

  // ── Check for draft on mount ───────────────────────────────────────────────
  useEffect(() => {
    const draft = loadDraft(DRAFT_KEYS.recovery);
    const status = getDraftStatus(draft);
    if (status === "stale-empty") { clearDraft(DRAFT_KEYS.recovery); return; }
    if (status === "today" || status === "stale-meaningful") {
      setDraftPrompt({ status, draft });
    }
  }, []);

  // ── Save draft whenever meaningful state changes ───────────────────────────
  useEffect(() => {
    if (!selectedTemplate) return;
    saveDraft(DRAFT_KEYS.recovery, {
      template: selectedTemplate,
      checklist,
      step: sessionStep,
      beforeMetrics,
      afterMetrics,
      resultRating,
      sessionStart: sessionStart ? sessionStart.toISOString() : null,
    });
  }, [selectedTemplate, checklist, sessionStep, beforeMetrics, afterMetrics, resultRating]);

  const resumeDraft = (draft) => {
    setSelectedTemplate(draft.template);
    setChecklist(draft.checklist || []);
    setSessionStep(draft.step || "before");
    setBeforeMetrics(draft.beforeMetrics || { energy: 3, soreness: 3, heel_pain: 0, low_back: 0 });
    setAfterMetrics(draft.afterMetrics  || { energy: 3, soreness: 3, heel_pain: 0, low_back: 0 });
    setResultRating(draft.resultRating || null);
    setSessionStart(draft.sessionStart ? new Date(draft.sessionStart) : new Date());
    setDraftPrompt(null);
  };

  const discardDraft = () => {
    clearDraft(DRAFT_KEYS.recovery);
    setDraftPrompt(null);
  };

  const safeSessions = recoverySessions || [];
  const today = new Date().toISOString().split("T")[0];
  const todaySession = safeSessions.find(s => s.date === today);
  const recentSessions = [...safeSessions].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 14);

  const startSession = (template) => {
    setSelectedTemplate(template);
    setChecklist(template.items.map((name, i) => ({ name, cue: RECOVERY_CUES[name] || "", completed: false, sort_order: i })));
    setBeforeMetrics({ energy: 3, soreness: 3, heel_pain: 0, low_back: 0 });
    setAfterMetrics({ energy: 3, soreness: 3, heel_pain: 0, low_back: 0 });
    setResultRating(null);
    setSessionStart(new Date());
    setSessionStep("before");
  };

  const toggleItem = (idx) => {
    setChecklist(prev => prev.map((item, i) => i === idx ? { ...item, completed: !item.completed } : item));
  };

  const completedCount = checklist.filter(i => i.completed).length;

  const saveSession = async () => {
    setSaving(true); setSaveError("");
    const duration = sessionStart ? Math.round((new Date() - sessionStart) / 60000) : 0;
    const sessionData = {
      date: today,
      template_name: selectedTemplate.name,
      duration_minutes: duration,
      completed_count: completedCount,
      total_count: checklist.length,
      before_energy: beforeMetrics.energy,
      after_energy: afterMetrics.energy,
      before_soreness: beforeMetrics.soreness,
      after_soreness: afterMetrics.soreness,
      before_heel_pain: beforeMetrics.heel_pain,
      after_heel_pain: afterMetrics.heel_pain,
      before_low_back_tightness: beforeMetrics.low_back,
      after_low_back_tightness: afterMetrics.low_back,
      result_rating: resultRating,
      items: checklist,
    };
    const ok = await onSaveSession(sessionData);
    if (ok !== false) {
      // Success — clear draft, advance to summary
      clearDraft(DRAFT_KEYS.recovery);
      setLastSession({ ...sessionData, duration });
      setSaving(false);
      setSessionStep("summary");
    } else {
      // Save failed — keep draft, show error
      setSaveError("Save failed. Your session progress is preserved. Try again.");
      setSaving(false);
    }
  };

  const endSession = () => {
    clearDraft(DRAFT_KEYS.recovery);
    setSessionStep(null);
    setSelectedTemplate(null);
    setView("recover");
  };

  const DeltaBadge = ({ before, after, label, lowerIsBetter = false }) => {
    const improved = lowerIsBetter ? after < before : after > before;
    const same = after === before;
    const color = same ? "#4B5563" : improved ? "#4AD99A" : "#D94A4A";
    return (
      <div style={{ background: "#0F1117", borderRadius: 8, padding: "10px 14px" }}>
        <div style={{ color: "#8B92A5", fontSize: 11, marginBottom: 4 }}>{label}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ color: "#E8EAF0", fontSize: 16, fontWeight: 700 }}>{before}</span>
          <span style={{ color, fontSize: 14 }}>→</span>
          <span style={{ color, fontSize: 20, fontWeight: 800 }}>{after}</span>
          {!same && <span style={{ color, fontSize: 11, fontWeight: 700 }}>{improved ? "▲ Better" : "▼ Worse"}</span>}
          {same && <span style={{ color: "#4B5563", fontSize: 11 }}>No change</span>}
        </div>
      </div>
    );
  };

  // ── ACTIVE SESSION ─────────────────────────────────────────────────────────
  if (selectedTemplate && ["before", "checklist", "after"].includes(sessionStep)) {
    return (
      <div style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 20, height: "calc(100dvh - 160px)" }}>
        <div style={{ background: "#1A1D26", borderRadius: 14, border: "1px solid #2A2D3A", padding: 24, display: "flex", flexDirection: "column", overflow: "hidden" }}>

          {/* Session header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24, flexShrink: 0 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                <span style={{ fontSize: 24 }}>{selectedTemplate.icon}</span>
                <span style={{ color: selectedTemplate.color, fontSize: 20, fontWeight: 800 }}>{selectedTemplate.name}</span>
                <span style={{ background: selectedTemplate.color + "22", color: selectedTemplate.color, padding: "2px 8px", borderRadius: 4, fontSize: 11, fontWeight: 700 }}>{selectedTemplate.duration}</span>
              </div>
              <div style={{ color: "#8B92A5", fontSize: 13 }}>{selectedTemplate.purpose}</div>
            </div>
            <button onClick={() => endSession()}
              style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 8, padding: "8px 14px", fontSize: 12, cursor: "pointer" }}>
              Cancel Session
            </button>
          </div>

          {/* Step tabs */}
          <div style={{ display: "flex", background: "#0F1117", borderRadius: 8, padding: 3, marginBottom: 24, flexShrink: 0 }}>
            {[["before", "📊 Before"], ["checklist", "✅ Checklist"], ["after", "📈 After"]].map(([step, label]) => (
              <button key={step} onClick={() => setSessionStep(step)}
                style={{ flex: 1, background: sessionStep === step ? selectedTemplate.color : "none",
                  color: sessionStep === step ? "#0F1117" : "#4B5563",
                  border: "none", borderRadius: 6, padding: "8px 0", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                {label}
              </button>
            ))}
          </div>

          <div style={{ flex: 1, overflowY: "auto" }}>
            {/* BEFORE METRICS */}
            {sessionStep === "before" && (
              <div>
                <div style={{ color: "#E8EAF0", fontSize: 16, fontWeight: 700, marginBottom: 20 }}>How are you feeling right now?</div>
                <MetricSelector label="Energy" value={beforeMetrics.energy} onChange={v => setBeforeMetrics(m => ({ ...m, energy: v }))} max={5} color="#4AD99A" />
                <MetricSelector label="Muscle Soreness" value={beforeMetrics.soreness} onChange={v => setBeforeMetrics(m => ({ ...m, soreness: v }))} max={5} color="#E8A838" />
                <MetricSelector label="Heel Pain" value={beforeMetrics.heel_pain} onChange={v => setBeforeMetrics(m => ({ ...m, heel_pain: v }))} max={10} color="#D94A4A" />
                <MetricSelector label="Low Back Tightness" value={beforeMetrics.low_back} onChange={v => setBeforeMetrics(m => ({ ...m, low_back: v }))} max={10} color="#D94A4A" />
                <button onClick={() => setSessionStep("checklist")}
                  style={{ background: selectedTemplate.color, color: "#0F1117", border: "none", borderRadius: 10, height: 56, width: "100%", fontSize: 17, fontWeight: 800, cursor: "pointer", marginTop: 8 }}>
                  Start Checklist →
                </button>
              </div>
            )}

            {/* CHECKLIST */}
            {sessionStep === "checklist" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <div style={{ color: "#E8EAF0", fontSize: 16, fontWeight: 700 }}>Complete each item</div>
                  <div style={{ color: selectedTemplate.color, fontSize: 14, fontWeight: 700 }}>{completedCount}/{checklist.length}</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
                  {checklist.map((item, i) => (
                    <button key={i} onClick={() => toggleItem(i)}
                      style={{ background: item.completed ? selectedTemplate.color + "22" : "#0F1117",
                        border: item.completed ? "1px solid " + selectedTemplate.color + "44" : "1px solid #2A2D3A",
                        borderRadius: 10, padding: "14px 16px", cursor: "pointer", textAlign: "left", width: "100%" }}>
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
                        <div style={{ width: 28, height: 28, borderRadius: 8, flexShrink: 0, marginTop: 2,
                          background: item.completed ? selectedTemplate.color : "#2A2D3A",
                          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>
                          {item.completed ? "✓" : ""}
                        </div>
                        <div>
                          <div style={{ color: item.completed ? selectedTemplate.color : "#E8EAF0", fontWeight: 700, fontSize: 15, marginBottom: 3 }}>{item.name}</div>
                          {item.cue && <div style={{ color: "#8B92A5", fontSize: 12, lineHeight: 1.5 }}>{item.cue}</div>}
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
                <button onClick={() => setSessionStep("after")}
                  style={{ background: selectedTemplate.color, color: "#0F1117", border: "none", borderRadius: 10, height: 56, width: "100%", fontSize: 17, fontWeight: 800, cursor: "pointer" }}>
                  Record After Metrics →
                </button>
              </div>
            )}

            {/* AFTER METRICS */}
            {sessionStep === "after" && (
              <div>
                {/* Before comparison */}
                <div style={{ background: "#0F1117", borderRadius: 10, padding: "14px 16px", marginBottom: 20, border: "1px solid #2A2D3A" }}>
                  <div style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>Before → After</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    {[["Energy", beforeMetrics?.energy ?? 3, afterMetrics?.energy ?? 3, "#4AD99A", false],
                      ["Soreness", beforeMetrics?.soreness ?? 3, afterMetrics?.soreness ?? 3, "#E8A838", true],
                      ["Heel Pain", beforeMetrics?.heel_pain ?? 0, afterMetrics?.heel_pain ?? 0, "#D94A4A", true],
                      ["Low Back", beforeMetrics?.low_back ?? 0, afterMetrics?.low_back ?? 0, "#D94A4A", true]].map(([label, before, after, color, lib]) => {
                      const improved = lib ? after < before : after > before;
                      const same = after === before;
                      const dc = same ? "#4B5563" : improved ? "#4AD99A" : "#D94A4A";
                      return (
                        <div key={label} style={{ background: "#1A1D26", borderRadius: 8, padding: "8px 12px" }}>
                          <div style={{ color: "#8B92A5", fontSize: 11, marginBottom: 4 }}>{label}</div>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <span style={{ color: "#8B92A5", fontSize: 14, fontWeight: 700 }}>{before}</span>
                            <span style={{ color: dc }}>→</span>
                            <span style={{ color: dc, fontSize: 18, fontWeight: 800 }}>{after}</span>
                            {!same && <span style={{ color: dc, fontSize: 10 }}>{improved ? "▲" : "▼"}</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div style={{ color: "#E8EAF0", fontSize: 15, fontWeight: 700, marginBottom: 16 }}>Update your after metrics:</div>
                <MetricSelector label="Energy" value={afterMetrics.energy} onChange={v => setAfterMetrics(m => ({ ...m, energy: v }))} max={5} color="#4AD99A" />
                <MetricSelector label="Muscle Soreness" value={afterMetrics.soreness} onChange={v => setAfterMetrics(m => ({ ...m, soreness: v }))} max={5} color="#E8A838" />
                <MetricSelector label="Heel Pain" value={afterMetrics.heel_pain} onChange={v => setAfterMetrics(m => ({ ...m, heel_pain: v }))} max={10} color="#D94A4A" />
                <MetricSelector label="Low Back Tightness" value={afterMetrics.low_back} onChange={v => setAfterMetrics(m => ({ ...m, low_back: v }))} max={10} color="#D94A4A" />

                <div style={{ marginBottom: 20, marginTop: 8 }}>
                  <div style={{ color: "#8B92A5", fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>Did you leave better than you arrived?</div>
                  <div style={{ display: "flex", gap: 10 }}>
                    {[["better", "✅ Yes", "#4AD99A"], ["neutral", "➡️ Neutral", "#E8A838"], ["worse", "❌ No", "#D94A4A"]].map(([val, label, color]) => (
                      <button key={val} onClick={() => setResultRating(val)}
                        style={{ flex: 1, height: 52, borderRadius: 10, border: resultRating === val ? "2px solid " + color : "2px solid #2A2D3A",
                          background: resultRating === val ? color + "22" : "#0F1117",
                          color: resultRating === val ? color : "#4B5563", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                        {label}
                      </button>
                    ))}
                  </div>
                </div>

                <button onClick={saveSession} disabled={saving || !resultRating}
                  style={{ background: saving || !resultRating ? "#2A2D3A" : "#4AD99A",
                    color: saving || !resultRating ? "#4B5563" : "#0F1117",
                    border: "none", borderRadius: 10, height: 60, width: "100%", fontSize: 18, fontWeight: 800, cursor: saving || !resultRating ? "default" : "pointer" }}>
                  {saving ? "Saving..." : "Save Recovery Session"}
                </button>
                {saveError && <div style={{ color: "#D94A4A", fontSize: 13, marginTop: 10, background: "#D94A4A11", border: "1px solid #D94A4A44", borderRadius: 8, padding: "10px 14px" }}>{saveError}</div>}
              </div>
            )}
          </div>
        </div>

        {/* Right sidebar — progress */}
        <div style={{ display: "flex", flexDirection: "column", gap: 12, overflowY: "auto" }}>
          <div style={{ background: "#1A1D26", borderRadius: 12, border: "1px solid #2A2D3A", padding: 16 }}>
            <div style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 }}>Session Progress</div>
            <div style={{ background: "#0F1117", borderRadius: 8, padding: "12px 14px", marginBottom: 12 }}>
              <div style={{ color: "#8B92A5", fontSize: 12, marginBottom: 6 }}>Checklist</div>
              <div style={{ color: selectedTemplate.color, fontSize: 28, fontWeight: 800 }}>{completedCount}<span style={{ color: "#4B5563", fontSize: 16 }}>/{checklist.length}</span></div>
              <div style={{ background: "#1A1D26", borderRadius: 4, height: 6, marginTop: 8 }}>
                <div style={{ width: `${checklist.length > 0 ? (completedCount/checklist.length)*100 : 0}%`, height: "100%", background: selectedTemplate.color, borderRadius: 4, transition: "width 0.3s" }} />
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {checklist.map((item, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0" }}>
                  <div style={{ width: 18, height: 18, borderRadius: 4, flexShrink: 0,
                    background: item.completed ? selectedTemplate.color : "#2A2D3A",
                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11 }}>
                    {item.completed ? "✓" : ""}
                  </div>
                  <span style={{ color: item.completed ? "#E8EAF0" : "#4B5563", fontSize: 12, textDecoration: item.completed ? "none" : "none" }}>{item.name}</span>
                </div>
              ))}
            </div>
          </div>

          {sessionStep !== "before" && (
            <div style={{ background: "#1A1D26", borderRadius: 12, border: "1px solid #2A2D3A", padding: 16 }}>
              <div style={{ color: "#4B5563", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 }}>Before Metrics</div>
              {[["Energy", beforeMetrics.energy, 5, "#4AD99A"], ["Soreness", beforeMetrics.soreness, 5, "#E8A838"], ["Heel Pain", beforeMetrics.heel_pain, 10, "#D94A4A"], ["Low Back", beforeMetrics.low_back, 10, "#D94A4A"]].map(([label, val, max, color]) => (
                <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #2A2D3A" }}>
                  <span style={{ color: "#8B92A5", fontSize: 12 }}>{label}</span>
                  <span style={{ color, fontSize: 13, fontWeight: 700 }}>{val}/{max}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── SESSION SUMMARY ────────────────────────────────────────────────────────
  if (selectedTemplate && sessionStep === "summary" && lastSession) {
    const ratingConfig = { better: { color: "#4AD99A", label: "✅ Better", icon: "🎉" }, neutral: { color: "#E8A838", label: "➡️ Neutral", icon: "😐" }, worse: { color: "#D94A4A", label: "❌ Worse", icon: "😔" } };
    const rc = ratingConfig[lastSession.result_rating] || ratingConfig.neutral;
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "60vh" }}>
        <div style={{ background: "#1A1D26", borderRadius: 16, border: "1px solid #4AD99A44", padding: 40, maxWidth: 560, width: "100%", textAlign: "center" }}>
          <div style={{ fontSize: 44, marginBottom: 12 }}>{rc.icon}</div>
          <div style={{ fontSize: 26, fontWeight: 800, color: "#4AD99A", marginBottom: 4 }}>Recovery Session Complete</div>
          <div style={{ color: "#8B92A5", fontSize: 14, marginBottom: 28 }}>{lastSession.template_name} · {lastSession.duration} min · {lastSession.completed_count}/{lastSession.total_count} items</div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 24, textAlign: "left" }}>
            <DeltaBadge label="Energy" before={lastSession.before_energy} after={lastSession.after_energy} color="#4AD99A" />
            <DeltaBadge label="Muscle Soreness" before={lastSession.before_soreness} after={lastSession.after_soreness} lowerIsBetter />
            <DeltaBadge label="Heel Pain" before={lastSession.before_heel_pain} after={lastSession.after_heel_pain} lowerIsBetter />
            <DeltaBadge label="Low Back" before={lastSession.before_low_back_tightness} after={lastSession.after_low_back_tightness} lowerIsBetter />
          </div>

          <div style={{ background: rc.color + "22", border: `1px solid ${rc.color}44`, borderRadius: 10, padding: "12px 20px", marginBottom: 24 }}>
            <div style={{ color: rc.color, fontSize: 18, fontWeight: 800 }}>Did you leave better than you arrived? {rc.label}</div>
          </div>

          <button onClick={endSession}
            style={{ background: "#4AD99A", color: "#0F1117", border: "none", borderRadius: 10, height: 52, width: "100%", fontSize: 16, fontWeight: 800, cursor: "pointer" }}>
            Done
          </button>
        </div>
      </div>
    );
  }

  // ── MAIN VIEWS ─────────────────────────────────────────────────────────────
  return (
    <div>
      {/* Draft recovery prompt */}
      {draftPrompt && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 600, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#1A1D26", borderRadius: 16, border: "1px solid #E8A83844", padding: 32, maxWidth: 420, width: "100%" }}>
            <div style={{ fontSize: 28, marginBottom: 12, textAlign: "center" }}>🌿</div>
            <div style={{ color: "#E8EAF0", fontSize: 18, fontWeight: 700, marginBottom: 8, textAlign: "center" }}>
              {draftPrompt.status === "today" ? "Resume previous session?" : "Unfinished session found"}
            </div>
            <div style={{ color: "#8B92A5", fontSize: 13, marginBottom: 6, textAlign: "center", lineHeight: 1.6 }}>
              {draftPrompt.status === "today"
                ? "You have an unfinished recovery session from earlier today."
                : "Previous unfinished session from " + new Date(draftPrompt.draft.date + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" }) + "."}
            </div>
            {draftPrompt.draft.template && (
              <div style={{ background: "#0F1117", borderRadius: 8, padding: "10px 14px", marginBottom: 20, textAlign: "center" }}>
                <div style={{ color: "#4AD99A", fontSize: 13, fontWeight: 700 }}>{draftPrompt.draft.template.name}</div>
                <div style={{ color: "#4B5563", fontSize: 11, marginTop: 2 }}>
                  {draftPrompt.draft.checklist ? draftPrompt.draft.checklist.filter(function(i) { return i.completed; }).length : 0} of {draftPrompt.draft.checklist ? draftPrompt.draft.checklist.length : 0} exercises completed
                </div>
              </div>
            )}
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {draftPrompt.status === "today" && (
                <button onClick={() => resumeDraft(draftPrompt.draft)}
                  style={{ background: "#4AD99A", color: "#0F1117", border: "none", borderRadius: 10, height: 52, fontSize: 16, fontWeight: 800, cursor: "pointer" }}>
                  Resume Session
                </button>
              )}
              <button onClick={discardDraft}
                style={{ background: "#D94A4A22", color: "#D94A4A", border: "1px solid #D94A4A44", borderRadius: 10, height: 48, fontSize: 14, cursor: "pointer" }}>
                {draftPrompt.status === "today" ? "Discard & Start Fresh" : "Discard Old Session"}
              </button>
            </div>
          </div>
        </div>
      )}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Recovery</h2>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>Maintain the machine so training can continue for decades.</div>
        </div>
        <div style={{ display: "flex", background: "#1A1D26", borderRadius: 8, padding: 3, border: "1px solid #2A2D3A" }}>
          {[["recover", "Recover"], ["history", "History"]].map(([id, label]) => (
            <button key={id} onClick={() => setView(id)}
              style={{ background: view === id ? "#4A90D9" : "none", color: view === id ? "#fff" : "#8B92A5",
                border: "none", borderRadius: 6, padding: "7px 16px", fontSize: 13, fontWeight: view === id ? 600 : 400, cursor: "pointer" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* RECOVER VIEW — Template cards + today's status */}
      {view === "recover" && (
        <div>
          {/* Today's session status bar */}
          {todaySession && (
            <div style={{ background: "#4AD99A11", border: "1px solid #4AD99A33", borderRadius: 10, padding: "12px 20px", marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ color: "#4AD99A", fontWeight: 700, fontSize: 14 }}>✓ Session Complete Today</div>
                <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>{todaySession.template_name} · {todaySession.duration_minutes} min · {todaySession.completed_count}/{todaySession.total_count} items</div>
              </div>
              {todaySession.result_rating && (
                <div style={{ background: todaySession.result_rating === "better" ? "#4AD99A22" : todaySession.result_rating === "neutral" ? "#E8A83822" : "#D94A4A22",
                  color: todaySession.result_rating === "better" ? "#4AD99A" : todaySession.result_rating === "neutral" ? "#E8A838" : "#D94A4A",
                  padding: "6px 14px", borderRadius: 8, fontSize: 13, fontWeight: 700 }}>
                  {todaySession.result_rating === "better" ? "✅ Better" : todaySession.result_rating === "neutral" ? "➡️ Neutral" : "❌ Worse"}
                </div>
              )}
            </div>
          )}

          {/* Template cards — full layout, these ARE the Recover tab */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, alignItems: "stretch" }}>
            {RECOVERY_TEMPLATES.map((t, i) => (
              <Card key={i} style={{ border: `1px solid ${t.color}33`, display: "flex", flexDirection: "column" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                  <span style={{ fontSize: 28 }}>{t.icon}</span>
                  <div>
                    <div style={{ color: t.color, fontWeight: 800, fontSize: 16 }}>{t.name}</div>
                    <div style={{ color: "#8B92A5", fontSize: 12 }}>{t.duration} · {t.items.length} exercises</div>
                  </div>
                </div>
                <div style={{ color: "#8B92A5", fontSize: 13, marginBottom: 14, fontStyle: "italic" }}>{t.purpose}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 16, flex: 1 }}>
                  {t.items.map((item, ii) => (
                    <div key={ii} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ width: 5, height: 5, borderRadius: "50%", background: t.color, flexShrink: 0 }} />
                      <span style={{ color: "#C8CDD8", fontSize: 12 }}>{item}</span>
                    </div>
                  ))}
                </div>
                <button onClick={() => startSession(t)}
                  style={{ background: t.color, color: "#0F1117", border: "none", borderRadius: 9, height: 48, width: "100%", fontSize: 14, fontWeight: 800, cursor: "pointer", marginTop: "auto" }}>
                  Start Session
                </button>
              </Card>
            ))}
          </div>
        </div>
      )}

      {/* HISTORY VIEW */}
      {view === "history" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {recentSessions.length === 0 ? (
            <Card style={{ textAlign: "center", padding: 40 }}>
              <div style={{ color: "#3A3D4A", fontSize: 14 }}>No recovery sessions yet. Start one from the Recover tab.</div>
            </Card>
          ) : recentSessions.map((s, i) => (
            <RecoverySessionCard key={i} s={s} />
          ))}
        </div>
      )}

      {/* TEMPLATES — shown inside Recover tab */}
      {view === "recover_extra_hidden" && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          {RECOVERY_TEMPLATES.map((t, i) => (
            <Card key={i} style={{ border: `1px solid ${t.color}33` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <span style={{ fontSize: 28 }}>{t.icon}</span>
                <div>
                  <div style={{ color: t.color, fontWeight: 800, fontSize: 16 }}>{t.name}</div>
                  <div style={{ color: "#8B92A5", fontSize: 12 }}>{t.duration} · {t.items.length} exercises</div>
                </div>
              </div>
              <div style={{ color: "#8B92A5", fontSize: 13, marginBottom: 14, fontStyle: "italic" }}>{t.purpose}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 16 }}>
                {t.items.map((item, ii) => (
                  <div key={ii} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ width: 5, height: 5, borderRadius: "50%", background: t.color, flexShrink: 0 }} />
                    <span style={{ color: "#C8CDD8", fontSize: 12 }}>{item}</span>
                  </div>
                ))}
              </div>
              <button onClick={() => { startSession(t); setView("recover"); }}
                style={{ background: t.color, color: "#0F1117", border: "none", borderRadius: 9, height: 48, width: "100%", fontSize: 14, fontWeight: 800, cursor: "pointer" }}>
                Start Session
              </button>
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

function RecoverySessionCard({ s }) {
  const [expanded, setExpanded] = useState(false);
  const rc = { better: "#4AD99A", neutral: "#E8A838", worse: "#D94A4A" }[s.result_rating] || "#4B5563";
  return (
    <div style={{ background: "#1A1D26", borderRadius: 12, border: expanded ? "1px solid " + rc + "44" : "1px solid #2A2D3A", overflow: "hidden" }}>
      <button onClick={() => setExpanded(e => !e)}
        style={{ width: "100%", background: "none", border: "none", padding: "16px 20px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", textAlign: "left" }}>
        <div>
          <div style={{ color: "#E8EAF0", fontWeight: 700, fontSize: 15 }}>{new Date(s.date + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })}</div>
          <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>{s.template_name} · {s.duration_minutes} min · {s.completed_count}/{s.total_count} items</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ color: rc, fontSize: 14, fontWeight: 700 }}>{s.result_rating === "better" ? "✅ Better" : s.result_rating === "neutral" ? "➡️ Neutral" : "❌ Worse"}</div>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: "#2A2D3A", display: "flex", alignItems: "center", justifyContent: "center", color: "#4A90D9", fontSize: 13, fontWeight: 700 }}>{expanded ? "▲" : "▼"}</div>
        </div>
      </button>
      {expanded && (
        <div style={{ padding: "0 20px 16px", borderTop: "1px solid #2A2D3A" }}>

          {/* Program + Exercises completed */}
          <div style={{ marginTop: 14, marginBottom: 14 }}>
            <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>
              Program · {s.template_name}
            </div>
            {s.items && s.items.length > 0 ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {s.items.map((item, ii) => (
                  <div key={ii} style={{ display: "flex", alignItems: "center", gap: 8, background: "#0F1117", borderRadius: 7, padding: "7px 12px" }}>
                    <span style={{ fontSize: 12, flexShrink: 0 }}>{item.completed ? "✅" : "⬜"}</span>
                    <span style={{ color: item.completed ? "#C8CDD8" : "#4B5563", fontSize: 12, fontWeight: item.completed ? 500 : 400 }}>{item.name}</span>
                    {item.cue && item.completed && <span style={{ color: "#4B5563", fontSize: 11, marginLeft: "auto", fontStyle: "italic" }}>{item.cue}</span>}
                  </div>
                ))}
                <div style={{ color: "#8B92A5", fontSize: 11, marginTop: 4 }}>
                  {s.completed_count} of {s.total_count} exercises completed · {s.duration_minutes} min
                </div>
              </div>
            ) : (
              <div style={{ color: "#4B5563", fontSize: 12 }}>{s.completed_count}/{s.total_count} exercises completed · {s.duration_minutes} min</div>
            )}
          </div>

          {/* Feeling improvement metrics */}
          <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>Feeling Improvement</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
            {[["Energy", s.before_energy, s.after_energy, false],
              ["Soreness", s.before_soreness, s.after_soreness, true],
              ["Heel Pain", s.before_heel_pain, s.after_heel_pain, true],
              ["Low Back", s.before_low_back_tightness, s.after_low_back_tightness, true]].map(([label, before, after, lib]) => {
              const improved = lib ? after < before : after > before;
              const same = after === before;
              const dc = same ? "#4B5563" : improved ? "#4AD99A" : "#D94A4A";
              return (
                <div key={label} style={{ background: "#0F1117", borderRadius: 8, padding: "10px 12px" }}>
                  <div style={{ color: "#8B92A5", fontSize: 11, marginBottom: 4 }}>{label}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ color: "#E8EAF0", fontSize: 14, fontWeight: 700 }}>{before}</span>
                    <span style={{ color: dc }}>→</span>
                    <span style={{ color: dc, fontSize: 18, fontWeight: 800 }}>{after}</span>
                    {!same && <span style={{ color: dc, fontSize: 10 }}>{improved ? "▲" : "▼"}</span>}
                  </div>
                </div>
              );
            })}
          </div>
          {s.notes && <div style={{ color: "#8B92A5", fontSize: 12, fontStyle: "italic", borderTop: "1px solid #2A2D3A", paddingTop: 10 }}>{s.notes}</div>}
        </div>
      )}
    </div>
  );
}

// ─── PHASE TRACKER ────────────────────────────────────────────────────────────

// ── PhaseTargetsCard — editable daily targets, stored on the phase object ────
function PhaseTargetsCard({ phase, setPhase }) {
  const defaults = { calories: phase?.type === "cut" ? 1600 : 2650, protein: 191, carbs: 220, fat: 65 };
  const current = { ...defaults, ...(phase?.targets || {}) };
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(current);
  const [saving, setSaving] = useState(false);
  const [saveMsg, setSaveMsg] = useState(null);

  // Re-sync draft when phase.targets changes (e.g. after DB round-trip)
  useEffect(() => {
    if (!editing) {
      const fresh = { calories: phase?.type === "cut" ? 1600 : 2650, protein: 191, carbs: 220, fat: 65, ...(phase?.targets || {}) };
      setDraft(fresh);
    }
  }, [phase]);

  const save = async () => {
    setSaving(true); setSaveMsg(null);
    if (!phase?.id) {
      console.error("PhaseTargetsCard: phase has no id — cannot save targets", phase);
      setSaving(false);
      setSaveMsg("Error — no phase ID");
      setTimeout(() => setSaveMsg(null), 3000);
      return;
    }
    const updated = { ...phase, targets: draft };
    await setPhase(updated);
    setSaving(false);
    setEditing(false);
    setSaveMsg("Saved");
    setTimeout(() => setSaveMsg(null), 2000);
  };

  const T = editing ? draft : current;

  return (
    <Card>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <SectionLabel style={{ margin: 0 }}>Daily Targets</SectionLabel>
        {!editing ? (
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {saveMsg && <span style={{ color: "#4AD99A", fontSize: 11, fontWeight: 700 }}>{saveMsg}</span>}
            <button onClick={() => { setDraft(current); setEditing(true); }}
              style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 6, padding: "4px 10px", fontSize: 12, cursor: "pointer" }}>
              Edit
            </button>
          </div>
        ) : (
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={save} disabled={saving}
              style={{ background: saving ? "#2A2D3A" : "#4AD99A", color: saving ? "#8B92A5" : "#0F1117", border: "none", borderRadius: 6, padding: "4px 10px", fontSize: 12, fontWeight: 700, cursor: saving ? "default" : "pointer" }}>
              {saving ? "Saving…" : "Save"}
            </button>
            <button onClick={() => setEditing(false)} disabled={saving}
              style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 6, padding: "4px 10px", fontSize: 12, cursor: "pointer" }}>
              Cancel
            </button>
          </div>
        )}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {[
          { key: "calories", label: "Calories", unit: "kcal/day", color: "#E8A838" },
          { key: "protein",  label: "Protein",  unit: "g/day",    color: "#4A90D9" },
          { key: "carbs",    label: "Carbs",    unit: "g/day",    color: "#7B68EE" },
          { key: "fat",      label: "Fat",      unit: "g/day",    color: "#4AD9A0" },
        ].map(({ key, label, unit, color }) => (
          <div key={key} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#0F1117", borderRadius: 7, padding: "8px 12px" }}>
            <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
            {editing ? (
              <input type="number" value={draft[key]}
                onChange={e => setDraft(d => ({ ...d, [key]: Number(e.target.value) }))}
                style={{ background: "#1A1D26", border: `1px solid ${color}44`, borderRadius: 6, color, fontSize: 14, fontWeight: 700,
                  width: 80, padding: "3px 8px", textAlign: "right", outline: "none", fontFamily: "inherit" }} />
            ) : (
              <span style={{ color, fontSize: 15, fontWeight: 700 }}>{T[key]} <span style={{ fontSize: 11, fontWeight: 400, color: "#4B5563" }}>{unit}</span></span>
            )}
          </div>
        ))}
      </div>
    </Card>
  );
}

function PhaseTracker({ phase, setPhase }) {
  const [showSetup, setShowSetup] = useState(!phase);
  const [setupType, setSetupType] = useState("gain");
  const [setupStart, setSetupStart] = useState(new Date().toISOString().split("T")[0]);

  const cfg = phase ? PHASE_CONFIG[phase.type] : null;

  const startPhase = () => {
    const start = new Date(setupStart);
    if (isNaN(start.getTime())) return; // guard against invalid date
    const weeks = PHASE_CONFIG[setupType].weeks;
    const end = new Date(start);
    end.setDate(end.getDate() + weeks * 7);
    setPhase({ type: setupType, startDate: start.toISOString(), endDate: end.toISOString(), history: phase?.history || [] });
    setShowSetup(false);
  };

  const completePhase = () => {
    const history = [...(phase.history || []), { type: phase.type, startDate: phase.startDate, endDate: new Date().toISOString() }];
    setPhase({ ...phase, history });
    setShowSetup(true);
    setSetupType(phase.type === "gain" ? "cut" : "gain");
  };

  const getDayInfo = () => {
    if (!phase) return null;
    const start = new Date(phase.startDate), end = new Date(phase.endDate), now = new Date();
    const totalDays = Math.round((end - start) / 86400000);
    const elapsed = Math.max(0, Math.round((now - start) / 86400000));
    const remaining = Math.max(0, totalDays - elapsed);
    const pct = Math.min(100, (elapsed / totalDays) * 100);
    const week = Math.floor(elapsed / 7) + 1;
    return { totalDays, elapsed, remaining, pct, week, totalWeeks: cfg.weeks };
  };

  const info = phase ? getDayInfo() : null;
  const history = phase?.history || [];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Phase Tracker</h2>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>Bulk / Cut cycle management</div>
        </div>
        {phase && (
          <button onClick={() => { setShowSetup(true); setSetupType(phase.type); setSetupStart(new Date().toISOString().split("T")[0]); }}
            style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 13, cursor: "pointer" }}>
            Edit Phase
          </button>
        )}
      </div>

      {!phase && !showSetup && (
        <Card style={{ textAlign: "center", padding: 48 }}>
          <div style={{ fontSize: 40, marginBottom: 16 }}>🗓️</div>
          <div style={{ color: "#E8EAF0", fontSize: 18, fontWeight: 700, marginBottom: 8 }}>No active phase</div>
          <button onClick={() => setShowSetup(true)}
            style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 9, padding: "12px 28px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
            Set Up Phase
          </button>
        </Card>
      )}

      {phase && info && (
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 20, marginBottom: 20 }}>
          <Card style={{ border: `1px solid ${cfg.color}44` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                  <span style={{ fontSize: 24 }}>{cfg.icon}</span>
                  <span style={{ fontSize: 22, fontWeight: 800, color: cfg.color }}>{cfg.label}</span>
                </div>
                <div style={{ color: "#8B92A5", fontSize: 13 }}>{cfg.description}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: cfg.color, fontSize: 36, fontWeight: 800, lineHeight: 1 }}>{info.remaining}</div>
                <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>days remaining</div>
              </div>
            </div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ color: "#8B92A5", fontSize: 12 }}>Week {Math.min(info.week, info.totalWeeks)} of {info.totalWeeks}</span>
                <span style={{ color: cfg.color, fontSize: 12, fontWeight: 700 }}>{Math.round(info.pct)}% complete</span>
              </div>
              <div style={{ background: "#0F1117", borderRadius: 6, height: 10 }}>
                <div style={{ width: `${info.pct}%`, height: "100%", background: cfg.color, borderRadius: 6 }} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                <span style={{ color: "#4B5563", fontSize: 11 }}>{fmtDate(phase.startDate)}</span>
                <span style={{ color: "#4B5563", fontSize: 11 }}>{fmtDate(phase.endDate)}</span>
              </div>
            </div>

            <div style={{ display: "flex", gap: 3, marginBottom: 20 }}>
              {Array.from({ length: info.totalWeeks }).map((_, i) => {
                const done = i < info.week - 1, current = i === info.week - 1;
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                    <div style={{ width: "100%", height: 28, borderRadius: 4,
                      background: done ? cfg.color : current ? cfg.color + "66" : "#1A1D26",
                      border: current ? `1px solid ${cfg.color}` : "1px solid #2A2D3A",
                      display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {done && <span style={{ fontSize: 12 }}>✓</span>}
                      {current && <span style={{ color: cfg.color, fontSize: 10, fontWeight: 700 }}>NOW</span>}
                    </div>
                    <div style={{ color: "#3A3D4A", fontSize: 9 }}>W{i + 1}</div>
                  </div>
                );
              })}
            </div>

            <button onClick={completePhase}
              style={{ background: cfg.color, color: "#0F1117", border: "none", borderRadius: 9, padding: "11px 0", width: "100%", fontSize: 14, fontWeight: 800, cursor: "pointer" }}>
              Complete Phase → Start {phase.type === "gain" ? "Cut" : "Gain"}
            </button>
          </Card>

          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <PhaseTargetsCard phase={phase} setPhase={setPhase} />
            <Card>
              <SectionLabel>Phase Stats</SectionLabel>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[["Day", `${info.elapsed + 1} of ${info.totalDays}`], ["Started", fmtDate(phase.startDate)], ["Ends", fmtDate(phase.endDate)], ["Cycles completed", history.length]].map(([label, val]) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between" }}>
                    <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
                    <span style={{ color: "#E8EAF0", fontSize: 13, fontWeight: 700 }}>{val}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>
      )}

      {history.length > 0 && (
        <Card>
          <SectionLabel>Cycle History</SectionLabel>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {history.map((h, i) => {
              const hcfg = PHASE_CONFIG[h.type];
              const days = Math.round((new Date(h.endDate) - new Date(h.startDate)) / 86400000);
              return (
                <div key={i} style={{ background: "#0F1117", borderRadius: 8, padding: "10px 14px", border: `1px solid ${hcfg.color}33` }}>
                  <div style={{ color: hcfg.color, fontWeight: 700, fontSize: 13 }}>{hcfg.icon} {hcfg.label}</div>
                  <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>{fmtDate(h.startDate)} → {fmtDate(h.endDate)}</div>
                  <div style={{ color: "#4B5563", fontSize: 11, marginTop: 1 }}>{days} days</div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {showSetup && (
        <Modal title="Set Up Phase" onClose={() => phase && setShowSetup(false)} width={480}>
          <div style={{ marginBottom: 20 }}>
            <SectionLabel>Phase Type</SectionLabel>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {["gain", "cut"].map(type => {
                const c = PHASE_CONFIG[type];
                return (
                  <button key={type} onClick={() => setSetupType(type)}
                    style={{ background: setupType === type ? c.bg : "#0F1117", border: setupType === type ? "2px solid " + c.color : "2px solid #2A2D3A", borderRadius: 10, padding: "16px 12px", cursor: "pointer", textAlign: "left" }}>
                    <div style={{ fontSize: 22, marginBottom: 6 }}>{c.icon}</div>
                    <div style={{ color: setupType === type ? c.color : "#E8EAF0", fontWeight: 700, fontSize: 15 }}>{c.label}</div>
                    <div style={{ color: "#8B92A5", fontSize: 11, marginTop: 4 }}>{c.weeks} weeks · {c.calories} kcal/day</div>
                  </button>
                );
              })}
            </div>
          </div>
          <div style={{ marginBottom: 20 }}>
            <label style={{ color: "#8B92A5", fontSize: 11, display: "block", marginBottom: 6 }}>Start Date</label>
            <input type="date" value={setupStart} onChange={e => setSetupStart(e.target.value)} style={inputStyle} />
          </div>
          <div style={{ background: "#0F1117", borderRadius: 8, padding: "12px 16px", marginBottom: 20 }}>
            <div style={{ color: "#8B92A5", fontSize: 12, marginBottom: 4 }}>Phase ends on</div>
            <div style={{ color: PHASE_CONFIG[setupType].color, fontSize: 18, fontWeight: 700 }}>
              {(() => { const d = new Date(setupStart); if (isNaN(d.getTime())) return "—"; d.setDate(d.getDate() + PHASE_CONFIG[setupType].weeks * 7); return fmtDateLong(d.toISOString()); })()}
            </div>
          </div>
          <button onClick={startPhase}
            style={{ background: PHASE_CONFIG[setupType].color, color: "#0F1117", border: "none", borderRadius: 9, padding: "13px 0", width: "100%", fontSize: 15, fontWeight: 800, cursor: "pointer" }}>
            Start {PHASE_CONFIG[setupType].label}
          </button>
        </Modal>
      )}
    </div>
  );
}
