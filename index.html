// ─── HELPERS ──────────────────────────────────────────────────────────────────
const sf = (sets, reps, weight, type) => {
  if (type === "bodyweight") return sets * reps * 10;
  if (type === "banded")     return sets * reps;
  return sets * reps * (weight || 0);
};
const fmtDate = (d) => new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric" });
const fmtDateLong = (d) => new Date(d).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });

// ─── SHARED COMPONENTS ────────────────────────────────────────────────────────
function Sparkline({ data, width = 120, height = 40 }) {
  if (!data || data.length < 2) return <span style={{ color: "#3A3D4A", fontSize: 11 }}>No history</span>;
  const vals = data.map(d => d.value);
  const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 6) - 3;
    return `${x},${y}`;
  });
  const trend = vals[vals.length - 1] >= vals[0];
  const lc = trend ? "#4AD99A" : "#D94A4A";
  return (
    <svg width={width} height={height}>
      <polyline points={pts.join(" ")} fill="none" stroke={lc} strokeWidth={2} strokeLinejoin="round" />
      <circle cx={pts[pts.length-1].split(",")[0]} cy={pts[pts.length-1].split(",")[1]} r={3.5} fill={lc} />
    </svg>
  );
}

function BarChart({ data, height = 140 }) {
  if (!data.length) return <div style={{ color: "#3A3D4A", textAlign: "center", padding: "40px 0", fontSize: 13 }}>No sessions logged yet</div>;
  const maxV = Math.max(...data.map(d => d.value));
  const last = data[data.length - 1];
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height }}>
      {data.map((d, i) => {
        const h = Math.max(6, (d.value / maxV) * (height - 30));
        const isLast = i === data.length - 1;
        return (
          <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
            <div style={{ fontSize: 10, color: isLast ? "#E8A838" : "#3A3D4A", fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>
              {isLast ? d.value.toLocaleString() : ""}
            </div>
            <div style={{ width: "100%", height: h, background: isLast ? "#E8A838" : "#4A90D9", borderRadius: "4px 4px 0 0", opacity: isLast ? 1 : 0.5 }} />
            <div style={{ fontSize: 9, color: "#3A3D4A", whiteSpace: "nowrap", transform: "rotate(-30deg)", transformOrigin: "top center", marginTop: 4 }}>
              {fmtDate(d.date)}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function MacroRing({ pct, color, label, val, target, unit }) {
  const r = 36, circ = 2 * Math.PI * r;
  const dash = Math.min(pct / 100, 1) * circ;
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
      <svg width={90} height={90} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={45} cy={45} r={r} fill="none" stroke="#1A1D26" strokeWidth={8} />
        <circle cx={45} cy={45} r={r} fill="none" stroke={color} strokeWidth={8}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{ transition: "stroke-dasharray 0.4s" }} />
      </svg>
      <div style={{ textAlign: "center", marginTop: -8 }}>
        <div style={{ color: "#E8EAF0", fontSize: 18, fontWeight: 700, fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>{val}</div>
        <div style={{ color: "#8B92A5", fontSize: 10 }}>{unit} / {target}</div>
        <div style={{ color, fontSize: 11, fontWeight: 600, marginTop: 2 }}>{label}</div>
      </div>
    </div>
  );
}

}

function WorkoutTab({ exercises, workoutLogs, onLogSet }) {
  const [formGuide, setFormGuide] = useState(null);
  const [logging, setLogging] = useState(null);
  const [logSets, setLogSets] = useState("3");
  const [logReps, setLogReps] = useState("8");
  const [logWeight, setLogWeight] = useState("");
  const [logNotes, setLogNotes] = useState("");

  const active = exercises.filter(e => e.active);
  const lastEntry = (id) => { const l = workoutLogs.filter(x => x.exerciseId === id); return l.length ? l[l.length - 1] : null; };
  const sfHistory = (id) => {
    const ex = exercises.find(e => e.id === id);
    return workoutLogs.filter(x => x.exerciseId === id).map(x => ({ value: sf(x.sets, x.reps, x.weight, ex?.type), date: x.date }));
  };
  const todaySets = workoutLogs.filter(x => new Date(x.date).toDateString() === new Date().toDateString()).length;

  const previewSF = logSets && logReps ? sf(+logSets, +logReps, +logWeight, logging?.type) : null;

  const saveSet = () => {
    onLogSet(logging.id, { sets: +logSets, reps: +logReps, weight: logging.type === "weighted" ? +logWeight : 0, notes: logNotes, date: new Date().toISOString() });
    setLogging(null); setLogWeight(""); setLogNotes("");
  };

  // Group order
  const GROUP_ORDER = ["Warm-up", "Chest", "Back", "Glutes", "Hamstrings", "Legs", "Shoulders", "Arms", "Core"];
  const byGroup = {};
  GROUP_ORDER.forEach(g => { byGroup[g] = []; });
  active.forEach(e => { if (byGroup[e.muscleGroup]) byGroup[e.muscleGroup].push(e); else { byGroup[e.muscleGroup] = [e]; } });

  return (
    <div style={{ display: "flex", gap: 24, height: "100%" }}>
      {/* Left: exercise list */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div>
            <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Today's Workout</h2>
            <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>{fmtDateLong(new Date())} · {todaySets} sets logged today</div>
          </div>
        </div>

        {GROUP_ORDER.filter(g => byGroup[g] && byGroup[g].length > 0).map((group) => (
          <div key={group} style={{ marginBottom: 24 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <div style={{ width: 3, height: 16, background: MUSCLE_COLORS[group] || "#4B5563", borderRadius: 2 }} />
              <span style={{ color: MUSCLE_COLORS[group] || "#4B5563", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>{group}</span>
              {group === "Warm-up" && <span style={{ color: "#4B5563", fontSize: 11 }}>— complete before main work</span>}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {byGroup[group].map(ex => {
                const last = lastEntry(ex.id);
                const hist = sfHistory(ex.id);
                const latestSF = hist.length ? hist[hist.length - 1].value : null;
                return (
                  <Card key={ex.id} style={{ padding: "14px 20px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                          <span style={{ fontWeight: 600, color: "#E8EAF0", fontSize: 15 }}>{ex.name}</span>
                          {ex.superset && (
                            <span style={{ background: "#7B68EE22", color: "#7B68EE", padding: "1px 7px", borderRadius: 4, fontSize: 10, fontWeight: 700 }}>
                              ⚡ SUPERSET w/ {ex.superset}
                            </span>
                          )}
                          {ex.flag && <span style={{ background: "#E8A83822", color: "#E8A838", padding: "1px 7px", borderRadius: 4, fontSize: 10, fontWeight: 700 }}>{ex.flag}</span>}
                        </div>
                        {last ? (
                          <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>
                            Last: {last.sets}×{last.reps} @ {last.weight} lbs — {fmtDate(last.date)}
                          </div>
                        ) : (
                          <div style={{ color: "#3A3D4A", fontSize: 12, marginTop: 2 }}>No previous sessions</div>
                        )}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                        <div style={{ textAlign: "right" }}>
                          <Sparkline data={hist} width={100} height={36} />
                          {latestSF && <div style={{ color: "#E8A838", fontSize: 11, fontWeight: 700, marginTop: 2 }}>SF {latestSF.toLocaleString()}</div>}
                        </div>
                        <button onClick={() => setFormGuide(ex)}
                          style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 7, padding: "7px 12px", fontSize: 12, cursor: "pointer", whiteSpace: "nowrap" }}>
                          Form Guide
                        </button>
                        <button onClick={() => { setLogging(ex); setLogSets(ex.defaultSets || "3"); setLogReps(ex.defaultReps || "10"); setLogWeight(""); setLogNotes(""); }}
                          style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 7, padding: "7px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
                          + Log Set
                        </button>
                      </div>
                    </div>
                  </Card>
                );
              })}
            </div>
          </div>
        ))}

        {/* Alfredson Protocol */}
        <div style={{ marginBottom: 24 }}>

          {previewSF !== null && (

          </button>
        </Modal>
      )}
    </div>
  );
}

// ─── PROGRESS TAB ─────────────────────────────────────────────────────────────
function ProgressTab({ exercises, workoutLogs }) {
  const [selected, setSelected] = useState(null);
  const [view, setView] = useState("dashboard"); // "dashboard" | "detail"

  // ── Per-exercise stats ──────────────────────────────────────────────────────
  const exStats = exercises.filter(e => e.active).map(ex => {
    const logs = workoutLogs.filter(l => l.exerciseId === ex.id);
    const sfSeries = logs.map(l => ({ value: sf(l.sets, l.reps, l.weight, ex.type), date: l.date }));
    const first = sfSeries[0]?.value;
    const last  = sfSeries[sfSeries.length - 1]?.value;
    const prev  = sfSeries[sfSeries.length - 2]?.value;
    const totalGain  = first && last  ? ((last  - first) / first * 100) : null;
    const sessionGain = last && prev  ? ((last  - prev)  / prev  * 100) : null;
    const peak = sfSeries.length ? Math.max(...sfSeries.map(d => d.value)) : null;
    return { ex, logs, sfSeries, first, last, prev, totalGain, sessionGain, peak };
  });

  // ── Overall Progress Score (avg of all exercises with ≥2 sessions) ──────────
  const scored = exStats.filter(s => s.totalGain !== null);
  const overallScore = scored.length
    ? scored.reduce((a, s) => a + s.totalGain, 0) / scored.length
    : null;

  // ── Group scores ────────────────────────────────────────────────────────────
  const groupScores = {};
  scored.forEach(s => {
    const g = s.ex.muscleGroup;
    if (!groupScores[g]) groupScores[g] = [];
    groupScores[g].push(s.totalGain);
  });
  const groupAvgs = Object.entries(groupScores).map(([g, vals]) => ({
    group: g, avg: vals.reduce((a, v) => a + v, 0) / vals.length,
  })).sort((a, b) => b.avg - a.avg);

  // ── Detail view data ────────────────────────────────────────────────────────
  const selStats = selected ? exStats.find(s => s.ex.id === selected) : null;

  const openDetail = (id) => { setSelected(id); setView("detail"); };

  // ── Trend direction for overall ─────────────────────────────────────────────
  const trendColor = overallScore === null ? "#4B5563" : overallScore >= 0 ? "#4AD99A" : "#D94A4A";

  return (
    <div>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Progress Dashboard</h2>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>Normalized across all exercises</div>
        </div>
        <div style={{ display: "flex", background: "#1A1D26", borderRadius: 8, padding: 3, border: "1px solid #2A2D3A" }}>
          {[["dashboard", "Dashboard"], ["detail", "Exercise Detail"]].map(([id, label]) => (
            <button key={id} onClick={() => setView(id)}
              style={{ background: view === id ? "#4A90D9" : "none", color: view === id ? "#fff" : "#8B92A5",
                border: "none", borderRadius: 6, padding: "6px 14px", fontSize: 13, fontWeight: view === id ? 600 : 400, cursor: "pointer" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {view === "dashboard" && (
        <div>
          {/* Top row: Overall score + group scores */}
          <div style={{ display: "grid", gridTemplateColumns: "280px 1fr", gap: 20, marginBottom: 20 }}>

            {/* Overall Progress Score */}
            <Card style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 28, border: `1px solid ${trendColor}44` }}>
              <div style={{ color: "#8B92A5", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Overall Progress Score</div>
              {overallScore !== null ? (
                <>
                  <div style={{ color: trendColor, fontSize: 56, fontWeight: 800, lineHeight: 1, fontVariantNumeric: "tabular-nums" }}>
                    {overallScore >= 0 ? "+" : ""}{overallScore.toFixed(1)}%
                  </div>
                  <div style={{ color: "#4B5563", fontSize: 12, marginTop: 8, textAlign: "center" }}>
                    avg gain from first → latest session<br />across {scored.length} exercise{scored.length !== 1 ? "s" : ""}
                  </div>
                </>
              ) : (
                <div style={{ color: "#3A3D4A", fontSize: 14, textAlign: "center" }}>Log at least 2 sessions per exercise to see your score</div>
              )}
            </Card>

            {/* Group scores */}
            <Card>
              <SectionLabel>Progress by Muscle Group</SectionLabel>
              {groupAvgs.length === 0 ? (
                <div style={{ color: "#3A3D4A", fontSize: 13 }}>No data yet — log some sessions first</div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {groupAvgs.map(({ group, avg }) => {
                    const color = MUSCLE_COLORS[group] || "#4B5563";
                    const pct = Math.min(100, Math.max(0, avg));
                    return (
                      <div key={group}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <span style={{ color, fontSize: 13, fontWeight: 600 }}>{group}</span>
                          <span style={{ color: avg >= 0 ? "#4AD99A" : "#D94A4A", fontSize: 13, fontWeight: 700 }}>
                            {avg >= 0 ? "+" : ""}{avg.toFixed(1)}%
                          </span>
                        </div>
                        <div style={{ background: "#0F1117", borderRadius: 4, height: 6 }}>
                          <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 4, transition: "width 0.4s" }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </Card>
          </div>

          {/* Exercise grid */}
          <SectionLabel>All Exercises — Click to Drill Down</SectionLabel>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
            {exStats.map(({ ex, sfSeries, totalGain, sessionGain, last }) => {
              const color = MUSCLE_COLORS[ex.muscleGroup] || "#4B5563";
              const hasData = sfSeries.length > 0;
              const gainColor = totalGain === null ? "#4B5563" : totalGain >= 0 ? "#4AD99A" : "#D94A4A";
              return (
                <div key={ex.id} onClick={() => openDetail(ex.id)}
                  style={{ background: "#1A1D26", border: `1px solid #2A2D3A`, borderRadius: 10, padding: "14px 16px", cursor: "pointer",
                    transition: "border-color 0.15s" }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = color}
                  onMouseLeave={e => e.currentTarget.style.borderColor = "#2A2D3A"}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                    <div>
                      <div style={{ color: "#E8EAF0", fontWeight: 600, fontSize: 13, marginBottom: 2 }}>{ex.name}</div>
                      <Pill label={ex.muscleGroup} color={color} />
                    </div>
                    <div style={{ textAlign: "right" }}>
                      {totalGain !== null ? (
                        <>
                          <div style={{ color: gainColor, fontSize: 18, fontWeight: 800 }}>
                            {totalGain >= 0 ? "+" : ""}{totalGain.toFixed(1)}%
                          </div>
                          <div style={{ color: "#4B5563", fontSize: 10 }}>total gain</div>
                        </>
                      ) : (
                        <div style={{ color: "#3A3D4A", fontSize: 11 }}>no data</div>
                      )}
                    </div>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
                    <div>
                      <Sparkline data={sfSeries} width={90} height={32} />
                      <div style={{ color: "#4B5563", fontSize: 10, marginTop: 2 }}>{sfSeries.length} session{sfSeries.length !== 1 ? "s" : ""}</div>
                    </div>
                    {sessionGain !== null && (
                      <div style={{ textAlign: "right" }}>
                        <div style={{ color: sessionGain >= 0 ? "#4AD99A" : "#D94A4A", fontSize: 12, fontWeight: 700 }}>
                          {sessionGain >= 0 ? "+" : ""}{sessionGain.toFixed(1)}%
                        </div>
                        <div style={{ color: "#4B5563", fontSize: 10 }}>last session</div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view === "detail" && (
        <div>
          {/* Exercise selector */}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 24 }}>
            {exercises.filter(e => e.active).map(e => (
              <button key={e.id} onClick={() => setSelected(e.id)}
                style={{ background: selected === e.id ? MUSCLE_COLORS[e.muscleGroup] : "#1A1D26",
                  color: selected === e.id ? "#fff" : "#8B92A5",
                  border: `1px solid ${selected === e.id ? MUSCLE_COLORS[e.muscleGroup] : "#2A2D3A"}`,
                  borderRadius: 20, padding: "7px 16px", fontSize: 13, cursor: "pointer",
                  fontWeight: selected === e.id ? 700 : 400 }}>
                {e.name}
              </button>
            ))}
          </div>

          {selStats && (
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 20 }}>
              <Card>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
                  <div>
                    <div style={{ fontSize: 17, fontWeight: 700, color: "#E8EAF0" }}>{selStats.ex.name}</div>
                    <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>
                      {selStats.ex.type === "weighted" ? "SF = sets × reps × weight" : selStats.ex.type === "bodyweight" ? "SF = sets × reps × 10" : "SF = sets × reps"}
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 16 }}>
                    {selStats.totalGain !== null && (
                      <div style={{ textAlign: "right" }}>
                        <div style={{ color: selStats.totalGain >= 0 ? "#4AD99A" : "#D94A4A", fontSize: 22, fontWeight: 800 }}>
                          {selStats.totalGain >= 0 ? "+" : ""}{selStats.totalGain.toFixed(1)}%
                        </div>
                        <div style={{ color: "#4B5563", fontSize: 11 }}>total gain</div>
                      </div>
                    )}
                    {selStats.sessionGain !== null && (
                      <div style={{ textAlign: "right" }}>
                        <div style={{ color: selStats.sessionGain >= 0 ? "#4AD99A" : "#D94A4A", fontSize: 22, fontWeight: 800 }}>
                          {selStats.sessionGain >= 0 ? "+" : ""}{selStats.sessionGain.toFixed(1)}%
                        </div>
                        <div style={{ color: "#4B5563", fontSize: 11 }}>vs last session</div>
                      </div>
                    )}
                    {selStats.peak && (
                      <div style={{ textAlign: "right" }}>
                        <div style={{ color: "#E8A838", fontSize: 22, fontWeight: 800 }}>{selStats.peak.toLocaleString()}</div>
                        <div style={{ color: "#4B5563", fontSize: 11 }}>peak SF</div>
                      </div>
                    )}
                  </div>
                </div>
                <BarChart data={selStats.sfSeries.slice(-12)} height={160} />
              </Card>

              <Card>
                <SectionLabel>Session History</SectionLabel>
                {selStats.logs.length === 0 ? (
                  <div style={{ color: "#3A3D4A", fontSize: 13, textAlign: "center", padding: "20px 0" }}>No sessions yet</div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 380, overflowY: "auto" }}>
                    {[...selStats.logs].reverse().map((l, i) => (
                      <div key={i} style={{ background: "#0F1117", borderRadius: 8, padding: "10px 12px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                          <span style={{ color: "#8B92A5", fontSize: 12 }}>{fmtDate(l.date)}</span>
                          <span style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>{sf(l.sets, l.reps, l.weight, selStats.ex.type).toLocaleString()}</span>
                        </div>
                        <div style={{ color: "#C8CDD8", fontSize: 13, marginTop: 2 }}>
                          {selStats.ex.type === "weighted" ? `${l.sets}×${l.reps} @ ${l.weight} lbs` : `${l.sets}×${l.reps}`}
                        </div>
                        {l.notes && <div style={{ color: "#4B5563", fontSize: 11, marginTop: 2, fontStyle: "italic" }}>{l.notes}</div>}
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            </div>
          )}

          {!selected && (
            <div style={{ color: "#3A3D4A", textAlign: "center", padding: "60px 0", fontSize: 14 }}>Select an exercise above to see its detail</div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── BODY TAB ─────────────────────────────────────────────────────────────────
function BodyTab({ bodyLogs, onSave }) {
  const [showForm, setShowForm] = useState(false);
  const [fields, setFields] = useState({ weight: "", chest: "", waist: "", hips: "", glutes: "", thighs: "", arms: "" });

  const setF = (k) => (e) => setFields(f => ({ ...f, [k]: e.target.value }));

  const handleSave = () => {
    onSave({ date: new Date().toISOString(), ...Object.fromEntries(Object.entries(fields).map(([k, v]) => [k, Number(v) || 0])) });
    setShowForm(false);
    setFields({ weight: "", chest: "", waist: "", hips: "", glutes: "", thighs: "", arms: "" });
  };

  const recent = [...bodyLogs].reverse().slice(0, 10);
  const weightData = bodyLogs.filter(l => l.weight).map(l => ({ value: l.weight, date: l.date }));
  const latestWeight = weightData.length ? weightData[weightData.length - 1].value : null;
  const startWeight = weightData.length ? weightData[0].value : null;

  const MEASURES = [
    { key: "chest", label: "Chest" }, { key: "waist", label: "Waist" },
    { key: "hips", label: "Hips" }, { key: "glutes", label: "Glutes" },
    { key: "thighs", label: "Thighs" }, { key: "arms", label: "Arms" },
  ];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Body Tracking</h2>
        <button onClick={() => setShowForm(true)}
          style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 8, padding: "9px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
          + Log Today
        </button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 20, marginBottom: 24 }}>
        <Card>
          <SectionLabel>Current Weight</SectionLabel>
          <div style={{ fontSize: 40, fontWeight: 800, color: "#E8EAF0", fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>
            {latestWeight ? `${latestWeight}` : "—"}
          </div>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 4 }}>lbs</div>
          {startWeight && latestWeight && startWeight !== latestWeight && (
            <div style={{ color: latestWeight < startWeight ? "#4AD99A" : "#D94A4A", fontSize: 14, fontWeight: 700, marginTop: 8 }}>
              {latestWeight < startWeight ? "↓" : "↑"} {Math.abs(latestWeight - startWeight).toFixed(1)} lbs from start
            </div>
          )}
        </Card>
        <Card style={{ gridColumn: "span 2" }}>
          <SectionLabel>Weight Trend</SectionLabel>
          {weightData.length < 2 ? (
            <div style={{ color: "#3A3D4A", fontSize: 13 }}>Log at least 2 entries to see trend</div>
          ) : (
            <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 80 }}>
              {weightData.slice(-20).map((d, i) => {
                const vals = weightData.slice(-20).map(x => x.value);
                const min = Math.min(...vals), max = Math.max(...vals);
                const h = Math.max(4, ((d.value - min) / (max - min + 0.1)) * 60 + 12);
                const isLast = i === Math.min(weightData.length, 20) - 1;
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center" }}>
                    {isLast && <div style={{ color: "#4A90D9", fontSize: 10, marginBottom: 2 }}>{d.value}</div>}
                    <div style={{ width: "100%", height: h, background: isLast ? "#4A90D9" : "#2A2D3A", borderRadius: "3px 3px 0 0" }} />
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      </div>

      {/* History table */}
      {recent.length > 0 && (
        <Card>
          <SectionLabel>Measurement History</SectionLabel>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr>
                  {["Date", "Weight", "Chest", "Waist", "Hips", "Glutes", "Thighs", "Arms"].map(h => (
                    <th key={h} style={{ color: "#4B5563", fontWeight: 700, textAlign: "left", padding: "6px 12px", borderBottom: "1px solid #2A2D3A" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {recent.map((l, i) => (
                  <tr key={i} style={{ borderBottom: "1px solid #1A1D26" }}>
                    <td style={{ color: "#8B92A5", padding: "8px 12px" }}>{fmtDateLong(l.date)}</td>
                    {["weight", "chest", "waist", "hips", "glutes", "thighs", "arms"].map(k => (
                      <td key={k} style={{ color: "#C8CDD8", padding: "8px 12px", fontVariantNumeric: "tabular-nums" }}>
                        {l[k] ? `${l[k]}${k === "weight" ? " lbs" : '"'}` : "—"}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      {showForm && (
        <Modal title="Log Body Measurements" onClose={() => setShowForm(false)} width={520}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 20 }}>
            <div>
              <label style={{ color: "#8B92A5", fontSize: 11, display: "block", marginBottom: 6 }}>Weight (lbs)</label>
              <input type="number" value={fields.weight} onChange={setF("weight")} style={inputStyle} placeholder="191" />
            </div>
            {MEASURES.map(({ key, label }) => (
              <div key={key}>
                <label style={{ color: "#8B92A5", fontSize: 11, display: "block", marginBottom: 6 }}>{label} (in)</label>
                <input type="number" value={fields[key]} onChange={setF(key)} style={inputStyle} />
              </div>
            ))}
          </div>
          <button onClick={handleSave}
            style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 9, padding: "13px 0", width: "100%", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
            Save
          </button>
        </Modal>
      )}
    </div>
  );
}

// ─── LOG VIEW (edit/delete/date nav) ─────────────────────────────────────────
function LogView({ nutritionLogs, onSave, onDelete, onEdit, totals, TARGETS }) {
  const [selectedDate, setSelectedDate] = useState(new Date().toDateString());
  const [editingIdx, setEditingIdx] = useState(null);
  const [editFields, setEditFields] = useState({});
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [showAddForm, setShowAddForm] = useState(false);
  const [addFields, setAddFields] = useState({ calories: "", protein: "", carbs: "", fat: "", notes: "" });

  const allDates = [...new Set([
    new Date().toDateString(),
    ...nutritionLogs.map(l => new Date(l.date).toDateString())
  ])].sort((a, b) => new Date(b) - new Date(a)).slice(0, 30);

  const dayLogs = nutritionLogs
    .map((l, globalIdx) => ({ ...l, globalIdx }))
    .filter(l => new Date(l.date).toDateString() === selectedDate)
    .sort((a, b) => new Date(a.date) - new Date(b.date));

  const dayTotals = dayLogs.reduce((a, l) => ({
    calories: a.calories + (l.calories || 0), protein: a.protein + (l.protein || 0),
    carbs: a.carbs + (l.carbs || 0), fat: a.fat + (l.fat || 0),
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

  const fmtDayLabel = (ds) => {
    const today = new Date().toDateString();
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (ds === today) return "Today";
    if (ds === yesterday) return "Yesterday";
    return new Date(ds).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
  };

  const startEdit = (entry) => {
    setEditingIdx(entry.globalIdx);
    setEditFields({ calories: entry.calories, protein: entry.protein, carbs: entry.carbs, fat: entry.fat, notes: entry.notes || "" });
  };

  const saveEdit = () => {
    onEdit(editingIdx, { calories: +editFields.calories, protein: +editFields.protein, carbs: +editFields.carbs, fat: +editFields.fat, notes: editFields.notes });
    setEditingIdx(null);
  };

  const handleAdd = () => {
    onSave({ date: new Date().toISOString(), calories: +addFields.calories, protein: +addFields.protein, carbs: +addFields.carbs, fat: +addFields.fat, notes: addFields.notes });
    setAddFields({ calories: "", protein: "", carbs: "", fat: "", notes: "" });
    setShowAddForm(false);
  };

  return (
    <div style={{ overflowY: "auto", flex: 1 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {allDates.map(ds => (
            <button key={ds} onClick={() => { setSelectedDate(ds); setEditingIdx(null); }}
              style={{ background: selectedDate === ds ? "#4A90D9" : "#1A1D26", color: selectedDate === ds ? "#fff" : "#8B92A5",
                border: `1px solid ${selectedDate === ds ? "#4A90D9" : "#2A2D3A"}`, borderRadius: 20,
                padding: "5px 14px", fontSize: 12, cursor: "pointer", fontWeight: selectedDate === ds ? 700 : 400 }}>
              {fmtDayLabel(ds)}
            </button>
          ))}
        </div>
        <button onClick={() => setShowAddForm(true)}
          style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", flexShrink: 0 }}>
          + Add Entry
        </button>
      </div>

      <Card style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div style={{ color: "#E8EAF0", fontWeight: 700, fontSize: 15 }}>{fmtDayLabel(selectedDate)}</div>
          <div style={{ color: "#8B92A5", fontSize: 12 }}>{dayLogs.length} meal{dayLogs.length !== 1 ? "s" : ""} logged</div>
        </div>
        <div style={{ display: "flex", gap: 20 }}>
          {[
            { label: "Calories", val: dayTotals.calories, target: TARGETS.calories, color: "#E8A838", unit: "kcal" },
            { label: "Protein",  val: dayTotals.protein,  target: TARGETS.protein,  color: "#4A90D9", unit: "g" },
            { label: "Carbs",    val: dayTotals.carbs,    target: TARGETS.carbs,    color: "#7B68EE", unit: "g" },
            { label: "Fat",      val: dayTotals.fat,      target: TARGETS.fat,      color: "#4AD9A0", unit: "g" },
          ].map(({ label, val, target, color, unit }) => {
            const pct = Math.min(100, (val / target) * 100);
            return (
              <div key={label} style={{ flex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <span style={{ color: "#8B92A5", fontSize: 11 }}>{label}</span>
                  <span style={{ color, fontSize: 11, fontWeight: 700 }}>{val}<span style={{ color: "#4B5563" }}>/{target}{unit}</span></span>
                </div>
                <div style={{ background: "#0F1117", borderRadius: 3, height: 4 }}>
                  <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 3 }} />
                </div>
              </div>
            );
          })}
        </div>
      </Card>

      {showAddForm && (
        <Card style={{ marginBottom: 16, border: "1px solid #4A90D944" }}>
          <SectionLabel>Add Meal Entry</SectionLabel>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10, marginBottom: 12 }}>
            {[["Calories", "calories"], ["Protein (g)", "protein"], ["Carbs (g)", "carbs"], ["Fat (g)", "fat"]].map(([lbl, k]) => (
              <div key={k}>
                <label style={{ color: "#8B92A5", fontSize: 10, display: "block", marginBottom: 4 }}>{lbl}</label>
                <input type="number" value={addFields[k]} onChange={e => setAddFields(f => ({ ...f, [k]: e.target.value }))} style={inputStyle} />
              </div>
            ))}
          </div>
          <div style={{ marginBottom: 12 }}>
            <label style={{ color: "#8B92A5", fontSize: 10, display: "block", marginBottom: 4 }}>Meal Name</label>
            <input value={addFields.notes} onChange={e => setAddFields(f => ({ ...f, notes: e.target.value }))} style={inputStyle} placeholder="e.g. Breakfast — eggs + sourdough" />
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={handleAdd} style={{ flex: 1, background: "#4A90D9", color: "#fff", border: "none", borderRadius: 7, padding: "9px 0", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Save</button>
            <button onClick={() => setShowAddForm(false)} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 7, padding: "9px 16px", fontSize: 13, cursor: "pointer" }}>Cancel</button>
          </div>
        </Card>
      )}

      {dayLogs.length === 0 ? (
        <div style={{ color: "#3A3D4A", textAlign: "center", padding: "40px 0", fontSize: 14 }}>No meals logged for this day — use + Add Entry above.</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {dayLogs.map((entry, i) => (
            <Card key={i} style={{ padding: "14px 16px" }}>
              {editingIdx === entry.globalIdx ? (
                <div>
                  <div style={{ color: "#E8EAF0", fontWeight: 600, fontSize: 14, marginBottom: 12 }}>Editing: {entry.notes || "Meal"}</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10, marginBottom: 12 }}>
                    {[["Calories", "calories"], ["Protein (g)", "protein"], ["Carbs (g)", "carbs"], ["Fat (g)", "fat"]].map(([lbl, k]) => (
                      <div key={k}>
                        <label style={{ color: "#8B92A5", fontSize: 10, display: "block", marginBottom: 4 }}>{lbl}</label>
                        <input type="number" value={editFields[k]} onChange={e => setEditFields(f => ({ ...f, [k]: e.target.value }))} style={inputStyle} />
                      </div>
                    ))}
                  </div>
                  <div style={{ marginBottom: 12 }}>
                    <label style={{ color: "#8B92A5", fontSize: 10, display: "block", marginBottom: 4 }}>Meal Name</label>
                    <input value={editFields.notes} onChange={e => setEditFields(f => ({ ...f, notes: e.target.value }))} style={inputStyle} />
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={saveEdit} style={{ flex: 1, background: "#4AD99A", color: "#0F1117", border: "none", borderRadius: 7, padding: "8px 0", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Save Changes</button>
                    <button onClick={() => setEditingIdx(null)} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 7, padding: "8px 16px", fontSize: 13, cursor: "pointer" }}>Cancel</button>
                  </div>
                </div>
              ) : (
                <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                      <span style={{ color: "#E8EAF0", fontWeight: 600, fontSize: 14 }}>{entry.notes || "Meal"}</span>
                      <span style={{ color: "#4B5563", fontSize: 11 }}>{new Date(entry.date).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })}</span>
                    </div>
                    <div style={{ display: "flex", gap: 16 }}>
                      <span style={{ color: "#E8A838", fontSize: 13, fontWeight: 700 }}>{entry.calories} kcal</span>
                      <span style={{ color: "#4A90D9", fontSize: 13 }}>{entry.protein}g protein</span>
                      <span style={{ color: "#7B68EE", fontSize: 13 }}>{entry.carbs}g carbs</span>
                      <span style={{ color: "#4AD9A0", fontSize: 13 }}>{entry.fat}g fat</span>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => startEdit(entry)} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 12, cursor: "pointer" }}>✏️ Edit</button>
                    {confirmDelete === entry.globalIdx ? (
                      <>
                        <button onClick={() => { onDelete(entry.globalIdx); setConfirmDelete(null); }} style={{ background: "#D94A4A", color: "#fff", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 12, cursor: "pointer", fontWeight: 700 }}>Confirm</button>
                        <button onClick={() => setConfirmDelete(null)} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 6, padding: "6px 10px", fontSize: 12, cursor: "pointer" }}>✕</button>
                      </>
                    ) : (
                      <button onClick={() => setConfirmDelete(entry.globalIdx)} style={{ background: "#2A2D3A", color: "#4B5563", border: "none", borderRadius: 6, padding: "6px 10px", fontSize: 12, cursor: "pointer" }}>🗑️</button>
                    )}
                  </div>
                </div>
              )}
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── PHASE TRACKER ───────────────────────────────────────────────────────────
const PHASE_CONFIG = {
  gain: { label: "Gain Phase", color: "#4AD99A", bg: "#4AD99A22", icon: "📈", weeks: 12, calories: 2200, description: "Caloric surplus · Build muscle · Progressive overload" },
  cut:  { label: "Cut Phase",  color: "#4A90D9", bg: "#4A90D922", icon: "🔥", weeks: 4,  calories: 1600, description: "Caloric deficit · Preserve muscle · Shed fat" },
};

function PhaseTracker({ phase, setPhase }) {
  const [showSetup, setShowSetup] = useState(!phase);
  const [setupType, setSetupType] = useState("gain");
  const [setupStart, setSetupStart] = useState(new Date().toISOString().split("T")[0]);

  const cfg = phase ? PHASE_CONFIG[phase.type] : null;

  const startPhase = () => {
    const start = new Date(setupStart);
    const weeks = PHASE_CONFIG[setupType].weeks;
    const end = new Date(start);
    end.setDate(end.getDate() + weeks * 7);
    setPhase({ type: setupType, startDate: start.toISOString(), endDate: end.toISOString(), history: phase?.history || [] });
    setShowSetup(false);
  };

  const completePhase = () => {
    const history = [...(phase.history || []), { type: phase.type, startDate: phase.startDate, endDate: new Date().toISOString() }];
    setPhase({ ...phase, history });
    setShowSetup(true);
    // pre-select the opposite phase
    setSetupType(phase.type === "gain" ? "cut" : "gain");
  };

  const getDayInfo = () => {
    if (!phase) return null;
    const start = new Date(phase.startDate);
    const end = new Date(phase.endDate);
    const now = new Date();
    const totalDays = Math.round((end - start) / 86400000);
    const elapsed = Math.max(0, Math.round((now - start) / 86400000));
    const remaining = Math.max(0, totalDays - elapsed);
    const pct = Math.min(100, (elapsed / totalDays) * 100);
    const week = Math.floor(elapsed / 7) + 1;
    return { totalDays, elapsed, remaining, pct, week, totalWeeks: cfg.weeks };
  };

  const info = phase ? getDayInfo() : null;

  // Cycle history summary
  const history = phase?.history || [];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#E8EAF0" }}>Phase Tracker</h2>
          <div style={{ color: "#8B92A5", fontSize: 13, marginTop: 3 }}>Bulk / Cut cycle management</div>
        </div>
        {phase && (
          <button onClick={() => { setShowSetup(true); setSetupType(phase.type); setSetupStart(new Date().toISOString().split("T")[0]); }}
            style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 13, cursor: "pointer" }}>
            Edit Phase
          </button>
        )}
      </div>

      {/* No phase set */}
      {!phase && !showSetup && (
        <Card style={{ textAlign: "center", padding: 48 }}>
          <div style={{ fontSize: 40, marginBottom: 16 }}>🗓️</div>
          <div style={{ color: "#E8EAF0", fontSize: 18, fontWeight: 700, marginBottom: 8 }}>No active phase</div>
          <div style={{ color: "#8B92A5", fontSize: 14, marginBottom: 24 }}>Set up your first gain or cut phase to start tracking your cycle.</div>
          <button onClick={() => setShowSetup(true)}
            style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 9, padding: "12px 28px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
            Set Up Phase
          </button>
        </Card>
      )}

      {/* Active phase */}
      {phase && info && (
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 20, marginBottom: 20 }}>
          {/* Main phase card */}
          <Card style={{ border: `1px solid ${cfg.color}44` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                  <span style={{ fontSize: 24 }}>{cfg.icon}</span>
                  <span style={{ fontSize: 22, fontWeight: 800, color: cfg.color }}>{cfg.label}</span>
                </div>
                <div style={{ color: "#8B92A5", fontSize: 13 }}>{cfg.description}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: cfg.color, fontSize: 36, fontWeight: 800, lineHeight: 1 }}>{info.remaining}</div>
                <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>days remaining</div>
              </div>
            </div>

            {/* Progress bar */}
            <div style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ color: "#8B92A5", fontSize: 12 }}>Week {Math.min(info.week, info.totalWeeks)} of {info.totalWeeks}</span>
                <span style={{ color: cfg.color, fontSize: 12, fontWeight: 700 }}>{Math.round(info.pct)}% complete</span>
              </div>
              <div style={{ background: "#0F1117", borderRadius: 6, height: 10, overflow: "hidden" }}>
                <div style={{ width: `${info.pct}%`, height: "100%", background: cfg.color, borderRadius: 6, transition: "width 0.4s" }} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                <span style={{ color: "#4B5563", fontSize: 11 }}>{fmtDate(phase.startDate)}</span>
                <span style={{ color: "#4B5563", fontSize: 11 }}>{fmtDate(phase.endDate)}</span>
              </div>
            </div>

            {/* Week timeline */}
            <div style={{ display: "flex", gap: 3, marginBottom: 20 }}>
              {Array.from({ length: info.totalWeeks }).map((_, i) => {
                const done = i < info.week - 1;
                const current = i === info.week - 1;
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                    <div style={{ width: "100%", height: 28, borderRadius: 4, background: done ? cfg.color : current ? cfg.color + "66" : "#1A1D26",
                      border: current ? `1px solid ${cfg.color}` : "1px solid #2A2D3A",
                      display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {done && <span style={{ fontSize: 12 }}>✓</span>}
                      {current && <span style={{ color: cfg.color, fontSize: 10, fontWeight: 700 }}>NOW</span>}
                    </div>
                    <div style={{ color: "#3A3D4A", fontSize: 9 }}>W{i + 1}</div>
                  </div>
                );
              })}
            </div>

            <button onClick={completePhase}
              style={{ background: cfg.color, color: "#0F1117", border: "none", borderRadius: 9, padding: "11px 0", width: "100%", fontSize: 14, fontWeight: 800, cursor: "pointer" }}>
              Complete Phase → Start {phase.type === "gain" ? "Cut" : "Gain"}
            </button>
          </Card>

          {/* Right column: targets + stats */}
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Card>
              <SectionLabel>Daily Targets</SectionLabel>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[
                  { label: "Calories", val: cfg.calories.toLocaleString(), unit: "kcal", color: "#E8A838" },
                  { label: "Protein", val: "191", unit: "g", color: "#4A90D9" },
                  { label: "Training", val: "3×", unit: "/ week", color: "#4AD9A0" },
                  { label: "Surplus/Deficit", val: phase.type === "gain" ? "+500" : "-600", unit: "kcal", color: cfg.color },
                ].map(({ label, val, unit, color }) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#0F1117", borderRadius: 7, padding: "8px 12px" }}>
                    <span style={{ color: "#8B92A5", fontSize: 13 }}>{label}</span>
                    <span style={{ color, fontSize: 15, fontWeight: 700 }}>{val} <span style={{ fontSize: 11, fontWeight: 400, color: "#4B5563" }}>{unit}</span></span>
                  </div>
                ))}
              </div>
            </Card>

            <Card>
              <SectionLabel>Phase Stats</SectionLabel>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <span style={{ color: "#8B92A5", fontSize: 13 }}>Day</span>
                  <span style={{ color: "#E8EAF0", fontSize: 13, fontWeight: 700 }}>{info.elapsed + 1} of {info.totalDays}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <span style={{ color: "#8B92A5", fontSize: 13 }}>Started</span>
                  <span style={{ color: "#E8EAF0", fontSize: 13 }}>{fmtDate(phase.startDate)}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <span style={{ color: "#8B92A5", fontSize: 13 }}>Ends</span>
                  <span style={{ color: "#E8EAF0", fontSize: 13 }}>{fmtDate(phase.endDate)}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <span style={{ color: "#8B92A5", fontSize: 13 }}>Cycles completed</span>
                  <span style={{ color: cfg.color, fontSize: 13, fontWeight: 700 }}>{history.length}</span>
                </div>
              </div>
            </Card>
          </div>
        </div>
      )}

      {/* Cycle history */}
      {history.length > 0 && (
        <Card>
          <SectionLabel>Cycle History</SectionLabel>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {history.map((h, i) => {
              const hcfg = PHASE_CONFIG[h.type];
              const days = Math.round((new Date(h.endDate) - new Date(h.startDate)) / 86400000);
              return (
                <div key={i} style={{ background: "#0F1117", borderRadius: 8, padding: "10px 14px", border: `1px solid ${hcfg.color}33` }}>
                  <div style={{ color: hcfg.color, fontWeight: 700, fontSize: 13 }}>{hcfg.icon} {hcfg.label}</div>
                  <div style={{ color: "#8B92A5", fontSize: 12, marginTop: 2 }}>{fmtDate(h.startDate)} → {fmtDate(h.endDate)}</div>
                  <div style={{ color: "#4B5563", fontSize: 11, marginTop: 1 }}>{days} days</div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {/* Setup modal */}
      {showSetup && (
        <Modal title="Set Up Phase" onClose={() => phase && setShowSetup(false)} width={480}>
          <div style={{ marginBottom: 20 }}>
            <SectionLabel>Phase Type</SectionLabel>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {(["gain", "cut"]).map(type => {
                const c = PHASE_CONFIG[type];
                return (
                  <button key={type} onClick={() => setSetupType(type)}
                    style={{ background: setupType === type ? c.bg : "#0F1117", border: `2px solid ${setupType === type ? c.color : "#2A2D3A"}`,
                      borderRadius: 10, padding: "16px 12px", cursor: "pointer", textAlign: "left" }}>
                    <div style={{ fontSize: 22, marginBottom: 6 }}>{c.icon}</div>
                    <div style={{ color: setupType === type ? c.color : "#E8EAF0", fontWeight: 700, fontSize: 15 }}>{c.label}</div>
                    <div style={{ color: "#8B92A5", fontSize: 11, marginTop: 4 }}>{c.weeks} weeks · {c.calories} kcal/day</div>
                    <div style={{ color: "#4B5563", fontSize: 11, marginTop: 2 }}>{c.description}</div>
                  </button>
                );
              })}
            </div>
          </div>
          <div style={{ marginBottom: 20 }}>
            <label style={{ color: "#8B92A5", fontSize: 11, display: "block", marginBottom: 6 }}>Start Date</label>
            <input type="date" value={setupStart} onChange={e => setSetupStart(e.target.value)} style={inputStyle} />
          </div>
          <div style={{ background: "#0F1117", borderRadius: 8, padding: "12px 16px", marginBottom: 20 }}>
            <div style={{ color: "#8B92A5", fontSize: 12, marginBottom: 4 }}>Phase ends on</div>
            <div style={{ color: PHASE_CONFIG[setupType].color, fontSize: 18, fontWeight: 700 }}>
              {(() => { const d = new Date(setupStart); d.setDate(d.getDate() + PHASE_CONFIG[setupType].weeks * 7); return fmtDateLong(d.toISOString()); })()}
            </div>
          </div>
          <button onClick={startPhase}
            style={{ background: PHASE_CONFIG[setupType].color, color: "#0F1117", border: "none", borderRadius: 9, padding: "13px 0", width: "100%", fontSize: 15, fontWeight: 800, cursor: "pointer" }}>
            Start {PHASE_CONFIG[setupType].label}
          </button>
        </Modal>
      )}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("workout");
  const [exercises] = useState(INITIAL_EXERCISES);
  const [workoutLogs, setWorkoutLogs] = useState([]);
  const [bodyLogs, setBodyLogs] = useState([]);
  const [nutritionLogs, setNutritionLogs] = useState([]);
  const [phase, setPhase] = useState(null);
  const [loading, setLoading] = useState(true);
  const [dbError, setDbError] = useState(false);
  const [session, setSession] = useState(null);
  const [userId, setUserId] = useState(null);

  // ── Check for magic link token on load ────────────────────────────────────
  useState(() => {
    const hash = window.location.hash;
    if (hash.includes("access_token")) {
      const params = new URLSearchParams(hash.replace("#", ""));
      const token = params.get("access_token");
      const uid = params.get("user_id") || null;
      if (token) {
        // Verify token and get user
        fetch(`${SUPABASE_URL}/auth/v1/user`, {
          headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${token}` }
        }).then(r => r.json()).then(user => {
          if (user.id) {
            setSession(token);
            setUserId(user.id);
            window.history.replaceState({}, document.title, window.location.pathname);
          }
        });
      }
    } else {
      // Check localStorage for existing session
      const stored = localStorage.getItem("pp_session") || sessionStorage.getItem("pp_session");
      if (stored) {
        try {
          const { token, uid } = JSON.parse(stored);
          setSession(token);
          setUserId(uid);
        } catch(e) { setLoading(false); }
      } else {
        setLoading(false);
      }
    }
  }, []);

  // ── Load data when session is ready ───────────────────────────────────────
  useState(() => {
    if (session && userId) {
      const data = JSON.stringify({ token: session, uid: userId });
      localStorage.setItem("pp_session", data);
      sessionStorage.setItem("pp_session", data);
      loadAll();
    }
  }, [session, userId]);

  async function loadAll() {
    setLoading(true);
    try {
      const [wData, bData, nData, pData] = await Promise.all([
        sbGet(`workout_logs?user_id=eq.${userId}&order=date.asc&limit=2000`, session),
        sbGet(`body_logs?user_id=eq.${userId}&order=date.asc&limit=500`, session),
        sbGet(`nutrition_logs?user_id=eq.${userId}&order=date.asc&limit=5000`, session),
        sbGet(`phase_data?user_id=eq.${userId}&order=created_at.desc&limit=1`, session),
      ]);
      setWorkoutLogs((wData || []).map(r => ({ id: r.id, exerciseId: r.exercise_id, sets: r.sets, reps: r.reps, weight: r.weight, notes: r.notes, date: r.date })));
      setBodyLogs((bData || []).map(r => ({ id: r.id, weight: r.weight, chest: r.chest, waist: r.waist, hips: r.hips, glutes: r.glutes, thighs: r.thighs, arms: r.arms, date: r.date })));
      setNutritionLogs((nData || []).map(r => ({ id: r.id, calories: r.calories, protein: r.protein, carbs: r.carbs, fat: r.fat, notes: r.notes, date: r.date })));
      if (pData && pData.length > 0) {
        setPhase({ id: pData[0].id, type: pData[0].type, startDate: pData[0].start_date, endDate: pData[0].end_date, history: pData[0].history || [] });
      }
    } catch(e) { setDbError(true); }
    setLoading(false);
  }

  const signOut = () => {
    localStorage.removeItem("pp_session");
    sessionStorage.removeItem("pp_session");
    setSession(null); setUserId(null);
    setWorkoutLogs([]); setBodyLogs([]); setNutritionLogs([]); setPhase(null);
  };

  // ── Handlers ──────────────────────────────────────────────────────────────
  const addWorkoutLog = async (exerciseId, entry) => {
    const rows = await sbPost("workout_logs", { exercise_id: exerciseId, sets: entry.sets, reps: entry.reps, weight: entry.weight, notes: entry.notes, date: entry.date, user_id: userId }, session);
    if (rows?.[0]) setWorkoutLogs(p => [...p, { id: rows[0].id, exerciseId, ...entry }]);
  };

  const addBodyLog = async (entry) => {
    const rows = await sbPost("body_logs", { ...entry, user_id: userId }, session);
    if (rows?.[0]) setBodyLogs(p => [...p, { ...entry, id: rows[0].id }]);
  };

  const addNutritionLog = async (entry) => {
    const rows = await sbPost("nutrition_logs", { calories: entry.calories, protein: entry.protein, carbs: entry.carbs, fat: entry.fat, notes: entry.notes, date: entry.date, user_id: userId }, session);
    if (rows?.[0]) setNutritionLogs(p => [...p, { ...entry, id: rows[0].id }]);
  };

  const editNutritionLog = async (idx, updated) => {
    const entry = nutritionLogs[idx];
    if (!entry?.id) return;
    await sbPatch(`nutrition_logs?id=eq.${entry.id}`, { calories: updated.calories, protein: updated.protein, carbs: updated.carbs, fat: updated.fat, notes: updated.notes }, session);
    setNutritionLogs(p => p.map((l, i) => i === idx ? { ...l, ...updated } : l));
  };

  const deleteNutritionLog = async (idx) => {
    const entry = nutritionLogs[idx];
    if (!entry?.id) return;
    await sbDelete(`nutrition_logs?id=eq.${entry.id}`, session);
    setNutritionLogs(p => p.filter((_, i) => i !== idx));
  };

  const savePhase = async (newPhase) => {
    if (newPhase?.id) {
      await sbPatch(`phase_data?id=eq.${newPhase.id}`, { type: newPhase.type, start_date: newPhase.startDate, end_date: newPhase.endDate, history: newPhase.history }, session);
    } else {
      const rows = await sbPost("phase_data", { type: newPhase.type, start_date: newPhase.startDate, end_date: newPhase.endDate, history: newPhase.history || [], user_id: userId }, session);
      if (rows?.[0]) newPhase = { ...newPhase, id: rows[0].id };
    }
    setPhase(newPhase);
  };

  const totalSets = workoutLogs.length;
  const phaseCfg = phase ? PHASE_CONFIG[phase.type] : null;
  const phaseInfo = phase && phaseCfg ? (() => {
    const start = new Date(phase.startDate), end = new Date(phase.endDate), now = new Date();
    const totalDays = Math.round((end - start) / 86400000);
    const elapsed = Math.max(0, Math.round((now - start) / 86400000));
    const remaining = Math.max(0, totalDays - elapsed);
    const week = Math.floor(elapsed / 7) + 1;
    return { remaining, week, totalWeeks: phaseCfg.weeks };
  })() : null;

  // ── Screens ───────────────────────────────────────────────────────────────
  if (!session) return <LoginScreen onLogin={(token, uid) => { setSession(token); setUserId(uid); }} />;

  if (loading) return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
      <div style={{ fontSize: 11, color: "#4A90D9", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em" }}>DURHAM CAPITAL</div>
      <div style={{ fontSize: 32, fontWeight: 800, color: "#E8EAF0" }}>PROJECT PRIME</div>
      <div style={{ color: "#8B92A5", fontSize: 14 }}>Loading your data...</div>
    </div>
  );

  if (dbError) return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16, padding: 32 }}>
      <div style={{ fontSize: 32, fontWeight: 800, color: "#E8EAF0" }}>PROJECT PRIME</div>
      <div style={{ color: "#D94A4A", fontSize: 15, textAlign: "center" }}>Could not load data. Check your connection.</div>
      <button onClick={loadAll} style={{ background: "#4A90D9", color: "#fff", border: "none", borderRadius: 8, padding: "10px 24px", fontSize: 14, cursor: "pointer" }}>Retry</button>
    </div>
  );

  return (
    <div style={{ display: "flex", height: "100vh", background: "#0F1117", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", color: "#E8EAF0" }}>
      {/* Sidebar */}
      <div style={{ width: 220, background: "#1A1D26", borderRight: "1px solid #2A2D3A", display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "24px 20px 20px" }}>
          <div style={{ fontSize: 11, color: "#4A90D9", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 4 }}>DURHAM CAPITAL</div>
          <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: "-0.5px", color: "#E8EAF0", lineHeight: 1 }}>PROJECT PRIME</div>
          <div style={{ fontSize: 11, color: "#4B5563", marginTop: 4 }}>Build the best version of you</div>
        </div>
        <nav style={{ flex: 1, padding: "0 10px" }}>
          {NAV.map(n => (
            <button key={n.id} onClick={() => setTab(n.id)}
              style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "11px 12px", borderRadius: 9, border: "none", cursor: "pointer", marginBottom: 3,
                background: tab === n.id ? "#4A90D922" : "none", color: tab === n.id ? "#4A90D9" : "#8B92A5",
                fontWeight: tab === n.id ? 700 : 400, fontSize: 14, textAlign: "left" }}>
              <span style={{ fontSize: 18 }}>{n.icon}</span>
              {n.label}
              {tab === n.id && <div style={{ marginLeft: "auto", width: 3, height: 16, background: "#4A90D9", borderRadius: 2 }} />}
            </button>
          ))}
        </nav>
        <div style={{ padding: 16, borderTop: "1px solid #2A2D3A", display: "flex", flexDirection: "column", gap: 10 }}>
          {phase && phaseCfg && phaseInfo && (
            <div style={{ background: phaseCfg.bg, borderRadius: 8, padding: "10px 12px", border: `1px solid ${phaseCfg.color}44` }}>
              <div style={{ color: phaseCfg.color, fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>{phaseCfg.label}</div>
              <div style={{ color: phaseCfg.color, fontSize: 20, fontWeight: 800, marginTop: 2 }}>{phaseInfo.remaining}d left</div>
              <div style={{ color: "#4B5563", fontSize: 10, marginTop: 1 }}>Week {Math.min(phaseInfo.week, phaseInfo.totalWeeks)} of {phaseInfo.totalWeeks}</div>
            </div>
          )}
          <div style={{ background: "#0F1117", borderRadius: 8, padding: "10px 12px" }}>
            <div style={{ color: "#4B5563", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>Total Sets Logged</div>
            <div style={{ color: "#4A90D9", fontSize: 24, fontWeight: 800, marginTop: 2 }}>{totalSets}</div>
          </div>
          <button onClick={signOut} style={{ background: "#2A2D3A", color: "#8B92A5", border: "none", borderRadius: 7, padding: "8px 0", fontSize: 12, cursor: "pointer", width: "100%" }}>
            Sign Out
          </button>
        </div>
      </div>
      {/* Main content */}
      <div style={{ flex: 1, overflowY: "auto", padding: 32 }}>
        {tab === "workout" && <WorkoutTab exercises={exercises} workoutLogs={workoutLogs} onLogSet={addWorkoutLog} />}
        {tab === "progress" && <ProgressTab exercises={exercises} workoutLogs={workoutLogs} />}
        {tab === "body" && <BodyTab bodyLogs={bodyLogs} onSave={addBodyLog} />}
        {tab === "nutrition" && <NutritionTab nutritionLogs={nutritionLogs} onSave={addNutritionLog} onEdit={editNutritionLog} onDelete={deleteNutritionLog} />}
        {tab === "phase" && <PhaseTracker phase={phase} setPhase={savePhase} />}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
